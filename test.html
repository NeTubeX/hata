<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>TEST - AssemblyAI - 3 Modes de saisie</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/hammer.js/2.0.8/hammer.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{background:#0a0e1a;font-family:system-ui;padding:15px;color:#ffffff;}
h2{color:#ffffff;margin-bottom:10px;font-size:18px;}
button{padding:12px 20px;margin:5px;border:none;border-radius:30px;font-weight:bold;cursor:pointer;color:white;}
.btn-quick{background:#8b5cf6;color:white;}
.btn-voice{background:#10b981;color:white;}
.btn-gesture{background:#f59e0b;color:white;}
table{width:100%;border-collapse:collapse;margin-top:15px;background:#1e293b;border-radius:12px;overflow:hidden;}
th,td{padding:10px;text-align:center;color:#ffffff;border-bottom:1px solid #334155;}
th{background:#0f172a;color:#cbd5e1;}
.modal{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.95);display:flex;align-items:center;justify-content:center;visibility:hidden;z-index:1000;}
.modal.show{visibility:visible;}
.modal-box{background:#1e293b;border-radius:30px;padding:25px;width:90%;max-width:400px;text-align:center;border:1px solid #3b82f6;}
.note-big{font-size:70px;font-weight:bold;color:#60a5fa;background:#0f172a;padding:20px;border-radius:50px;margin:15px 0;}
.numpad{display:grid;grid-template-columns:repeat(5,1fr);gap:10px;margin:20px 0;}
.numpad button{background:#334155;color:white;padding:15px;font-size:20px;margin:0;border:none;border-radius:12px;cursor:pointer;}
.numpad button:active{background:#3b82f6;}
.gesture-zone{background:#0f172a;border-radius:50px;padding:40px;margin:15px 0;cursor:pointer;border:2px solid #f59e0b;}
.student-name{font-size:22px;font-weight:bold;color:#60a5fa;}
.progress{font-size:12px;color:#cbd5e1;margin-top:15px;}
.toast{position:fixed;bottom:30px;left:50%;transform:translateX(-50%);background:#1e293b;color:white;padding:8px 20px;border-radius:30px;font-size:13px;opacity:0;transition:0.2s;border:1px solid #3b82f6;}
.toast.show{opacity:1;}
#voiceFeedback{background:#0f172a;padding:15px;border-radius:20px;margin:10px 0;min-height:100px;color:#cbd5e1;text-align:center;font-size:13px;overflow-y:auto;}
.gesture-value{font-size:60px;font-weight:bold;color:#f59e0b;}
.gesture-hint{font-size:12px;color:#cbd5e1;margin-top:15px;}
.modal-box button{background:#334155;color:white;border:none;border-radius:30px;padding:10px 20px;cursor:pointer;}
.modal-box button:active{transform:scale(0.96);}
.voice-active-badge{background:#10b981;color:white;padding:5px 12px;border-radius:20px;font-size:11px;display:inline-block;margin-bottom:10px;}
.volume-control{display:flex;align-items:center;justify-content:center;gap:10px;margin:10px 0;}
.volume-control button{background:#334155;padding:5px 12px;font-size:12px;margin:0;}
</style>
</head>
<body>

<h2>🧪 TEST - AssemblyAI - 3 Modes de saisie</h2>

<div style="margin:15px 0">
<button class="btn-quick" id="testQuick">⚡ MODE RAPIDE</button>
<button class="btn-voice" id="testVoice">🎙️ DICTÉE VOCALE (AssemblyAI)</button>
<button class="btn-gesture" id="testGesture">👆 MODE GESTUEL</button>
</div>

<div id="preview">
<table id="noteTable">
<thead><tr><th>Élève</th><th>Note P1</th></tr></thead>
<tbody id="tableBody"></tbody>
</table>
</div>

<div id="toast" class="toast"></div>

<!-- MODAL -->
<div id="modal" class="modal">
<div class="modal-box">
<div class="voice-active-badge" id="voiceBadge" style="display:none">🎤 Mode vocal AssemblyAI actif</div>
<div id="modalStudentName" class="student-name">---</div>
<div id="modalStudentClass" style="font-size:12px;color:#cbd5e1;margin:5px 0">Classe: 4ème</div>
<div class="volume-control" style="display:none">
<button id="volumeDownBtn" style="background:#334155">🔉 -</button>
<span id="volumeStatus" style="font-size:11px;color:#94a3b8">Volume: 100%</span>
<button id="volumeUpBtn" style="background:#334155">🔊 +</button>
<button id="testVoiceBtn" style="background:#3b82f6">🔊 Tester la voix</button>
</div>
<div id="modalNoteArea">
<div class="note-big" id="noteValue">0</div>
<div style="font-size:12px;color:#cbd5e1">/ <span id="noteMax">20</span></div>
</div>
<div id="modalControls"></div>
<div id="modalProgress" class="progress"></div>
<div style="margin-top:20px"><button id="closeModal" style="background:#334155">Fermer</button></div>
</div>
</div>

<script>
// ============ CLÉ API ASSEMBLYAI (POUR TEST UNIQUEMENT) ============
const ASSEMBLYAI_API_KEY = "a917d7b2611a422db3e0a352071f32cb";

// ============ SYNTHÈSE VOCALE ============
let currentVolume = 1.0;
let speechSynthesis = window.speechSynthesis;
let currentUtterance = null;

function stopSpeaking() {
    if (speechSynthesis) {
        speechSynthesis.cancel();
    }
}

function speak(text, priority = true) {
    if (!text) return;
    if (priority) stopSpeaking();
    
    let utterance = new SpeechSynthesisUtterance(text);
    utterance.lang = 'fr-FR';
    utterance.rate = 0.9;
    utterance.pitch = 1.0;
    utterance.volume = currentVolume;
    
    let voices = speechSynthesis.getVoices();
    let frenchVoice = voices.find(v => v.lang === 'fr-FR' || v.lang.startsWith('fr'));
    if (frenchVoice) utterance.voice = frenchVoice;
    
    utterance.onend = () => { currentUtterance = null; };
    utterance.onerror = () => { currentUtterance = null; };
    
    currentUtterance = utterance;
    speechSynthesis.speak(utterance);
}

function setVolume(value) {
    currentVolume = Math.min(1.0, Math.max(0.1, value));
    document.getElementById('volumeStatus').innerHTML = `Volume: ${Math.round(currentVolume * 100)}%`;
    speak("Test volume", false);
}

// ============ DONNÉES ============
let students = [
    { id: 0, nom: "KASONGO Jean", note: 0 },
    { id: 1, nom: "MAMBU Thérèse", note: 0 },
    { id: 2, nom: "MUTOMBO Paul", note: 0 },
    { id: 3, nom: "KABONGO Marie", note: 0 },
    { id: 4, nom: "LUMUMBA David", note: 0 }
];
let currentMode = null;
let currentIndex = 0;
let currentNote = 0;
let maxNote = 20;
let voiceWaiting = false;

// ============ ASSEMBLYAI STREAMING ============
let assemblyAIWs = null;
let mediaStream = null;
let mediaRecorder = null;
let audioContext = null;
let sourceNode = null;
let processorNode = null;

function refreshTable() {
    let html = '';
    students.forEach((s, i) => {
        let color = s.note >= 10 ? '#10b981' : (s.note > 0 ? '#f59e0b' : '#cbd5e1');
        let activeBorder = (i === currentIndex && currentMode === 'voice') ? '2px solid #10b981' : 'none';
        html += `<tr style="border-left: ${activeBorder}">`;
        html += `<td style="color:#ffffff">${s.nom} ${i === currentIndex && currentMode === 'voice' ? '🎤' : ''}</td>`;
        html += `<td style="color:${color};font-weight:bold">${s.note}</td>`;
        html += `</tr>`;
    });
    document.getElementById('tableBody').innerHTML = html;
}

function showToast(msg) {
    let toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2500);
}

function saveNote(index, value) {
    students[index].note = value;
    refreshTable();
    let msg = `${students[index].nom} a obtenu ${value} sur ${maxNote}`;
    showToast(`✅ ${msg}`);
    speak(msg, true);
}

function updateModalUI() {
    document.getElementById('modalStudentName').textContent = students[currentIndex].nom;
    document.getElementById('noteValue').textContent = currentNote;
    document.getElementById('noteMax').textContent = maxNote;
    document.getElementById('modalProgress').textContent = `📋 ${currentIndex+1} / ${students.length} élèves`;
    refreshTable();
}

function doValidate() {
    saveNote(currentIndex, currentNote);
    if (currentIndex + 1 < students.length) {
        currentIndex++;
        currentNote = students[currentIndex].note;
        updateModalUI();
        let msg = `Passage à ${students[currentIndex].nom}, note actuelle ${currentNote} sur ${maxNote}`;
        speak(msg, true);
    } else {
        let msg = "Félicitations! Tous les élèves ont été notés.";
        speak(msg, true);
        document.getElementById('modal').classList.remove('show');
        currentMode = null;
        refreshTable();
    }
}

function doSkip() {
    if (currentIndex + 1 < students.length) {
        currentIndex++;
        currentNote = students[currentIndex].note;
        updateModalUI();
        let msg = `Passage à ${students[currentIndex].nom} sans enregistrer`;
        speak(msg, true);
    } else {
        let msg = "Vous êtes déjà au dernier élève";
        speak(msg, true);
    }
}

function findStudentByName(nomDit) {
    let nomLower = nomDit.toLowerCase().trim();
    nomLower = nomLower.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
    
    for (let i = 0; i < students.length; i++) {
        let studentName = students[i].nom.toLowerCase();
        studentName = studentName.normalize("NFD").replace(/[\u0300-\u036f]/g, "");
        
        if (studentName.includes(nomLower)) return i;
        let firstName = studentName.split(' ')[0];
        if (firstName === nomLower) return i;
        let lastName = studentName.split(' ').pop();
        if (lastName === nomLower) return i;
    }
    return -1;
}

// ========== ASSEMBLYAI STREAMING ==========
async function startAssemblyAIStreaming() {
    try {
        // Demander le micro
        mediaStream = await navigator.mediaDevices.getUserMedia({ audio: true });
        
        // Créer contexte audio (force 16kHz)
        audioContext = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
        sourceNode = audioContext.createMediaStreamSource(mediaStream);
        
        // Connexion WebSocket à AssemblyAI
        const wsUrl = `wss://streaming.assemblyai.com/v3/ws?sample_rate=16000&speech_model=u3-rt-pro`;
        assemblyAIWs = new WebSocket(wsUrl, {
            headers: { Authorization: ASSEMBLYAI_API_KEY }
        });
        
        assemblyAIWs.onopen = () => {
            console.log("✅ WebSocket AssemblyAI connecté");
            document.getElementById('voiceFeedback').innerHTML = "🎙️ Connecté à AssemblyAI - Parlez maintenant...";
            speak("Connecté à AssemblyAI. Je vous écoute.", true);
            
            // Configurer le pipeline audio
            processorNode = audioContext.createScriptProcessor(4096, 1, 1);
            processorNode.onaudioprocess = (event) => {
                if (assemblyAIWs && assemblyAIWs.readyState === WebSocket.OPEN) {
                    const inputData = event.inputBuffer.getChannelData(0);
                    // Convertir Float32 -> Int16
                    const pcmData = new Int16Array(inputData.length);
                    for (let i = 0; i < inputData.length; i++) {
                        pcmData[i] = Math.max(-32768, Math.min(32767, Math.floor(inputData[i] * 32768)));
                    }
                    assemblyAIWs.send(pcmData.buffer);
                }
            };
            
            sourceNode.connect(processorNode);
            processorNode.connect(audioContext.destination);
            audioContext.resume();
        };
        
        assemblyAIWs.onmessage = (event) => {
            const msg = JSON.parse(event.data);
            if (msg.type === 'Turn') {
                const text = msg.transcript;
                const isFinal = msg.end_of_turn;
                
                const feedbackDiv = document.getElementById('voiceFeedback');
                feedbackDiv.innerHTML = isFinal ? 
                    `<div style="color:#10b981">✅ Final: ${text}</div>` : 
                    `<div style="color:#f59e0b">⏳ Partial: ${text}</div>`;
                
                if (isFinal && text) {
                    // Traiter la commande vocale
                    processVoiceCommand(text);
                }
            } else if (msg.type === 'SpeechStarted') {
                document.getElementById('voiceFeedback').innerHTML = "🎤 Détection de parole...";
            } else if (msg.type === 'Termination') {
                console.log("Session terminée");
            }
        };
        
        assemblyAIWs.onerror = (error) => {
            console.error("Erreur WebSocket:", error);
            document.getElementById('voiceFeedback').innerHTML = "❌ Erreur de connexion à AssemblyAI";
            showToast("Erreur AssemblyAI");
        };
        
        assemblyAIWs.onclose = () => {
            console.log("WebSocket fermé");
            if (voiceWaiting && currentMode === 'voice') {
                setTimeout(() => startAssemblyAIStreaming(), 1000);
            }
        };
        
    } catch (error) {
        console.error("Erreur accès micro:", error);
        document.getElementById('voiceFeedback').innerHTML = "❌ Impossible d'accéder au microphone";
        showToast("Erreur: accès micro refusé");
    }
}

function stopAssemblyAIStreaming() {
    voiceWaiting = false;
    if (assemblyAIWs && assemblyAIWs.readyState === WebSocket.OPEN) {
        assemblyAIWs.send(JSON.stringify({ type: "Terminate" }));
        setTimeout(() => assemblyAIWs.close(), 100);
    }
    if (processorNode) processorNode.disconnect();
    if (sourceNode) sourceNode.disconnect();
    if (audioContext) audioContext.close();
    if (mediaStream) mediaStream.getTracks().forEach(track => track.stop());
}

function processVoiceCommand(text) {
    const lowerText = text.toLowerCase();
    const feedbackDiv = document.getElementById('voiceFeedback');
    feedbackDiv.innerHTML += `<div>📝 Commande reçue: "${text}"</div>`;
    
    // Valider
    if (lowerText.includes('valider') || lowerText.includes('valide') || lowerText.includes('enregistrer')) {
        doValidate();
        return;
    }
    
    // Passer
    if (lowerText.includes('passer') || lowerText.includes('suivant') || lowerText.includes('saute')) {
        doSkip();
        return;
    }
    
    // Changer d'élève
    let foundIndex = findStudentByName(text);
    if (foundIndex !== -1 && foundIndex !== currentIndex) {
        if (currentNote !== students[currentIndex].note) {
            saveNote(currentIndex, currentNote);
        }
        currentIndex = foundIndex;
        currentNote = students[currentIndex].note;
        updateModalUI();
        let msg = `Changement vers ${students[currentIndex].nom}, note actuelle ${currentNote}`;
        speak(msg, true);
        return;
    }
    
    // Demander note actuelle
    if (lowerText.includes('note actuelle') || lowerText.includes('quelle est sa note') || lowerText.includes('combien')) {
        let msg = `${students[currentIndex].nom} a ${currentNote} sur ${maxNote}`;
        speak(msg, true);
        return;
    }
    
    // Extraire un nombre
    let match = text.match(/\b(\d{1,2})\b/);
    if (match) {
        let detected = parseInt(match[1]);
        if (detected <= maxNote) {
            currentNote = detected;
            document.getElementById('noteValue').textContent = currentNote;
            let msg = `Note mise à ${currentNote} pour ${students[currentIndex].nom}`;
            speak(msg, true);
            return;
        }
    }
}

// ========== MODE RAPIDE ==========
function startQuickMode() {
    if (assemblyAIWs) stopAssemblyAIStreaming();
    currentMode = 'quick';
    currentIndex = 0;
    currentNote = students[0].note;
    document.getElementById('voiceBadge').style.display = 'none';
    
    let controls = `<div class="numpad" id="numpad"></div>
    <div style="display:flex;gap:10px;justify-content:center">
        <button id="quickPrev" style="background:#334155">◀ Préc</button>
        <button id="quickSave" style="background:#10b981">✓ Valider</button>
        <button id="quickNext" style="background:#3b82f6">Suiv ▶</button>
    </div>`;
    
    document.getElementById('modalControls').innerHTML = controls;
    document.getElementById('modalNoteArea').style.display = 'block';
    updateModalUI();
    buildNumpad();
    document.getElementById('modal').classList.add('show');
    speak(`Mode rapide activé. Premier élève: ${students[0].nom}`, true);
    
    document.getElementById('quickSave').onclick = () => { saveNote(currentIndex, currentNote); if(currentIndex+1<students.length){ currentIndex++; currentNote=students[currentIndex].note; updateModalUI(); } else { document.getElementById('modal').classList.remove('show'); } };
    document.getElementById('quickNext').onclick = () => { if(currentIndex+1<students.length){ currentIndex++; currentNote=students[currentIndex].note; updateModalUI(); } };
    document.getElementById('quickPrev').onclick = () => { if(currentIndex>0){ currentIndex--; currentNote=students[currentIndex].note; updateModalUI(); } };
}

function buildNumpad() {
    let pad = document.getElementById('numpad');
    if (!pad) return;
    let btns = [7,8,9,'C',4,5,6,'←',1,2,3,'✓',0];
    pad.innerHTML = '';
    btns.forEach(btn => {
        let b = document.createElement('button');
        b.textContent = btn;
        b.style.background = btn === '✓' ? '#10b981' : (btn === 'C' ? '#ef4444' : '#334155');
        b.onclick = () => {
            if (btn === 'C') currentNote = 0;
            else if (btn === '←') currentNote = Math.floor(currentNote / 10);
            else if (btn === '✓') { saveNote(currentIndex, currentNote); if(currentIndex+1<students.length){ currentIndex++; currentNote=students[currentIndex].note; updateModalUI(); } else { document.getElementById('modal').classList.remove('show'); } }
            else { let newVal = parseFloat(currentNote.toString() + btn.toString()); if (newVal <= maxNote) currentNote = newVal; }
            document.getElementById('noteValue').textContent = currentNote;
        };
        pad.appendChild(b);
    });
}

// ========== MODE VOCAL ASSEMBLYAI ==========
async function startVoiceMode() {
    currentMode = 'voice';
    currentIndex = 0;
    currentNote = students[0].note;
    document.getElementById('voiceBadge').style.display = 'inline-block';
    
    let controls = `<div style="margin:15px 0">
        <button id="voiceStopBtn" style="background:#ef4444">⏹️ Arrêter la reconnaissance</button>
    </div>
    <div id="voiceFeedback" style="background:#0f172a;padding:15px;border-radius:20px;margin:10px 0;min-height:120px;color:#cbd5e1;text-align:center;font-size:13px;overflow-y:auto">
        🎤 Cliquez sur "Démarrer le micro" pour activer AssemblyAI
    </div>
    <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button id="voiceStartAssembly" style="background:#10b981">🎙️ Démarrer le micro</button>
        <button id="voiceManualSave" style="background:#10b981">✓ Valider (manuel)</button>
        <button id="voiceManualSkip" style="background:#f59e0b">⏩ Passer (manuel)</button>
    </div>`;
    
    document.getElementById('modalControls').innerHTML = controls;
    document.getElementById('modalNoteArea').style.display = 'block';
    updateModalUI();
    document.getElementById('modal').classList.add('show');
    speak(`Mode dictée vocale AssemblyAI activé. Élève actuel: ${students[0].nom}`, true);
    
    document.getElementById('voiceStartAssembly').onclick = async () => {
        voiceWaiting = true;
        await startAssemblyAIStreaming();
    };
    document.getElementById('voiceStopBtn').onclick = () => { 
        stopAssemblyAIStreaming();
        document.getElementById('voiceFeedback').innerHTML = "⏹️ Reconnaissance arrêtée";
        speak("Reconnaissance vocale arrêtée", true);
    };
    document.getElementById('voiceManualSave').onclick = () => { doValidate(); };
    document.getElementById('voiceManualSkip').onclick = () => { doSkip(); };
}

// ========== MODE GESTUEL ==========
let gestureHammer = null;
function updateGestureZone() { let gv = document.getElementById('gestureValue'); if (gv) gv.textContent = currentNote; }

function startGestureMode() {
    if (assemblyAIWs) stopAssemblyAIStreaming();
    currentMode = 'gesture';
    currentIndex = 0;
    currentNote = students[0].note;
    document.getElementById('voiceBadge').style.display = 'none';
    
    let controls = `<div id="gestureZone" class="gesture-zone">
        <div id="gestureValue" class="gesture-value" style="font-size:60px;font-weight:bold;color:#f59e0b">${currentNote}</div>
    </div>
    <div style="display:flex;gap:10px;justify-content:center;margin-top:15px">
        <button id="gestureSkip" style="background:#f59e0b">⏩ Passer</button>
    </div>`;
    
    document.getElementById('modalControls').innerHTML = controls;
    document.getElementById('modalNoteArea').style.display = 'block';
    updateModalUI();
    document.getElementById('modal').classList.add('show');
    speak(`Mode gestuel activé.`, true);
    
    if (gestureHammer) gestureHammer.destroy();
    let zone = document.getElementById('gestureZone');
    gestureHammer = new Hammer(zone);
    
    gestureHammer.on('swipeleft', () => { if (currentNote > 0) { currentNote--; document.getElementById('gestureValue').textContent = currentNote; document.getElementById('noteValue').textContent = currentNote; if (navigator.vibrate) navigator.vibrate(30); } });
    gestureHammer.on('swiperight', () => { if (currentNote < maxNote) { currentNote++; document.getElementById('gestureValue').textContent = currentNote; document.getElementById('noteValue').textContent = currentNote; if (navigator.vibrate) navigator.vibrate(30); } });
    gestureHammer.on('tap', () => { saveNote(currentIndex, currentNote); if(currentIndex+1<students.length){ currentIndex++; currentNote=students[currentIndex].note; updateModalUI(); let gv=document.getElementById('gestureValue'); if(gv) gv.textContent=currentNote; } else { document.getElementById('modal').classList.remove('show'); } });
    
    document.getElementById('gestureSkip').onclick = () => { if(currentIndex+1<students.length){ currentIndex++; currentNote=students[currentIndex].note; updateModalUI(); let gv=document.getElementById('gestureValue'); if(gv) gv.textContent=currentNote; } };
}

// ========== INIT ==========
document.getElementById('testQuick').onclick = startQuickMode;
document.getElementById('testVoice').onclick = startVoiceMode;
document.getElementById('testGesture').onclick = startGestureMode;
document.getElementById('closeModal').onclick = () => {
    document.getElementById('modal').classList.remove('show');
    if (assemblyAIWs) stopAssemblyAIStreaming();
    if (gestureHammer) gestureHammer.destroy();
    currentMode = null;
    stopSpeaking();
};

document.getElementById('volumeDownBtn').onclick = () => setVolume(currentVolume - 0.1);
document.getElementById('volumeUpBtn').onclick = () => setVolume(currentVolume + 0.1);
document.getElementById('testVoiceBtn').onclick = () => speak("Test du volume vocal. Est-ce que vous m'entendez bien ?", true);

window.speechSynthesis.onvoiceschanged = () => {
    let voices = speechSynthesis.getVoices();
    console.log("Voix disponibles:", voices.map(v => v.lang));
};

refreshTable();
speak("Application AssemblyAI prête.", true);
showToast("Application AssemblyAI prête - Clé API chargée");
</script>
</body>
</html>
