<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
<title>NeTubeX | Scan FEN - Téléchargement PDF</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f0f2f5;color:#1a2c3e;padding:16px;min-height:100vh;}
.container{max-width:1400px;margin:0 auto;width:100%;}
.login-wrapper{max-width:420px;margin:80px auto;}
.card{background:#ffffff;border-radius:20px;box-shadow:0 2px 8px rgba(0,0,0,0.08);padding:32px;border:1px solid #e2e8f0;}
h1{font-size:1.5rem;font-weight:700;color:#0a2540;}
.subtitle{color:#5c6f87;font-size:0.8rem;margin-top:6px;}
.form-group{margin-bottom:20px;}
label{font-size:0.7rem;font-weight:600;text-transform:uppercase;color:#4a5b6e;letter-spacing:0.5px;display:block;margin-bottom:6px;}
input{width:100%;padding:12px 14px;border:1px solid #e2e8f0;border-radius:12px;font-size:0.9rem;background:#fff;}
input:focus{outline:none;border-color:#2c6e9e;}
.btn{background:#1c4e6f;border:none;color:white;padding:12px 24px;font-size:0.85rem;font-weight:600;border-radius:40px;cursor:pointer;transition:opacity 0.2s;}
.btn:hover{opacity:0.85;}
.btn-secondary{background:#ffffff;color:#1c4e6f;border:1px solid #e2e8f0;}
.btn-retrait{background:#9e2c1c;color:#fff;margin-left:10px;}
.btn-filter{background:#eef2f8;color:#1c4e6f;padding:6px 14px;margin-right:6px;border-radius:30px;font-size:0.7rem;font-weight:600;border:none;cursor:pointer;}
.btn-filter.active{background:#1c4e6f;color:white;}
.error-message{color:#c0392b;font-size:0.75rem;margin-top:12px;text-align:center;}
.hidden{display:none;}
.main-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:20px;gap:12px;}
.logo-title h1{font-size:1.4rem;font-weight:800;background:linear-gradient(135deg,#0a2540,#2c6e9e);-webkit-background-clip:text;-webkit-text-fill-color:transparent;}
.content-section{background:#ffffff;border-radius:20px;padding:20px;border:1px solid #e2e8f0;box-shadow:0 2px 6px rgba(0,0,0,0.04);}
.section-header{margin-bottom:20px;padding-bottom:12px;border-bottom:2px solid #eef2f6;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px;}
.section-header h2{font-size:1rem;font-weight:700;color:#0f172a;}
.filter-bar{display:flex;gap:6px;flex-wrap:wrap;align-items:center;}
.filter-bar input{padding:6px 10px;border-radius:30px;border:1px solid #e2e8f0;font-size:0.7rem;}
.table-wrapper{overflow-x:auto;border-radius:16px;border:1px solid #eef2f6;margin-top:12px;}
.scan-table{width:100%;border-collapse:collapse;font-size:0.75rem;}
.scan-table th{background:#f8fafc;padding:12px 12px;text-align:left;font-weight:700;color:#1e293b;border-bottom:2px solid #e2e8f0;font-size:0.7rem;text-transform:uppercase;letter-spacing:0.3px;}
.scan-table td{padding:10px 12px;border-bottom:1px solid #f1f5f9;color:#334155;}
.scan-table tr:hover td{background:#fafcff;}
.observation-cell{max-width:200px;white-space:normal;word-break:break-word;font-size:0.7rem;color:#475569;line-height:1.3;}
.btn-preview-scan{background:#eef2f8;border:none;color:#1c4e6f;padding:5px 10px;border-radius:20px;cursor:pointer;font-size:0.65rem;font-weight:600;}
.btn-preview-scan:hover{background:#e2e8f0;}
.btn-delete-scan{background:#fef2f2;border:1px solid #fecaca;color:#dc2626;padding:5px 10px;border-radius:20px;cursor:pointer;font-size:0.65rem;font-weight:600;}
.btn-delete-scan:hover{background:#fee2e2;}
.btn-download-pdf{background:#8b5cf6;border:none;color:#fff;padding:5px 10px;border-radius:20px;cursor:pointer;font-size:0.65rem;font-weight:600;margin-right:6px;}
.btn-download-pdf:hover{background:#7c3aed;}
.btn-delete-bulk{background:#dc2626;color:white;border:none;padding:6px 14px;border-radius:40px;font-size:0.7rem;font-weight:600;cursor:pointer;}
.btn-delete-bulk:hover{opacity:0.85;}
.status-badge{display:inline-flex;align-items:center;gap:4px;padding:3px 10px;border-radius:40px;font-size:0.65rem;font-weight:600;background:#ecfdf5;color:#059669;}
.actions-cell{display:flex;gap:6px;flex-wrap:wrap;}
footer{text-align:center;font-size:0.65rem;color:#94a3b8;margin-top:24px;padding:16px;border-top:1px solid #eef2f6;}
.toast-container{position:fixed;bottom:20px;right:16px;left:16px;z-index:10000;display:flex;flex-direction:column;gap:8px;}
.toast{background:#1e293b;color:#fff;padding:12px 16px;border-radius:16px;font-size:0.75rem;display:flex;align-items:center;gap:10px;box-shadow:0 10px 25px -5px rgba(0,0,0,0.1);border-left:4px solid;animation:slideIn 0.2s ease;}
.toast-success{border-left-color:#10b981;}
.toast-error{border-left-color:#ef4444;}
.toast-warning{border-left-color:#f59e0b;}
.toast-info{border-left-color:#3b82f6;}
@keyframes slideIn{from{opacity:0;transform:translateX(100px);}to{opacity:1;transform:translateX(0);}}
.modal-confirm{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.7);backdrop-filter:blur(6px);z-index:20000;display:flex;align-items:center;justify-content:center;visibility:hidden;opacity:0;transition:0.2s;}
.modal-confirm.active{visibility:visible;opacity:1;}
.modal-confirm-content{background:#fff;border-radius:28px;max-width:320px;width:85%;padding:24px 20px;text-align:center;}
.modal-confirm-content i{font-size:40px;margin-bottom:12px;color:#f59e0b;}
.modal-confirm-content h3{font-size:18px;font-weight:700;margin-bottom:6px;color:#0f172a;}
.modal-confirm-content p{font-size:13px;color:#475569;margin-bottom:20px;}
.modal-confirm-buttons{display:flex;gap:12px;justify-content:center;}
.modal-confirm-buttons button{padding:8px 20px;border-radius:40px;font-size:13px;font-weight:600;border:none;cursor:pointer;}
.btn-confirm-yes{background:#10b981;color:#fff;}
.btn-confirm-no{background:#e2e8f0;color:#1e293b;}
.loading-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.6);backdrop-filter:blur(4px);z-index:30000;display:flex;align-items:center;justify-content:center;visibility:hidden;}
.loading-overlay.active{visibility:visible;}
.loading-spinner{background:#fff;border-radius:20px;padding:25px 35px;text-align:center;}
.loading-spinner i{font-size:36px;color:#1c4e6f;margin-bottom:12px;}
.loading-spinner p{font-size:13px;color:#475569;}
</style>
</head>
<body>
<div class="container">
    <div id="loginSection">
        <div class="login-wrapper">
            <div class="card">
                <h1>NE TUBEX</h1>
                <div class="subtitle">Portail administrateur · Scans FEN</div>
                <div class="form-group"><label>Email</label><input type="email" id="loginEmail" placeholder="admin@netubex.com"></div>
                <div class="form-group"><label>Mot de passe</label><input type="password" id="loginPassword" placeholder=""></div>
                <button class="btn" id="loginBtn" style="width:100%;">Se connecter</button>
                <div id="loginError" class="error-message hidden"></div>
            </div>
        </div>
    </div>
    <div id="dashboardSection" class="hidden">
        <div class="main-header">
            <div class="logo-title"><h1>📸 NE TUBEX · SCANS FEN</h1></div>
            <div>
                <button id="refreshBtn" class="btn btn-secondary"><i class="fas fa-sync-alt"></i></button>
                <button id="retraitBtn" class="btn btn-retrait"><i class="fas fa-money-bill-wave"></i> Retrait</button>
            </div>
        </div>
        <div class="content-section">
            <div class="section-header">
                <h2><i class="fas fa-file-alt"></i> Rapports FEN</h2>
                <div class="filter-bar">
                    <button class="btn-filter" data-filter="today">Aujourd'hui</button>
                    <button class="btn-filter" data-filter="week">Semaine</button>
                    <button class="btn-filter" data-filter="month">Mois</button>
                    <button class="btn-filter active" data-filter="all">Tous</button>
                    <input type="date" id="dateStartFilter" placeholder="Du">
                    <input type="date" id="dateEndFilter" placeholder="Au">
                    <button id="applyDateFilter" class="btn-filter" style="background:#1c4e6f;color:white;">Appliquer</button>
                    <button id="deleteBulkBtn" class="btn-delete-bulk"><i class="fas fa-trash-alt"></i> Suppr.</button>
                </div>
            </div>
            <div class="table-wrapper">
                <table class="scan-table">
                    <thead>
                        <tr><th style="width:28px;"><input type="checkbox" id="selectAllCheckbox"></th><th>Date</th><th>Expéditeur</th><th>Observation</th><th>Docs</th><th>Aperçu</th><th>Statut</th><th>Actions</th></thead>
                    <tbody id="scansBody"><tr><td colspan="8" style="text-align:center;padding:40px;"><i class="fas fa-spinner fa-pulse"></i> Chargement...</td></tr></tbody>
                </table>
            </div>
        </div>
        <footer>© NeTubeX 2026 · Plateforme de réception des rapports FEN</footer>
    </div>
</div>
<div id="toastContainer" class="toast-container"></div>
<div id="confirmModal" class="modal-confirm"><div class="modal-confirm-content"><i class="fas fa-shield-alt"></i><h3>Confirmation</h3><p id="confirmMessage">Êtes-vous sûr ?</p><div class="modal-confirm-buttons"><button class="btn-confirm-no" id="confirmNoBtn">Annuler</button><button class="btn-confirm-yes" id="confirmYesBtn">Confirmer</button></div></div></div>
<div id="loadingOverlay" class="loading-overlay"><div class="loading-spinner"><i class="fas fa-spinner fa-pulse"></i><p>Génération du PDF en cours...</p></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = { apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA", authDomain: "netubexmoney.firebaseapp.com", projectId: "netubexmoney", storageBucket: "netubexmoney.firebasestorage.app", messagingSenderId: "856592608176", appId: "1:856592608176:web:69f9df9cfd4f8c28630475" };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let allScansData = [];
let currentFilter = 'all';
let currentStartDate = null;
let currentEndDate = null;

function showToast(message, type = "success") {
    const container = document.getElementById('toastContainer');
    const toast = document.createElement('div');
    toast.className = `toast toast-${type}`;
    toast.innerHTML = `<div style="font-weight:600;">${type === 'success' ? '✓' : '⚠️'}</div><div style="flex:1;">${message}</div><button style="background:transparent;border:none;color:#fff;cursor:pointer;font-size:16px;">&times;</button>`;
    container.appendChild(toast);
    toast.querySelector('button').onclick = () => toast.remove();
    setTimeout(() => toast.remove(), 5000);
}

function showConfirm(message, onConfirm) {
    const modal = document.getElementById('confirmModal');
    document.getElementById('confirmMessage').innerText = message;
    modal.classList.add('active');
    const confirmYes = () => { modal.classList.remove('active'); onConfirm(); cleanup(); };
    const confirmNo = () => { modal.classList.remove('active'); cleanup(); };
    const cleanup = () => {
        document.getElementById('confirmYesBtn').removeEventListener('click', confirmYes);
        document.getElementById('confirmNoBtn').removeEventListener('click', confirmNo);
    };
    document.getElementById('confirmYesBtn').addEventListener('click', confirmYes, { once: true });
    document.getElementById('confirmNoBtn').addEventListener('click', confirmNo, { once: true });
}

function showLoading(show) {
    document.getElementById('loadingOverlay').classList.toggle('active', show);
}

async function chargerScansFEN() {
    try {
        const querySnapshot = await getDocs(collection(db, "scan_reports"));
        allScansData = [];
        querySnapshot.forEach(docSnap => { allScansData.push({ id: docSnap.id, ...docSnap.data() }); });
        allScansData.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
        appliquerFiltre();
    } catch (err) {
        showToast("Erreur chargement", "error");
    }
}

function appliquerFiltre() {
    let filtered = [...allScansData];
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const weekAgo = new Date(today); weekAgo.setDate(today.getDate() - 7);
    const monthAgo = new Date(today); monthAgo.setMonth(today.getMonth() - 1);
    
    if (currentFilter === 'today') filtered = filtered.filter(s => new Date(s.timestamp) >= today);
    else if (currentFilter === 'week') filtered = filtered.filter(s => new Date(s.timestamp) >= weekAgo);
    else if (currentFilter === 'month') filtered = filtered.filter(s => new Date(s.timestamp) >= monthAgo);
    else if (currentFilter === 'custom' && currentStartDate && currentEndDate) {
        const start = new Date(currentStartDate); start.setHours(0,0,0,0);
        const end = new Date(currentEndDate); end.setHours(23,59,59,999);
        filtered = filtered.filter(s => { const d = new Date(s.timestamp); return d >= start && d <= end; });
    }
    afficherScans(filtered);
}

function formatDate(timestamp) {
    if (!timestamp) return '—';
    try {
        const d = new Date(timestamp);
        return d.toLocaleDateString('fr-FR', { day:'2-digit', month:'2-digit', year:'numeric' }) + ' ' + d.toLocaleTimeString('fr-FR', { hour:'2-digit', minute:'2-digit' });
    } catch(e) { return '—'; }
}

async function downloadAsPDF(scan) {
    showLoading(true);
    try {
        const { jsPDF } = window.jspdf;
        const pdf = new jsPDF({ unit: 'mm', format: 'a4', orientation: 'portrait' });
        const pageWidth = 210, pageHeight = 297, margin = 15;
        const contentWidth = pageWidth - (margin * 2);
        
        pdf.setFontSize(16); pdf.setFont("helvetica", "bold");
        pdf.text("RAPPORT FEN - DOCUMENTS SCANNÉS", pageWidth / 2, 20, { align: "center" });
        pdf.setFontSize(10); pdf.setFont("helvetica", "normal");
        pdf.text(`Date: ${formatDate(scan.timestamp)}`, margin, 35);
        pdf.text(`Expéditeur: ${scan.expediteur || 'Blandine Kazembe'} (FEN)`, margin, 42);
        pdf.text(`Observation: ${scan.observation || 'Aucune'}`, margin, 49);
        pdf.line(margin, 55, pageWidth - margin, 55);
        
        let yPos = 65;
        const docs = [
            { name: "Feuille de présence", data: scan.documents?.feuillePresence },
            { name: "PV transmission de rapport", data: scan.documents?.pvTransmission },
            { name: "PV archivage", data: scan.documents?.pvArchivage }
        ];
        
        for (let i = 0; i < docs.length; i++) {
            if (!docs[i].data) continue;
            pdf.setFontSize(11); pdf.setFont("helvetica", "bold");
            pdf.text(`${i+1}. ${docs[i].name}`, margin, yPos);
            yPos += 6;
            
            const img = new Image();
            await new Promise((resolve, reject) => { img.onload = resolve; img.onerror = reject; img.src = docs[i].data; });
            const ratio = img.height / img.width;
            let finalWidth = contentWidth;
            let finalHeight = contentWidth * ratio;
            if (finalHeight > pageHeight - yPos - 20) { finalHeight = pageHeight - yPos - 20; finalWidth = finalHeight / ratio; }
            const xPos = margin + (contentWidth - finalWidth) / 2;
            pdf.addImage(docs[i].data, 'JPEG', xPos, yPos, finalWidth, finalHeight);
            yPos += finalHeight + 10;
            if (yPos > pageHeight - 25 && i < docs.length - 1) { pdf.addPage(); yPos = 20; }
        }
        
        const fileName = `RAPPORT_FEN_${new Date(scan.timestamp).toLocaleDateString('fr-FR').replace(/\//g, '-')}.pdf`;
        
        // Méthode de téléchargement fiable pour mobile
        const pdfBlob = pdf.output('blob');
        
        // Pour mobile: créer un lien de téléchargement et cliquer dessus
        const link = document.createElement('a');
        const url = URL.createObjectURL(pdfBlob);
        link.href = url;
        link.download = fileName;
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
        URL.revokeObjectURL(url);
        
        showToast("PDF téléchargé avec succès", "success");
    } catch (err) {
        console.error(err);
        showToast("Erreur lors de la génération du PDF", "error");
    } finally {
        showLoading(false);
    }
}

function afficherScans(scans) {
    const tbody = document.getElementById('scansBody');
    if (scans.length === 0) { tbody.innerHTML = '<tr><td colspan="8" style="text-align:center;padding:40px;">Aucun rapport trouvé</td></tr>'; return; }
    
    let html = '';
    for (const scan of scans) {
        const docsList = [];
        if (scan.documents?.feuillePresence) docsList.push('📋 FP');
        if (scan.documents?.pvTransmission) docsList.push('📄 PVT');
        if (scan.documents?.pvArchivage) docsList.push('📑 PVA');
        const doc0 = (scan.documents?.feuillePresence || '').replace(/"/g, '&quot;');
        const doc1 = (scan.documents?.pvTransmission || '').replace(/"/g, '&quot;');
        const doc2 = (scan.documents?.pvArchivage || '').replace(/"/g, '&quot;');
        
        html += `<tr>
            <td><input type="checkbox" class="scan-checkbox" value="${scan.id}"></td>
            <td><strong>${formatDate(scan.timestamp)}</strong></td>
            <td><div style="font-weight:600;">${escapeHtml(scan.expediteur || 'Blandine Kazembe')}</div><div style="font-size:0.6rem;color:#64748b;">FEN</div></td>
            <td class="observation-cell">${escapeHtml(scan.observation || '—')}</td>
            <td>${docsList.join('<br>')}</td>
            <td><button class="btn-preview-scan" data-doc0="${doc0}" data-doc1="${doc1}" data-doc2="${doc2}"><i class="fas fa-eye"></i></button></td>
            <td><span class="status-badge"><i class="fas fa-check-circle"></i> Reçu</span></td>
            <td class="actions-cell">
                <button class="btn-download-pdf" data-doc0="${doc0}" data-doc1="${doc1}" data-doc2="${doc2}" data-expediteur="${escapeHtml(scan.expediteur || 'Blandine Kazembe')}" data-date="${scan.timestamp}" data-observation="${escapeHtml(scan.observation || '')}"><i class="fas fa-file-pdf"></i> PDF</button>
                <button class="btn-delete-scan" data-id="${scan.id}"><i class="fas fa-trash-alt"></i></button>
            </td>
        </tr>`;
    }
    tbody.innerHTML = html;
    
    // Aperçu
    document.querySelectorAll('.btn-preview-scan').forEach(btn => {
        btn.addEventListener('click', () => {
            const doc0 = btn.getAttribute('data-doc0'), doc1 = btn.getAttribute('data-doc1'), doc2 = btn.getAttribute('data-doc2');
            const modalHtml = `<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:10001;display:flex;align-items:center;justify-content:center;"><div style="background:#fff;border-radius:20px;padding:20px;max-width:90%;max-height:90%;overflow:auto;"><div style="text-align:right;"><button id="closeModalBtn" style="background:transparent;border:none;font-size:1.5rem;cursor:pointer;">&times;</button></div><div style="display:flex;gap:15px;justify-content:center;flex-wrap:wrap;">${doc0 ? `<div><img src="${doc0}" style="max-width:180px;border-radius:12px;border:1px solid #ddd;"><div style="font-size:11px;margin-top:6px;">Feuille présence</div></div>` : ''}${doc1 ? `<div><img src="${doc1}" style="max-width:180px;border-radius:12px;border:1px solid #ddd;"><div style="font-size:11px;margin-top:6px;">PV transmission</div></div>` : ''}${doc2 ? `<div><img src="${doc2}" style="max-width:180px;border-radius:12px;border:1px solid #ddd;"><div style="font-size:11px;margin-top:6px;">PV archivage</div></div>` : ''}</div></div></div>`;
            const modalDiv = document.createElement('div'); modalDiv.innerHTML = modalHtml; document.body.appendChild(modalDiv);
            modalDiv.querySelector('#closeModalBtn').onclick = () => modalDiv.remove();
        });
    });
    
    // Téléchargement PDF
    document.querySelectorAll('.btn-download-pdf').forEach(btn => {
        btn.addEventListener('click', async (e) => {
            e.stopPropagation();
            const scanData = {
                documents: { feuillePresence: btn.getAttribute('data-doc0'), pvTransmission: btn.getAttribute('data-doc1'), pvArchivage: btn.getAttribute('data-doc2') },
                expediteur: btn.getAttribute('data-expediteur'), fonction: 'FEN', observation: btn.getAttribute('data-observation'), timestamp: btn.getAttribute('data-date')
            };
            await downloadAsPDF(scanData);
        });
    });
    
    // Suppression
    document.querySelectorAll('.btn-delete-scan').forEach(btn => {
        btn.addEventListener('click', async (e) => {
            e.stopPropagation(); const id = btn.getAttribute('data-id');
            showConfirm('Supprimer ce rapport ?', async () => { await deleteDoc(doc(db, "scan_reports", id)); chargerScansFEN(); showToast("Rapport supprimé", "success"); });
        });
    });
    
    document.getElementById('selectAllCheckbox').onclick = (e) => document.querySelectorAll('.scan-checkbox').forEach(cb => cb.checked = e.target.checked);
}

function escapeHtml(str) { if (!str) return ''; return String(str).replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : '&gt;'); }

async function supprimerScansSelectionnes() {
    const checkboxes = document.querySelectorAll('.scan-checkbox:checked');
    if (checkboxes.length === 0) { showToast("Aucun rapport sélectionné", "warning"); return; }
    showConfirm(`Supprimer ${checkboxes.length} rapport(s) ?`, async () => {
        for (const cb of checkboxes) await deleteDoc(doc(db, "scan_reports", cb.value));
        chargerScansFEN(); showToast(`${checkboxes.length} rapport(s) supprimé(s)`, "success");
    });
}

function setupFilters() {
    const filterBtns = document.querySelectorAll('.btn-filter[data-filter]');
    const applyBtn = document.getElementById('applyDateFilter');
    const startInput = document.getElementById('dateStartFilter');
    const endInput = document.getElementById('dateEndFilter');
    document.getElementById('deleteBulkBtn').addEventListener('click', supprimerScansSelectionnes);
    filterBtns.forEach(btn => { btn.addEventListener('click', () => {
        filterBtns.forEach(b => b.classList.remove('active')); btn.classList.add('active');
        currentFilter = btn.getAttribute('data-filter');
        if (currentFilter !== 'custom') { currentStartDate = null; currentEndDate = null; startInput.value = ''; endInput.value = ''; }
        appliquerFiltre();
    }); });
    applyBtn.addEventListener('click', () => { const start = startInput.value, end = endInput.value; if (start && end) { filterBtns.forEach(b => b.classList.remove('active')); currentFilter = 'custom'; currentStartDate = start; currentEndDate = end; appliquerFiltre(); } else showToast("Plage de dates complète requise", "warning"); });
}

const loginSection = document.getElementById('loginSection'), dashboardSection = document.getElementById('dashboardSection');
const loginEmail = document.getElementById('loginEmail'), loginPassword = document.getElementById('loginPassword'), loginBtn = document.getElementById('loginBtn'), loginError = document.getElementById('loginError');
loginBtn.onclick = async () => { loginError.classList.add('hidden'); try { await signInWithEmailAndPassword(auth, loginEmail.value, loginPassword.value); } catch(e) { loginError.innerText = 'Identifiants incorrects'; loginError.classList.remove('hidden'); showToast("Échec connexion", "error"); } };
document.getElementById('refreshBtn').onclick = () => chargerScansFEN();
document.getElementById('retraitBtn').onclick = () => window.open('https://www.netubex.com/retrait', '_blank');
onAuthStateChanged(auth, (user) => { if (user) { loginSection.classList.add('hidden'); dashboardSection.classList.remove('hidden'); chargerScansFEN(); setupFilters(); } else { loginSection.classList.remove('hidden'); dashboardSection.classList.add('hidden'); loginEmail.value = ''; loginPassword.value = ''; } });
</script>
</body>
</html>
