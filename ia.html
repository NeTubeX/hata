*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;touch-action:pan-x pan-y;}
html,body{height:100%;background:#0a0e1a;font-family:'Inter',sans-serif;overflow-x:hidden;}
.container{max-width:1400px;margin:0 auto;padding:20px;}
.card{background:rgba(18,18,31,0.9);backdrop-filter:blur(10px);border-radius:20px;margin-bottom:20px;overflow:hidden;border:1px solid rgba(59,130,246,0.2);}
.card-header{padding:14px 20px;background:linear-gradient(135deg,#0f2b44,#071a2c);color:#fff;font-weight:600;}

.school-name{font-size:22px;font-weight:700;background:linear-gradient(135deg,#fff,#94a3b8);-webkit-background-clip:text;background-clip:text;color:transparent;}
.school-sub{font-size:11px;opacity:0.8;margin-top:4px;color:#cbd5e1;}
.tabs-container{overflow-x:auto;margin-bottom:20px;white-space:nowrap;-webkit-overflow-scrolling:touch;}
.tabs{display:inline-flex;gap:6px;}
.tab{background:transparent;border:1px solid #334155;padding:9px 20px;border-radius:40px;font-size:13px;cursor:pointer;color:#cbd5e1;transition:all 0.2s;}
.tab:hover{background:rgba(59,130,246,0.2);border-color:#3b82f6;}
.tab.active{background:#1e3a5f;color:#fff;border-color:transparent;}
.tab-content{display:none;animation:fadeIn 0.25s;}
.tab-content.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.form-grid{display:grid;grid-template-columns:1fr;gap:14px;}

.form-field{display:flex;flex-direction:column;gap:6px;}
.form-field label{font-size:11px;font-weight:600;color:#cbd5e1;}
.form-field input,.form-field select{background:#2d3748;border:1px solid #334155;border-radius:12px;padding:10px 14px;color:#fff;}

.btn{background:#1e3a5f;color:#fff;border:none;padding:10px 20px;border-radius:40px;font-weight:500;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:8px;transition:all 0.2s;}
.btn:hover{opacity:0.9;transform:scale(0.98);}
.btn-sm{padding:6px 14px;font-size:12px;}

.btn-outline:hover{background:#3b82f6;color:#fff;}
.btn-danger{background:#7f1d1d;}
.btn-danger:hover{background:#991b1b;}
.btn-success{background:#14532d;}
.btn-success:hover{background:#166534;}
.btn-secondary{background:#334155;}
.btn-secondary:hover{background:#475569;}
.btn-warning{background:#b45309;color:#fff;}
.btn-warning:hover{background:#c2410c;}
.table-wrapper{overflow-x:auto;touch-action:pan-x pan-y;}
.student-table{width:100%;border-collapse:collapse;font-size:12px;min-width:1400px;}
.student-table th{background:#0f172a;padding:12px 6px;border-bottom:2px solid #334155;font-size:11px;color:#fff;}
.student-table td{border-bottom:1px solid #334155;padding:8px 4px;color:#e2e8f0;}
.student-table input{width:55px;padding:6px;border-radius:8px;background:#2d3748;border:1px solid #334155;color:#fff;text-align:center;}
.footer-note{text-align:center;padding:12px;font-size:11px;color:#4a5568;}
.fiche-selector{background:rgba(18,18,31,0.9);margin:0;padding:12px 20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border-bottom:1px solid rgba(59,130,246,0.2);}
.fiche-selector label{color:#fff;}
.fiche-selector select{flex:1;padding:8px 12px;border-radius:14px;background:#2d3748;border:1px solid #334155;color:#fff;}

// ==================== FONCTIONS POUR L'ONGLET RECO (CHAT) ====================
let recoMessages = [];
let recoUnsubscribe = null;
let currentRecoEcole = schoolId;

function formatRecoDate(d) {
    let date = new Date(d);
    let now = new Date();
    let isToday = (now - date) < 24 * 60 * 60 * 1000;
    return isToday ? "Aujourd'hui à " + date.toLocaleTimeString('fr-FR', {hour: '2-digit', minute: '2-digit'}) : date.toLocaleDateString('fr-FR', {day: '2-digit', month: '2-digit', hour: '2-digit', minute: '2-digit'});
}

function formatRecoNumber(n) {
    return '#' + String(n).padStart(3, '0');
}

function escapeRecoHtml(t) {
    if(!t) return '';
    return t.replace(/[&<>]/g, m => m === '&' ? '&amp;' : m === '<' ? '&lt;' : m === '>' ? '&gt;' : m);
}

function updateRecoUnreadBadge() {
    let unreadCount = recoMessages.filter(m => m.sender === 'netubex' && !m.read).length;
    let badge = document.getElementById('recoUnreadCount');
    if(badge) badge.textContent = unreadCount;
}

function updateRecoUI() {
    let container = document.getElementById('recoMessagesContainer');
    if(!container) return;
    
    updateRecoUnreadBadge();
    
    if(recoMessages.length === 0) {
        container.innerHTML = '<div class="empty-state">💬 Aucun message. Commencez la discussion !</div>';
        return;
    }
    
    let sorted = [...recoMessages].sort((a, b) => (a.number || 0) - (b.number || 0));
    container.innerHTML = '';
    
    sorted.forEach(msg => {
        let isDirection = msg.sender === 'direction';
        let isUnread = !isDirection && !msg.read;
        let logo = !isDirection ? '<div class="logo-small"><img src="https://www.netubex.com/favicon.png.png" onerror="this.style.display=\'none\'"></div>' : '';
        
        let div = document.createElement('div');
        div.className = `parent-msg ${isDirection ? 'user' : 'bot'}`;
        div.setAttribute('data-message-id', msg.id);
        div.innerHTML = `<div class="bubble">
            <div class="msg-header">
                ${!isDirection ? logo : ''}
                <span class="msg-number">${formatRecoNumber(msg.number)}</span>
                <span class="msg-sender">${escapeRecoHtml(msg.nom)}</span>
                ${isUnread ? '<span class="unread-badge">NON LU</span>' : ''}
            </div>
            <div class="msg-text">${escapeRecoHtml(msg.message)}</div>
            <div class="msg-date">📅 ${formatRecoDate(msg.date)}</div>
        </div>`;
        container.appendChild(div);
    });
    
    setTimeout(() => {
        container.scrollTo({
            top: container.scrollHeight,
            behavior: 'smooth'
        });
    }, 100);
}

async function markRecoMessageAsRead(messageId) {
    try {
        const supportMessagesDocRef = doc(db, "communication", "support_netubex_board");
        const docSnap = await getDoc(supportMessagesDocRef);
        if (docSnap.exists()) {
            let currentMsgs = docSnap.data().messages || [];
            const updatedMsgs = currentMsgs.map(msg => 
                msg.id === messageId ? { ...msg, read: true, readAt: new Date().toISOString() } : msg
            );
            await setDoc(supportMessagesDocRef, { 
                messages: updatedMsgs, 
                lastUpdated: new Date().toISOString() 
            });
        }
    } catch (error) {
        console.error("Erreur marquage lu:", error);
    }
}

function observeRecoMessages() {
    let container = document.getElementById('recoMessagesContainer');
    if(!container) return;
    
    let observer = new IntersectionObserver((entries) => {
        for(let e of entries) {
            if(e.isIntersecting) {
                let el = e.target;
                let messageId = el.getAttribute('data-message-id');
                if(messageId) {
                    let msg = recoMessages.find(m => m.id === messageId);
                    if(msg && msg.sender === 'netubex' && !msg.read) {
                        markRecoMessageAsRead(messageId);
                        msg.read = true;
                        updateRecoUI();
                    }
                }
            }
        }
    }, { threshold: 0.5 });
    
    let mo = new MutationObserver(() => {
        document.querySelectorAll('#recoMessagesContainer .parent-msg.bot').forEach(el => observer.observe(el));
    });
    mo.observe(container, { childList: true, subtree: true });
}

async function sendRecoMessageToFirebase(message) {
    try {
        const supportMessagesDocRef = doc(db, "communication", "support_netubex_board");
        const docSnap = await getDoc(supportMessagesDocRef);
        let currentMsgs = docSnap.exists() ? docSnap.data().messages || [] : [];
        let nextNumber = currentMsgs.length + 1;
        
        const messageData = {
            id: Date.now().toString() + Math.random().toString(36).substr(2, 6),
            number: nextNumber,
            sender: "direction",
            nom: "DIRECTION",
            message: message,
            date: new Date().toISOString(),
            read: false,
            createdAt: new Date(),
            ecole: currentRecoEcole
        };
        
        await setDoc(supportMessagesDocRef, { 
            messages: [...currentMsgs, messageData],
            lastUpdated: new Date().toISOString()
        });
        
        return true;
    } catch (error) {
        console.error("Erreur envoi:", error);
        toast("Erreur de connexion. Message non envoyé.", 'error');
        return false;
    }
}

async function sendRecoMessage() {
    let input = document.getElementById('recoMessageInput');
    let msg = input.value.trim();
    if(!msg) return;
    
    const success = await sendRecoMessageToFirebase(msg);
    
    if (success) {
        input.value = '';
        toast("Message envoyé au support NeTubeX", 'success');
    }
}

function listenToRecoMessages() {
    const supportMessagesDocRef = doc(db, "communication", "support_netubex_board");
    
    if(recoUnsubscribe) recoUnsubscribe();
    
    recoUnsubscribe = onSnapshot(supportMessagesDocRef, (docSnap) => {
        if (docSnap.exists()) {
            const data = docSnap.data();
            let allMessages = data.messages || [];
            
            let filteredMessages = allMessages.filter(msg => msg.ecole === currentRecoEcole);
            filteredMessages.sort((a, b) => (a.number || 0) - (b.number || 0));
            
            recoMessages = filteredMessages;
            updateRecoUI();
        }
    }, (error) => {
        console.error("Erreur écoute:", error);
        toast("Erreur de connexion au serveur", 'error');
    });
}

function initRecoSupport() {
    listenToRecoMessages();
    observeRecoMessages();
    
    let sendBtn = document.getElementById('recoSendBtn');
    let input = document.getElementById('recoMessageInput');
    
    if(sendBtn) {
        sendBtn.onclick = sendRecoMessage;
    }
    if(input) {
        input.addEventListener('keypress', (e) => {
            if(e.key === 'Enter') {
                e.preventDefault();
                sendRecoMessage();
            }
        });
    }
}
</script>
