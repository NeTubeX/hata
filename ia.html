<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Test Worker Firebase</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #0a0e1a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .box {
            background: #1e293b;
            border-radius: 16px;
            padding: 30px;
            max-width: 700px;
            width: 100%;
            border: 1px solid #334155;
        }
        h1 { font-size: 22px; margin-bottom: 6px; color: #60a5fa; }
        .sub { color: #94a3b8; font-size: 14px; margin-bottom: 20px; }
        .status {
            background: #0f172a;
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 16px;
            border: 1px solid #1e293b;
            font-size: 13px;
            min-height: 60px;
            white-space: pre-wrap;
        }
        .status .ok { color: #10b981; }
        .status .error { color: #ef4444; }
        .status .info { color: #60a5fa; }
        .status .warning { color: #f59e0b; }
        button {
            padding: 12px 20px;
            border-radius: 40px;
            border: none;
            background: #3b82f6;
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.2s;
            margin: 4px;
        }
        button:hover { opacity: 0.85; transform: scale(0.98); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        button.secondary { background: #334155; }
        button.success { background: #10b981; }
        button.danger { background: #ef4444; }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
            flex-wrap: wrap;
        }
        .input-group input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 40px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #fff;
            font-size: 14px;
            min-width: 150px;
        }
        .input-group input:focus { outline: none; border-color: #3b82f6; }
        .log {
            background: #0f172a;
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
            max-height: 250px;
            overflow-y: auto;
            font-size: 12px;
            font-family: monospace;
            color: #94a3b8;
            border: 1px solid #1e293b;
        }
        .log .sent { color: #60a5fa; }
        .log .received { color: #10b981; }
        .log .error-log { color: #ef4444; }
        .log .warn { color: #f59e0b; }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }
        .badge.ok { background: #10b981; color: #fff; }
        .badge.error { background: #ef4444; color: #fff; }
        .badge.waiting { background: #f59e0b; color: #fff; }
        .badge.info { background: #3b82f6; color: #fff; }
        .btn-group { display: flex; flex-wrap: wrap; gap: 8px; margin: 8px 0; }
        .school-info {
            background: #0f172a;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 12px;
            border-left: 3px solid #3b82f6;
            font-size: 13px;
        }
        .school-info strong { color: #60a5fa; }
        .collection-info {
            background: #0f172a;
            border-radius: 8px;
            padding: 8px 12px;
            margin: 4px 0;
            font-size: 12px;
            color: #94a3b8;
        }
    </style>
</head>
<body>

<div class="box">
    <h1>🧪 Test Worker Firebase</h1>
    <div class="sub">
        Worker: <code id="workerUrlDisplay">parent.netube-a97.workers.dev</code>
        <span id="workerStatus" class="badge waiting">Test...</span>
    </div>

    <div class="school-info" id="schoolInfo">
        <strong>🏫 École:</strong> <span id="schoolNameDisplay">Chargement...</span>
        <br>
        <strong>📂 Collection:</strong> <code id="collectionDisplay">...</code>
    </div>

    <div class="status" id="statusDisplay">
        <span class="info">⏳ Prêt à tester...</span>
    </div>

    <div class="input-group">
        <input type="text" id="questionInput" placeholder="Question (ex: Qui est le meilleur élève ?)" value="Donne-moi la liste des élèves">
        <button id="testBtn" style="flex:1;">🚀 Test complet</button>
    </div>

    <div class="btn-group">
        <button id="fetchBtn" class="secondary">📥 Firebase</button>
        <button id="sendBtn" class="success" disabled>📤 Envoyer au Worker</button>
        <button id="debugBtn" class="secondary">🔍 Debug</button>
        <button id="clearBtn" class="danger">🗑️ Effacer</button>
    </div>

    <div class="log" id="logDisplay">
        <div class="info">📋 Log des actions...</div>
    </div>
</div>

<script type="module">
    // =============================================
    // 1. IMPORTER FIREBASE
    // =============================================
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // =============================================
    // 2. CONFIGURATION FIREBASE
    // =============================================
    const firebaseConfig = {
        apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
        authDomain: "netubexmoney.firebaseapp.com",
        projectId: "netubexmoney",
        storageBucket: "netubexmoney.firebasestorage.app",
        messagingSenderId: "856592608176",
        appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // =============================================
    // 3. DÉTECTION DE L'ÉCOLE
    // =============================================
    const urlParams = new URLSearchParams(window.location.search);
    let SCHOOL_ID = urlParams.get('ecole') || 'gloria_dei';
    
    // Si vous voulez forcer une école spécifique, décommentez la ligne ci-dessous
    // SCHOOL_ID = 'gloria_dei';
    
    const WORKER_URL = 'https://parent.netube-a97.workers.dev/';

    // =============================================
    // 4. ÉLÉMENTS DOM
    // =============================================
    const statusDisplay = document.getElementById('statusDisplay');
    const logDisplay = document.getElementById('logDisplay');
    const questionInput = document.getElementById('questionInput');
    const testBtn = document.getElementById('testBtn');
    const fetchBtn = document.getElementById('fetchBtn');
    const sendBtn = document.getElementById('sendBtn');
    const debugBtn = document.getElementById('debugBtn');
    const clearBtn = document.getElementById('clearBtn');
    const workerStatus = document.getElementById('workerStatus');
    const schoolNameDisplay = document.getElementById('schoolNameDisplay');
    const collectionDisplay = document.getElementById('collectionDisplay');
    const workerUrlDisplay = document.getElementById('workerUrlDisplay');

    let firebaseData = null;
    let lastWorkerResponse = null;
    let allFiches = [];

    // Afficher les infos de l'école
    schoolNameDisplay.textContent = SCHOOL_ID.toUpperCase().replace(/_/g, ' ');
    collectionDisplay.textContent = SCHOOL_ID + '_fiches';
    workerUrlDisplay.textContent = WORKER_URL;

    // =============================================
    // 5. FONCTIONS UTILITAIRES
    // =============================================
    function setStatus(message, type = 'info') {
        const colors = {
            info: '#60a5fa',
            ok: '#10b981',
            error: '#ef4444',
            warning: '#f59e0b'
        };
        statusDisplay.innerHTML = `<span style="color:${colors[type] || '#94a3b8'}">${message}</span>`;
    }

    function addLog(message, type = 'info') {
        const colors = {
            info: '#94a3b8',
            sent: '#60a5fa',
            received: '#10b981',
            error: '#ef4444',
            warning: '#f59e0b'
        };
        const time = new Date().toLocaleTimeString();
        const div = document.createElement('div');
        div.innerHTML = `<span style="color:${colors[type] || '#94a3b8'}">[${time}] ${message}</span>`;
        logDisplay.appendChild(div);
        logDisplay.scrollTop = logDisplay.scrollHeight;
    }

    // =============================================
    // 6. TESTER LE WORKER
    // =============================================
    async function testWorker() {
        try {
            workerStatus.textContent = 'Test...';
            workerStatus.className = 'badge waiting';
            
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ 
                    question: "Test de connexion",
                    ecole: SCHOOL_ID 
                })
            });
            
            const data = await response.json();
            workerStatus.textContent = '✅ Connecté';
            workerStatus.className = 'badge ok';
            addLog('✅ Worker répond: ' + JSON.stringify(data).substring(0, 100), 'received');
            setStatus('✅ Worker connecté avec succès !', 'ok');
            return true;
        } catch (error) {
            workerStatus.textContent = '❌ Erreur';
            workerStatus.className = 'badge error';
            addLog('❌ Erreur worker: ' + error.message, 'error');
            setStatus('❌ Erreur de connexion au worker', 'error');
            return false;
        }
    }

    // =============================================
    // 7. RÉCUPÉRER LES DONNÉES FIREBASE
    // =============================================
    async function fetchFirebaseData() {
        setStatus('⏳ Récupération des données Firebase...', 'info');
        addLog(`📥 Récupération depuis: ${SCHOOL_ID}_fiches`, 'info');
        
        try {
            // Récupérer les fiches
            const collectionName = SCHOOL_ID + "_fiches";
            addLog(`📂 Collection: ${collectionName}`, 'info');
            
            const fichesSnap = await getDocs(collection(db, collectionName));
            
            if (fichesSnap.empty) {
                addLog(`⚠️ Aucune fiche trouvée dans ${collectionName}`, 'warning');
                setStatus(`⚠️ Aucune fiche trouvée. Vérifiez le nom de l'école.`, 'warning');
                
                // Proposer des alternatives
                addLog(`💡 Essayez de changer SCHOOL_ID dans le code`, 'warning');
                return null;
            }
            
            addLog(`✅ ${fichesSnap.size} fiches trouvées`, 'received');
            
            const eleves = [];
            const fiches = [];
            let totalEleves = 0;
            
            fichesSnap.forEach(doc => {
                const data = doc.data();
                addLog(`📄 Fiche: ${doc.id} - ${data.cours || 'sans cours'} (${data.eleves?.length || 0} élèves)`, 'info');
                
                if (data.eleves && data.eleves.length > 0) {
                    fiches.push({
                        id: doc.id,
                        cours: data.cours || 'Non défini',
                        classe: data.classe || 'Non défini',
                        option: data.option || '',
                        titulaire: data.titulaire || '',
                        eleves: data.eleves || []
                    });
                    
                    data.eleves.forEach(e => {
                        if (e.nom) {
                            eleves.push({
                                nom: e.nom,
                                classe: data.classe || '?',
                                cours: data.cours || '?',
                                option: data.option || '',
                                notes: e.notes || {},
                                sexe: e.sexe || 'Non spécifié'
                            });
                            totalEleves++;
                        }
                    });
                }
            });
            
            if (totalEleves === 0) {
                addLog(`⚠️ Aucun élève trouvé dans les fiches`, 'warning');
                setStatus(`⚠️ Les fiches existent mais n'ont pas d'élèves`, 'warning');
                return null;
            }
            
            firebaseData = {
                fiches: fiches,
                eleves: eleves,
                totalEleves: totalEleves,
                totalFiches: fiches.length
            };
            
            allFiches = fiches;
            
            addLog(`✅ ${totalEleves} élèves trouvés dans ${fiches.length} fiches`, 'received');
            setStatus(`✅ ${totalEleves} élèves récupérés depuis Firebase`, 'ok');
            
            // Afficher un résumé
            const noms = eleves.slice(0, 10).map(e => e.nom).join(', ');
            addLog(`📋 Élèves: ${noms}${eleves.length > 10 ? '...' : ''}`, 'info');
            
            // Afficher les classes
            const classes = [...new Set(eleves.map(e => e.classe))];
            addLog(`📚 Classes: ${classes.join(', ')}`, 'info');
            
            sendBtn.disabled = false;
            return firebaseData;
            
        } catch (error) {
            addLog(`❌ Erreur Firebase: ${error.message}`, 'error');
            setStatus(`❌ Erreur: ${error.message}`, 'error');
            return null;
        }
    }

    // =============================================
    // 8. ENVOYER AU WORKER
    // =============================================
    async function sendToWorker(question) {
        if (!firebaseData) {
            setStatus('⚠️ Récupérez d\'abord les données Firebase', 'error');
            addLog('⚠️ Aucune donnée Firebase disponible', 'error');
            return;
        }

        setStatus('⏳ Envoi au worker...', 'info');
        addLog(`📤 Envoi de la question: "${question}"`, 'sent');
        addLog(`📦 ${firebaseData.totalEleves} élèves inclus`, 'sent');

        try {
            const payload = {
                question: question,
                ecole: SCHOOL_ID,
                eleves: firebaseData.eleves.slice(0, 50),
                totalEleves: firebaseData.totalEleves,
                fiches: firebaseData.fiches.slice(0, 20)
            };

            console.log('📦 Payload envoyé:', payload);

            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(payload)
            });

            const data = await response.json();
            lastWorkerResponse = data;

            addLog(`✅ Réponse reçue: ${(data.answer || 'Aucune réponse').substring(0, 200)}...`, 'received');
            setStatus(`✅ Réponse reçue`, 'ok');

            // Afficher la réponse complète
            addLog(`📝 Réponse: ${JSON.stringify(data)}`, 'received');

            return data;
        } catch (error) {
            addLog(`❌ Erreur envoi: ${error.message}`, 'error');
            setStatus(`❌ Erreur: ${error.message}`, 'error');
            return null;
        }
    }

    // =============================================
    // 9. DEBUG - Explorer Firebase
    // =============================================
    async function debugFirebase() {
        addLog('🔍 Exploration de Firebase...', 'info');
        setStatus('🔍 Exploration...', 'info');
        
        try {
            // Lister toutes les collections disponibles
            const collections = [];
            const snap = await getDocs(collection(db, SCHOOL_ID + "_fiches"));
            
            addLog(`📂 Collection ${SCHOOL_ID}_fiches: ${snap.size} documents`, 'info');
            
            if (snap.empty) {
                addLog(`⚠️ La collection est vide. Vérifiez le nom de l'école.`, 'warning');
                addLog(`💡 SCHOOL_ID actuel: ${SCHOOL_ID}`, 'warning');
                
                // Essayer de lister toutes les collections (limité)
                addLog(`💡 Essayez de changer SCHOOL_ID dans le code ou dans l'URL`, 'info');
                addLog(`💡 URL actuelle: ${window.location.href}`, 'info');
            } else {
                snap.forEach(doc => {
                    const data = doc.data();
                    const nbEleves = data.eleves?.length || 0;
                    addLog(`📄 ${doc.id}: ${data.cours || 'sans cours'} - ${nbEleves} élèves`, 'info');
                });
            }
            
        } catch (error) {
            addLog(`❌ Erreur debug: ${error.message}`, 'error');
        }
    }

    // =============================================
    // 10. TEST COMPLET
    // =============================================
    async function fullTest() {
        const question = questionInput.value.trim() || "Donne-moi la liste des élèves";
        
        addLog('🚀 Début du test complet', 'info');
        setStatus('🚀 Test en cours...', 'info');
        
        // 1. Tester le worker
        const workerOk = await testWorker();
        if (!workerOk) {
            addLog('❌ Test arrêté: worker non accessible', 'error');
            return;
        }
        
        // 2. Récupérer les données Firebase
        const data = await fetchFirebaseData();
        if (!data) {
            addLog('❌ Test arrêté: pas de données Firebase', 'error');
            return;
        }
        
        // 3. Envoyer au worker
        const result = await sendToWorker(question);
        if (result) {
            addLog('✅ Test complet réussi !', 'ok');
            setStatus('✅ Test complet réussi !', 'ok');
        } else {
            addLog('❌ Test échoué', 'error');
        }
    }

    // =============================================
    // 11. ÉVÉNEMENTS
    // =============================================
    
    testBtn.addEventListener('click', fullTest);
    fetchBtn.addEventListener('click', fetchFirebaseData);
    debugBtn.addEventListener('click', debugFirebase);
    
    sendBtn.addEventListener('click', () => {
        const question = questionInput.value.trim() || "Donne-moi la liste des élèves";
        sendToWorker(question);
    });
    
    clearBtn.addEventListener('click', () => {
        logDisplay.innerHTML = '<div class="info">📋 Log effacé...</div>';
        setStatus('🧹 Log effacé', 'info');
    });
    
    questionInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') testBtn.click();
    });

    // =============================================
    // 12. INITIALISATION
    // =============================================
    (async function init() {
        addLog('🚀 Application de test chargée', 'info');
        addLog(`🏫 École: ${SCHOOL_ID}`, 'info');
        addLog(`🔗 Worker: ${WORKER_URL}`, 'info');
        setStatus('⏳ Test automatique du worker...', 'info');
        
        const ok = await testWorker();
        if (ok) {
            addLog('💡 Cliquez sur "Firebase" pour charger les données', 'info');
            addLog('💡 Ou sur "Test complet" pour tout faire d\'un coup', 'info');
        }
    })();

    // Exposer pour debug
    window.testWorker = testWorker;
    window.fetchFirebaseData = fetchFirebaseData;
    window.sendToWorker = sendToWorker;
    window.fullTest = fullTest;
    window.debugFirebase = debugFirebase;

    console.log('🧪 Application de test prête !');
    console.log(`🏫 École: ${SCHOOL_ID}`);
    console.log('📋 Fonctions disponibles:');
    console.log('  - testWorker()');
    console.log('  - fetchFirebaseData()');
    console.log('  - sendToWorker(question)');
    console.log('  - fullTest()');
    console.log('  - debugFirebase()');
</script>
</body>
</html>
