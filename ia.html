<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Mode Vocal</title>
    <style>
        body {
            background: #0a0e1a;
            font-family: system-ui;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: #1e293b;
            border-radius: 30px;
            padding: 30px;
            width: 100%;
            max-width: 500px;
            text-align: center;
            border: 1px solid #3b82f6;
        }
        .note {
            font-size: 80px;
            font-weight: bold;
            color: #60a5fa;
            background: #0f172a;
            padding: 30px;
            border-radius: 50px;
            margin: 20px 0;
        }
        button {
            background: #10b981;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 40px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            margin: 10px;
        }
        button.stop {
            background: #ef4444;
        }
        .feedback {
            background: #0f172a;
            padding: 15px;
            border-radius: 20px;
            margin-top: 20px;
            font-size: 14px;
            color: #cbd5e1;
            min-height: 80px;
        }
        .student {
            font-size: 24px;
            font-weight: bold;
            color: #ffd700;
        }
    </style>
</head>
<body>
    <div class="card">
        <h2>🎙️ TEST MODE VOCAL</h2>
        <div class="student" id="studentName">KASONGO Jean</div>
        <div class="note" id="noteValue">0</div>
        <div>
            <button id="startBtn">🎤 Démarrer</button>
            <button id="stopBtn" class="stop">⏹️ Arrêter</button>
        </div>
        <div class="feedback" id="feedback">Cliquez sur Démarrer et parlez</div>
        <div style="margin-top: 15px; font-size: 12px; color: #94a3b8;">
            Commandes: "5", "12", "valider", "suivant", "précédent"
        </div>
    </div>

    <script>
        let currentNote = 0;
        let currentStudent = 0;
        let recognition = null;
        let isListening = false;
        
        const students = ["KASONGO Jean", "MAMBU Thérèse", "MUTOMBO Paul"];
        
        function updateUI() {
            document.getElementById('studentName').textContent = students[currentStudent];
            document.getElementById('noteValue').textContent = currentNote;
        }
        
        function speak(text) {
            if (!text) return;
            let utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'fr-FR';
            utterance.rate = 0.9;
            window.speechSynthesis.cancel();
            window.speechSynthesis.speak(utterance);
        }
        
        function saveNote() {
            const fb = document.getElementById('feedback');
            fb.innerHTML += `<br>✅ ${students[currentStudent]} a obtenu ${currentNote}`;
            speak(`${students[currentStudent]} : ${currentNote}`);
            
            if (currentStudent + 1 < students.length) {
                currentStudent++;
                currentNote = 0;
                updateUI();
                speak(`Passage à ${students[currentStudent]}`);
            } else {
                speak("Félicitations ! Tous les élèves ont été notés.");
                if (recognition) recognition.stop();
            }
        }
        
        function nextStudent() {
            if (currentStudent + 1 < students.length) {
                currentStudent++;
                currentNote = 0;
                updateUI();
                speak(`Passage à ${students[currentStudent]}`);
            } else {
                speak("Dernier élève");
            }
        }
        
        function prevStudent() {
            if (currentStudent > 0) {
                currentStudent--;
                currentNote = 0;
                updateUI();
                speak(`Retour à ${students[currentStudent]}`);
            } else {
                speak("Premier élève");
            }
        }
        
        if ('webkitSpeechRecognition' in window) {
            const SpeechRecognition = window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = true;
            recognition.lang = 'fr-FR';
            
            recognition.onresult = (event) => {
                let finalText = "";
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        finalText += event.results[i][0].transcript;
                    }
                }
                
                if (!finalText) return;
                
                const text = finalText.toLowerCase();
                const fb = document.getElementById('feedback');
                fb.innerHTML = `🎤 Vous avez dit: "${finalText}"`;
                
                if (text.includes('valider') || text.includes('valide')) {
                    saveNote();
                    return;
                }
                if (text.includes('suivant') || text.includes('passer')) {
                    nextStudent();
                    return;
                }
                if (text.includes('précédent') || text.includes('retour')) {
                    prevStudent();
                    return;
                }
                
                const numbers = {
                    'zero':0, 'un':1, 'deux':2, 'trois':3, 'quatre':4, 'cinq':5,
                    'six':6, 'sept':7, 'huit':8, 'neuf':9, 'dix':10, 'onze':11,
                    'douze':12, 'treize':13, 'quatorze':14, 'quinze':15, 'seize':16,
                    'dix-sept':17, 'dix-huit':18, 'dix-neuf':19, 'vingt':20
                };
                
                let noteValue = null;
                for (let [word, val] of Object.entries(numbers)) {
                    if (text.includes(word)) {
                        noteValue = val;
                        break;
                    }
                }
                
                let match = text.match(/\b(\d{1,2})\b/);
                if (match && noteValue === null) {
                    noteValue = parseInt(match[1]);
                }
                
                if (noteValue !== null && noteValue <= 20) {
                    currentNote = noteValue;
                    document.getElementById('noteValue').textContent = currentNote;
                    fb.innerHTML += `<br>✏️ Note mise à ${noteValue}`;
                }
            };
            
            recognition.onerror = (event) => {
                document.getElementById('feedback').innerHTML = `❌ Erreur: ${event.error}`;
            };
            
            recognition.onend = () => {
                if (isListening) {
                    recognition.start();
                }
            };
        } else {
            document.getElementById('feedback').innerHTML = "❌ Votre navigateur ne supporte pas la reconnaissance vocale. Utilisez Chrome.";
        }
        
        document.getElementById('startBtn').onclick = () => {
            isListening = true;
            try { recognition.start(); } catch(e) {}
            document.getElementById('feedback').innerHTML = "🎤 Je vous écoute...";
            speak("Mode vocal activé");
        };
        
        document.getElementById('stopBtn').onclick = () => {
            isListening = false;
            try { recognition.stop(); } catch(e) {}
            document.getElementById('feedback').innerHTML = "⏹️ Reconnaissance arrêtée";
            speak("Arrêt");
        };
        
        updateUI();
    </script>
</body>
</html>
