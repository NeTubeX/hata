<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Test IA Parentale</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, sans-serif;
            background: #0a0e1a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .box {
            background: #1e293b;
            border-radius: 16px;
            padding: 30px;
            max-width: 500px;
            width: 100%;
            border: 1px solid #334155;
        }
        h1 { font-size: 22px; margin-bottom: 6px; }
        .sub { color: #94a3b8; font-size: 14px; margin-bottom: 20px; }
        input, button {
            width: 100%;
            padding: 12px 16px;
            border-radius: 40px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #fff;
            font-size: 15px;
            margin-bottom: 10px;
        }
        button {
            background: #3b82f6;
            border: none;
            font-weight: 600;
            cursor: pointer;
            transition: 0.2s;
        }
        button:hover { opacity: 0.85; transform: scale(0.98); }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        #reponse {
            background: #0f172a;
            border-radius: 12px;
            padding: 16px;
            margin-top: 16px;
            min-height: 60px;
            border: 1px solid #1e293b;
            font-size: 14px;
            line-height: 1.5;
            display: none;
        }
        #reponse.show { display: block; }
        .err { color: #ef4444; }
        .ok { color: #10b981; }
        .info { color: #94a3b8; font-size: 12px; margin-top: 12px; }
    </style>
</head>
<body>

<div class="box">
    <h1>🧪 Test IA</h1>
    <div class="sub">Worker: <code>parent.netube-a97.workers.dev</code></div>

    <input type="text" id="question" placeholder="Posez une question..." value="Qui est le meilleur élève ?">
    <button id="btnEnvoyer">📤 Envoyer</button>

    <div id="reponse">
        <div id="contenu"></div>
    </div>

    <div class="info" id="status">✅ Worker actif</div>
</div>

<script type="module">
    // ===== Firebase =====
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
        authDomain: "netubexmoney.firebaseapp.com",
        projectId: "netubexmoney",
        storageBucket: "netubexmoney.firebasestorage.app",
        messagingSenderId: "856592608176",
        appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // ===== Éléments DOM =====
    const input = document.getElementById('question');
    const btn = document.getElementById('btnEnvoyer');
    const reponseDiv = document.getElementById('reponse');
    const contenu = document.getElementById('contenu');
    const status = document.getElementById('status');

    // ===== Worker URL =====
    const WORKER_URL = 'https://parent.netube-a97.workers.dev/';

    // ===== Fonction pour récupérer les données Firebase =====
    async function getFirebaseData() {
        try {
            const fichesSnap = await getDocs(collection(db, "gloria_dei_fiches"));
            const eleves = [];
            fichesSnap.forEach(doc => {
                const data = doc.data();
                if (data.eleves) {
                    data.eleves.forEach(e => {
                        eleves.push({
                            nom: e.nom || 'Inconnu',
                            classe: data.classe || '?',
                            cours: data.cours || '?',
                            notes: e.notes || {}
                        });
                    });
                }
            });
            return eleves;
        } catch (e) {
            console.error('Firebase error:', e);
            return [];
        }
    }

    // ===== Envoyer au Worker =====
    async function askWorker(question, data) {
        const payload = {
            question: question,
            ecole: 'gloria_dei',
            data: data  // on envoie les données Firebase au Worker
        };

        const response = await fetch(WORKER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
        });

        return await response.json();
    }

    // ===== Action principale =====
    btn.addEventListener('click', async () => {
        const question = input.value.trim();
        if (!question) return;

        btn.disabled = true;
        btn.textContent = '⏳ Chargement...';
        reponseDiv.classList.remove('show');
        contenu.innerHTML = '';
        status.textContent = '⏳ Récupération des données...';

        try {
            // 1. Récupérer les données Firebase
            const eleves = await getFirebaseData();
            status.textContent = `📊 ${eleves.length} élèves trouvés`;

            // 2. Envoyer au Worker
            const result = await askWorker(question, eleves);

            // 3. Afficher la réponse
            contenu.innerHTML = result.answer || 'Aucune réponse';
            reponseDiv.classList.add('show');
            status.textContent = '✅ Réponse reçue du Worker';

        } catch (error) {
            contenu.innerHTML = `<span class="err">❌ Erreur: ${error.message}</span>`;
            reponseDiv.classList.add('show');
            status.textContent = '❌ Erreur';
        }

        btn.disabled = false;
        btn.textContent = '📤 Envoyer';
    });

    // ===== Test rapide au chargement =====
    (async function test() {
        try {
            const res = await fetch(WORKER_URL);
            const data = await res.json();
            status.textContent = `✅ Worker répond: ${data.status || 'ok'}`;
        } catch {
            status.textContent = '⚠️ Worker inaccessible';
        }
    })();

    // ===== Entrée =====
    input.addEventListener('keypress', e => { if (e.key === 'Enter') btn.click(); });
</script>
</body>
</html>
