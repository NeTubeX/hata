<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Worker Parental</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0e1a;
            color: #fff;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .container {
            max-width: 600px;
            width: 100%;
            background: rgba(18, 18, 31, 0.95);
            border-radius: 24px;
            padding: 30px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        h1 {
            font-size: 24px;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .input-group {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
        }
        .input-group input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 40px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #fff;
            font-size: 16px;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-group input:focus {
            border-color: #3b82f6;
        }
        .input-group button {
            padding: 14px 28px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: transform 0.2s, opacity 0.2s;
        }
        .input-group button:hover {
            transform: scale(0.97);
            opacity: 0.9;
        }
        .input-group button:active {
            transform: scale(0.95);
        }
        .ecole-selector {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            align-items: center;
        }
        .ecole-selector label {
            color: #94a3b8;
            font-size: 13px;
            font-weight: 600;
        }
        .ecole-selector select {
            flex: 1;
            padding: 10px 16px;
            border-radius: 40px;
            border: 1px solid #334155;
            background: #1e293b;
            color: #fff;
            font-size: 14px;
            outline: none;
            cursor: pointer;
        }
        .response-box {
            background: #0f172a;
            border-radius: 16px;
            padding: 20px;
            min-height: 120px;
            margin-top: 16px;
            border: 1px solid #1e293b;
            white-space: pre-wrap;
            word-wrap: break-word;
            font-size: 15px;
            line-height: 1.6;
            max-height: 400px;
            overflow-y: auto;
        }
        .response-box .empty {
            color: #64748b;
            font-style: italic;
        }
        .response-box .loading {
            color: #60a5fa;
        }
        .response-box .error {
            color: #f87171;
        }
        .response-box .success {
            color: #34d399;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 600;
            margin-top: 8px;
        }
        .badge.code {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }
        .badge.nom {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }
        .badge.error {
            background: rgba(239, 68, 68, 0.2);
            color: #f87171;
        }
        .stats {
            display: flex;
            gap: 16px;
            margin-top: 16px;
            padding: 12px 16px;
            background: #0f172a;
            border-radius: 12px;
            font-size: 12px;
            color: #94a3b8;
        }
        .stats span {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .quick-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 16px;
        }
        .quick-buttons button {
            padding: 8px 16px;
            border-radius: 40px;
            border: 1px solid #334155;
            background: transparent;
            color: #cbd5e1;
            font-size: 12px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-buttons button:hover {
            background: #1e293b;
            border-color: #3b82f6;
        }
        .quick-buttons button:active {
            transform: scale(0.95);
        }
        .separator {
            border: none;
            border-top: 1px solid #1e293b;
            margin: 16px 0;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .pulse {
            animation: pulse 1s ease-in-out infinite;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🧪 Test Worker Parental</h1>
    <p class="subtitle">Testez votre worker IA avec Firebase</p>

    <div class="ecole-selector">
        <label>🏫 École :</label>
        <select id="ecoleSelect">
            <option value="gloria_dei">Gloria Dei</option>
            <option value="autre_ecole">Autre école</option>
        </select>
    </div>

    <div class="quick-buttons">
        <button onclick="testCode()">🔢 Tester code (123456)</button>
        <button onclick="testNom()">👤 Tester nom (Jean)</button>
        <button onclick="testMessage()">💬 Message test</button>
        <button onclick="clearResponse()">✖ Effacer</button>
    </div>

    <div class="input-group">
        <input type="text" id="questionInput" placeholder="Code 6 chiffres ou Nom d'élève..." />
        <button id="sendBtn">Envoyer</button>
    </div>

    <hr class="separator">

    <div id="responseBox" class="response-box">
        <div class="empty">💡 Entrez un code ou un nom pour tester le worker...</div>
    </div>

    <div id="statsBox" class="stats" style="display:none;">
        <span>📊 Type: <span id="typeDisplay">-</span></span>
        <span>⏱️ Temps: <span id="timeDisplay">-</span></span>
        <span>📦 Données: <span id="dataDisplay">-</span></span>
    </div>
</div>

<script>
// 🔹 CONFIGURATION
const WORKER_URL = 'https://ia.netube-a97.workers.dev/'; // 🔴 REMPLACEZ PAR VOTRE URL

// 🔹 ÉLÉMENTS DOM
const questionInput = document.getElementById('questionInput');
const sendBtn = document.getElementById('sendBtn');
const responseBox = document.getElementById('responseBox');
const statsBox = document.getElementById('statsBox');
const typeDisplay = document.getElementById('typeDisplay');
const timeDisplay = document.getElementById('timeDisplay');
const dataDisplay = document.getElementById('dataDisplay');
const ecoleSelect = document.getElementById('ecoleSelect');

// 🔹 FONCTION PRINCIPALE
async function envoyerQuestion(question) {
    if (!question || question.trim() === '') {
        responseBox.innerHTML = `<div class="error">❌ Veuillez entrer une question</div>`;
        return;
    }

    const ecole = ecoleSelect.value;
    const startTime = performance.now();

    // Afficher le chargement
    responseBox.innerHTML = `<div class="loading pulse">⏳ Envoi de la requête...<br><span style="font-size:12px;color:#64748b;">Question: "${question}"</span></div>`;
    statsBox.style.display = 'none';

    try {
        // 🔹 ENVOI AU WORKER - QUESTION BRUTE UNIQUEMENT
        const response = await fetch(WORKER_URL, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
            },
            body: JSON.stringify({
                question: question,  // ← Envoi de la question brute
                ecole: ecole
            })
        });

        const endTime = performance.now();
        const duration = ((endTime - startTime) / 1000).toFixed(2);

        if (!response.ok) {
            throw new Error(`HTTP ${response.status}: ${response.statusText}`);
        }

        const data = await response.json();
        
        // 🔹 AFFICHAGE DU RÉSULTAT
        let html = '';
        
        if (data.answer) {
            // Nettoyer la réponse (retirer les instructions système si présentes)
            let reponse = data.answer;
            
            // Si la réponse contient le prompt système, on l'enlève
            if (reponse.includes('TU ES UN SYSTÈME') || reponse.includes('RÈGLES IMPÉRATIVES')) {
                // Chercher la partie utile (après le prompt)
                const lines = reponse.split('\n');
                let cleanLines = [];
                let foundUseful = false;
                
                for (const line of lines) {
                    // Ignorer les lignes qui ressemblent à des instructions
                    if (line.includes('TU ES UN SYSTÈME') || 
                        line.includes('RÈGLES IMPÉRATIVES') ||
                        line.includes('CONTEXTE DE L\'ÉLÈVE') ||
                        line.includes('RAPPEL IMPORTANT') ||
                        line.includes('Utilise le nom') ||
                        line.includes('Ne JAMAIS utiliser') ||
                        line.includes('Utilise TOUJOURS') ||
                        line.includes('Maximum 3 phrases') ||
                        line.includes('Sois encourageant') ||
                        line.includes('Ne donne JAMAIS') ||
                        line.includes('Ne mentionne JAMAIS') ||
                        line.includes('Utilise "') && line.includes('pour parler')) {
                        foundUseful = false;
                        continue;
                    }
                    
                    // Si on trouve une ligne qui semble être une vraie réponse
                    if (line.trim().length > 0 && !line.includes('École:') && !line.includes('Contexte:')) {
                        foundUseful = true;
                        cleanLines.push(line);
                    }
                }
                
                // Si on a trouvé des lignes utiles
                if (cleanLines.length > 0) {
                    reponse = cleanLines.join('\n').trim();
                } else {
                    // Fallback: garder la réponse originale mais nettoyer
                    reponse = reponse
                        .replace(/TU ES UN SYSTÈME[^.]*\./g, '')
                        .replace(/RÈGLES IMPÉRATIVES[^.]*\./g, '')
                        .replace(/CONTEXTE DE L'ÉLÈVE[^.]*\./g, '')
                        .replace(/RAPPEL IMPORTANT[^.]*\./g, '')
                        .trim();
                }
            }
            
            html += `<div class="success">${reponse}</div>`;
            
            // Badge de type
            const type = data.type || 'ia';
            const badgeClass = type === 'dure' ? 'code' : (type === 'error' ? 'error' : 'nom');
            html += `<div class="badge ${badgeClass}">${type === 'dure' ? '📌 Réponse programmée' : type === 'error' ? '❌ Erreur' : '🤖 IA'}</div>`;
            
            // Afficher les stats
            statsBox.style.display = 'flex';
            typeDisplay.textContent = type || 'ia';
            timeDisplay.textContent = `${duration}s`;
            dataDisplay.textContent = data.data ? '✓' : '✗';
            
            // Afficher les données brutes en détail (si présentes)
            if (data.data) {
                html += `<hr class="separator" style="margin-top:12px;margin-bottom:8px;">`;
                html += `<details style="font-size:12px;color:#94a3b8;">`;
                html += `<summary>📦 Données (${Object.keys(data.data).length} champs)</summary>`;
                html += `<pre style="margin-top:8px;padding:8px;background:#0a0e1a;border-radius:8px;overflow-x:auto;font-size:11px;">${JSON.stringify(data.data, null, 2)}</pre>`;
                html += `</details>`;
            }
            
        } else if (data.error) {
            html = `<div class="error">❌ ${data.error}</div>`;
        } else {
            html = `<div class="error">❌ Réponse inattendue du worker</div>`;
            html += `<details style="font-size:12px;color:#94a3b8;margin-top:8px;">`;
            html += `<summary>📄 Réponse brute</summary>`;
            html += `<pre style="margin-top:8px;padding:8px;background:#0a0e1a;border-radius:8px;overflow-x:auto;font-size:11px;">${JSON.stringify(data, null, 2)}</pre>`;
            html += `</details>`;
        }
        
        responseBox.innerHTML = html;

    } catch (error) {
        responseBox.innerHTML = `
            <div class="error">❌ Erreur: ${error.message}</div>
            <div style="font-size:12px;color:#64748b;margin-top:8px;">
                💡 Vérifiez que le worker est accessible à l'URL: ${WORKER_URL}
            </div>
        `;
        statsBox.style.display = 'none';
    }
}

// 🔹 FONCTIONS DE TEST RAPIDE
function testCode() {
    questionInput.value = '123456';
    envoyerQuestion('123456');
}

function testNom() {
    questionInput.value = 'Jean';
    envoyerQuestion('Jean');
}

function testMessage() {
    questionInput.value = 'Bonjour, je cherche les notes de KASONGO Jean';
    envoyerQuestion(questionInput.value);
}

function clearResponse() {
    responseBox.innerHTML = `<div class="empty">💡 Entrez un code ou un nom pour tester le worker...</div>`;
    statsBox.style.display = 'none';
    questionInput.value = '';
    questionInput.focus();
}

// 🔹 ÉVÉNEMENTS
sendBtn.addEventListener('click', () => {
    envoyerQuestion(questionInput.value);
});

questionInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') {
        envoyerQuestion(questionInput.value);
    }
});

// 🔹 TEST AUTOMATIQUE AU CHARGEMENT
window.addEventListener('load', () => {
    // Vérifier si le worker répond
    fetch(WORKER_URL, {
        method: 'GET',
        headers: { 'Content-Type': 'application/json' }
    })
    .then(response => response.json())
    .then(data => {
        console.log('✅ Worker accessible:', data);
        responseBox.innerHTML = `<div class="success">✅ Worker connecté !</div>`;
    })
    .catch(error => {
        console.error('❌ Worker inaccessible:', error);
        responseBox.innerHTML = `
            <div class="error">⚠️ Worker inaccessible</div>
            <div style="font-size:12px;color:#64748b;margin-top:8px;">
                Vérifiez que l'URL du worker est correcte: ${WORKER_URL}
            </div>
        `;
    });

    // Focus sur l'input
    setTimeout(() => questionInput.focus(), 500);
});

// 🔹 AFFICHER L'URL DU WORKER DANS LA CONSOLE
console.log('🔹 URL du worker:', WORKER_URL);
console.log('💡 Testez avec: code 123456 ou nom Jean');
</script>

</body>
</html>
