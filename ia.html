<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🧪 Test IA - Espace Parental</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0a0e1a, #1a2335);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: rgba(18, 18, 31, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 24px;
            padding: 30px;
            max-width: 650px;
            width: 100%;
            border: 1px solid rgba(59, 130, 246, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }
        h1 {
            color: #fff;
            font-size: 22px;
            margin-bottom: 4px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        h1 span {
            font-size: 28px;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 13px;
            margin-bottom: 20px;
            border-bottom: 1px solid rgba(59, 130, 246, 0.15);
            padding-bottom: 14px;
        }
        .url-display {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            padding: 12px 16px;
            margin-bottom: 16px;
            border: 1px solid rgba(59, 130, 246, 0.15);
        }
        .url-display label {
            color: #94a3b8;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 4px;
        }
        .url-display code {
            color: #60a5fa;
            font-size: 13px;
            word-break: break-all;
            font-family: monospace;
        }
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 14px;
            border-radius: 40px;
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 16px;
        }
        .status.online {
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.25);
        }
        .status.offline {
            background: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.25);
        }
        .status .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            display: inline-block;
        }
        .status.online .dot {
            background: #10b981;
            animation: pulse 1.5s ease-in-out infinite;
        }
        .status.offline .dot {
            background: #ef4444;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; transform: scale(1); }
            50% { opacity: 0.5; transform: scale(0.8); }
        }
        .input-group {
            display: flex;
            gap: 10px;
            margin-bottom: 12px;
        }
        .input-group input {
            flex: 1;
            padding: 14px 18px;
            border-radius: 40px;
            border: 1px solid rgba(59, 130, 246, 0.3);
            background: rgba(0, 0, 0, 0.3);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-group input:focus {
            border-color: #3b82f6;
        }
        .input-group input::placeholder {
            color: #64748b;
        }
        .input-group button {
            padding: 14px 28px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: #fff;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: all 0.2s;
            white-space: nowrap;
        }
        .input-group button:hover {
            transform: scale(0.97);
            opacity: 0.9;
        }
        .input-group button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .quick-buttons {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 14px;
        }
        .quick-buttons button {
            padding: 7px 14px;
            border-radius: 40px;
            border: 1px solid rgba(59, 130, 246, 0.2);
            background: rgba(59, 130, 246, 0.08);
            color: #94a3b8;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .quick-buttons button:hover {
            background: rgba(59, 130, 246, 0.2);
            color: #fff;
            border-color: #3b82f6;
        }
        .quick-buttons button.ia-test {
            border-color: rgba(16, 185, 129, 0.3);
            background: rgba(16, 185, 129, 0.08);
            color: #10b981;
        }
        .quick-buttons button.ia-test:hover {
            background: rgba(16, 185, 129, 0.2);
            color: #34d399;
        }
        .response-area {
            background: rgba(0, 0, 0, 0.4);
            border-radius: 16px;
            padding: 16px 20px;
            min-height: 100px;
            max-height: 250px;
            overflow-y: auto;
            border: 1px solid rgba(59, 130, 246, 0.1);
            margin-top: 4px;
        }
        .response-area .label {
            color: #94a3b8;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            display: block;
            margin-bottom: 6px;
        }
        .response-area .response-text {
            color: #e2e8f0;
            font-size: 14px;
            line-height: 1.6;
            white-space: pre-wrap;
            word-break: break-word;
        }
        .response-area .response-text .loading {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #3b82f6;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .response-area .error {
            color: #ef4444;
        }
        .response-area .success {
            color: #10b981;
        }
        .response-area .ia-response {
            color: #60a5fa;
        }
        .response-area .dure-response {
            color: #fbbf24;
        }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 40px;
            font-size: 10px;
            font-weight: 700;
            margin-right: 8px;
        }
        .badge-ia {
            background: rgba(59, 130, 246, 0.2);
            color: #60a5fa;
        }
        .badge-dure {
            background: rgba(251, 191, 36, 0.2);
            color: #fbbf24;
        }
        .badge-error {
            background: rgba(239, 68, 68, 0.2);
            color: #ef4444;
        }
        .footer {
            margin-top: 14px;
            text-align: center;
            color: #4a5568;
            font-size: 11px;
            border-top: 1px solid rgba(59, 130, 246, 0.08);
            padding-top: 14px;
        }
        .footer a {
            color: #60a5fa;
            text-decoration: none;
        }
        .footer a:hover {
            text-decoration: underline;
        }
        .count-badge {
            display: inline-block;
            background: rgba(16, 185, 129, 0.15);
            color: #10b981;
            padding: 2px 12px;
            border-radius: 40px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }
        .info-box {
            background: rgba(59, 130, 246, 0.05);
            border-radius: 12px;
            padding: 10px 14px;
            margin-bottom: 14px;
            border: 1px solid rgba(59, 130, 246, 0.1);
        }
        .info-box p {
            color: #94a3b8;
            font-size: 12px;
            line-height: 1.5;
        }
        .info-box strong {
            color: #60a5fa;
        }
        .info-box .highlight {
            color: #10b981;
        }
        .time-display {
            font-size: 11px;
            color: #64748b;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>
        <span>🧪</span> Test IA
        <span class="count-badge" id="questionCounter">0/10</span>
    </h1>
    <div class="subtitle">Votre Worker : <strong style="color:#60a5fa;">parent.netube-a97.workers.dev</strong></div>

    <div class="status online" id="statusDisplay">
        <span class="dot"></span>
        <span id="statusText">✅ Prêt - Envoyez une question</span>
    </div>

    <div class="info-box">
        <p>
            💡 <strong>IA Test :</strong> "Quelle est la capitale du Congo ?" 
            <span class="highlight">→ Vraie IA</span><br>
            💡 <strong>Code dur :</strong> "Bonjour" → Réponse standard
        </p>
    </div>

    <div class="input-group">
        <input type="text" id="questionInput" placeholder="Posez votre question..." />
        <button id="sendBtn">📤 Envoyer</button>
    </div>

    <div class="quick-buttons">
        <!-- Code dur -->
        <button data-question="Bonjour">👋 Bonjour</button>
        <button data-question="Merci">🙏 Merci</button>
        <button data-question="Aide">❓ Aide</button>
        
        <!-- IA -->
        <button data-question="Quelle est la capitale du Congo ?" class="ia-test">🌍 Capitale</button>
        <button data-question="Notes de KASONGO Jean" class="ia-test">📝 Notes</button>
        <button data-question="Code 123456" class="ia-test">🔑 Code</button>
        <button data-question="Présence de Jean" class="ia-test">📊 Présence</button>
        <button data-question="Explique-moi la photosynthèse" class="ia-test">🌿 Photosynthèse</button>
        <button data-question="Donne-moi un conseil pour réussir" class="ia-test">💡 Conseil</button>
    </div>

    <div class="response-area">
        <span class="label">💬 Réponse</span>
        <div class="response-text" id="responseText">En attente de votre question...</div>
    </div>

    <div class="footer">
        🔒 Test sécurisé • 
        <a href="#" id="resetCounterBtn">🔄 Réinitialiser le compteur</a>
    </div>
</div>

<script>
    // 🔹 CONFIGURATION
    const WORKER_URL = 'https://parent.netube-a97.workers.dev';
    const STORAGE_KEY = 'parent_test_counter';

    // 🔹 RÉFÉRENCES DOM
    const questionInput = document.getElementById('questionInput');
    const sendBtn = document.getElementById('sendBtn');
    const responseText = document.getElementById('responseText');
    const questionCounter = document.getElementById('questionCounter');
    const statusDisplay = document.getElementById('statusDisplay');
    const statusText = document.getElementById('statusText');

    // 🔹 COMPTEUR DE QUESTIONS
    function getTodayKey() {
        const today = new Date().toISOString().slice(0, 10);
        return STORAGE_KEY + '_' + today;
    }

    function getQuestionCount() {
        const key = getTodayKey();
        const data = localStorage.getItem(key);
        if (!data) return 0;
        try {
            const parsed = JSON.parse(data);
            if (parsed.date !== new Date().toISOString().slice(0, 10)) return 0;
            return parsed.count || 0;
        } catch (e) { return 0; }
    }

    function incrementQuestionCount() {
        const key = getTodayKey();
        const currentCount = getQuestionCount();
        const newCount = currentCount + 1;
        localStorage.setItem(key, JSON.stringify({
            date: new Date().toISOString().slice(0, 10),
            count: newCount
        }));
        return newCount;
    }

    function canAskQuestion() {
        return getQuestionCount() < 10;
    }

    function updateCounterDisplay() {
        const current = getQuestionCount();
        questionCounter.textContent = current + '/10';
        if (current >= 10) {
            questionCounter.style.background = 'rgba(239, 68, 68, 0.15)';
            questionCounter.style.color = '#ef4444';
        } else {
            questionCounter.style.background = 'rgba(16, 185, 129, 0.15)';
            questionCounter.style.color = '#10b981';
        }
    }

    // 🔹 RÉINITIALISER LE COMPTEUR
    document.getElementById('resetCounterBtn').addEventListener('click', (e) => {
        e.preventDefault();
        const key = getTodayKey();
        localStorage.removeItem(key);
        updateCounterDisplay();
        responseText.innerHTML = '🔄 Compteur réinitialisé pour aujourd\'hui.';
        responseText.className = 'response-text success';
    });

    // 🔹 ENVOYER LA QUESTION
    async function sendQuestion(question) {
        if (!question || question.trim() === '') {
            responseText.innerHTML = '❓ Veuillez poser une question.';
            responseText.className = 'response-text error';
            return;
        }

        if (!canAskQuestion()) {
            responseText.innerHTML = '⚠️ <strong>Limite quotidienne atteinte (10 questions)</strong><br>Revenez demain.';
            responseText.className = 'response-text error';
            return;
        }

        // 🔹 AFFICHER LE CHARGEMENT
        sendBtn.disabled = true;
        sendBtn.textContent = '⏳ Envoi...';
        responseText.innerHTML = '<span class="loading"></span> L\'IA réfléchit...';
        responseText.className = 'response-text';
        statusText.textContent = '⏳ Envoi en cours...';

        try {
            const startTime = Date.now();
            const response = await fetch(WORKER_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ question: question.trim() })
            });

            if (!response.ok) {
                throw new Error('Erreur HTTP ' + response.status);
            }

            const data = await response.json();
            const endTime = Date.now();
            const responseTime = endTime - startTime;

            // 🔹 INCRÉMENTER LE COMPTEUR
            const newCount = incrementQuestionCount();
            updateCounterDisplay();

            // 🔹 AFFICHER LA RÉPONSE
            const answer = data.answer || '⚠️ Pas de réponse reçue.';
            const type = data.type || 'inconnu';

            // Déterminer le type
            let badge = '';
            let typeClass = '';
            if (type === 'ia') {
                badge = '<span class="badge badge-ia">🤖 IA</span>';
                typeClass = 'ia-response';
            } else if (type === 'dure' || answer.includes('Bonjour') || answer.includes('Merci')) {
                badge = '<span class="badge badge-dure">💾 Code dur</span>';
                typeClass = 'dure-response';
            } else {
                badge = '<span class="badge badge-ia">🤖 IA</span>';
                typeClass = 'ia-response';
            }

            responseText.innerHTML = `
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;font-size:11px;color:#94a3b8;">
                    <div>${badge} <span style="color:#64748b;">•</span> ${responseTime}ms</div>
                    <span>💬 ${newCount}/10</span>
                </div>
                <div class="${typeClass}">${escapeHtml(answer)}</div>
            `;
            responseText.className = 'response-text success';

            statusText.textContent = '✅ Réponse reçue en ' + responseTime + 'ms';

        } catch (error) {
            console.error('Erreur:', error);
            responseText.innerHTML = `
                <span class="badge badge-error">❌ Erreur</span>
                <div style="color:#ef4444;margin-top:6px;">${error.message || 'Connexion échouée'}</div>
                <div style="font-size:12px;color:#64748b;margin-top:4px;">💡 Vérifiez que le Worker est accessible</div>
            `;
            responseText.className = 'response-text error';
            statusText.textContent = '❌ Erreur - ' + (error.message || 'Connexion échouée');
        }

        sendBtn.disabled = false;
        sendBtn.textContent = '📤 Envoyer';
        questionInput.value = '';
        questionInput.focus();
    }

    // 🔹 ESCAPE HTML
    function escapeHtml(text) {
        if (!text) return '';
        return text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/\n/g, '<br>');
    }

    // 🔹 ÉVÉNEMENTS
    sendBtn.addEventListener('click', () => sendQuestion(questionInput.value));

    questionInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            e.preventDefault();
            sendQuestion(questionInput.value);
        }
    });

    document.querySelectorAll('.quick-buttons button').forEach(btn => {
        btn.addEventListener('click', () => {
            const question = btn.dataset.question;
            questionInput.value = question;
            sendQuestion(question);
        });
    });

    // 🔹 INIT
    updateCounterDisplay();
    statusText.textContent = '✅ Prêt - Envoyez une question en POST';

    console.log('🧪 Application de test prête !');
    console.log('📡 Worker:', WORKER_URL);
    console.log('💬 Questions restantes:', 10 - getQuestionCount());
</script>

</body>
</html>
