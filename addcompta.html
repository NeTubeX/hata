<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer configuration comptabilité</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0e1a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: rgba(18,18,31,0.95);
            border-radius: 24px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(59,130,246,0.3);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg,#60a5fa,#3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            text-align: center;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 13px;
            text-align: center;
            margin-bottom: 24px;
        }
        .info {
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.3);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .info-line {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .info-line:last-child {
            border-bottom: none;
        }
        .info-label {
            color: #94a3b8;
        }
        .info-value {
            color: #60a5fa;
            font-weight: 600;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg,#10b981,#059669);
            color: white;
        }
        .btn:hover {
            transform: scale(0.98);
            opacity: 0.9;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-danger {
            background: linear-gradient(135deg,#ef4444,#dc2626);
            margin-top: 12px;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #334155;
            color: #94a3b8;
            margin-top: 12px;
        }
        .btn-outline:hover {
            background: rgba(255,255,255,0.05);
        }
        .status {
            margin-top: 16px;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
            display: none;
        }
        .status.success {
            display: block;
            background: rgba(16,185,129,0.15);
            border: 1px solid rgba(16,185,129,0.3);
            color: #10b981;
        }
        .status.error {
            display: block;
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            color: #ef4444;
        }
        .status.loading {
            display: block;
            background: rgba(59,130,246,0.15);
            border: 1px solid rgba(59,130,246,0.3);
            color: #60a5fa;
        }
        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #60a5fa;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 6px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            background: #2d3748;
            border: 1px solid #334155;
            color: #fff;
            font-size: 14px;
            box-sizing: border-box;
        }
        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .input-group input::placeholder {
            color: #64748b;
        }
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 11px;
            color: #334155;
        }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 10px;
            font-weight: 600;
        }
        .badge-success {
            background: #10b981;
            color: white;
        }
        .badge-error {
            background: #ef4444;
            color: white;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>⚙️ Configuration Comptabilité</h1>
    <p class="subtitle">Crée la configuration Firebase pour la comptabilité</p>

    <div class="info" id="infoEcole">
        <div class="info-line">
            <span class="info-label">🏫 École</span>
            <span class="info-value" id="ecoleDisplay">Chargement...</span>
        </div>
        <div class="info-line">
            <span class="info-label">📁 Chemin</span>
            <span class="info-value" id="pathDisplay">Chargement...</span>
        </div>
        <div class="info-line">
            <span class="info-label">🔑 Code par défaut</span>
            <span class="info-value">1234</span>
        </div>
    </div>

    <div class="input-group">
        <label>🔑 CODE D'ACCÈS (optionnel)</label>
        <input type="text" id="customCode" placeholder="Laissez vide pour 1234" maxlength="6" inputmode="numeric">
    </div>

    <button class="btn" id="createBtn">🚀 CRÉER LA CONFIGURATION</button>
    <button class="btn btn-outline" id="verifyBtn">🔍 VÉRIFIER L'EXISTANCE</button>
    <button class="btn btn-danger" id="deleteBtn">🗑️ SUPPRIMER LA CONFIG</button>

    <div id="status" class="status"></div>

    <div class="footer">
        NetubeX SARL &bull; Support: support@netubex.com
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
        authDomain: "netubexmoney.firebaseapp.com",
        projectId: "netubexmoney",
        storageBucket: "netubexmoney.firebasestorage.app",
        messagingSenderId: "856592608176",
        appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const urlParams = new URLSearchParams(window.location.search);
    let schoolId = urlParams.get('ecole');

    if (!schoolId) {
        document.getElementById('ecoleDisplay').textContent = '❌ Aucune école';
        document.getElementById('pathDisplay').textContent = 'Ajouter ?ecole=NOM_ECOLE';
        document.getElementById('createBtn').disabled = true;
        document.getElementById('verifyBtn').disabled = true;
        document.getElementById('deleteBtn').disabled = true;
        showStatus('error', '❌ Paramètre "ecole" manquant dans l\'URL. Ajoutez ?ecole=NOM_ECOLE');
    } else {
        const SCHOOL_PREFIX = schoolId.replace(/-/g, '_');
        document.getElementById('ecoleDisplay').textContent = schoolId.toUpperCase();
        document.getElementById('pathDisplay').textContent = `ecoles/${SCHOOL_PREFIX}/_config/settings`;
    }

    const configRef = doc(db, "ecoles", SCHOOL_PREFIX, "_config", "settings");

    function showStatus(type, message) {
        const el = document.getElementById('status');
        el.className = `status ${type}`;
        el.innerHTML = message;
        el.style.display = 'block';
    }

    function hideStatus() {
        document.getElementById('status').style.display = 'none';
    }

    async function createConfig() {
        const btn = document.getElementById('createBtn');
        btn.disabled = true;
        btn.textContent = '⏳ CRÉATION...';
        hideStatus();
        showStatus('loading', '<span class="loader"></span> Création en cours...');

        try {
            const code = document.getElementById('customCode').value.trim() || "1234";
            const configData = {
                codeAcces: code,
                nom: `COMPLEXE SCOLAIRE ${schoolId.toUpperCase()}`,
                adresse: "",
                maxExonerations: 10,
                fraisInscription: 50000
            };

            await setDoc(configRef, configData);
            showStatus('success', `
                ✅ Configuration créée avec succès !<br>
                🔑 Code: <strong>${code}</strong><br>
                📁 Chemin: <strong>ecoles/${SCHOOL_PREFIX}/_config/settings</strong>
            `);
        } catch (error) {
            showStatus('error', `❌ Erreur: ${error.message}`);
            console.error(error);
        } finally {
            btn.disabled = false;
            btn.textContent = '🚀 CRÉER LA CONFIGURATION';
        }
    }

    async function verifyConfig() {
        const btn = document.getElementById('verifyBtn');
        btn.disabled = true;
        btn.textContent = '⏳ VÉRIFICATION...';
        hideStatus();
        showStatus('loading', '<span class="loader"></span> Vérification en cours...');

        try {
            const snap = await getDoc(configRef);
            if (snap.exists()) {
                const data = snap.data();
                showStatus('success', `
                    ✅ Configuration trouvée !<br>
                    🔑 Code: <strong>${data.codeAcces || 'Non défini'}</strong><br>
                    🏫 École: <strong>${data.nom || 'Non défini'}</strong>
                `);
            } else {
                showStatus('error', '❌ Aucune configuration trouvée. Cliquez sur "Créer"');
            }
        } catch (error) {
            showStatus('error', `❌ Erreur: ${error.message}`);
            console.error(error);
        } finally {
            btn.disabled = false;
            btn.textContent = '🔍 VÉRIFIER L\'EXISTANCE';
        }
    }

    async function deleteConfig() {
        if (!confirm('⚠️ Supprimer définitivement la configuration ?')) return;

        const btn = document.getElementById('deleteBtn');
        btn.disabled = true;
        btn.textContent = '⏳ SUPPRESSION...';
        hideStatus();
        showStatus('loading', '<span class="loader"></span> Suppression en cours...');

        try {
            await deleteDoc(configRef);
            showStatus('success', '✅ Configuration supprimée avec succès');
        } catch (error) {
            showStatus('error', `❌ Erreur: ${error.message}`);
            console.error(error);
        } finally {
            btn.disabled = false;
            btn.textContent = '🗑️ SUPPRIMER LA CONFIG';
        }
    }

    document.getElementById('createBtn').addEventListener('click', createConfig);
    document.getElementById('verifyBtn').addEventListener('click', verifyConfig);
    document.getElementById('deleteBtn').addEventListener('click', deleteConfig);

    // Auto-vérification au chargement
    if (schoolId) {
        setTimeout(verifyConfig, 500);
    }

    // Entrée pour valider avec Enter
    document.getElementById('customCode').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            createConfig();
        }
    });

    console.log('✅ Page de configuration prête');
    console.log(`📁 Chemin: ecoles/${SCHOOL_PREFIX}/_config/settings`);
</script>

</body>
</html>
