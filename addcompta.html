<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Créer configuration comptabilité</title>
    <style>
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0a0e1a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }
        .card {
            background: rgba(18,18,31,0.95);
            border-radius: 24px;
            padding: 40px;
            max-width: 550px;
            width: 100%;
            border: 1px solid rgba(59,130,246,0.3);
            box-shadow: 0 20px 60px rgba(0,0,0,0.6);
        }
        h1 {
            font-size: 22px;
            font-weight: 700;
            background: linear-gradient(135deg,#60a5fa,#3b82f6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            text-align: center;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 13px;
            text-align: center;
            margin-bottom: 24px;
        }
        .info {
            background: rgba(16,185,129,0.1);
            border: 1px solid rgba(16,185,129,0.3);
            border-radius: 12px;
            padding: 16px;
            margin-bottom: 20px;
        }
        .info-line {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            font-size: 13px;
            border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .info-line:last-child {
            border-bottom: none;
        }
        .info-label {
            color: #94a3b8;
        }
        .info-value {
            color: #60a5fa;
            font-weight: 600;
            word-break: break-all;
        }
        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 40px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            background: linear-gradient(135deg,#10b981,#059669);
            color: white;
        }
        .btn:hover {
            transform: scale(0.98);
            opacity: 0.9;
        }
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        .btn-danger {
            background: linear-gradient(135deg,#ef4444,#dc2626);
            margin-top: 12px;
        }
        .btn-outline {
            background: transparent;
            border: 1px solid #334155;
            color: #94a3b8;
            margin-top: 12px;
        }
        .btn-outline:hover {
            background: rgba(255,255,255,0.05);
        }
        .status {
            margin-top: 16px;
            padding: 14px;
            border-radius: 12px;
            font-size: 14px;
            text-align: center;
            display: none;
            max-height: 200px;
            overflow-y: auto;
        }
        .status.success {
            display: block;
            background: rgba(16,185,129,0.15);
            border: 1px solid rgba(16,185,129,0.3);
            color: #10b981;
        }
        .status.error {
            display: block;
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.3);
            color: #ef4444;
        }
        .status.loading {
            display: block;
            background: rgba(59,130,246,0.15);
            border: 1px solid rgba(59,130,246,0.3);
            color: #60a5fa;
        }
        .loader {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid #60a5fa;
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
            vertical-align: middle;
            margin-right: 8px;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .input-group {
            margin-bottom: 16px;
        }
        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: #94a3b8;
            margin-bottom: 6px;
        }
        .input-group input {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            background: #2d3748;
            border: 1px solid #334155;
            color: #fff;
            font-size: 14px;
            box-sizing: border-box;
        }
        .input-group input:focus {
            outline: none;
            border-color: #3b82f6;
        }
        .input-group input::placeholder {
            color: #64748b;
        }
        .footer {
            margin-top: 20px;
            text-align: center;
            font-size: 11px;
            color: #334155;
        }
        .log-area {
            margin-top: 12px;
            background: #0f172a;
            border-radius: 12px;
            padding: 12px;
            font-family: monospace;
            font-size: 11px;
            color: #94a3b8;
            max-height: 150px;
            overflow-y: auto;
            border: 1px solid #1e293b;
            display: none;
        }
        .log-area.show {
            display: block;
        }
        .log-area .log-line {
            padding: 2px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
        }
        .log-area .log-line:last-child {
            border-bottom: none;
        }
        .log-area .log-success {
            color: #10b981;
        }
        .log-area .log-error {
            color: #ef4444;
        }
        .log-area .log-info {
            color: #60a5fa;
        }
    </style>
</head>
<body>

<div class="card">
    <h1>⚙️ Configuration Comptabilité</h1>
    <p class="subtitle">Crée la configuration Firebase pour la comptabilité</p>

    <div class="input-group">
        <label>🏫 NOM DE L'ÉCOLE *</label>
        <input type="text" id="ecoleInput" placeholder="Ex: gloria-dei, mon-ecole, test" value="">
    </div>

    <div class="info" id="infoEcole">
        <div class="info-line">
            <span class="info-label">📁 Chemin</span>
            <span class="info-value" id="pathDisplay">ecoles/NOM_ECOLE/_config/settings</span>
        </div>
        <div class="info-line">
            <span class="info-label">🔑 Code par défaut</span>
            <span class="info-value">1234</span>
        </div>
        <div class="info-line">
            <span class="info-label">📊 Firestore</span>
            <span class="info-value" id="firebaseStatus">⏳ Vérification...</span>
        </div>
    </div>

    <div class="input-group">
        <label>🔑 CODE D'ACCÈS (optionnel)</label>
        <input type="text" id="customCode" placeholder="Laissez vide pour 1234" maxlength="6" inputmode="numeric">
    </div>

    <button class="btn" id="createBtn">🚀 CRÉER LA CONFIGURATION</button>
    <button class="btn btn-outline" id="verifyBtn">🔍 VÉRIFIER L'EXISTANCE</button>
    <button class="btn btn-danger" id="deleteBtn">🗑️ SUPPRIMER LA CONFIG</button>

    <div id="status" class="status"></div>
    <div id="logArea" class="log-area"></div>

    <div class="footer">
        NetubeX SARL &bull; Support: support@netubex.com
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, deleteDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
        authDomain: "netubexmoney.firebaseapp.com",
        projectId: "netubexmoney",
        storageBucket: "netubexmoney.firebasestorage.app",
        messagingSenderId: "856592608176",
        appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
    };

    let app, db;

    function logMessage(message, type = 'info') {
        const logArea = document.getElementById('logArea');
        logArea.classList.add('show');
        const line = document.createElement('div');
        line.className = `log-line log-${type}`;
        const timestamp = new Date().toLocaleTimeString();
        line.textContent = `[${timestamp}] ${message}`;
        logArea.appendChild(line);
        logArea.scrollTop = logArea.scrollHeight;
        console.log(message);
    }

    try {
        app = initializeApp(firebaseConfig);
        db = getFirestore(app);
        document.getElementById('firebaseStatus').textContent = '✅ Connecté';
        logMessage('✅ Firebase initialisé avec succès', 'success');
    } catch (error) {
        document.getElementById('firebaseStatus').textContent = '❌ Erreur';
        logMessage(`❌ Erreur Firebase: ${error.message}`, 'error');
        console.error(error);
    }

    let schoolId = '';
    let configRef = null;

    function getSchoolId() {
        const input = document.getElementById('ecoleInput').value.trim();
        if (!input) return '';
        return input.replace(/[^a-zA-Z0-9]/g, '_');
    }

    function updatePath() {
        const id = getSchoolId();
        if (id) {
            document.getElementById('pathDisplay').textContent = `ecoles/${id}/_config/settings`;
        } else {
            document.getElementById('pathDisplay').textContent = 'ecoles/NOM_ECOLE/_config/settings';
        }
    }

    document.getElementById('ecoleInput').addEventListener('input', updatePath);

    const urlParams = new URLSearchParams(window.location.search);
    const urlEcole = urlParams.get('ecole');
    if (urlEcole) {
        document.getElementById('ecoleInput').value = urlEcole;
        updatePath();
    }

    function showStatus(type, message) {
        const el = document.getElementById('status');
        el.className = `status ${type}`;
        el.innerHTML = message;
        el.style.display = 'block';
        logMessage(message, type);
    }

    function hideStatus() {
        document.getElementById('status').style.display = 'none';
    }

    async function checkFirebaseConnection() {
        try {
            // Tester la connexion en lisant une collection qui existe
            const testRef = collection(db, "ecoles");
            await getDocs(testRef);
            document.getElementById('firebaseStatus').textContent = '✅ Connecté';
            return true;
        } catch (error) {
            document.getElementById('firebaseStatus').textContent = '❌ Erreur';
            logMessage(`❌ Erreur de connexion Firebase: ${error.message}`, 'error');
            return false;
        }
    }

    async function createConfig() {
        const schoolName = document.getElementById('ecoleInput').value.trim();
        if (!schoolName) {
            showStatus('error', '❌ Veuillez entrer le nom de l\'école');
            return;
        }

        const connected = await checkFirebaseConnection();
        if (!connected) {
            showStatus('error', '❌ Impossible de se connecter à Firebase. Vérifiez votre connexion internet.');
            return;
        }

        const SCHOOL_PREFIX = getSchoolId();
        configRef = doc(db, "ecoles", SCHOOL_PREFIX, "_config", "settings");

        const btn = document.getElementById('createBtn');
        btn.disabled = true;
        btn.textContent = '⏳ CRÉATION...';
        hideStatus();
        showStatus('loading', '<span class="loader"></span> Création en cours...');

        try {
            const code = document.getElementById('customCode').value.trim() || "1234";
            const configData = {
                codeAcces: code,
                nom: `COMPLEXE SCOLAIRE ${schoolName.toUpperCase()}`,
                adresse: "",
                maxExonerations: 10,
                fraisInscription: 50000,
                createdAt: new Date().toISOString()
            };

            logMessage(`📝 Création de la config pour: ${schoolName}`, 'info');
            logMessage(`📝 Chemin: ecoles/${SCHOOL_PREFIX}/_config/settings`, 'info');
            logMessage(`📝 Code: ${code}`, 'info');

            await setDoc(configRef, configData);
            
            showStatus('success', `
                ✅ Configuration créée avec succès !<br>
                🏫 École: <strong>${schoolName}</strong><br>
                🔑 Code: <strong>${code}</strong><br>
                📁 Chemin: <strong>ecoles/${SCHOOL_PREFIX}/_config/settings</strong>
            `);
            logMessage('✅ Configuration créée avec succès !', 'success');
        } catch (error) {
            showStatus('error', `❌ Erreur: ${error.message}`);
            logMessage(`❌ Erreur: ${error.message}`, 'error');
            console.error(error);
            
            // Afficher plus d'informations sur l'erreur
            if (error.code === 'permission-denied') {
                showStatus('error', '❌ Permission refusée. Vérifiez les règles de sécurité Firebase.');
            } else if (error.code === 'unavailable') {
                showStatus('error', '❌ Service indisponible. Vérifiez votre connexion internet.');
            }
        } finally {
            btn.disabled = false;
            btn.textContent = '🚀 CRÉER LA CONFIGURATION';
        }
    }

    async function verifyConfig() {
        const schoolName = document.getElementById('ecoleInput').value.trim();
        if (!schoolName) {
            showStatus('error', '❌ Veuillez entrer le nom de l\'école');
            return;
        }

        const connected = await checkFirebaseConnection();
        if (!connected) {
            showStatus('error', '❌ Impossible de se connecter à Firebase.');
            return;
        }

        const SCHOOL_PREFIX = getSchoolId();
        configRef = doc(db, "ecoles", SCHOOL_PREFIX, "_config", "settings");

        const btn = document.getElementById('verifyBtn');
        btn.disabled = true;
        btn.textContent = '⏳ VÉRIFICATION...';
        hideStatus();
        showStatus('loading', '<span class="loader"></span> Vérification en cours...');

        try {
            const snap = await getDoc(configRef);
            if (snap.exists()) {
                const data = snap.data();
                showStatus('success', `
                    ✅ Configuration trouvée !<br>
                    🏫 École: <strong>${data.nom || 'Non défini'}</strong><br>
                    🔑 Code: <strong>${data.codeAcces || 'Non défini'}</strong><br>
                    📅 Créée: <strong>${data.createdAt ? new Date(data.createdAt).toLocaleString() : 'Inconnu'}</strong>
                `);
                logMessage('✅ Configuration trouvée', 'success');
            } else {
                showStatus('error', '❌ Aucune configuration trouvée. Cliquez sur "Créer"');
                logMessage('❌ Aucune configuration trouvée', 'error');
            }
        } catch (error) {
            showStatus('error', `❌ Erreur: ${error.message}`);
            logMessage(`❌ Erreur: ${error.message}`, 'error');
            console.error(error);
        } finally {
            btn.disabled = false;
            btn.textContent = '🔍 VÉRIFIER L\'EXISTANCE';
        }
    }

    async function deleteConfig() {
        const schoolName = document.getElementById('ecoleInput').value.trim();
        if (!schoolName) {
            showStatus('error', '❌ Veuillez entrer le nom de l\'école');
            return;
        }

        if (!confirm(`⚠️ Supprimer définitivement la configuration pour ${schoolName} ?`)) return;

        const connected = await checkFirebaseConnection();
        if (!connected) {
            showStatus('error', '❌ Impossible de se connecter à Firebase.');
            return;
        }

        const SCHOOL_PREFIX = getSchoolId();
        configRef = doc(db, "ecoles", SCHOOL_PREFIX, "_config", "settings");

        const btn = document.getElementById('deleteBtn');
        btn.disabled = true;
        btn.textContent = '⏳ SUPPRESSION...';
        hideStatus();
        showStatus('loading', '<span class="loader"></span> Suppression en cours...');

        try {
            await deleteDoc(configRef);
            showStatus('success', `✅ Configuration supprimée avec succès pour ${schoolName}`);
            logMessage(`✅ Configuration supprimée pour ${schoolName}`, 'success');
        } catch (error) {
            showStatus('error', `❌ Erreur: ${error.message}`);
            logMessage(`❌ Erreur: ${error.message}`, 'error');
            console.error(error);
        } finally {
            btn.disabled = false;
            btn.textContent = '🗑️ SUPPRIMER LA CONFIG';
        }
    }

    document.getElementById('createBtn').addEventListener('click', createConfig);
    document.getElementById('verifyBtn').addEventListener('click', verifyConfig);
    document.getElementById('deleteBtn').addEventListener('click', deleteConfig);

    // Vérification automatique au chargement
    setTimeout(async () => {
        await checkFirebaseConnection();
        if (urlEcole) {
            setTimeout(verifyConfig, 500);
        }
    }, 500);

    document.getElementById('customCode').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            createConfig();
        }
    });

    document.getElementById('ecoleInput').addEventListener('keypress', function(e) {
        if (e.key === 'Enter') {
            verifyConfig();
        }
    });

    console.log('✅ Page de configuration prête');
    console.log(`📁 Firebase project: ${firebaseConfig.projectId}`);
</script>

</body>
</html>
