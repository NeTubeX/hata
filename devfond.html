<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Fond transparent - Zone batterie</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;background:#0f0c29;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;overflow:hidden}
body{background:linear-gradient(145deg,#0f0c29 0%,#302b63 40%,#24243e 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
body::before{content:'';position:fixed;top:-100px;left:50%;transform:translateX(-50%);width:500px;height:500px;background:radial-gradient(circle,rgba(120,80,255,0.3) 0%,transparent 70%);border-radius:50%;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:20%;right:-50px;width:300px;height:300px;background:radial-gradient(circle,rgba(255,100,200,0.12) 0%,transparent 70%);border-radius:50%;pointer-events:none;z-index:0}
.content-card{position:relative;z-index:1;background:rgba(255,255,255,0.05);backdrop-filter:blur(12px);padding:32px 28px;border-radius:28px;border:1px solid rgba(255,255,255,0.06);box-shadow:0 8px 32px rgba(0,0,0,0.4);text-align:center;width:100%;max-width:320px}
.content-card h1{font-size:2rem;font-weight:700;background:linear-gradient(135deg,#c4b5fd,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px}
.content-card p{color:rgba(255,255,255,0.8);font-size:1rem;line-height:1.6}
.note{color:rgba(255,255,255,0.2);font-size:0.7rem;margin-top:30px;letter-spacing:0.5px;z-index:1;position:relative;background:rgba(0,0,0,0.2);padding:4px 16px;border-radius:40px;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,0.05)}
</style>
</head>
<body>
<div class="content-card">
<h1>Fond transparent</h1>
<p>La barre de statut est transparente<br />sur Chrome Android</p>
</div>
<div class="note">⬆ fond sur zone batterie</div>
<script>
// La technique magique :
if (window.navigator) {
    // Forcer la transparence de la barre de statut
    // en utilisant l'API expérimentale
    if ('virtualKeyboard' in navigator) {
        navigator.virtualKeyboard.overlaysContent = true;
    }
    
    // Autre méthode : utiliser l'API Fullscreen
    // avec un délai pour garder la barre visible
    setTimeout(() => {
        if (document.documentElement.requestFullscreen) {
            document.documentElement.requestFullscreen().catch(() => {});
        }
    }, 1000);
}
</script>
</body>
</html>
