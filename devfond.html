<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>Scroll transparent</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:200vh;background:linear-gradient(145deg,#0f0c29 0%,#302b63 40%,#24243e 100%);font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;overflow-x:hidden}
body{padding:20px;padding-top:calc(20px + env(safe-area-inset-top));display:flex;flex-direction:column;align-items:center}
body::before{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:600px;height:600px;background:radial-gradient(circle,rgba(120,80,255,0.4) 0%,transparent 70%);border-radius:50%;pointer-events:none;z-index:0}
body::after{content:'';position:fixed;bottom:20%;right:-50px;width:300px;height:300px;background:radial-gradient(circle,rgba(255,100,200,0.15) 0%,transparent 70%);border-radius:50%;pointer-events:none;z-index:0}
.content{position:relative;z-index:1;width:100%;max-width:360px;display:flex;flex-direction:column;gap:30px;padding-bottom:100px}
.card{background:rgba(255,255,255,0.05);backdrop-filter:blur(12px);padding:28px;border-radius:24px;border:1px solid rgba(255,255,255,0.06);box-shadow:0 8px 32px rgba(0,0,0,0.3);text-align:center}
.card h1{font-size:1.8rem;font-weight:700;background:linear-gradient(135deg,#c4b5fd,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:8px}
.card p{color:rgba(255,255,255,0.7);font-size:1rem;line-height:1.6}
.card .highlight{color:rgba(255,255,255,0.9);font-weight:500;background:rgba(167,139,250,0.15);padding:2px 12px;border-radius:12px;display:inline-block;border:1px solid rgba(167,139,250,0.15)}
.card-small{background:rgba(255,255,255,0.03);backdrop-filter:blur(8px);padding:20px;border-radius:16px;border:1px solid rgba(255,255,255,0.04);text-align:center}
.card-small p{color:rgba(255,255,255,0.5);font-size:0.9rem}
.status-bar-spacer{height:env(safe-area-inset-top);width:100%;position:fixed;top:0;left:0;z-index:100;background:transparent;pointer-events:none}
.scroll-indicator{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);z-index:50;color:rgba(255,255,255,0.2);font-size:0.7rem;background:rgba(0,0,0,0.3);padding:6px 16px;border-radius:30px;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,0.05);animation:bounce 2s infinite}
@keyframes bounce{0%,100%{transform:translateX(-50%) translateY(0)}50%{transform:translateX(-50%) translateY(-5px)}}
</style>
</head>
<body>
<div class="status-bar-spacer"></div>
<div class="content">
<div class="card">
<h1>Scroll & Transparence</h1>
<p>Comme Facebook, le fond défile <span class="highlight">derrière la barre</span></p>
</div>
<div class="card-small"><p>🔹 Zone batterie transparente</p></div>
<div class="card-small"><p>🔸 Le fond passe en dessous</p></div>
<div class="card-small"><p>🔹 Effet parallaxe natif</p></div>
<div class="card-small"><p>🔸 Comme une app native</p></div>
<div class="card" style="margin-top:20px">
<p style="font-size:0.9rem;opacity:0.6">⬇️ Scrolle pour voir l'effet ⬇️</p>
</div>
</div>
<div class="scroll-indicator">⬇ scroll ⬇</div>
</body>
</html>
