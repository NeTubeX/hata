<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Fond design - Zone batterie</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;min-height:100vh;background:#0f0c29;font-family:system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
.app{position:relative;width:100%;min-height:100vh;background:linear-gradient(145deg,#0f0c29 0%,#302b63 40%,#24243e 100%);background-attachment:fixed;display:flex;flex-direction:column;align-items:center;padding:0 20px 30px;margin-top:-30px;padding-top:50px;box-shadow:0 0 60px rgba(0,0,0,0.8);overflow:visible}
.app::before{content:'';position:absolute;top:-80px;left:50%;transform:translateX(-50%);width:400px;height:400px;background:radial-gradient(circle,rgba(120,80,255,0.3) 0%,transparent 70%);border-radius:50%;pointer-events:none;z-index:0}
.app::after{content:'';position:absolute;bottom:20%;right:-30px;width:200px;height:200px;background:radial-gradient(circle,rgba(255,100,200,0.15) 0%,transparent 70%);border-radius:50%;pointer-events:none;z-index:0}
.content-card{position:relative;z-index:2;background:rgba(255,255,255,0.05);backdrop-filter:blur(12px);padding:32px 28px;border-radius:28px;border:1px solid rgba(255,255,255,0.06);box-shadow:0 8px 32px rgba(0,0,0,0.4);text-align:center;width:100%;max-width:320px;margin-top:60px}
.content-card h1{font-size:2rem;font-weight:700;background:linear-gradient(135deg,#c4b5fd,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:12px}
.content-card p{color:rgba(255,255,255,0.8);font-size:1rem;line-height:1.6;margin-bottom:16px}
.content-card .highlight{color:rgba(255,255,255,0.95);font-weight:500;background:rgba(167,139,250,0.15);padding:2px 12px;border-radius:12px;display:inline-block;border:1px solid rgba(167,139,250,0.15)}
.glow-text{color:rgba(255,255,255,0.3);font-size:0.7rem;margin-top:30px;letter-spacing:0.5px;z-index:2;position:relative;background:rgba(0,0,0,0.2);padding:4px 16px;border-radius:40px;backdrop-filter:blur(4px);border:1px solid rgba(255,255,255,0.05)}
</style>
</head>
<body>
<div class="app">
<div class="content-card">
<h1>Design pur</h1>
<p>Fond dégradé avec halos lumineux<br /><span class="highlight">sans image</span></p>
<p style="font-size:0.9rem;opacity:0.6;margin-top:8px">Le fond couvre la zone batterie<br />en débordant vers le haut</p>
</div>
<div class="glow-text">⬆ fond débordant sur la zone batterie</div>
</div>
</body>
</html>
