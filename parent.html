<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>ESPACE PARENTAL</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',sans-serif;}
body{background:#0a0e1a;min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;}
.parent-app{width:100%;max-width:480px;background:linear-gradient(135deg,#1e293b,#0f172a);border-radius:32px;overflow:hidden;border:1px solid rgba(59,130,246,0.3);box-shadow:0 20px 60px rgba(0,0,0,0.6);}
.header{background:linear-gradient(135deg,#0f2b44,#071a2c);padding:20px 24px;display:flex;align-items:center;gap:16px;border-bottom:1px solid rgba(59,130,246,0.2);}
.logo{width:56px;height:56px;border-radius:50%;background:linear-gradient(135deg,#3b82f6,#f59e0b);padding:3px;flex-shrink:0;animation:pulse 2s ease-in-out infinite;}
.logo-inner{width:100%;height:100%;border-radius:50%;background:#0a0e1a;overflow:hidden;display:flex;align-items:center;justify-content:center;font-size:28px;font-weight:700;color:#fff;}
@keyframes pulse{0%{transform:scale(1);box-shadow:0 0 0 0 rgba(59,130,246,0.4);}50%{transform:scale(1.05);box-shadow:0 0 30px 10px rgba(59,130,246,0.15);}100%{transform:scale(1);box-shadow:0 0 0 0 rgba(59,130,246,0.4);}}
.header-text{flex:1;}
.header-text h1{color:#fff;font-size:18px;font-weight:700;letter-spacing:1px;}
.header-text p{color:#10b981;font-size:13px;font-weight:600;}
.close-btn{background:rgba(239,68,68,0.15);border:none;color:#f87171;font-size:22px;cursor:pointer;width:36px;height:36px;border-radius:50%;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
.close-btn:hover{background:rgba(239,68,68,0.3);}
.info-bar{background:rgba(0,0,0,0.3);padding:10px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(255,255,255,0.05);}
.info-bar span{color:#94a3b8;font-size:12px;}
.counter{background:#10b981;color:white;padding:2px 14px;border-radius:40px;font-weight:bold;font-size:14px;transition:all 0.3s;}
.counter.full{background:#ef4444;}
.messages{height:420px;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;background:radial-gradient(circle at 20% 30%, rgba(59,130,246,0.05), transparent 80%);}
.msg{display:flex;width:100%;animation:fadeInUp 0.3s ease-out;}
.msg.user{justify-content:flex-end;}
.msg.bot{justify-content:flex-start;}
.bubble{max-width:85%;padding:14px 18px;border-radius:20px;font-size:14px;line-height:1.5;word-wrap:break-word;white-space:pre-wrap;}
.msg.user .bubble{background:linear-gradient(135deg,#3b82f6,#1e40af);color:#fff;border-radius:20px 20px 4px 20px;}
.msg.bot .bubble{background:rgba(18,25,45,0.9);color:#e2e8f0;border:2px solid rgba(255,107,107,0.3);border-radius:20px 20px 20px 4px;animation:rainbow 4s linear infinite;}
@keyframes rainbow{0%{border-color:rgba(255,107,107,0.3);}25%{border-color:rgba(255,159,67,0.3);}50%{border-color:rgba(29,209,161,0.3);}75%{border-color:rgba(84,160,255,0.3);}100%{border-color:rgba(255,107,107,0.3);}}
.bubble strong{color:#60a5fa;}
.bubble .logo-msg{width:50px;height:50px;border-radius:50%;object-fit:cover;display:block;margin:0 auto 10px auto;border:2px solid rgba(255,215,0,0.3);}
.input-area{display:flex;gap:12px;padding:16px;background:#0f172a;border-top:1px solid #334155;}
.input-area textarea{flex:1;padding:12px 16px;background:#0f172a;border:1px solid #334155;border-radius:40px;color:#fff;font-size:14px;outline:none;resize:none;font-family:'Inter',sans-serif;line-height:1.4;min-height:48px;max-height:120px;}
.input-area textarea:focus{border-color:#3b82f6;}
.input-area button{background:linear-gradient(135deg,#10b981,#059669);border:none;border-radius:40px;padding:0 24px;color:#fff;font-weight:600;cursor:pointer;font-size:16px;transition:all 0.2s;}
.input-area button:active{transform:scale(0.95);}
.loader{display:inline-block;width:16px;height:16px;border:2px solid #3b82f6;border-top-color:transparent;border-radius:50%;animation:spin 0.6s linear infinite;vertical-align:middle;margin-right:8px;}
@keyframes spin{to{transform:rotate(360deg);}}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.welcome-bubble{text-align:center;padding:20px;}
.welcome-bubble .logo-msg{width:60px;height:60px;border-radius:50%;object-fit:cover;display:block;margin:0 auto 12px auto;border:3px solid rgba(255,215,0,0.4);}
.empty-state{text-align:center;padding:40px;color:#94a3b8;}
</style>
</head>
<body>

<div class="parent-app" id="parentApp">
    <div class="header">
        <div class="logo"><div class="logo-inner">🏫</div></div>
        <div class="header-text">
            <h1>👪 ESPACE PARENTAL</h1>
            <p>Système Intelligent</p>
        </div>
        <button class="close-btn" id="closeApp">✕</button>
    </div>
    <div class="info-bar">
        <span>💬 Questions aujourd'hui</span>
        <span class="counter" id="questionCounter">0/10</span>
    </div>
    <div class="messages" id="messagesContainer">
        <div class="msg bot">
            <div class="bubble welcome-bubble">
                <img src="https://www.netubex.com/png.png" alt="Système" class="logo-msg" onerror="this.style.display='none'">
                <p>Je suis un système intelligent qui vous permet de savoir quelques détails sur votre enfant.</p>
                <p style="margin-top:8px;">Veuillez taper un <strong>code à 6 chiffres</strong> pour les frais ou le <strong>nom</strong> de votre enfant pour ses notes.</p>
            </div>
        </div>
    </div>
    <div class="input-area">
        <textarea id="questionInput" placeholder="Code 6 chiffres ou Nom de l'élève..." rows="1"></textarea>
        <button id="sendBtn">📤</button>
    </div>
</div>

<script>
// ===== CONFIGURATION =====
const SCHOOL_PREFIX = 'ecole_exemple';
const WORKER_URL = 'https://ia.netube-a97.workers.dev/';

// ===== ÉTAT =====
let dernierEleveConsulte = null;
let dernierEleveData = null;
let isProcessing = false;

// ===== ÉLÉMENTS DOM =====
const messages = document.getElementById('messagesContainer');
const input = document.getElementById('questionInput');
const sendBtn = document.getElementById('sendBtn');
const counter = document.getElementById('questionCounter');
const closeBtn = document.getElementById('closeApp');

// ===== COMPTEUR DE QUESTIONS =====
function getTodayKey() {
    const today = new Date().toISOString().slice(0, 10);
    return 'parent_questions_' + SCHOOL_PREFIX + '_' + today;
}

function getQuestionCount() {
    const data = localStorage.getItem(getTodayKey());
    if (!data) return 0;
    try {
        const parsed = JSON.parse(data);
        if (parsed.date !== new Date().toISOString().slice(0, 10)) return 0;
        return parsed.count || 0;
    } catch (e) { return 0; }
}

function incrementQuestionCount() {
    const key = getTodayKey();
    const newCount = getQuestionCount() + 1;
    localStorage.setItem(key, JSON.stringify({ date: new Date().toISOString().slice(0, 10), count: newCount }));
    return newCount;
}

function canAskQuestion() { return getQuestionCount() < 10; }

function updateCounter() {
    const current = getQuestionCount();
    counter.textContent = current + '/10';
    counter.classList.toggle('full', current >= 10);
}

// ===== SYNTHÈSE VOCALE =====
function waitForVoices(callback) {
    if (window.speechSynthesis.getVoices().length > 0) {
        callback();
        return;
    }
    const handler = () => {
        callback();
        window.speechSynthesis.onvoiceschanged = null;
    };
    window.speechSynthesis.onvoiceschanged = handler;
    setTimeout(() => {
        if (window.speechSynthesis.getVoices().length > 0) {
            window.speechSynthesis.onvoiceschanged = null;
            callback();
        }
    }, 2000);
}

function voixParentale(texte) {
    if (!texte || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    let texteParle = texte.replace(/(\d+)\/(\d+)/g, '$1 sur $2');
    const utterance = new SpeechSynthesisUtterance(texteParle);
    utterance.lang = 'fr-FR';
    utterance.rate = 0.8;
    utterance.pitch = 1;
    const voices = window.speechSynthesis.getVoices();
    const voixFR = voices.find(v => v.lang.startsWith('fr'));
    if (voixFR) utterance.voice = voixFR;
    window.speechSynthesis.speak(utterance);
}

function stopSpeaking() {
    if (window.speechSynthesis) window.speechSynthesis.cancel();
}

// ===== MESSAGES =====
function addMessage(text, isUser = false) {
    const div = document.createElement('div');
    div.className = `msg ${isUser ? 'user' : 'bot'}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    div.appendChild(bubble);
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function addLoadingMessage() {
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'loadingMsg';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<span class="loader"></span> Réflexion en cours...';
    div.appendChild(bubble);
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
}

function removeLoadingMessage() {
    const el = document.getElementById('loadingMsg');
    if (el) el.remove();
}

function typeWriterEffect(element, text, speed = 12) {
    return new Promise((resolve) => {
        element.innerHTML = '';
        let i = 0;
        const interval = setInterval(() => {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                i++;
                messages.scrollTop = messages.scrollHeight;
            } else {
                clearInterval(interval);
                resolve();
            }
        }, speed);
    });
}

// ===== IA =====
async function chercherInfosFinancieresParCode(code) {
    // Simulé - à remplacer par votre API Firebase
    return {
        nom: "Jean KASONGO",
        prenom: "Marie",
        classe: "3ème Année",
        option: "CG",
        minerval: 45000,
        totalPaye: 270000,
        reste: 180000,
        moisImpayes: ["Avril", "Mai"],
        statut: "Paiement partiel"
    };
}

async function chercherNotesParNom(nom) {
    // Simulé - à remplacer par votre API Firebase
    return [{
        eleveNom: "Jean KASONGO",
        sexe: "M",
        classe: "3ème Année",
        option: "CG",
        titulaire: "M. LUMUMBA",
        epreuves: [
            { matiere: "Mathématiques", epreuve: "Interrogation", note: 15, max: 20, periode: 1 },
            { matiere: "Mathématiques", epreuve: "Devoir", note: 12, max: 20, periode: 1 }
        ],
        nombreElevesClasse: 35,
        punitions: [],
        presences: [{ date: new Date().toISOString(), present: true }]
    }];
}

async function chargerInstructionsIA() {
    return `Tu es un assistant scolaire chaleureux et bienveillant.
Règles :
1. Ne JAMAIS utiliser de pourcentages
2. Utilise TOUJOURS les points (15/20, 40/40)
3. Maximum 3 phrases
4. Sois encourageant et bienveillant`;
}

async function genererReponseNaturelle(question, eleveData) {
    const nomEcole = "COMPLEXE SCOLAIRE";
    let contexte = `École: ${nomEcole}. L'élève s'appelle ${eleveData.nom}. `;
    const sexe = eleveData.sexe || 'M';
    let pronom = sexe === 'F' ? 'elle' : 'il';
    contexte += `${pronom === 'il' ? 'Il' : 'Elle'} est en classe de ${eleveData.classe}. `;
    
    if (eleveData.notes && eleveData.notes.length > 0) {
        contexte += "Ses notes: ";
        contexte += eleveData.notes.map(ep => `${ep.epreuve}: ${ep.note}/${ep.max}`).join(", ");
    }
    
    const instructions = await chargerInstructionsIA();
    try {
        const response = await fetch(WORKER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: `${instructions}\n\nCONTEXTE: ${contexte}\nQUESTION: ${question}` })
        });
        const data = await response.json();
        return data.answer || "Je n'ai pas pu traiter votre demande.";
    } catch (e) {
        return "Je suis désolé, il y a un problème de connexion. Veuillez réessayer.";
    }
}

async function traiterMessage(message) {
    const msg = message.trim().toLowerCase();
    
    if (/^\d{6}$/.test(msg)) {
        const infos = await chercherInfosFinancieresParCode(msg);
        if (!infos) return "❌ Code non reconnu. Veuillez vérifier ou donnez le nom de l'élève.";
        
        dernierEleveConsulte = infos.nom;
        const notes = await chercherNotesParNom(infos.nom);
        const noteData = notes.length > 0 ? notes[0] : null;
        
        dernierEleveData = {
            nom: infos.nom,
            prenom: infos.prenom,
            sexe: noteData?.sexe || 'M',
            classe: infos.classe,
            option: infos.option,
            notes: noteData?.epreuves || [],
            titulaire: noteData?.titulaire,
            nombreElevesClasse: noteData?.nombreElevesClasse || 0,
            frais: {
                minerval: infos.minerval,
                totalPaye: infos.totalPaye,
                reste: infos.reste,
                moisImpayes: infos.moisImpayes
            },
            punitions: noteData?.punitions || [],
            presences: noteData?.presences || []
        };
        return await genererReponseNaturelle(`Présente un résumé des informations de l'élève.`, dernierEleveData);
    }
    
    if (msg.length >= 2) {
        const notes = await chercherNotesParNom(msg);
        if (notes.length > 0) {
            const premier = notes[0];
            dernierEleveConsulte = premier.eleveNom;
            dernierEleveData = {
                nom: premier.eleveNom,
                prenom: "",
                sexe: premier.sexe || 'M',
                classe: premier.classe,
                option: premier.option,
                notes: premier.epreuves,
                titulaire: premier.titulaire,
                nombreElevesClasse: premier.nombreElevesClasse,
                punitions: premier.punitions,
                presences: premier.presences
            };
            let reponse = `${premier.eleveNom} est en ${premier.classe}${premier.option ? ' option '+premier.option : ''}.`;
            if (premier.epreuves && premier.epreuves.length > 0) {
                reponse += ` Ses notes: ${premier.epreuves.map(ep => ep.epreuve+' : '+ep.note+'/'+ep.max).join(', ')}.`;
            }
            return reponse;
        }
    }
    
    if (dernierEleveConsulte && dernierEleveData) {
        return await genererReponseNaturelle(msg, dernierEleveData);
    }
    
    return "Bonjour ! Je suis un système intelligent. Veuillez me donner un code à 6 chiffres ou le nom complet d'un élève.";
}

// ===== ENVOI =====
async function sendMessage() {
    const message = input.value.trim();
    if (!message || isProcessing) return;
    if (!canAskQuestion()) {
        addMessage("⚠️ Limite quotidienne atteinte. Revenez demain !", false);
        return;
    }
    
    isProcessing = true;
    addMessage(message, true);
    input.value = '';
    input.style.height = 'auto';
    
    const loading = addLoadingMessage();
    
    try {
        const reponse = await traiterMessage(message);
        removeLoadingMessage();
        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg bot';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        msgDiv.appendChild(bubble);
        messages.appendChild(msgDiv);
        await typeWriterEffect(bubble, reponse);
        messages.scrollTop = messages.scrollHeight;
        
        waitForVoices(() => { voixParentale(reponse); });
        
        incrementQuestionCount();
        updateCounter();
    } catch (error) {
        removeLoadingMessage();
        addMessage("❌ Une erreur est survenue. Veuillez réessayer.", false);
    }
    
    isProcessing = false;
}

// ===== ÉVÉNEMENTS =====
sendBtn.addEventListener('click', sendMessage);

input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

input.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

closeBtn.addEventListener('click', () => {
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0e1a;color:#94a3b8;font-size:18px;">👪 Espace parental fermé</div>';
    stopSpeaking();
});

// ===== INIT =====
updateCounter();

// Pré-charger les voix
if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => {
        window.speechSynthesis.getVoices();
    };
}

// Accueil vocal avec délai
setTimeout(() => {
    waitForVoices(() => {
        voixParentale("Bienvenue dans l'espace parental. Je suis un système intelligent qui vous permet de savoir quelques détails sur votre enfant. Veuillez taper un code à 6 chiffres pour les frais ou le nom de votre enfant pour ses notes.");
    });
}, 1500);

console.log('✅ Espace parental chargé');
</script>
</body>
</html>
