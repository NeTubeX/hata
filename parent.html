// ===== COMPTEUR DE QUESTIONS =====
function getTodayKey() {
    const today = new Date().toISOString().slice(0, 10);
    return 'parent_questions_' + SCHOOL_PREFIX + '_' + today;
}

function getQuestionCount() {
    const data = localStorage.getItem(getTodayKey());
    if (!data) return 0;
    try {
        const parsed = JSON.parse(data);
        if (parsed.date !== new Date().toISOString().slice(0, 10)) return 0;
        return parsed.count || 0;
    } catch (e) { return 0; }
}

function incrementQuestionCount() {
    const key = getTodayKey();
    const newCount = getQuestionCount() + 1;
    localStorage.setItem(key, JSON.stringify({ date: new Date().toISOString().slice(0, 10), count: newCount }));
    return newCount;
}

function canAskQuestion() { return getQuestionCount() < 10; }

function updateCounter() {
    const current = getQuestionCount();
    counter.textContent = current + '/10';
    counter.classList.toggle('full', current >= 10);
}

// ===== SYNTHÈSE VOCALE =====
function waitForVoices(callback) {
    if (window.speechSynthesis.getVoices().length > 0) {
        callback();
        return;
    }
    const handler = () => {
        callback();
        window.speechSynthesis.onvoiceschanged = null;
    };
    window.speechSynthesis.onvoiceschanged = handler;
    setTimeout(() => {
        if (window.speechSynthesis.getVoices().length > 0) {
            window.speechSynthesis.onvoiceschanged = null;
            callback();
        }
    }, 2000);
}

function voixParentale(texte) {
    if (!texte || !window.speechSynthesis) return;
    window.speechSynthesis.cancel();
    let texteParle = texte.replace(/(\d+)\/(\d+)/g, '$1 sur $2');
    const utterance = new SpeechSynthesisUtterance(texteParle);
    utterance.lang = 'fr-FR';
    utterance.rate = 0.8;
    utterance.pitch = 1;
    const voices = window.speechSynthesis.getVoices();
    const voixFR = voices.find(v => v.lang.startsWith('fr'));
    if (voixFR) utterance.voice = voixFR;
    window.speechSynthesis.speak(utterance);
}

function stopSpeaking() {
    if (window.speechSynthesis) window.speechSynthesis.cancel();
}

// ===== MESSAGES =====
function addMessage(text, isUser = false) {
    const div = document.createElement('div');
    div.className = `msg ${isUser ? 'user' : 'bot'}`;
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    div.appendChild(bubble);
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
}

function addLoadingMessage() {
    const div = document.createElement('div');
    div.className = 'msg bot';
    div.id = 'loadingMsg';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.innerHTML = '<span class="loader"></span> Réflexion en cours...';
    div.appendChild(bubble);
    messages.appendChild(div);
    messages.scrollTop = messages.scrollHeight;
    return div;
}

function removeLoadingMessage() {
    const el = document.getElementById('loadingMsg');
    if (el) el.remove();
}

function typeWriterEffect(element, text, speed = 12) {
    return new Promise((resolve) => {
        element.innerHTML = '';
        let i = 0;
        const interval = setInterval(() => {
            if (i < text.length) {
                element.innerHTML += text.charAt(i);
                i++;
                messages.scrollTop = messages.scrollHeight;
            } else {
                clearInterval(interval);
                resolve();
            }
        }, speed);
    });
}

async function chercherInfosFinancieresParCode(code) {
    try {
        let q = query(collection(db, "ecoles", SCHOOL_PREFIX, "compta_eleves"), where("parentCode", "==", code), where("_type", "==", "compta_eleve"));
        let snap = await getDocs(q);
        if (snap.empty) {
            q = query(collection(db, SCHOOL_PREFIX + "_compta_eleves"), where("parentCode", "==", code), where("_type", "==", "compta_eleve"));
            snap = await getDocs(q);
        }
        if (snap.empty) return null;
        const data = snap.docs[0].data();
        const paiements = data.paiements || {};
        const minerval = data.minerval || 45000;
        const totalAnnuel = minerval * 10;
        let totalPaye = 0, moisImpayes = [];
        const moisListe = ["Septembre", "Octobre", "Novembre", "Décembre", "Janvier", "Février", "Mars", "Avril", "Mai", "Juin"];
        for (let mois of moisListe) {
            const montant = paiements[mois]?.montant || 0;
            totalPaye += montant;
            if (montant < minerval && !data.exonere) moisImpayes.push(mois);
        }
        const reste = totalAnnuel - totalPaye;
        let statut = "En ordre";
        if (data.exonere) statut = "Exonéré";
        else if (moisImpayes.length >= 3) statut = "Liste noire";
        else if (moisImpayes.length > 0) statut = "Paiement partiel";
        return {
            nom: data.nom,
            prenom: data.prenom || "",
            classe: data.classe,
            option: data.option || "",
            exonere: data.exonere || false,
            minerval,
            totalAnnuel,
            totalPaye,
            reste,
            moisImpayes,
            statut
        };
    } catch (e) { return null; }
}

async function chercherInfosFinancieresParNom(nom) {
    try {
        const q = query(collection(db, "ecoles", SCHOOL_PREFIX, "compta_eleves"), where("nom", "==", nom), where("_type", "==", "compta_eleve"));
        const snap = await getDocs(q);
        if (snap.empty) return null;
        const data = snap.docs[0].data();
        const paiements = data.paiements || {};
        const minerval = data.minerval || 45000;
        const totalAnnuel = minerval * 10;
        let totalPaye = 0, moisImpayes = [];
        const moisListe = ["Septembre", "Octobre", "Novembre", "Décembre", "Janvier", "Février", "Mars", "Avril", "Mai", "Juin"];
        for (let mois of moisListe) {
            const montant = paiements[mois]?.montant || 0;
            totalPaye += montant;
            if (montant < minerval && !data.exonere) moisImpayes.push(mois);
        }
        const reste = totalAnnuel - totalPaye;
        return { nom: data.nom, prenom: data.prenom || "", classe: data.classe, minerval, totalPaye, reste, moisImpayes };
    } catch (e) { return null; }
}

async function chercherPunitionsParNom(nom) {
    try {
        const q = query(
            collection(db, SCHOOL_PREFIX + "_punitions"),
            where("eleveNom", "==", nom),
            where("statut", "==", "active")
        );
        const snap = await getDocs(q);
        const punitions = [];
        snap.forEach(ds => {
            const data = ds.data();
            punitions.push({
                motif: data.motif,
                justification: data.justification,
                date: data.date,
                gravite: data.gravite || 'moyenne'
            });
        });
        return punitions;
    } catch(e) { return []; }
}

async function chercherPresencesParNom(nom) {
    try {
        const snap = await getDocs(collection(db, SCHOOL_PREFIX + "_presences"));
        const presences = [];
        snap.forEach(ds => {
            const data = ds.data();
            data.eleves.forEach(e => {
                if (e.nom === nom) {
                    presences.push({
                        date: data.date,
                        present: e.present,
                        classe: data.classe,
                        option: data.option
                    });
                }
            });
        });
        presences.sort((a,b) => b.date.localeCompare(a.date));
        return presences.slice(0, 3);
    } catch(e) { return []; }
}

async function chercherNotesParNom(nom) {
    try {
        const snap = await getDocs(collection(db, SCHOOL_PREFIX + "_fiches"));
        const resultats = [];
        const searchTerm = nom.toLowerCase().trim();
        for (const ds of snap.docs) {
            const fiche = ds.data();
            if (fiche._type === "prof") continue;
            if (!fiche.eleves) continue;
            for (const eleve of fiche.eleves) {
                const nomEleve = (eleve.nom || '').toLowerCase();
                if (nomEleve.includes(searchTerm) || searchTerm.includes(nomEleve)) {
                    const epreuvesList = [];
                    if (eleve.notes) {
                        for (let periode = 1; periode <= 4; periode++) {
                            const epreuves = fiche.epreuvesParPeriode?.[periode] || [];
                            const notesPeriode = eleve.notes[`p${periode}`] || [];
                            for (let i = 0; i < epreuves.length; i++) {
                                const nomEpreuve = epreuves[i].nom || "Epreuve";
                                if (!nomEpreuve.toLowerCase().includes("examen")) {
                                    let note = notesPeriode[i] || 0;
                                    let max = epreuves[i].max || 1;
                                    if (note > 0) {
                                        epreuvesList.push({
                                            matiere: fiche.cours,
                                            epreuve: nomEpreuve,
                                            note: note,
                                            max: max,
                                            periode: periode,
                                            titulaire: fiche.titulaire || null,
                                            classe: fiche.classe,
                                            option: fiche.option || ''
                                        });
                                    }
                                }
                            }
                        }
                    }
                    const punitions = await chercherPunitionsParNom(eleve.nom);
                    const presences = await chercherPresencesParNom(eleve.nom);
                    const sexe = eleve.sexe || 'Non spécifié';
                    const nombreElevesClasse = fiche.eleves ? fiche.eleves.length : 0;
                    
                    if (epreuvesList.length > 0 || punitions.length > 0 || presences.length > 0) {
                        resultats.push({
                            eleveNom: eleve.nom,
                            sexe: sexe,
                            classe: fiche.classe,
                            option: fiche.option || '',
                            titulaire: fiche.titulaire || null,
                            epreuves: epreuvesList,
                            nombreElevesClasse: nombreElevesClasse,
                            punitions: punitions,
                            presences: presences
                        });
                    }
                }
            }
        }
        return resultats;
    } catch(e) { return []; }
}

async function genererReponseNaturelle(question, eleveData) {
    const nomEcole = schoolId ? schoolId.toUpperCase().replace(/-/g, ' ') : 'COMPLEXE SCOLAIRE';
    
    let contexte = `École: ${nomEcole}. `;
    contexte += `L'élève s'appelle ${eleveData.nom} ${eleveData.prenom || ''}. `;
    
    const sexe = eleveData.sexe || 'Non spécifié';
    let pronom = "il";
    let possessif = "son";
    if (sexe === 'F' || sexe === 'Féminin') {
        pronom = "elle";
        possessif = "sa";
    }
    
    contexte += `Son sexe est ${sexe === 'M' ? 'Masculin' : sexe === 'F' ? 'Féminin' : 'Non spécifié'}. `;
    contexte += `${pronom === 'il' ? 'Il' : 'Elle'} est en classe de ${eleveData.classe}. `;
    contexte += `Sa classe compte ${eleveData.nombreElevesClasse || 0} élèves. `;
    
    if (eleveData.option && eleveData.option !== "TOUTES") {
        contexte += `Option ${eleveData.option}. `;
    }
    if (eleveData.titulaire) {
        contexte += `Son professeur est ${eleveData.titulaire}. `;
    }
    
    if (eleveData.notes && eleveData.notes.length > 0) {
        contexte += "Ses notes (en points) : ";
        const notesEnPoints = eleveData.notes
            .filter(ep => ep.note > 0)
            .map(ep => `${ep.epreuve}: ${ep.note}/${ep.max}`)
            .join(", ");
        
        if (notesEnPoints) {
            contexte += notesEnPoints;
        } else {
            contexte += "Aucune note enregistrée pour le moment. ";
        }
    } else {
        contexte += "Il n'a aucune note enregistrée pour le moment. ";
    }
    
    if (eleveData.frais) {
        contexte += `Frais scolaires : Minerval de ${eleveData.frais.minerval.toLocaleString()} FC/mois, `;
        contexte += `total payé ${eleveData.frais.totalPaye.toLocaleString()} FC, `;
        contexte += `reste à payer ${eleveData.frais.reste.toLocaleString()} FC. `;
        
        if (eleveData.frais.moisImpayes && eleveData.frais.moisImpayes.length > 0) {
            contexte += `Mois impayés : ${eleveData.frais.moisImpayes.join(", ")}. `;
        } else {
            contexte += "Compte financier à jour. ";
        }
    }
    
    const instructions = await chargerInstructionsIA();
    const prompt = `${instructions}

CONTEXTE DE L'ÉLÈVE : ${contexte}

QUESTION : ${question}

RAPPEL IMPORTANT : 
- Utilise le nom de l'école ${nomEcole} dans ta réponse
- Utilise UNIQUEMENT les POINTS (ex: 15/20, 40/40), JAMAIS les pourcentages
- Sois chaleureux et encourageant
- Maximum 3 phrases
- Si on te demande le sexe, réponds clairement "C'est un garçon" ou "C'est une fille"
- Si on te demande le nombre d'élèves, donne le nombre exact
- Utilise "${pronom}" pour parler de l'élève`;
    
    try {
        const response = await fetch(WORKER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: prompt })
        });
        const data = await response.json();
        
        let reponse = data.answer || "Je suis désolé, je n'ai pas pu traiter votre demande.";
        
        reponse = reponse.replace(/\d+%/g, '');
        reponse = reponse.replace(/\d+,\d+%/g, '');
        reponse = reponse.replace(/pourcent/g, 'points');
        reponse = reponse.replace(/pour cent/g, 'points');
        reponse = reponse.replace(/pourcentage/g, 'points');
        
        if (!reponse.toLowerCase().includes(nomEcole.toLowerCase())) {
            reponse = `À l'école ${nomEcole}, ${reponse.toLowerCase()}`;
        }
        
        return reponse;
    } catch (e) {
        return `Je suis désolé, il y a un problème de connexion. Veuillez réessayer.`;
    }
}

// ===== TRAITEMENT DES MESSAGES =====
async function traiterMessage(message) {
    const msg = message.trim().toLowerCase();
    const nomEcole = schoolId ? schoolId.toUpperCase().replace(/-/g, ' ') : 'COMPLEXE SCOLAIRE';
    
    if (/^\d{6}$/.test(msg)) {
        const infos = await chercherInfosFinancieresParCode(msg);
        if (!infos) {
            dernierEleveConsulte = null;
            dernierEleveData = null;
            return `❌ Code non reconnu à l'école ${nomEcole}. Veuillez vérifier votre code ou donnez le nom complet de l'élève.`;
        }
        dernierEleveConsulte = infos.nom;
        const resultatsNotes = await chercherNotesParNom(infos.nom);
        const noteData = resultatsNotes.length > 0 ? resultatsNotes[0] : null;
        
        dernierEleveData = {
            nom: infos.nom,
            prenom: infos.prenom,
            sexe: noteData ? noteData.sexe : 'Non spécifié',
            classe: infos.classe,
            option: infos.option,
            ecole: nomEcole,
            notes: noteData ? noteData.epreuves : [],
            titulaire: noteData ? noteData.titulaire : null,
            nombreElevesClasse: noteData ? noteData.nombreElevesClasse : 0,
            frais: {
                minerval: infos.minerval,
                totalPaye: infos.totalPaye,
                reste: infos.reste,
                moisImpayes: infos.moisImpayes,
                statut: infos.statut
            },
            punitions: noteData ? noteData.punitions : [],
            presences: noteData ? noteData.presences : []
        };
        return await genererReponseNaturelle(`L'utilisateur a fourni le code ${msg}. Présente un résumé des informations de l'élève de manière chaleureuse.`, dernierEleveData);
    }
    
    if (msg.length >= 2 && !dernierEleveConsulte) {
        const resultats = await chercherNotesParNom(msg);
        if (resultats.length > 0) {
            const premier = resultats[0];
            dernierEleveConsulte = premier.eleveNom;
            const infosFrais = await chercherInfosFinancieresParNom(dernierEleveConsulte);
            
            dernierEleveData = {
                nom: premier.eleveNom,
                prenom: "",
                sexe: premier.sexe || 'Non spécifié',
                classe: premier.classe,
                option: premier.option,
                ecole: nomEcole,
                notes: premier.epreuves,
                titulaire: premier.titulaire,
                nombreElevesClasse: premier.nombreElevesClasse || 0,
                frais: infosFrais ? {
                    minerval: infosFrais.minerval,
                    totalPaye: infosFrais.totalPaye,
                    reste: infosFrais.reste,
                    moisImpayes: infosFrais.moisImpayes
                } : null,
                punitions: premier.punitions,
                presences: premier.presences
            };
            
            let reponse = `À l'école ${nomEcole}, ${premier.eleveNom} est en ${premier.classe}${premier.option ? ' option '+premier.option : ''}.`;
            if (premier.titulaire) reponse += ` Son professeur est ${premier.titulaire}.`;
            if (premier.epreuves && premier.epreuves.length > 0) {
                const notesFiltrees = premier.epreuves.filter(ep => ep.note > 0);
                if (notesFiltrees.length > 0) {
                    reponse += ` Ses notes : ${notesFiltrees.map(ep => ep.epreuve + ' : ' + ep.note + '/' + ep.max).join(', ')}.`;
                }
            }
            return reponse;
        }
    }
    
    if (dernierEleveConsulte && dernierEleveData) {
        
        if (msg.includes('punition') || msg.includes('sanction') || msg.includes('puni') || msg.includes('pun') || msg.includes('sanctionné')) {
            if (dernierEleveData.punitions && dernierEleveData.punitions.length > 0) {
                let rep = `📋 Punitions de ${dernierEleveConsulte} :\n\n`;
                dernierEleveData.punitions.forEach((p, index) => {
                    const gravite = p.gravite === 'grave' ? '⚠️ Grave' : p.gravite === 'moyenne' ? '🔶 Moyenne' : '🔷 Légère';
                    const date = new Date(p.date).toLocaleDateString('fr-FR');
                    rep += `${index + 1}. ${p.motif} (${gravite}) - ${date}\n`;
                });
                return rep;
            } else {
                return `✅ ${dernierEleveConsulte} n'a aucune punition active.`;
            }
        }
        
        if (msg.includes('présent') || msg.includes('absent') || msg.includes('présence') || msg.includes('est-il') || msg.includes('il est')) {
            if (dernierEleveData.presences && dernierEleveData.presences.length > 0) {
                const aujourdhui = dernierEleveData.presences[0];
                const date = new Date(aujourdhui.date).toLocaleDateString('fr-FR');
                const statut = aujourdhui.present ? '✅ Présent' : '❌ Absent';
                let rep = `📅 ${dernierEleveConsulte} : ${statut} aujourd'hui (${date}).`;
                
                let absencesConsecutives = 0;
                for (const p of dernierEleveData.presences) {
                    if (!p.present) absencesConsecutives++;
                    else break;
                }
                if (absencesConsecutives > 1) {
                    rep += ` Absent depuis ${absencesConsecutives} jours.`;
                }
                return rep;
            } else {
                return `❌ Aucune information de présence disponible pour ${dernierEleveConsulte}.`;
            }
        }
        
        if (msg.includes('tout') || msg.includes('complet') || msg.includes('détail') || msg.includes('informations')) {
            let rep = `📋 Informations complètes sur ${dernierEleveConsulte} :\n\n`;
            rep += `📚 Classe : ${dernierEleveData.classe}${dernierEleveData.option ? ' ('+dernierEleveData.option+')' : ''}\n`;
            rep += `👨‍🏫 Titulaire : ${dernierEleveData.titulaire || 'Non spécifié'}\n`;
            
            if (dernierEleveData.notes && dernierEleveData.notes.length > 0) {
                rep += `\n📝 Notes :\n`;
                dernierEleveData.notes.forEach(ep => {
                    rep += `• ${ep.epreuve} : ${ep.note}/${ep.max}\n`;
                });
            }
            
            if (dernierEleveData.punitions && dernierEleveData.punitions.length > 0) {
                rep += `\n⚠️ Punitions :\n`;
                dernierEleveData.punitions.forEach(p => {
                    rep += `• ${p.motif} (${p.gravite})\n`;
                });
            } else {
                rep += `\n✅ Aucune punition.\n`;
            }
            
            if (dernierEleveData.presences && dernierEleveData.presences.length > 0) {
                const aujourdhui = dernierEleveData.presences[0];
                rep += `\n📅 Présence : ${aujourdhui.present ? '✅ Présent' : '❌ Absent'} aujourd'hui.\n`;
            }
            
            return rep;
        }
        
        return await genererReponseNaturelle(msg, dernierEleveData);
    }
    
    return `Bonjour ! Je suis un système intelligent de l'école ${nomEcole} qui vous permet de savoir quelques détails sur votre enfant. Veuillez me donner un code à 6 chiffres ou le nom complet d'un élève.`;
}

// ===== ENVOI =====
async function sendMessage() {
    const message = input.value.trim();
    if (!message || isProcessing) return;
    if (!canAskQuestion()) {
        addMessage("⚠️ Limite quotidienne atteinte. Revenez demain !", false);
        return;
    }
    
    isProcessing = true;
    addMessage(message, true);
    input.value = '';
    input.style.height = 'auto';
    
    const loading = addLoadingMessage();
    
    try {
        const reponse = await traiterMessage(message);
        removeLoadingMessage();
        const msgDiv = document.createElement('div');
        msgDiv.className = 'msg bot';
        const bubble = document.createElement('div');
        bubble.className = 'bubble';
        msgDiv.appendChild(bubble);
        messages.appendChild(msgDiv);
        await typeWriterEffect(bubble, reponse);
        messages.scrollTop = messages.scrollHeight;
        
        waitForVoices(() => { voixParentale(reponse); });
        
        incrementQuestionCount();
        updateCounter();
    } catch (error) {
        removeLoadingMessage();
        addMessage("❌ Une erreur est survenue. Veuillez réessayer.", false);
    }
    
    isProcessing = false;
}

// ===== ÉVÉNEMENTS =====
sendBtn.addEventListener('click', sendMessage);

input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

input.addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 120) + 'px';
});

closeBtn.addEventListener('click', () => {
    document.body.innerHTML = '<div style="display:flex;align-items:center;justify-content:center;height:100vh;background:#0a0e1a;color:#94a3b8;font-size:18px;">👪 Espace parental fermé</div>';
    stopSpeaking();
});

// ===== INIT =====
updateCounter();

// Pré-charger les voix
if (window.speechSynthesis) {
    window.speechSynthesis.getVoices();
    window.speechSynthesis.onvoiceschanged = () => {
        window.speechSynthesis.getVoices();
    };
}

// Accueil vocal
setTimeout(() => {
    waitForVoices(() => {
        voixParentale("Bienvenue dans l'espace parental. Je suis un système intelligent qui vous permet de savoir quelques détails sur votre enfant. Veuillez taper un code à 6 chiffres pour les frais ou le nom de votre enfant pour ses notes.");
    });
}, 1500);

console.log('✅ Espace parental chargé');
</script>
