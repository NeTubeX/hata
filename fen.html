<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>NeTubeX - Scan Document</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;min-height:100vh;background:#0a0e1a;touch-action:pan-y pinch-zoom;}
body{font-family:'Inter',system-ui,sans-serif;background:#0a0e1a;color:#EAEAEA;overflow-x:hidden;}
.bg-fixed{position:fixed;top:0;left:0;right:0;bottom:0;z-index:-2;background:linear-gradient(145deg,#0a0e1a 0%,#0f172a 100%);}
.bg-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:-1;background:radial-gradient(circle at 30% 40%,rgba(243,156,18,0.06),transparent 75%);}
.navbar{position:fixed;top:0;left:0;right:0;background:rgba(10,14,26,0.95);backdrop-filter:blur(18px);border-bottom:1px solid rgba(243,156,18,0.2);padding:12px 20px;z-index:1000;display:flex;justify-content:space-between;align-items:center;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-img{width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid rgba(243,156,18,0.4);}
.logo-text{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,#E67E22,#F39C12);-webkit-background-clip:text;background-clip:text;color:transparent;}
.badge{background:rgba(243,156,18,0.2);padding:4px 12px;border-radius:20px;font-size:0.7rem;color:#F39C12;}
.logout-btn{background:rgba(239,68,68,0.2);border:1px solid rgba(239,68,68,0.5);color:#ef4444;padding:8px 16px;border-radius:40px;font-size:0.75rem;font-weight:600;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;gap:8px;}
.logout-btn:hover{background:rgba(239,68,68,0.4);transform:scale(1.02);}
.app-container{max-width:680px;margin:0 auto;padding:100px 20px 40px 20px;}
.scan-header{text-align:center;margin-bottom:28px;}
.scan-header h1{font-size:1.4rem;font-weight:700;color:#EAEAEA;margin-bottom:8px;}
.scan-header p{font-size:0.8rem;color:#9ca3af;}
.scan-card{background:rgba(18,25,45,0.7);backdrop-filter:blur(10px);border-radius:28px;padding:24px;margin-bottom:20px;border:1px solid rgba(255,255,255,0.05);transition:all 0.3s;}
.scan-title{font-size:1rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px;color:#F39C12;}
.scan-title i{font-size:1.2rem;}
.scan-number{display:inline-flex;align-items:center;justify-content:center;width:28px;height:28px;border-radius:28px;background:rgba(243,156,18,0.2);color:#F39C12;font-size:0.8rem;font-weight:700;margin-right:8px;}
.cam-area{position:relative;background:#0a0c15;border-radius:20px;overflow:hidden;margin-bottom:16px;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;border:1px solid rgba(243,156,18,0.2);}
video{width:100%;height:100%;object-fit:cover;}
canvas{display:none;}
.preview-img{width:100%;height:100%;object-fit:contain;background:#0a0c15;}
.btn-row{display:flex;gap:12px;margin-bottom:12px;}
.btn{flex:1;padding:12px;border:none;border-radius:40px;font-weight:600;font-size:0.8rem;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;}
.btn-primary{background:rgba(59,130,246,0.85);color:white;}
.btn-capture{background:linear-gradient(135deg,#F39C12,#E67E22);color:white;}
.btn-capture:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.status-badge{font-size:0.7rem;padding:6px 12px;border-radius:20px;display:inline-flex;align-items:center;gap:6px;background:rgba(255,255,255,0.05);color:#9ca3af;}
.status-badge.success{background:#10b98120;color:#10b981;}
.progress-indicator{display:flex;justify-content:center;gap:30px;margin:30px 0 20px;padding:16px;background:rgba(18,25,45,0.5);border-radius:60px;}
.prog-step{width:44px;height:44px;border-radius:44px;background:rgba(45,55,72,0.6);display:flex;align-items:center;justify-content:center;font-weight:800;font-size:1rem;transition:all 0.3s;position:relative;}
.prog-step.active{background:#F39C12;box-shadow:0 0 15px rgba(243,156,18,0.5);}
.prog-step.done{background:#10b981;}
.prog-step .step-label{position:absolute;bottom:-24px;font-size:0.6rem;font-weight:500;white-space:nowrap;color:#9ca3af;}
.preview-all{display:flex;gap:16px;justify-content:center;margin:20px 0 16px;flex-wrap:wrap;padding:16px;background:rgba(18,25,45,0.4);border-radius:24px;}
.preview-all-img{width:75px;height:75px;border-radius:16px;object-fit:cover;background:#111827;border:2px solid rgba(243,156,18,0.3);}
.preview-all-label{font-size:0.6rem;margin-top:6px;color:#9ca3af;display:flex;align-items:center;justify-content:center;gap:4px;}
.btn-action{background:linear-gradient(135deg,#F39C12,#E67E22);width:100%;padding:14px;border-radius:60px;font-weight:700;font-size:0.9rem;border:none;cursor:pointer;color:white;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.2s;}
.btn-action:disabled{opacity:0.5;cursor:not-allowed;transform:none;}
.btn-danger{background:rgba(239,68,68,0.85);}
.hidden{display:none;}
footer{text-align:center;font-size:0.65rem;color:#4b556b;margin-top:32px;padding:16px;}
.observation-textarea{width:100%;padding:14px;border-radius:20px;background:rgba(10,14,26,0.8);border:1px solid rgba(243,156,18,0.3);color:white;font-family:'Inter',sans-serif;font-size:0.85rem;resize:vertical;}
.observation-textarea:focus{outline:none;border-color:#F39C12;box-shadow:0 0 0 3px rgba(243,156,18,0.2);}
.popup-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);z-index:2000;display:flex;align-items:center;justify-content:center;visibility:hidden;opacity:0;transition:0.2s;}
.popup-overlay.active{visibility:visible;opacity:1;}
.popup-card{background:linear-gradient(145deg,#1a2538,#111827);border-radius:32px;width:90%;max-width:400px;padding:28px 24px;text-align:center;border:1px solid rgba(243,156,18,0.3);}
.popup-title{font-size:1.3rem;font-weight:800;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:10px;}
.popup-message{font-size:0.9rem;margin-bottom:24px;color:#e2e8f0;line-height:1.5;}
.popup-buttons{display:flex;gap:12px;justify-content:center;}
.popup-btn{padding:10px 24px;border-radius:40px;font-weight:600;border:none;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;}
.popup-btn.secondary{background:#334155;color:#fff;}
.popup-btn.primary{background:#F39C12;color:#0f172a;}
.request-details{background:rgba(243,156,18,0.1);border-radius:12px;padding:10px;margin:12px 0;font-size:0.75rem;text-align:left;}
.request-details p{margin:4px 0;color:#cbd5e1;}
.security-note{font-size:0.7rem;color:#9ca3af;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;gap:6px;}
@media (max-width:560px){.app-container{padding:90px 16px 30px;}.scan-title{font-size:0.9rem;}.preview-all-img{width:65px;height:65px;}.progress-indicator{gap:20px;}.prog-step{width:38px;height:38px;}.logout-btn{padding:6px 12px;font-size:0.7rem;}}
</style>
</head>
<body>
<div class="bg-fixed"></div>
<div class="bg-overlay"></div>
<div class="navbar">
    <div class="logo">
        <img src="https://www.netubex.com/favicon.png.png" alt="NeTubeX" class="logo-img" onerror="this.src='https://netubex.github.io/hata/favicon.png.png'">
        <span class="logo-text">NeTubeX</span>
    </div>
    <div style="display:flex; align-items:center; gap:12px;">
        <div class="badge"><i class="fas fa-shield-alt"></i> Scan document</div>
        <button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Déconnexion</button>
    </div>
</div>

<div class="app-container">
    <div class="scan-header">
        <h1><i class="fas fa-scanner"></i> Scan document</h1>
        <p>Numérisation des documents officiels</p>
    </div>

    <div id="page0" class="scan-card">
        <div class="scan-title"><span class="scan-number">01</span> <i class="fas fa-clipboard-list"></i> Feuille de présence</div>
        <div class="cam-area"><video id="video0" autoplay playsinline muted></video><canvas id="canvas0"></canvas><img id="preview0" class="preview-img" style="display:none;"></div>
        <div class="btn-row"><button id="startCam0" class="btn btn-primary"><i class="fas fa-video"></i> ACTIVER</button><button id="capture0" class="btn btn-capture" disabled><i class="fas fa-camera"></i> CAPTURER</button></div>
        <div id="status0" class="status-badge"><i class="fas fa-circle"></i> En attente</div>
    </div>

    <div id="page1" class="scan-card hidden">
        <div class="scan-title"><span class="scan-number">02</span> <i class="fas fa-file-alt"></i> PV transmission de rapport</div>
        <div class="cam-area"><video id="video1" autoplay playsinline muted></video><canvas id="canvas1"></canvas><img id="preview1" class="preview-img" style="display:none;"></div>
        <div class="btn-row"><button id="startCam1" class="btn btn-primary"><i class="fas fa-video"></i> ACTIVER</button><button id="capture1" class="btn btn-capture" disabled><i class="fas fa-camera"></i> CAPTURER</button></div>
        <div id="status1" class="status-badge"><i class="fas fa-circle"></i> En attente</div>
    </div>

    <div id="page2" class="scan-card hidden">
        <div class="scan-title"><span class="scan-number">03</span> <i class="fas fa-archive"></i> PV archivage</div>
        <div class="cam-area"><video id="video2" autoplay playsinline muted></video><canvas id="canvas2"></canvas><img id="preview2" class="preview-img" style="display:none;"></div>
        <div class="btn-row"><button id="startCam2" class="btn btn-primary"><i class="fas fa-video"></i> ACTIVER</button><button id="capture2" class="btn btn-capture" disabled><i class="fas fa-camera"></i> CAPTURER</button></div>
        <div id="status2" class="status-badge"><i class="fas fa-circle"></i> En attente</div>
    </div>
    
    <div class="scan-card" style="margin-top:20px;">
        <div class="scan-title"><span class="scan-number"><i class="fas fa-pen-alt"></i></span> Observation</div>
        <textarea id="observationText" class="observation-textarea" rows="3" placeholder="Saisissez une observation..."></textarea>
    </div>
    
    <div class="progress-indicator">
        <div class="prog-step active" id="prog0"><span>1</span><span class="step-label">Présence</span></div>
        <div class="prog-step" id="prog1"><span>2</span><span class="step-label">Transmission</span></div>
        <div class="prog-step" id="prog2"><span>3</span><span class="step-label">Archivage</span></div>
    </div>
    
    <div id="previewAllArea" class="preview-all hidden">
        <div class="preview-all-item"><img id="previewAll0" class="preview-all-img" src=""><div class="preview-all-label"><i class="fas fa-clipboard-list"></i> Présence</div></div>
        <div class="preview-all-item"><img id="previewAll1" class="preview-all-img" src=""><div class="preview-all-label"><i class="fas fa-file-alt"></i> Transmission</div></div>
        <div class="preview-all-item"><img id="previewAll2" class="preview-all-img" src=""><div class="preview-all-label"><i class="fas fa-archive"></i> Archivage</div></div>
    </div>
    
    <button id="sendFinalBtn" class="btn-action hidden"><i class="fas fa-paper-plane"></i> ENVOYER À LA DEO</button>
    <button id="restartAllBtn" class="btn-action btn-danger hidden"><i class="fas fa-sync-alt"></i> RECOMMENCER</button>
    <footer>© NeTubeX 2026</footer>
</div>

<div id="popupOverlay" class="popup-overlay">
    <div class="popup-card">
        <div id="popupTitle" class="popup-title"></div>
        <div id="popupMessage" class="popup-message"></div>
        <div class="popup-buttons">
            <button id="popupBtnLeft" class="popup-btn secondary"></button>
            <button id="popupBtnRight" class="popup-btn primary"></button>
        </div>
    </div>
</div>

<script>
const firebaseConfig = {
    apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
    authDomain: "netubexmoney.firebaseapp.com",
    projectId: "netubexmoney",
    storageBucket: "netubexmoney.firebasestorage.app",
    messagingSenderId: "856592608176",
    appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

let isSending = false;
let timerInterval = null;
let streams = [null, null, null];
let camActive = [false, false, false];
let capturedImages = [null, null, null];
let currentPage = 0;
let captureLock = false;

document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
    if(e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && e.key === 'u')) e.preventDefault();
});

function showPopup(title, message, icon, leftText, rightText, onRightClick, isDanger = false, onLeftClick = null) {
    const popup = document.getElementById('popupOverlay');
    const titleDiv = document.getElementById('popupTitle');
    const msgDiv = document.getElementById('popupMessage');
    const leftBtn = document.getElementById('popupBtnLeft');
    const rightBtn = document.getElementById('popupBtnRight');
    
    titleDiv.innerHTML = `<i class="${icon}"></i> ${title}`;
    msgDiv.innerHTML = message;
    leftBtn.innerHTML = leftText ? `<i class="fas fa-times"></i> ${leftText}` : '<i class="fas fa-times"></i> Annuler';
    rightBtn.innerHTML = rightText ? `<i class="fas fa-check"></i> ${rightText}` : '';
    rightBtn.style.display = rightText ? 'flex' : 'none';
    if(isDanger) rightBtn.classList.add('danger');
    else rightBtn.classList.remove('danger');
    
    leftBtn.onclick = () => { popup.classList.remove('active'); if(onLeftClick) onLeftClick(); };
    rightBtn.onclick = () => { popup.classList.remove('active'); if(onRightClick) onRightClick(); };
    popup.classList.add('active');
}

function showCameraRequestPopup(onAllow, onDeny) {
    const message = `<div style="text-align:center;"><i class="fas fa-shield-alt" style="font-size:2rem;color:#F39C12;margin-bottom:12px;display:block;"></i><strong>Autorisation caméra</strong><div class="request-details"><p><i class="fas fa-check-circle"></i> Scanner les documents</p><p><i class="fas fa-check-circle"></i> Capturer les feuilles de présence</p><p><i class="fas fa-check-circle"></i> Numériser les PV</p></div><div class="security-note"><i class="fas fa-lock"></i> Connexion sécurisée</div></div>`;
    const popup = document.getElementById('popupOverlay');
    const titleDiv = document.getElementById('popupTitle');
    const msgDiv = document.getElementById('popupMessage');
    const leftBtn = document.getElementById('popupBtnLeft');
    const rightBtn = document.getElementById('popupBtnRight');
    
    titleDiv.innerHTML = '<i class="fas fa-camera"></i> Accès caméra';
    msgDiv.innerHTML = message;
    leftBtn.innerHTML = '<i class="fas fa-times"></i> Refuser';
    rightBtn.innerHTML = '<i class="fas fa-check"></i> Autoriser';
    rightBtn.style.display = 'flex';
    
    leftBtn.onclick = () => { popup.classList.remove('active'); onDeny(); };
    rightBtn.onclick = () => { popup.classList.remove('active'); onAllow(); };
    popup.classList.add('active');
}

async function stopCamera(index){
    if(streams[index]){
        streams[index].getTracks().forEach(t => t.stop());
        streams[index] = null;
    }
    const vid = document.getElementById(`video${index}`);
    if(vid) vid.srcObject = null;
    camActive[index] = false;
}

async function startCamera(index){
    await stopCamera(index);
    const vid = document.getElementById(`video${index}`);
    const startBtn = document.getElementById(`startCam${index}`);
    const captureBtn = document.getElementById(`capture${index}`);
    const statusDiv = document.getElementById(`status${index}`);
    
    showCameraRequestPopup(
        async () => {
            try{
                const stream = await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
                streams[index] = stream;
                vid.srcObject = stream;
                await vid.play();
                camActive[index] = true;
                captureBtn.disabled = false;
                startBtn.disabled = true;
                startBtn.innerHTML = '<i class="fas fa-video"></i> ACTIVE';
                statusDiv.innerHTML = '<i class="fas fa-check-circle"></i> Prêt';
                statusDiv.classList.add('success');
            } catch(e){
                camActive[index] = false;
                captureBtn.disabled = true;
                startBtn.disabled = false;
                statusDiv.innerHTML = '<i class="fas fa-circle"></i> Erreur caméra';
            }
        },
        () => {
            camActive[index] = false;
            captureBtn.disabled = true;
            startBtn.disabled = false;
            statusDiv.innerHTML = '<i class="fas fa-circle"></i> Accès refusé';
        }
    );
}

async function captureDocument(index){
    if(!camActive[index]) return false;
    if(captureLock) return false;
    captureLock = true;
    setTimeout(() => { captureLock = false; }, 500);
    
    const vid = document.getElementById(`video${index}`);
    const canvas = document.getElementById(`canvas${index}`);
    canvas.width = vid.videoWidth;
    canvas.height = vid.videoHeight;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(vid, 0, 0);
    const imgData = canvas.toDataURL('image/jpeg', 0.92);
    capturedImages[index] = imgData;
    
    const previewImg = document.getElementById(`preview${index}`);
    previewImg.src = imgData;
    previewImg.style.display = 'block';
    vid.style.display = 'none';
    
    const captureBtn = document.getElementById(`capture${index}`);
    captureBtn.disabled = true;
    captureBtn.innerHTML = '<i class="fas fa-check-circle"></i> CAPTURÉ';
    
    const statusDiv = document.getElementById(`status${index}`);
    statusDiv.innerHTML = '<i class="fas fa-check-double"></i> Document capturé';
    statusDiv.classList.add('success');
    
    await stopCamera(index);
    updateGlobalPreview();
    
    setTimeout(() => {
        if(index === 0 && capturedImages[1] === null) goToPage(1);
        else if(index === 1 && capturedImages[2] === null) goToPage(2);
        else if(index === 2){
            document.getElementById('sendFinalBtn').classList.remove('hidden');
            document.getElementById('restartAllBtn').classList.remove('hidden');
            document.getElementById('previewAllArea').classList.remove('hidden');
            startSendButtonTimer();
        }
        updateProgressUI();
    }, 400);
    return true;
}

function resetAllCaptures(){
    for(let i = 0; i < 3; i++){
        capturedImages[i] = null;
        const previewImg = document.getElementById(`preview${i}`);
        previewImg.style.display = 'none';
        previewImg.src = '';
        const vid = document.getElementById(`video${i}`);
        vid.style.display = 'block';
        const captureBtn = document.getElementById(`capture${i}`);
        captureBtn.disabled = true;
        captureBtn.innerHTML = '<i class="fas fa-camera"></i> CAPTURER';
        const startBtn = document.getElementById(`startCam${i}`);
        startBtn.disabled = false;
        startBtn.innerHTML = '<i class="fas fa-video"></i> ACTIVER';
        const statusDiv = document.getElementById(`status${i}`);
        statusDiv.innerHTML = '<i class="fas fa-circle"></i> En attente';
        statusDiv.classList.remove('success');
    }
    updateGlobalPreview();
    document.getElementById('sendFinalBtn').classList.add('hidden');
    document.getElementById('restartAllBtn').classList.add('hidden');
    document.getElementById('previewAllArea').classList.add('hidden');
    currentPage = 0;
    document.getElementById('page0').classList.remove('hidden');
    document.getElementById('page1').classList.add('hidden');
    document.getElementById('page2').classList.add('hidden');
    updateProgressUI();
    if(timerInterval) clearInterval(timerInterval);
}

function updateGlobalPreview(){
    for(let i = 0; i < 3; i++){
        const previewAll = document.getElementById(`previewAll${i}`);
        if(capturedImages[i]){
            previewAll.src = capturedImages[i];
            previewAll.style.opacity = '1';
        } else {
            previewAll.src = '';
            previewAll.style.opacity = '0.3';
        }
    }
}

function updateProgressUI(){
    for(let i = 0; i < 3; i++){
        const prog = document.getElementById(`prog${i}`);
        if(capturedImages[i] !== null){
            prog.classList.add('done');
            prog.classList.remove('active');
        } else if(i === currentPage){
            prog.classList.add('active');
            prog.classList.remove('done');
        } else {
            prog.classList.remove('active', 'done');
        }
    }
}

function goToPage(page){
    if(page === currentPage) return;
    stopCamera(currentPage);
    document.getElementById(`page${currentPage}`).classList.add('hidden');
    currentPage = page;
    document.getElementById(`page${page}`).classList.remove('hidden');
    if(capturedImages[page] !== null){
        const vid = document.getElementById(`video${page}`);
        const preview = document.getElementById(`preview${page}`);
        if(vid) vid.style.display = 'none';
        if(preview) preview.style.display = 'block';
        const captureBtn = document.getElementById(`capture${page}`);
        captureBtn.disabled = true;
        captureBtn.innerHTML = '<i class="fas fa-check-circle"></i> CAPTURÉ';
    } else {
        const vid = document.getElementById(`video${page}`);
        const preview = document.getElementById(`preview${page}`);
        if(vid) vid.style.display = 'block';
        if(preview) preview.style.display = 'none';
        const startBtn = document.getElementById(`startCam${page}`);
        startBtn.disabled = false;
        startBtn.innerHTML = '<i class="fas fa-video"></i> ACTIVER';
        const captureBtn = document.getElementById(`capture${page}`);
        captureBtn.disabled = true;
        captureBtn.innerHTML = '<i class="fas fa-camera"></i> CAPTURER';
        const statusDiv = document.getElementById(`status${page}`);
        statusDiv.innerHTML = '<i class="fas fa-circle"></i> En attente';
        statusDiv.classList.remove('success');
    }
    updateProgressUI();
}

function startSendButtonTimer(){
    const sendBtn = document.getElementById('sendFinalBtn');
    const disabledUntil = localStorage.getItem('sendBtnDisabledUntil');
    if(timerInterval) clearInterval(timerInterval);
    if(disabledUntil && sendBtn){
        const remaining = parseInt(disabledUntil) - Date.now();
        if(remaining > 0){
            sendBtn.disabled = true;
            sendBtn.style.opacity = '0.5';
            isSending = true;
            timerInterval = setInterval(() => {
                const newRemaining = parseInt(localStorage.getItem('sendBtnDisabledUntil')) - Date.now();
                if(newRemaining > 0){
                    const secondsLeft = Math.ceil(newRemaining / 1000);
                    sendBtn.innerHTML = `<i class="fas fa-clock"></i> ${secondsLeft}s`;
                } else {
                    clearInterval(timerInterval);
                    sendBtn.disabled = false;
                    sendBtn.style.opacity = '1';
                    sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i> ENVOYER À LA DEO';
                    isSending = false;
                    localStorage.removeItem('sendBtnDisabledUntil');
                }
            }, 1000);
        } else {
            sendBtn.disabled = false;
            sendBtn.style.opacity = '1';
            sendBtn.innerHTML = '<i class="fas fa-paper-plane"></i> ENVOYER À LA DEO';
            isSending = false;
            localStorage.removeItem('sendBtnDisabledUntil');
        }
    }
}

async function sendAllDocuments(){
    if(isSending){
        showPopup('Envoi en cours', 'Veuillez patienter...', 'fas fa-spinner fa-pulse', 'OK', null, null);
        return;
    }
    if(!capturedImages[0] || !capturedImages[1] || !capturedImages[2]){
        showPopup('Documents manquants', 'Veuillez capturer les 3 documents.', 'fas fa-exclamation-triangle', 'Fermer', null, null);
        return;
    }
    
    const observation = document.getElementById('observationText').value.trim() || "Aucune observation";
    const sendBtn = document.getElementById('sendFinalBtn');
    sendBtn.disabled = true;
    sendBtn.style.opacity = '0.5';
    isSending = true;
    
    const disableUntil = Date.now() + (5 * 60 * 1000);
    localStorage.setItem('sendBtnDisabledUntil', disableUntil);
    
    showPopup('Envoi en cours', '<div style="text-align:center;"><i class="fas fa-spinner fa-pulse" style="font-size:2rem;color:#F39C12;"></i><p style="margin-top:12px;">Traitement en cours...</p></div>', 'fas fa-cloud-upload-alt', null, null, null);
    
    try {
        const rapportData = {
            expediteur: "FEN (Blandine Kazembe)",
            observation: observation,
            timestamp: firebase.firestore.FieldValue.serverTimestamp(),
            documents: {
                feuillePresence: capturedImages[0],
                pvTransmission: capturedImages[1],
                pvArchivage: capturedImages[2]
            }
        };
        await db.collection("scan_reports").add(rapportData);
        startSendButtonTimer();
        showPopup('Succès', '<div style="text-align:center;"><i class="fas fa-check-circle" style="font-size:2rem;color:#10b981;"></i><p style="margin-top:12px;">Rapport envoyé à la DEO avec succès !</p><p style="margin-top:8px;font-size:0.7rem;">Prochain envoi dans 5 minutes</p></div>', 'fas fa-check-circle', 'OK', null, null);
    } catch(error){
        showPopup('Erreur', '<div style="text-align:center;"><i class="fas fa-exclamation-triangle" style="font-size:2rem;color:#ef4444;"></i><p style="margin-top:12px;">Erreur lors de l\'envoi</p></div>', 'fas fa-exclamation-triangle', 'Fermer', null, null);
        sendBtn.disabled = false;
        sendBtn.style.opacity = '1';
        isSending = false;
        localStorage.removeItem('sendBtnDisabledUntil');
        if(timerInterval) clearInterval(timerInterval);
    }
}

function showRestartPopup(){
    showPopup('Recommencer', 'Voulez-vous vraiment tout recommencer ? Tous les documents seront supprimés.', 'fas fa-exclamation-triangle', 'Annuler', 'Recommencer', () => {
        resetAllCaptures();
        document.getElementById('observationText').value = '';
        showPopup('Réinitialisé', 'Documents supprimés. Vous pouvez recommencer.', 'fas fa-check-circle', 'Fermer', null, null);
    }, true);
}

function logout() {
    for(let i = 0; i < 3; i++) {
        if(streams[i]) streams[i].getTracks().forEach(t => t.stop());
    }
    if(timerInterval) clearInterval(timerInterval);
    window.location.href = 'https://www.netubex.com/login.html';
}

for(let i = 0; i < 3; i++){
    document.getElementById(`startCam${i}`).addEventListener('click', () => startCamera(i));
    document.getElementById(`capture${i}`).addEventListener('click', () => captureDocument(i));
}
document.getElementById('sendFinalBtn').addEventListener('click', sendAllDocuments);
document.getElementById('restartAllBtn').addEventListener('click', showRestartPopup);
document.getElementById('logoutBtn').addEventListener('click', logout);

window.addEventListener('beforeunload', () => {
    for(let i = 0; i < 3; i++) if(streams[i]) streams[i].getTracks().forEach(t => t.stop());
    if(timerInterval) clearInterval(timerInterval);
});

document.addEventListener('DOMContentLoaded', startSendButtonTimer);
</script>
</body>
</html>
