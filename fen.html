<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>NeTubeX - Conversion & Scan</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;user-select:none;-webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;}
html,body{width:100%;min-height:100vh;background:#0a0e1a;touch-action:pan-y pinch-zoom;}
body{font-family:'Inter',system-ui,sans-serif;background:#0a0e1a;color:#EAEAEA;overflow-x:hidden;}
.bg-fixed{position:fixed;top:0;left:0;right:0;bottom:0;z-index:-2;background:linear-gradient(145deg,#0a0e1a 0%,#0f172a 100%);}
.bg-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:-1;background:radial-gradient(circle at 30% 40%,rgba(243,156,18,0.06),transparent 75%);}
.navbar{position:fixed;top:0;left:0;right:0;background:rgba(10,14,26,0.95);backdrop-filter:blur(18px);border-bottom:1px solid rgba(243,156,18,0.2);padding:12px 20px;z-index:1000;display:flex;justify-content:space-between;align-items:center;}
.logo{display:flex;align-items:center;gap:10px;}
.logo-img{width:32px;height:32px;border-radius:50%;object-fit:cover;border:1px solid rgba(243,156,18,0.4);}
.logo-text{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,#E67E22,#F39C12);-webkit-background-clip:text;background-clip:text;color:transparent;}
.logout-btn{background:rgba(239,68,68,0.85);border:none;color:white;padding:8px 16px;border-radius:40px;font-weight:600;font-size:0.8rem;cursor:pointer;display:flex;align-items:center;gap:8px;transition:all 0.15s;font-family:'Inter',sans-serif;}
.logout-btn:active{transform:scale(0.96);background:#dc2626;}
.tabs-container{position:fixed;top:64px;left:0;right:0;background:rgba(10,14,26,0.95);backdrop-filter:blur(16px);border-bottom:1px solid rgba(255,255,255,0.05);z-index:999;display:flex;justify-content:center;gap:8px;padding:8px 16px;}
.tab-btn{flex:1;max-width:200px;padding:10px 16px;border:none;background:transparent;color:#9ca3af;font-weight:600;font-size:0.85rem;border-radius:40px;cursor:pointer;transition:all 0.2s;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;}
.tab-btn.active{background:linear-gradient(135deg,#F39C12,#E67E22);color:white;box-shadow:0 4px 12px rgba(243,156,18,0.3);}
.tab-btn:not(.active):hover{background:rgba(255,255,255,0.05);color:#e2e8f0;}
.app-container{max-width:680px;margin:0 auto;padding:130px 20px 40px 20px;}
.tab-page{display:none;}
.tab-page.active-page{display:block;}
.converter-card{background:rgba(18,25,45,0.7);backdrop-filter:blur(10px);border-radius:32px;padding:28px 24px;border:1px solid rgba(255,255,255,0.05);}
.converter-title{font-size:1.2rem;font-weight:700;text-align:center;margin-bottom:24px;color:#F39C12;display:flex;align-items:center;justify-content:center;gap:10px;}
.input-group{margin-bottom:20px;}
.input-label{display:flex;justify-content:space-between;margin-bottom:8px;font-size:0.8rem;color:#9ca3af;font-weight:500;}
.input-wrapper{position:relative;display:flex;align-items:center;}
.input-prefix{position:absolute;left:16px;font-weight:700;font-size:1.2rem;color:#F39C12;}
.converter-input{width:100%;padding:14px 16px 14px 40px;font-size:1.1rem;font-weight:500;border:1px solid rgba(255,255,255,0.1);border-radius:28px;background:rgba(10,14,26,0.8);color:white;font-family:'Inter',sans-serif;}
.converter-input:focus{outline:none;border-color:#F39C12;box-shadow:0 0 0 3px rgba(243,156,18,0.2);}
.actions{display:flex;gap:12px;margin:20px 0;justify-content:center;}
.converter-btn{flex:1;max-width:250px;padding:12px;border:none;border-radius:40px;font-weight:700;font-size:0.85rem;cursor:pointer;transition:all 0.15s;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-primary-conv{background:linear-gradient(135deg,#F39C12,#E67E22);color:white;}
.converter-btn:active{transform:scale(0.97);}
.converter-btn:disabled{opacity:0.7;cursor:not-allowed;transform:none;}
.result-card{background:rgba(10,14,26,0.6);border-radius:24px;padding:20px;text-align:center;border:1px solid rgba(243,156,18,0.2);margin-top:20px;}
.result-label{font-size:0.7rem;text-transform:uppercase;letter-spacing:2px;color:#9ca3af;}
.result-value{font-size:2rem;font-weight:800;margin-top:8px;background:linear-gradient(135deg,#F39C12,#ffd89a);-webkit-background-clip:text;background-clip:text;color:transparent;}
.spinner{width:18px;height:18px;border:2px solid rgba(255,255,255,0.3);border-top:2px solid white;border-radius:50%;animation:spin 0.7s linear infinite;display:inline-block;}
@keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
.scan-card{background:rgba(18,25,45,0.7);backdrop-filter:blur(10px);border-radius:28px;padding:20px;margin-bottom:20px;border:1px solid rgba(255,255,255,0.05);}
.scan-title{font-size:0.95rem;font-weight:600;margin-bottom:14px;display:flex;align-items:center;gap:8px;color:#F39C12;}
.cam-area{position:relative;background:#0a0c15;border-radius:20px;overflow:hidden;margin-bottom:14px;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;border:1px solid rgba(243,156,18,0.2);}
video{width:100%;height:100%;object-fit:cover;}
canvas{display:none;}
.preview-img{width:100%;height:100%;object-fit:contain;background:#0a0c15;}
.btn-row{display:flex;gap:12px;margin:12px 0 8px;}
.btn{flex:1;padding:10px;border:none;border-radius:40px;font-weight:600;font-size:0.75rem;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn-primary{background:rgba(59,130,246,0.85);color:white;}
.btn-capture{background:linear-gradient(135deg,#F39C12,#E67E22);color:white;}
.btn-capture:disabled{opacity:0.5;}
.status-badge{font-size:0.65rem;padding:4px 12px;border-radius:20px;display:inline-block;background:rgba(255,255,255,0.05);color:#9ca3af;}
.progress-indicator{display:flex;justify-content:center;gap:20px;margin:20px 0 10px;}
.prog-step{width:36px;height:36px;border-radius:36px;background:rgba(45,55,72,0.6);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.85rem;}
.prog-step.active{background:#F39C12;box-shadow:0 0 10px rgba(243,156,18,0.4);}
.prog-step.done{background:#10b981;}
.preview-all{display:flex;gap:16px;justify-content:center;margin:20px 0 16px;flex-wrap:wrap;}
.preview-all-item{width:80px;text-align:center;cursor:pointer;position:relative;}
.preview-all-img{width:65px;height:65px;border-radius:14px;object-fit:cover;background:#111827;border:1px solid rgba(243,156,18,0.3);}
.preview-all-label{font-size:0.55rem;margin-top:5px;color:#9ca3af;display:flex;align-items:center;justify-content:center;gap:4px;}
.send-btn-special{background:linear-gradient(135deg,#F39C12,#E67E22);width:100%;padding:14px;border-radius:60px;font-weight:700;font-size:0.9rem;border:none;cursor:pointer;color:white;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px;}
.restart-all-btn{background:rgba(239,68,68,0.85);width:100%;padding:14px;border-radius:60px;font-weight:700;font-size:0.9rem;border:none;cursor:pointer;color:white;display:flex;align-items:center;justify-content:center;gap:10px;margin-top:10px;}
.hidden{display:none;}
footer{text-align:center;font-size:0.65rem;color:#4b556b;margin-top:32px;padding:16px;}

/* POPUP PROFESSIONNELLE */
.popup-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(12px);z-index:2000;display:flex;align-items:center;justify-content:center;visibility:hidden;opacity:0;transition:0.2s;}
.popup-overlay.active{visibility:visible;opacity:1;}
.popup-card{background:linear-gradient(145deg,#1a2538,#111827);border-radius:32px;width:90%;max-width:400px;padding:28px 24px;text-align:center;border:1px solid rgba(243,156,18,0.3);}
.popup-title{font-size:1.3rem;font-weight:800;margin-bottom:12px;display:flex;align-items:center;justify-content:center;gap:10px;}
.popup-message{font-size:0.9rem;margin-bottom:24px;color:#e2e8f0;line-height:1.5;}
.popup-buttons{display:flex;gap:12px;justify-content:center;}
.popup-btn{padding:10px 24px;border-radius:40px;font-weight:600;border:none;cursor:pointer;font-family:'Inter',sans-serif;display:flex;align-items:center;justify-content:center;gap:8px;}
.popup-btn.secondary{background:#334155;color:#fff;}
.popup-btn.primary{background:#F39C12;color:#0f172a;}
.popup-btn.danger{background:#dc2626;color:white;}
.request-details{background:rgba(243,156,18,0.1);border-radius:12px;padding:10px;margin:12px 0;font-size:0.75rem;text-align:left;}
.request-details p{margin:4px 0;color:#cbd5e1;}
.request-details i{color:#F39C12;width:20px;}
.security-note{font-size:0.7rem;color:#9ca3af;margin-top:12px;padding-top:12px;border-top:1px solid rgba(255,255,255,0.1);display:flex;align-items:center;justify-content:center;gap:6px;}

@media (max-width:560px){.app-container{padding:120px 16px 30px;}.tab-btn{font-size:0.75rem;padding:8px 12px;}.logout-btn{padding:6px 12px;font-size:0.7rem;}.logo-text{font-size:1rem;}}
</style>
</head>
<body>
<div class="bg-fixed"></div>
<div class="bg-overlay"></div>
<div class="navbar"><div class="logo"><img src="https://www.netubex.com/favicon.png.png" alt="NeTubeX" class="logo-img" onerror="this.src='https://netubex.github.io/hata/favicon.png.png'"><span class="logo-text">NeTubeX</span></div><button id="logoutBtn" class="logout-btn"><i class="fas fa-sign-out-alt"></i> Déconnexion</button></div>
<div class="tabs-container"><button class="tab-btn active" data-tab="converter"><i class="fas fa-exchange-alt"></i> Conversion</button><button class="tab-btn" data-tab="scanner"><i class="fas fa-camera"></i> Scan documents</button></div>
<div class="app-container">
<div id="converter-tab" class="tab-page active-page"><div class="converter-card"><div class="converter-title"><i class="fas fa-dollar-sign"></i> → <i class="fas fa-coins"></i><span>Convertisseur</span></div><div class="input-group"><div class="input-label"><span>Montant en Dollars</span><span>$ USD</span></div><div class="input-wrapper"><span class="input-prefix">$</span><input type="number" id="convAmount" class="converter-input" placeholder="0.00" step="any" value="0.0001"></div></div><div class="actions"><button id="toPointsBtn" class="converter-btn btn-primary-conv"><i class="fas fa-coins"></i> Convertir en points</button></div><div class="result-card"><div class="result-label">Valeur convertie</div><div class="result-value" id="convResult">1 point</div></div></div></div>
<div id="scanner-tab" class="tab-page">
<div id="page0" class="scan-card"><div class="scan-title"><i class="fas fa-clipboard-list"></i> Feuille de présence</div><div class="cam-area"><video id="video0" autoplay playsinline muted></video><canvas id="canvas0"></canvas><img id="preview0" class="preview-img" style="display:none;"></div><div class="btn-row"><button id="startCam0" class="btn btn-primary"><i class="fas fa-video"></i> ACTIVER</button><button id="capture0" class="btn btn-capture" disabled><i class="fas fa-camera"></i> CAPTURER</button></div><div id="status0" class="status-badge"><i class="fas fa-circle"></i> En attente</div></div>
<div id="page1" class="scan-card hidden"><div class="scan-title"><i class="fas fa-file-alt"></i> PV transmission de rapport</div><div class="cam-area"><video id="video1" autoplay playsinline muted></video><canvas id="canvas1"></canvas><img id="preview1" class="preview-img" style="display:none;"></div><div class="btn-row"><button id="startCam1" class="btn btn-primary"><i class="fas fa-video"></i> ACTIVER</button><button id="capture1" class="btn btn-capture" disabled><i class="fas fa-camera"></i> CAPTURER</button></div><div id="status1" class="status-badge"><i class="fas fa-circle"></i> En attente</div></div>
<div id="page2" class="scan-card hidden"><div class="scan-title"><i class="fas fa-archive"></i> PV archivage</div><div class="cam-area"><video id="video2" autoplay playsinline muted></video><canvas id="canvas2"></canvas><img id="preview2" class="preview-img" style="display:none;"></div><div class="btn-row"><button id="startCam2" class="btn btn-primary"><i class="fas fa-video"></i> ACTIVER</button><button id="capture2" class="btn btn-capture" disabled><i class="fas fa-camera"></i> CAPTURER</button></div><div id="status2" class="status-badge"><i class="fas fa-circle"></i> En attente</div></div>
<div class="progress-indicator"><div class="prog-step active" id="prog0">1</div><div class="prog-step" id="prog1">2</div><div class="prog-step" id="prog2">3</div></div>
<div id="previewAllArea" class="preview-all hidden"><div class="preview-all-item" data-index="0"><img id="previewAll0" class="preview-all-img" src=""><div class="preview-all-label"><i class="fas fa-clipboard-list"></i> Présence</div></div><div class="preview-all-item" data-index="1"><img id="previewAll1" class="preview-all-img" src=""><div class="preview-all-label"><i class="fas fa-file-alt"></i> Transmission</div></div><div class="preview-all-item" data-index="2"><img id="previewAll2" class="preview-all-img" src=""><div class="preview-all-label"><i class="fas fa-archive"></i> Archivage</div></div></div>
<button id="sendFinalBtn" class="send-btn-special hidden"><i class="fas fa-paper-plane"></i> ENVOYER AU DEO</button>
<button id="restartAllBtn" class="restart-all-btn hidden"><i class="fas fa-sync-alt"></i> RECOMMENCER</button>
</div>
<footer>© NeTubeX 2026</footer>
</div>

<div id="popupOverlay" class="popup-overlay">
<div class="popup-card">
<div id="popupTitle" class="popup-title"></div>
<div id="popupMessage" class="popup-message"></div>
<div class="popup-buttons">
<button id="popupBtnLeft" class="popup-btn secondary"></button>
<button id="popupBtnRight" class="popup-btn primary"></button>
</div>
</div>
</div>

<script>
// Sécurité
document.addEventListener('contextmenu',function(e){e.preventDefault();return false;});
document.addEventListener('keydown',function(e){if(e.key==='F12'){e.preventDefault();return false;}if(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'||e.key==='C')){e.preventDefault();return false;}if(e.ctrlKey&&e.key==='u'){e.preventDefault();return false;}if(e.ctrlKey&&e.key==='s'){e.preventDefault();return false;}if(e.ctrlKey&&e.key==='p'){e.preventDefault();return false;}});
document.addEventListener('touchmove',function(e){if(e.scale&&e.scale!==1){e.preventDefault();}},{passive:false});
document.addEventListener('dblclick',function(e){e.preventDefault();});

// Désactivation console
(function(){const noop=function(){};if(window.console){window.console.log=noop;window.console.info=noop;window.console.warn=noop;window.console.debug=noop;window.console.error=noop;}})();

// Popup générique
function showPopup(title, message, icon, leftText, rightText, onRightClick, isDanger=false, onLeftClick=null) {
    const popup = document.getElementById('popupOverlay');
    const titleDiv = document.getElementById('popupTitle');
    const msgDiv = document.getElementById('popupMessage');
    const leftBtn = document.getElementById('popupBtnLeft');
    const rightBtn = document.getElementById('popupBtnRight');
    
    titleDiv.innerHTML = `<i class="${icon}"></i> ${title}`;
    msgDiv.innerHTML = message;
    leftBtn.innerHTML = leftText ? `<i class="fas fa-times"></i> ${leftText}` : '<i class="fas fa-times"></i> Annuler';
    rightBtn.innerHTML = rightText ? `<i class="fas fa-check"></i> ${rightText}` : '';
    rightBtn.style.display = rightText ? 'block' : 'none';
    
    if(isDanger){
        rightBtn.classList.add('danger');
    }else{
        rightBtn.classList.remove('danger');
    }
    
    leftBtn.onclick = () => {
        popup.classList.remove('active');
        if(onLeftClick) onLeftClick();
    };
    
    if(onRightClick){
        rightBtn.onclick = () => {
            popup.classList.remove('active');
            onRightClick();
        };
    }else{
        rightBtn.onclick = () => popup.classList.remove('active');
    }
    
    popup.classList.add('active');
}

// Popup de confirmation déconnexion
function showLogoutConfirmation() {
    const message = `
        <div style="text-align:center;">
            <i class="fas fa-sign-out-alt" style="font-size:2rem;color:#F39C12;margin-bottom:12px;display:block;"></i>
            <strong>Voulez-vous vraiment vous déconnecter ?</strong>
            <p style="margin-top:12px;font-size:0.8rem;color:#9ca3af;">Vous serez redirigé vers la page de connexion.</p>
        </div>
    `;
    
    showPopup('Déconnexion', message, 'fas fa-question-circle', 'Annuler', 'Se déconnecter', () => {
        window.location.href = 'https://www.netubex.com/hat/login.html';
    }, true);
}

// Événement déconnexion
document.getElementById('logoutBtn').addEventListener('click', function(e) {
    e.preventDefault();
    showLogoutConfirmation();
});

// Conversion
const DOLLAR_TO_POINTS=10000;
const convAmount=document.getElementById('convAmount');
const toPointsBtn=document.getElementById('toPointsBtn');
const convResult=document.getElementById('convResult');

function formatPoints(points){return new Intl.NumberFormat('fr-FR').format(Math.round(points))+' points';}
async function convertToPoints(){
    let val=convAmount.value;
    if(val===''||isNaN(parseFloat(val))){convResult.textContent='❌ Montant invalide';return;}
    const originalText=toPointsBtn.innerHTML;
    toPointsBtn.disabled=true;
    toPointsBtn.innerHTML='<div class="spinner"></div> Conversion...';
    await new Promise(resolve=>setTimeout(resolve,500));
    let dollars=parseFloat(val);
    let points=dollars*DOLLAR_TO_POINTS;
    convResult.textContent=formatPoints(points);
    toPointsBtn.disabled=false;
    toPointsBtn.innerHTML=originalText;
}
toPointsBtn.addEventListener('click',convertToPoints);
convAmount.addEventListener('keypress',async(e)=>{if(e.key==='Enter'){e.preventDefault();await convertToPoints();}});
convertToPoints();

// Variables caméra
let streams=[null,null,null];
let camActive=[false,false,false];
let capturedImages=[null,null,null];
let currentPage=0;
let captureLock=false;
let pendingCameraRequest = null;

// Popup demande caméra
function showCameraRequestPopup(onAllow, onDeny) {
    const detailedMessage = `
        <div style="text-align:center;">
            <i class="fas fa-shield-alt" style="font-size:2rem;color:#F39C12;margin-bottom:12px;display:block;"></i>
            <strong style="color:#F39C12;">NeTubeX</strong> souhaite accéder à votre caméra
        </div>
        <div class="request-details">
            <p><i class="fas fa-check-circle"></i> <strong>Autorisation requise pour :</strong></p>
            <p>• Scanner des documents officiels</p>
            <p>• Capturer les feuilles de présence</p>
            <p>• Numériser les PV de transmission</p>
            <p>• Archiver les documents scannés</p>
        </div>
        <div class="security-note">
            <i class="fas fa-lock"></i> Connexion sécurisée - NeTubeX
        </div>
    `;
    
    const popup = document.getElementById('popupOverlay');
    const titleDiv = document.getElementById('popupTitle');
    const msgDiv = document.getElementById('popupMessage');
    const leftBtn = document.getElementById('popupBtnLeft');
    const rightBtn = document.getElementById('popupBtnRight');
    
    titleDiv.innerHTML = '<i class="fas fa-camera"></i> Autorisation caméra';
    msgDiv.innerHTML = detailedMessage;
    leftBtn.innerHTML = '<i class="fas fa-times"></i> Refuser';
    rightBtn.innerHTML = '<i class="fas fa-check"></i> Autoriser';
    rightBtn.style.display = 'block';
    rightBtn.classList.remove('danger');
    
    pendingCameraRequest = { onAllow, onDeny };
    
    leftBtn.onclick = () => {
        popup.classList.remove('active');
        if(pendingCameraRequest && pendingCameraRequest.onDeny) {
            pendingCameraRequest.onDeny();
        }
        pendingCameraRequest = null;
    };
    
    rightBtn.onclick = () => {
        popup.classList.remove('active');
        if(pendingCameraRequest && pendingCameraRequest.onAllow) {
            pendingCameraRequest.onAllow();
        }
        pendingCameraRequest = null;
    };
    
    popup.classList.add('active');
}

// Gestion caméra
async function stopCamera(index){
    const vid=document.getElementById(`video${index}`);
    if(streams[index]){
        streams[index].getTracks().forEach(t=>t.stop());
        streams[index]=null;
    }
    if(vid)vid.srcObject=null;
    camActive[index]=false;
}

async function startCamera(index){
    await stopCamera(index);
    const vid=document.getElementById(`video${index}`);
    const startBtn=document.getElementById(`startCam${index}`);
    const captureBtn=document.getElementById(`capture${index}`);
    const statusDiv=document.getElementById(`status${index}`);
    
    showCameraRequestPopup(
        async () => {
            try{
                const stream=await navigator.mediaDevices.getUserMedia({video:{facingMode:"environment"}});
                streams[index]=stream;
                vid.srcObject=stream;
                await vid.play();
                camActive[index]=true;
                captureBtn.disabled=false;
                startBtn.disabled=true;
                startBtn.innerHTML='<i class="fas fa-video"></i> ACTIVE';
                statusDiv.innerHTML='<i class="fas fa-check-circle"></i> Prêt • Appuyez sur CAPTURER';
                statusDiv.style.background='#10b98120';
                statusDiv.style.color='#10b981';
            }catch(e){
                camActive[index]=false;
                captureBtn.disabled=true;
                startBtn.disabled=false;
                startBtn.innerHTML='<i class="fas fa-video"></i> ACTIVER';
                statusDiv.innerHTML='<i class="fas fa-circle"></i> Prêt à activer';
                statusDiv.style.background='';
                statusDiv.style.color='#9ca3af';
            }
        },
        () => {
            camActive[index]=false;
            captureBtn.disabled=true;
            startBtn.disabled=false;
            startBtn.innerHTML='<i class="fas fa-video"></i> ACTIVER';
            statusDiv.innerHTML='<i class="fas fa-circle"></i> Activation annulée';
            statusDiv.style.background='';
            statusDiv.style.color='#9ca3af';
        }
    );
}

async function captureDocument(index){
    if(!camActive[index]){
        const statusDiv=document.getElementById(`status${index}`);
        statusDiv.innerHTML='<i class="fas fa-circle"></i> Activez d\'abord la caméra';
        setTimeout(()=>{
            if(statusDiv.innerHTML.includes('Activez')) {
                statusDiv.innerHTML='<i class="fas fa-circle"></i> En attente';
            }
        },2000);
        return false;
    }
    if(captureLock) return false;
    captureLock=true;
    setTimeout(()=>{captureLock=false;},500);
    
    const vid=document.getElementById(`video${index}`);
    const canvas=document.getElementById(`canvas${index}`);
    canvas.width=vid.videoWidth;
    canvas.height=vid.videoHeight;
    const ctx=canvas.getContext('2d');
    ctx.drawImage(vid,0,0);
    const imgData=canvas.toDataURL('image/jpeg',0.92);
    capturedImages[index]=imgData;
    
    const previewImg=document.getElementById(`preview${index}`);
    previewImg.src=imgData;
    previewImg.style.display='block';
    vid.style.display='none';
    
    const captureBtn=document.getElementById(`capture${index}`);
    captureBtn.disabled=true;
    captureBtn.innerHTML='<i class="fas fa-check-circle"></i> CAPTURÉ';
    
    const statusDiv=document.getElementById(`status${index}`);
    statusDiv.innerHTML='<i class="fas fa-check-double"></i> Document capturé';
    statusDiv.style.background='#10b98120';
    statusDiv.style.color='#10b981';
    
    await stopCamera(index);
    updateGlobalPreview();
    
    setTimeout(()=>{
        if(index===0 && capturedImages[1]===null) goToPage(1);
        else if(index===1 && capturedImages[2]===null) goToPage(2);
        else if(index===2){
            document.getElementById('sendFinalBtn').classList.remove('hidden');
            document.getElementById('restartAllBtn').classList.remove('hidden');
            document.getElementById('previewAllArea').classList.remove('hidden');
        }
        updateProgressUI();
    },400);
    return true;
}

function resetAllCaptures(){
    for(let i=0;i<3;i++){
        capturedImages[i]=null;
        const previewImg=document.getElementById(`preview${i}`);
        previewImg.style.display='none';
        previewImg.src='';
        const vid=document.getElementById(`video${i}`);
        vid.style.display='block';
        const captureBtn=document.getElementById(`capture${i}`);
        captureBtn.disabled=true;
        captureBtn.innerHTML='<i class="fas fa-camera"></i> CAPTURER';
        const startBtn=document.getElementById(`startCam${i}`);
        startBtn.disabled=false;
        startBtn.innerHTML='<i class="fas fa-video"></i> ACTIVER';
        const statusDiv=document.getElementById(`status${i}`);
        statusDiv.innerHTML='<i class="fas fa-circle"></i> En attente';
        statusDiv.style.background='';
        statusDiv.style.color='';
    }
    updateGlobalPreview();
    document.getElementById('sendFinalBtn').classList.add('hidden');
    document.getElementById('restartAllBtn').classList.add('hidden');
    document.getElementById('previewAllArea').classList.add('hidden');
    currentPage=0;
    document.getElementById('page0').classList.remove('hidden');
    document.getElementById('page1').classList.add('hidden');
    document.getElementById('page2').classList.add('hidden');
    updateProgressUI();
}

function updateGlobalPreview(){
    for(let i=0;i<3;i++){
        const previewAll=document.getElementById(`previewAll${i}`);
        if(capturedImages[i]){
            previewAll.src=capturedImages[i];
            previewAll.style.opacity='1';
        }else{
            previewAll.src='';
            previewAll.style.opacity='0.3';
        }
    }
}

function updateProgressUI(){
    for(let i=0;i<3;i++){
        const prog=document.getElementById(`prog${i}`);
        if(capturedImages[i]!==null){
            prog.classList.add('done');
            prog.classList.remove('active');
        }else if(i===currentPage){
            prog.classList.add('active');
            prog.classList.remove('done');
        }else{
            prog.classList.remove('active','done');
        }
    }
}

function goToPage(page){
    if(page===currentPage) return;
    stopCamera(currentPage);
    document.getElementById(`page${currentPage}`).classList.add('hidden');
    currentPage=page;
    document.getElementById(`page${page}`).classList.remove('hidden');
    if(capturedImages[page]!==null){
        const vid=document.getElementById(`video${page}`);
        const preview=document.getElementById(`preview${page}`);
        if(vid)vid.style.display='none';
        if(preview)preview.style.display='block';
        const captureBtn=document.getElementById(`capture${page}`);
        captureBtn.disabled=true;
        captureBtn.innerHTML='<i class="fas fa-check-circle"></i> CAPTURÉ';
    }else{
        const vid=document.getElementById(`video${page}`);
        const preview=document.getElementById(`preview${page}`);
        if(vid)vid.style.display='block';
        if(preview)preview.style.display='none';
        const startBtn=document.getElementById(`startCam${page}`);
        startBtn.disabled=false;
        startBtn.innerHTML='<i class="fas fa-video"></i> ACTIVER';
        const captureBtn=document.getElementById(`capture${page}`);
        captureBtn.disabled=true;
        captureBtn.innerHTML='<i class="fas fa-camera"></i> CAPTURER';
        const statusDiv=document.getElementById(`status${page}`);
        statusDiv.innerHTML='<i class="fas fa-circle"></i> En attente';
        statusDiv.style.background='';
        statusDiv.style.color='';
    }
    updateProgressUI();
}

function sendAllDocuments(){
    if(!capturedImages[0]||!capturedImages[1]||!capturedImages[2]){
        return;
    }
    
    const message = `
        <div style="text-align:center;">
            <i class="fas fa-paper-plane" style="font-size:2rem;color:#10b981;margin-bottom:12px;display:block;"></i>
            <strong>Documents envoyés au DEO avec succès !</strong>
            <p style="margin-top:12px;font-size:0.8rem;color:#9ca3af;">Les 3 documents ont été transmis.</p>
        </div>
    `;
    
    showPopup('Envoi réussi', message, 'fas fa-check-circle', 'OK', null, () => {
        location.reload();
    });
}

function showRestartPopup() {
    const message = `
        <div style="text-align:center;">
            <i class="fas fa-exclamation-triangle" style="font-size:2rem;color:#F39C12;margin-bottom:12px;display:block;"></i>
            <strong>Voulez-vous vraiment tout recommencer ?</strong>
            <p style="margin-top:12px;font-size:0.8rem;color:#9ca3af;">Tous les documents scannés seront supprimés.</p>
        </div>
    `;
    
    showPopup('Recommencer', message, 'fas fa-sync-alt', 'Annuler', 'Recommencer', () => {
        resetAllCaptures();
        showPopup('✅ Réinitialisé', 'Tous les documents ont été supprimés. Vous pouvez recommencer les captures.', 'fas fa-check-circle', 'Fermer', null, null);
    }, true);
}

function initScan(){
    for(let i=0;i<3;i++){
        document.getElementById(`startCam${i}`).addEventListener('click',()=>startCamera(i));
        document.getElementById(`capture${i}`).addEventListener('click',()=>captureDocument(i));
    }
    document.getElementById('sendFinalBtn').addEventListener('click',sendAllDocuments);
    document.getElementById('restartAllBtn').addEventListener('click',showRestartPopup);
}

initScan();

window.addEventListener('beforeunload',()=>{
    for(let i=0;i<3;i++) if(streams[i]) streams[i].getTracks().forEach(t=>t.stop());
});

// Gestion des onglets
const tabBtns=document.querySelectorAll('.tab-btn');
const converterTab=document.getElementById('converter-tab');
const scannerTab=document.getElementById('scanner-tab');

tabBtns.forEach(btn=>{
    btn.addEventListener('click',()=>{
        const tabId=btn.getAttribute('data-tab');
        tabBtns.forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        if(tabId==='converter'){
            converterTab.classList.add('active-page');
            scannerTab.classList.remove('active-page');
            for(let i=0;i<3;i++) stopCamera(i);
        }else{
            converterTab.classList.remove('active-page');
            scannerTab.classList.add('active-page');
        }
    });
});
</script>
</body>
</html>
