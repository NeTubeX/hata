<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>NeTubeX - Scan 3 documents</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
<style>
*{margin:0;padding:0;box-sizing:border-box;user-select:none;-webkit-tap-highlight-color:transparent;}
html,body{width:100%;height:100%;overflow-x:hidden;background:#0a0e1a;}
body{font-family:'Inter',system-ui,sans-serif;background:#0a0e1a;color:#EAEAEA;padding-top:70px;}
.bg-fixed{position:fixed;top:0;left:0;right:0;bottom:0;z-index:-2;background:linear-gradient(135deg,#0a0e1a 0%,#0f172a 50%,#1a2335 100%);}
.bg-overlay{position:fixed;top:0;left:0;right:0;bottom:0;z-index:-1;background:radial-gradient(circle at 20% 30%, rgba(56,189,248,0.08), transparent 70%);}
.navbar{position:fixed;top:max(20px, env(safe-area-inset-top, 20px));left:50%;transform:translateX(-50%);width:auto;min-width:260px;max-width:90%;background:rgba(10,14,26,0.85);backdrop-filter:blur(20px);border:1px solid rgba(56,189,248,0.2);border-radius:60px;padding:10px 20px;z-index:1000;display:flex;justify-content:center;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,0.4);}
.logo{display:flex;align-items:center;gap:10px;}
.logo-img{width:36px;height:36px;border-radius:50%;object-fit:cover;border:1px solid rgba(56,189,248,0.3);}
.logo-text{font-size:1.2rem;font-weight:800;background:linear-gradient(135deg,#E67E22,#F39C12);-webkit-background-clip:text;background-clip:text;color:transparent;}
.app-container{max-width:800px;margin:0 auto;padding:20px 16px 40px 16px;}
.main-title{text-align:center;margin:10px 0 25px 0;}
.main-title h1{font-size:1.6rem;font-weight:800;background:linear-gradient(135deg,#E67E22,#F39C12);-webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:-0.5px;}
.scan-card{background:rgba(15,23,42,0.75);backdrop-filter:blur(12px);border-radius:32px;padding:22px;margin-bottom:24px;border:1px solid rgba(255,255,255,0.08);}
.scan-title{font-size:1.2rem;font-weight:700;margin-bottom:16px;display:flex;align-items:center;gap:10px;border-left:4px solid #F39C12;padding-left:14px;}
.cam-area{position:relative;background:#0a0a0a;border-radius:24px;overflow:hidden;margin-bottom:16px;aspect-ratio:4/3;display:flex;align-items:center;justify-content:center;}
video{width:100%;height:100%;object-fit:cover;}
canvas{display:none;}
.preview-img{width:100%;height:100%;object-fit:contain;background:#0a0a0a;border-radius:16px;}
.btn-row{display:flex;gap:12px;margin:12px 0;}
.btn{flex:1;padding:12px;border:none;border-radius:60px;font-weight:700;font-size:0.85rem;cursor:pointer;transition:0.1s;background:#1c1c1e;color:white;}
.btn-primary{background:#007aff;}
.btn-primary:active{transform:scale(0.97);}
.btn-capture{background:#ff9f0a;color:#1c1c1e;}
.btn-capture:active{transform:scale(0.97);}
.btn-capture:disabled{opacity:0.5;}
.status-badge{font-size:0.7rem;padding:4px 12px;border-radius:40px;display:inline-block;margin-top:8px;}
.preview-all{display:flex;gap:12px;justify-content:center;margin:20px 0;flex-wrap:wrap;}
.preview-all-item{width:100px;text-align:center;}
.preview-all-img{width:80px;height:80px;border-radius:16px;object-fit:cover;background:#1c1c1e;border:2px solid #3a3a3c;}
.preview-all-label{font-size:0.65rem;margin-top:6px;color:#aaa;}
.send-btn-special{background:linear-gradient(145deg,#e67e22,#d35400);color:#fff;width:100%;padding:16px;border-radius:60px;font-weight:800;font-size:1rem;margin-top:20px;border:none;cursor:pointer;}
.send-btn-special:active{transform:scale(0.97);}
.progress-indicator{display:flex;justify-content:center;gap:16px;margin:20px 0;}
.prog-step{width:32px;height:32px;border-radius:32px;background:#2d3748;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:0.8rem;color:white;}
.prog-step.active{background:#F39C12;box-shadow:0 0 8px #F39C12;}
.prog-step.done{background:#10b981;}
.popup-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);backdrop-filter:blur(10px);z-index:2000;display:flex;align-items:center;justify-content:center;visibility:hidden;opacity:0;transition:0.25s;}
.popup-overlay.active{visibility:visible;opacity:1;}
.popup-card{background:linear-gradient(145deg,#1e3a5f,#0f2d45);border-radius:32px;width:92%;max-width:500px;padding:28px 24px;text-align:center;border-top:5px solid #F39C12;}
.popup-title{font-size:1.3rem;font-weight:800;color:#F39C12;margin-bottom:12px;}
.popup-message{font-size:0.9rem;margin-bottom:20px;color:#e0f2fe;line-height:1.6;}
.popup-buttons{display:flex;gap:12px;justify-content:center;}
.popup-btn{padding:10px 24px;border-radius:60px;font-weight:700;border:none;cursor:pointer;}
.popup-btn.secondary{background:#2d4e73;color:#fff;}
.popup-btn.primary{background:#10b981;color:#fff;}
footer{text-align:center;font-size:0.7rem;color:#5f748d;margin-top:30px;padding:20px;}
.hidden{display:none;}
@media (max-width:640px){body{padding-top:65px;}.navbar{padding:8px 16px;}.logo-text{font-size:1rem;}.logo-img{width:30px;height:30px;}.main-title h1{font-size:1.3rem;}.preview-all-item{width:80px;}.preview-all-img{width:60px;height:60px;}}
</style>
</head>
<body>
<div class="bg-fixed"></div>
<div class="bg-overlay"></div>
<div class="navbar">
<div class="logo">
<img src="https://www.netubex.com/favicon.png.png" alt="NeTubeX" class="logo-img" onerror="this.src='https://netubex.github.io/hata/favicon.png.png'">
<span class="logo-text">NeTubeX</span>
</div>
</div>
<div class="app-container">
<div class="main-title"><h1>📸 RAPPORT JOURNALIER</h1></div>

<div id="page0" class="scan-card">
<div class="scan-title"><i class="fas fa-clipboard-list"></i> 📋 Feuille de présence</div>
<div class="cam-area"><video id="video0" autoplay playsinline muted></video><canvas id="canvas0"></canvas><img id="preview0" class="preview-img" style="display:none;"></div>
<div class="btn-row"><button id="startCam0" class="btn btn-primary">📷 ACTIVER</button><button id="capture0" class="btn btn-capture" disabled>📸 CAPTURER</button></div>
<div id="status0" class="status-badge">⚪ En attente</div>
</div>

<div id="page1" class="scan-card hidden">
<div class="scan-title"><i class="fas fa-file-alt"></i> 📄 PV transmission de rapport</div>
<div class="cam-area"><video id="video1" autoplay playsinline muted></video><canvas id="canvas1"></canvas><img id="preview1" class="preview-img" style="display:none;"></div>
<div class="btn-row"><button id="startCam1" class="btn btn-primary">📷 ACTIVER</button><button id="capture1" class="btn btn-capture" disabled>📸 CAPTURER</button></div>
<div id="status1" class="status-badge">⚪ En attente</div>
</div>

<div id="page2" class="scan-card hidden">
<div class="scan-title"><i class="fas fa-archive"></i> 📑 PV archivage</div>
<div class="cam-area"><video id="video2" autoplay playsinline muted></video><canvas id="canvas2"></canvas><img id="preview2" class="preview-img" style="display:none;"></div>
<div class="btn-row"><button id="startCam2" class="btn btn-primary">📷 ACTIVER</button><button id="capture2" class="btn btn-capture" disabled>📸 CAPTURER</button></div>
<div id="status2" class="status-badge">⚪ En attente</div>
</div>

<div class="progress-indicator" id="progressIndicator">
<div class="prog-step" id="prog0">1</div>
<div class="prog-step" id="prog1">2</div>
<div class="prog-step" id="prog2">3</div>
</div>

<div id="previewAllArea" class="preview-all hidden">
<div class="preview-all-item"><img id="previewAll0" class="preview-all-img" src=""><div class="preview-all-label">Feuille présence</div></div>
<div class="preview-all-item"><img id="previewAll1" class="preview-all-img" src=""><div class="preview-all-label">PV transmission</div></div>
<div class="preview-all-item"><img id="previewAll2" class="preview-all-img" src=""><div class="preview-all-label">PV archivage</div></div>
</div>

<button id="sendFinalBtn" class="send-btn-special hidden">📤 ENVOYER AU DEO</button>
<footer>© NeTubeX 2026</footer>
</div>

<div id="popupOverlay" class="popup-overlay"><div class="popup-card"><div id="popupTitle" class="popup-title"></div><div id="popupMessage" class="popup-message"></div><div class="popup-buttons"><button id="popupBtnLeft" class="popup-btn secondary"></button><button id="popupBtnRight" class="popup-btn primary"></button></div></div></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
    authDomain: "netubexmoney.firebaseapp.com",
    projectId: "netubexmoney",
    storageBucket: "netubexmoney.firebasestorage.app",
    messagingSenderId: "856592608176",
    appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const DOCS = [
    { name: "Feuille de présence", short: "FP", key: "feuillePresence" },
    { name: "Procès verbal de transmission de rapport", short: "PVT", key: "pvTransmission" },
    { name: "Procès verbal d'archivage", short: "PVA", key: "pvArchivage" }
];
let streams = [null, null, null];
let camActive = [false, false, false];
let capturedImages = [null, null, null];
let currentPage = 0;
let captureLock = false;

function showError(msg) {
    const popup = document.getElementById('popupOverlay');
    document.getElementById('popupTitle').innerText = "⚠️ Attention";
    document.getElementById('popupMessage').innerHTML = msg;
    document.getElementById('popupBtnLeft').innerText = "Fermer";
    document.getElementById('popupBtnRight').style.display = "none";
    document.getElementById('popupBtnLeft').onclick = () => popup.classList.remove('active');
    popup.classList.add('active');
}

function showSuccess(msg, onClose) {
    const popup = document.getElementById('popupOverlay');
    document.getElementById('popupTitle').innerText = "✅ Succès";
    document.getElementById('popupMessage').innerHTML = msg;
    document.getElementById('popupBtnLeft').innerText = "OK";
    document.getElementById('popupBtnRight').style.display = "none";
    document.getElementById('popupBtnLeft').onclick = () => {
        popup.classList.remove('active');
        if(onClose) onClose();
    };
    popup.classList.add('active');
}

async function stopCamera(index) {
    const vid = document.getElementById(`video${index}`);
    if(streams[index]) {
        streams[index].getTracks().forEach(t => t.stop());
        streams[index] = null;
    }
    if(vid) vid.srcObject = null;
    camActive[index] = false;
}

async function startCamera(index) {
    await stopCamera(index);
    const vid = document.getElementById(`video${index}`);
    const startBtn = document.getElementById(`startCam${index}`);
    const captureBtn = document.getElementById(`capture${index}`);
    const statusDiv = document.getElementById(`status${index}`);
    try {
        const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        streams[index] = stream;
        vid.srcObject = stream;
        await vid.play();
        await new Promise(resolve => { if(vid.videoWidth > 0) resolve(); else vid.onloadedmetadata = () => resolve(); });
        camActive[index] = true;
        captureBtn.disabled = false;
        startBtn.disabled = true;
        startBtn.innerText = '📷 ACTIVE';
        statusDiv.innerHTML = '✅ Prêt • Appuyez sur CAPTURER';
        statusDiv.style.background = '#10b98120';
        statusDiv.style.color = '#10b981';
    } catch(e) {
        showError("Impossible d'accéder à la caméra. Vérifiez les permissions.");
        camActive[index] = false;
        captureBtn.disabled = true;
        startBtn.disabled = false;
        startBtn.innerText = '📷 ACTIVER';
        statusDiv.innerHTML = '❌ Erreur caméra';
        statusDiv.style.background = '#ef444420';
        statusDiv.style.color = '#ef4444';
    }
}

async function captureDocument(index) {
    if(!camActive[index]) {
        showError(`Caméra non active pour ${DOCS[index].name}`);
        return false;
    }
    if(captureLock) {
        showError('Capture en cours, patientez');
        return false;
    }
    const vid = document.getElementById(`video${index}`);
    if(!vid.videoWidth) {
        showError('Flux vidéo non prêt');
        return false;
    }
    captureLock = true;
    setTimeout(() => { captureLock = false; }, 500);
    const canvas = document.getElementById(`canvas${index}`);
    const w = vid.videoWidth;
    const h = vid.videoHeight;
    canvas.width = w;
    canvas.height = h;
    const ctx = canvas.getContext('2d');
    ctx.drawImage(vid, 0, 0, w, h);
    const imgData = canvas.toDataURL('image/jpeg', 0.92);
    capturedImages[index] = imgData;
    
    const previewImg = document.getElementById(`preview${index}`);
    previewImg.src = imgData;
    previewImg.style.display = 'block';
    vid.style.display = 'none';
    
    const captureBtn = document.getElementById(`capture${index}`);
    captureBtn.disabled = true;
    captureBtn.innerText = '✅ CAPTURÉ';
    const statusDiv = document.getElementById(`status${index}`);
    statusDiv.innerHTML = `✓ ${DOCS[index].name} capturé !`;
    statusDiv.style.background = '#10b98120';
    statusDiv.style.color = '#10b981';
    
    await stopCamera(index);
    
    updateGlobalPreview();
    
    setTimeout(() => {
        if(index === 0 && capturedImages[1] === null) goToPage(1);
        else if(index === 1 && capturedImages[2] === null) goToPage(2);
        else if(index === 2) {
            updateProgressUI();
            document.getElementById('sendFinalBtn').classList.remove('hidden');
            document.getElementById('previewAllArea').classList.remove('hidden');
            showSuccess("✅ 3 documents capturés ! Vous pouvez maintenant envoyer le rapport.", null);
        }
        updateProgressUI();
    }, 600);
    return true;
}

function updateGlobalPreview() {
    for(let i=0; i<3; i++) {
        const previewAll = document.getElementById(`previewAll${i}`);
        if(capturedImages[i]) {
            previewAll.src = capturedImages[i];
        } else {
            previewAll.src = '';
        }
    }
}

function updateProgressUI() {
    for(let i=0; i<3; i++) {
        const prog = document.getElementById(`prog${i}`);
        if(capturedImages[i] !== null) {
            prog.classList.add('done');
            prog.classList.remove('active');
        } else if(i === currentPage) {
            prog.classList.add('active');
            prog.classList.remove('done');
        } else {
            prog.classList.remove('active', 'done');
        }
    }
    const allDone = capturedImages[0] && capturedImages[1] && capturedImages[2];
    if(allDone) {
        document.getElementById('sendFinalBtn').classList.remove('hidden');
        document.getElementById('previewAllArea').classList.remove('hidden');
    }
}

function goToPage(page) {
    if(page === currentPage) return;
    if(page < 0 || page > 2) return;
    stopCamera(currentPage);
    document.getElementById(`page${currentPage}`).classList.add('hidden');
    currentPage = page;
    document.getElementById(`page${page}`).classList.remove('hidden');
    if(capturedImages[page] !== null) {
        const vid = document.getElementById(`video${page}`);
        const preview = document.getElementById(`preview${page}`);
        if(vid) vid.style.display = 'none';
        if(preview) preview.style.display = 'block';
        const captureBtn = document.getElementById(`capture${page}`);
        if(captureBtn) captureBtn.disabled = true;
        captureBtn.innerText = '✅ CAPTURÉ';
    } else {
        const vid = document.getElementById(`video${page}`);
        const preview = document.getElementById(`preview${page}`);
        if(vid) vid.style.display = 'block';
        if(preview) preview.style.display = 'none';
        const startBtn = document.getElementById(`startCam${page}`);
        startBtn.disabled = false;
        startBtn.innerText = '📷 ACTIVER';
        const captureBtn = document.getElementById(`capture${page}`);
        captureBtn.disabled = true;
        captureBtn.innerText = '📸 CAPTURER';
        const statusDiv = document.getElementById(`status${page}`);
        statusDiv.innerHTML = '⚪ En attente d\'activation';
        statusDiv.style.background = '';
        statusDiv.style.color = '';
    }
    updateProgressUI();
}

async function sendAllDocuments() {
    if(!capturedImages[0] || !capturedImages[1] || !capturedImages[2]) {
        showError("Veuillez capturer les 3 documents avant d'envoyer.");
        return;
    }
    
    const previewHtml = `
        <div style="display:flex;gap:10px;justify-content:center;margin:10px 0;">
            <div><img src="${capturedImages[0]}" style="width:70px;height:70px;object-fit:cover;border-radius:12px;"><div style="font-size:10px;">Feuille présence</div></div>
            <div><img src="${capturedImages[1]}" style="width:70px;height:70px;object-fit:cover;border-radius:12px;"><div style="font-size:10px;">PV transmission</div></div>
            <div><img src="${capturedImages[2]}" style="width:70px;height:70px;object-fit:cover;border-radius:12px;"><div style="font-size:10px;">PV archivage</div></div>
        </div>
        <p>Confirmez l'envoi du rapport journalier avec ces 3 documents scannés ?</p>
    `;
    
    const popup = document.getElementById('popupOverlay');
    document.getElementById('popupTitle').innerText = "📤 Aperçu final";
    document.getElementById('popupMessage').innerHTML = previewHtml;
    document.getElementById('popupBtnLeft').innerText = "Annuler";
    document.getElementById('popupBtnRight').innerText = "Confirmer l'envoi";
    document.getElementById('popupBtnRight').style.display = "block";
    document.getElementById('popupBtnLeft').onclick = () => popup.classList.remove('active');
    document.getElementById('popupBtnRight').onclick = async () => {
        popup.classList.remove('active');
        await executeSendToFirebase();
    };
    popup.classList.add('active');
}

async function executeSendToFirebase() {
    const sendBtn = document.getElementById('sendFinalBtn');
    const originalText = sendBtn.innerText;
    sendBtn.innerText = "⏳ Envoi en cours...";
    sendBtn.disabled = true;
    
    try {
        const reportData = {
            type: "scan_report",
            expediteur: "Blandine Kazembe",
            fonction: "FEN",
            destinataire: "DEO",
            documents: {
                feuillePresence: capturedImages[0],
                pvTransmission: capturedImages[1],
                pvArchivage: capturedImages[2]
            },
            date: new Date().toLocaleDateString('fr-FR'),
            heure: new Date().toLocaleTimeString('fr-FR'),
            timestamp: new Date().toISOString(),
            status: "livre"
        };
        
        const reportsRef = collection(db, "scan_reports");
        await addDoc(reportsRef, reportData);
        
        showSuccess("✅ Rapport journalier envoyé avec succès !\n\nLes 3 documents scannés ont été transmis au DEO.", () => {
            resetAll();
        });
    } catch(error) {
        console.error("Firebase error:", error);
        showError(`Erreur d'envoi: ${error.message}\nVérifiez votre connexion internet.`);
    } finally {
        sendBtn.innerText = originalText;
        sendBtn.disabled = false;
    }
}

function resetAll() {
    for(let i=0; i<3; i++) {
        stopCamera(i);
        capturedImages[i] = null;
        const vid = document.getElementById(`video${i}`);
        const preview = document.getElementById(`preview${i}`);
        if(vid) vid.style.display = 'block';
        if(preview) preview.style.display = 'none';
        const startBtn = document.getElementById(`startCam${i}`);
        startBtn.disabled = false;
        startBtn.innerText = '📷 ACTIVER';
        const captureBtn = document.getElementById(`capture${i}`);
        captureBtn.disabled = true;
        captureBtn.innerText = '📸 CAPTURER';
        const statusDiv = document.getElementById(`status${i}`);
        statusDiv.innerHTML = '⚪ En attente';
        statusDiv.style.background = '';
        statusDiv.style.color = '';
        camActive[i] = false;
    }
    currentPage = 0;
    document.getElementById(`page0`).classList.remove('hidden');
    document.getElementById(`page1`).classList.add('hidden');
    document.getElementById(`page2`).classList.add('hidden');
    document.getElementById('sendFinalBtn').classList.add('hidden');
    document.getElementById('previewAllArea').classList.add('hidden');
    for(let i=0; i<3; i++) {
        const prog = document.getElementById(`prog${i}`);
        prog.classList.remove('active', 'done');
    }
    document.getElementById('prog0').classList.add('active');
    updateGlobalPreview();
}

function initPage(index) {
    const startBtn = document.getElementById(`startCam${index}`);
    const captureBtn = document.getElementById(`capture${index}`);
    startBtn.addEventListener('click', () => startCamera(index));
    captureBtn.addEventListener('click', () => captureDocument(index));
}

initPage(0);
initPage(1);
initPage(2);

document.getElementById('sendFinalBtn').addEventListener('click', sendAllDocuments);

window.addEventListener('beforeunload', () => {
    for(let i=0; i<3; i++) if(streams[i]) streams[i].getTracks().forEach(t => t.stop());
});

setTimeout(() => {
    startCamera(0);
}, 200);
</script>
</body>
</html>
