<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ma Localisation GPS</title>

<style>
body{
    font-family: Arial, sans-serif;
    text-align:center;
    padding:20px;
}

button{
    padding:12px 20px;
    font-size:16px;
    cursor:pointer;
}

#result{
    margin-top:20px;
    padding:15px;
    border:1px solid #ddd;
    border-radius:10px;
}
</style>
</head>
<body>

<h2>Ma Position GPS</h2>

<button onclick="obtenirPosition()">
    Obtenir ma localisation
</button>

<div id="result">
    En attente...
</div>

<script>
function obtenirPosition() {

    const result = document.getElementById("result");

    if (!navigator.geolocation) {
        result.innerHTML = "La géolocalisation n'est pas supportée.";
        return;
    }

    result.innerHTML = "Recherche de votre position...";

    navigator.geolocation.getCurrentPosition(

        function(position) {

            const latitude = position.coords.latitude;
            const longitude = position.coords.longitude;
            const precision = position.coords.accuracy;

            result.innerHTML = `
                <h3>Position trouvée</h3>
                <p><b>Latitude :</b> ${latitude}</p>
                <p><b>Longitude :</b> ${longitude}</p>
                <p><b>Précision :</b> ${precision.toFixed(2)} mètres</p>
            `;
        },

        function(error) {
            result.innerHTML =
                "Impossible d'obtenir la localisation.";
        },

        {
            enableHighAccuracy: true,
            timeout: 15000,
            maximumAge: 0
        }
    );
}
</script>

</body>
</html>
