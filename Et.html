<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
<title>NETUBEX SUPPORT - Direction</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#0a0e1a;font-family:'Inter',sans-serif;height:100vh;overflow:hidden;}
.parent-modal{background:linear-gradient(135deg,#1e293b,#0f172a);width:100%;height:100%;display:flex;flex-direction:column;overflow:hidden;}
.parent-modal-header{padding:16px 20px;background:linear-gradient(135deg,#0f2b44,#071a2c);display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(59,130,246,0.2);flex-shrink:0;}
.parent-modal-header h3{color:#fff;font-size:18px;font-weight:600;display:flex;align-items:center;gap:10px;}
.parent-modal-header h3 span{font-size:24px;}
.parent-modal-close{background:rgba(255,255,255,0.1);border:none;width:34px;height:34px;border-radius:50%;cursor:pointer;color:#94a3b8;font-size:20px;display:flex;align-items:center;justify-content:center;}
.parent-modal-body{flex:1;display:flex;flex-direction:column;overflow:hidden;padding:0;}
.parent-chat{display:flex;flex-direction:column;height:100%;width:100%;}
.parent-info{background:linear-gradient(135deg,#0f2b44,#071a2c);padding:14px 20px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid rgba(59,130,246,0.2);flex-shrink:0;}
.parent-info-left{display:flex;flex-direction:column;gap:4px;}
.parent-info-left span:first-child{color:#ffd700;font-size:15px;font-weight:600;}
.parent-info-left span:last-child{color:#94a3b8;font-size:12px;}
.parent-info-right{display:flex;align-items:center;gap:12px;}
.parent-info-right span:first-child{font-size:12px;color:#94a3b8;}
#parentQuestionCounter{background:#10b981;color:white;padding:4px 12px;border-radius:40px;font-weight:bold;font-size:14px;}
.parent-messages{flex:1;overflow-y:auto;padding:20px;display:flex;flex-direction:column;gap:12px;background:radial-gradient(circle at 20% 30%, rgba(59,130,246,0.05), transparent 80%);min-height:0;}
.parent-msg{display:flex;width:100%;animation:fadeInUp 0.3s ease-out;}
.parent-msg.user{justify-content:flex-end;}
.parent-msg.bot{justify-content:flex-start;}
.parent-msg .bubble{max-width:85%;padding:16px 20px;border-radius:24px;font-size:15px;line-height:1.5;word-wrap:break-word;font-weight:400;}
.parent-msg.user .bubble{background:linear-gradient(135deg,rgba(59,130,246,0.95),rgba(30,64,175,0.95));backdrop-filter:blur(12px);color:#fff;font-weight:500;border-radius:24px 24px 8px 24px;border:1px solid rgba(255,255,255,0.25);}
.parent-msg.bot .bubble{background:rgba(18,25,45,0.85);backdrop-filter:blur(16px);color:#e2e8f0;border:1px solid rgba(59,130,246,0.35);border-radius:24px 24px 24px 8px;}
.parent-input-area{flex-shrink:0;display:flex;gap:12px;background:#0f172a;padding:16px;border-top:1px solid #334155;}
.parent-input{flex:1;padding:14px 18px;background:#0f172a;border:1px solid #334155;border-radius:40px;color:#fff;font-size:14px;outline:none;}
.parent-input:focus{border-color:#3b82f6;}
.parent-send{background:linear-gradient(135deg,#10b981,#059669);border:none;border-radius:40px;padding:0 24px;color:#fff;font-weight:600;cursor:pointer;}
@keyframes fadeInUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.toast-container{position:fixed;top:20px;right:20px;z-index:1000;display:flex;flex-direction:column;gap:10px;}
.toast{background:rgba(18,25,45,0.95);backdrop-filter:blur(12px);border-radius:12px;padding:12px 20px;min-width:280px;border-left:3px solid #8b5cf6;animation:slideInRight 0.3s ease;}
.toast-title{font-weight:600;font-size:13px;margin-bottom:2px;}
.toast-netubex .toast-title{color:#a78bfa;}
.toast-direction .toast-title{color:#facc15;}
.toast-message{font-size:11px;color:#94a3b8;}
@keyframes slideInRight{from{transform:translateX(100%);opacity:0;}to{transform:translateX(0);opacity:1;}}
@keyframes slideOutRight{from{transform:translateX(0);opacity:1;}to{transform:translateX(100%);opacity:0;}}
.empty-state{text-align:center;padding:60px;color:#64748b;}
.msg-header{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.msg-number{font-size:10px;color:#94a3b8;background:rgba(0,0,0,0.3);padding:2px 6px;border-radius:20px;}
.msg-sender{font-weight:600;font-size:12px;}
.parent-msg.user .msg-sender{color:#facc15;}
.parent-msg.bot .msg-sender{color:#a78bfa;}
.logo-small{width:20px;height:20px;background:white;border-radius:5px;display:inline-flex;align-items:center;justify-content:center;padding:3px;}
.logo-small img{width:100%;height:auto;}
.unread-badge{background:#ef4444;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:600;color:white;margin-left:8px;}
.msg-text{font-size:14px;line-height:1.4;}
.msg-date{font-size:10px;color:#64748b;margin-top:8px;text-align:right;}
</style>
</head>
<body>
<div class="parent-modal">
<div class="parent-modal-header">
<h3><span>🛠️</span> NETUBEX SARL - Support technique</h3>
<button class="parent-modal-close" id="closeBtn" style="display:none;">&times;</button>
</div>
<div class="parent-modal-body">
<div class="parent-chat">
<div class="parent-info">
<div class="parent-info-left">
<span>Support Technique</span>
<span>Direction ↔ NeTubeX</span>
</div>
<div class="parent-info-right">
<span>📬 Non lus</span>
<span id="parentQuestionCounter">0</span>
</div>
</div>
<div id="messagesContainer" class="parent-messages">
<div class="empty-state">💬 Aucun message. Commencez la discussion !</div>
</div>
<div class="parent-input-area">
<input type="text" id="messageInput" class="parent-input" placeholder="Votre message...">
<button id="sendBtn" class="parent-send">Envoyer</button>
</div>
</div>
</div>
</div>
<div class="toast-container" id="toastContainer"></div>
<script>
let messages=[
{id:"1",number:1,sender:"netubex",nom:"NeTubeX Support",message:"Bonjour Direction ! Je suis l'assistant support NeTubeX. Comment puis-je vous aider ?",date:new Date(Date.now()-3600000).toISOString(),read:false},
{id:"2",number:2,sender:"direction",nom:"DIRECTION",message:"Bonjour, je rencontre un problème avec l'application. Les notes ne s'affichent pas.",date:new Date(Date.now()-1800000).toISOString(),read:true},
{id:"3",number:3,sender:"netubex",nom:"NeTubeX Support",message:"Je comprends. Pouvez-vous me dire quelle version vous utilisez ?",date:new Date(Date.now()-900000).toISOString(),read:false},
{id:"4",number:4,sender:"direction",nom:"DIRECTION",message:"Version 2.5.1 sur Chrome",date:new Date(Date.now()-600000).toISOString(),read:true}
];
let nextNumber=5;
function formatNumber(n){return '#'+String(n).padStart(3,'0');}
function formatDate(d){let date=new Date(d),now=new Date(),isToday=(now-date)<24*60*60*1000;return isToday?"Aujourd'hui à "+date.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'}):date.toLocaleDateString('fr-FR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});}
function showToast(msg,isNetubex){let c=document.getElementById('toastContainer'),t=document.createElement('div');t.className=`toast ${isNetubex?'toast-netubex':'toast-direction'}`;t.innerHTML=`<div class="toast-title">${isNetubex?'🛠️ NeTubeX Support':'📤 Message envoyé'}</div><div class="toast-message">${msg.length>60?msg.substring(0,57)+'...':msg}</div>`;c.appendChild(t);setTimeout(()=>{t.style.animation='slideOutRight 0.3s ease forwards';setTimeout(()=>t.remove(),300);},5000);}
function getUnreadCount(){return messages.filter(m=>m.sender==='netubex'&&!m.read).length;}
function updateUnreadBadge(){document.getElementById('parentQuestionCounter').textContent=getUnreadCount();}
function escapeHtml(t){if(!t)return '';return t.replace(/[&<>]/g,m=>m==='&'?'&amp;':m==='<'?'&lt;':m==='>'?'&gt;':m);}
function updateUI(){let container=document.getElementById('messagesContainer');updateUnreadBadge();if(messages.length===0){container.innerHTML='<div class="empty-state">💬 Aucun message</div>';return;}
let sorted=[...messages].sort((a,b)=>new Date(a.date)-new Date(b.date));container.innerHTML='';
sorted.forEach(msg=>{let isDirection=msg.sender==='direction';let isUnread=!isDirection&&!msg.read;let logo=!isDirection?'<div class="logo-small"><img src="https://www.netubex.com/favicon.png.png" onerror="this.style.display=\'none\'"></div>':'';
let div=document.createElement('div');div.className=`parent-msg ${isDirection?'user':'bot'}`;
div.innerHTML=`<div class="bubble"><div class="msg-header">${!isDirection?logo:''}<span class="msg-number">${formatNumber(msg.number)}</span><span class="msg-sender">${msg.nom}</span>${isUnread?'<span class="unread-badge">NON LU</span>':''}</div><div class="msg-text">${escapeHtml(msg.message)}</div><div class="msg-date">📅 ${formatDate(msg.date)}</div></div>`;
container.appendChild(div);});setTimeout(()=>{container.scrollTop=container.scrollHeight;},100);}
function sendMessage(){let input=document.getElementById('messageInput'),msg=input.value.trim();if(!msg)return;let newMsg={id:Date.now().toString(),number:nextNumber++,sender:"direction",nom:"DIRECTION",message:msg,date:new Date().toISOString(),read:true};messages.push(newMsg);updateUI();input.value='';showToast(msg,false);setTimeout(()=>simulateResponse(),2500);}
function simulateResponse(){let responses=["Merci pour votre message. L'équipe technique analyse votre demande.","Je comprends. Pouvez-vous me donner plus de détails ?","Notre équipe a été notifiée. Un technicien vous contactera rapidement.","J'ai bien reçu votre message. Je vous tiens informé."];let rand=responses[Math.floor(Math.random()*responses.length)];let netubexMsg={id:Date.now().toString()+Math.random(),number:nextNumber++,sender:"netubex",nom:"NeTubeX Support",message:rand,date:new Date().toISOString(),read:false};messages.push(netubexMsg);updateUI();showToast(rand,true);}
function markAsRead(){let changed=false;messages=messages.map(msg=>{if(msg.sender==='netubex'&&!msg.read){changed=true;return{...msg,read:true};}return msg;});if(changed)updateUI();}
function observeMessages(){let container=document.getElementById('messagesContainer');let observer=new IntersectionObserver(entries=>{for(let e of entries){if(e.isIntersecting){let el=e.target;if(el.classList.contains('parent-msg')&&el.querySelector('.unread-badge')){markAsRead();break;}}}},{threshold:0.2});let mo=new MutationObserver(()=>{document.querySelectorAll('.parent-msg.bot').forEach(el=>observer.observe(el));});mo.observe(container,{childList:true,subtree:true});document.querySelectorAll('.parent-msg.bot').forEach(el=>observer.observe(el));}
function init(){updateUI();observeMessages();document.getElementById('sendBtn').onclick=sendMessage;document.getElementById('messageInput').addEventListener('keypress',e=>{if(e.key==='Enter'){e.preventDefault();sendMessage();}});}
init();
</script>
</body>
</html>
