<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<title>Sélectionnez votre établissement</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#f3f6fc;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:32px 20px 40px;color:#0b1a33}
.main-container{max-width:820px;width:100%;background:#ffffff;border-radius:48px 48px 32px 32px;box-shadow:0 20px 40px -12px rgba(0,20,50,0.15),0 8px 24px -6px rgba(0,0,0,0.05);padding:32px 32px 44px;transition:box-shadow 0.2s}
.header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:16px;margin-bottom:28px;padding-bottom:20px;border-bottom:1px solid #e9edf4}
.header-left{display:flex;align-items:center;gap:14px}
.header-icon{background:#eef4ff;width:52px;height:52px;border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:26px;color:#1a4cff;box-shadow:0 4px 8px rgba(26,76,255,0.08)}
.header-title{font-size:24px;font-weight:600;letter-spacing:-0.3px;color:#0b1a33}
.header-title span{font-weight:400;color:#5470a6;font-size:16px;margin-left:8px}
.header-badge{background:#eef4ff;padding:6px 18px;border-radius:40px;font-size:13px;font-weight:500;color:#1a4cff;letter-spacing:0.2px;border:1px solid #d6e2ff;white-space:nowrap}
.schools-grid{display:flex;flex-direction:column;gap:14px}
.school-card{background:#fafbff;border-radius:24px;padding:18px 24px 18px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px 16px;border:1px solid #e6ecf7;transition:all 0.18s ease;cursor:pointer;box-shadow:0 2px 4px rgba(0,20,50,0.02)}
.school-card:hover{background:#ffffff;border-color:#b5c8f0;box-shadow:0 8px 18px -8px rgba(26,76,255,0.08);transform:translateY(-1px)}
.school-card:active{transform:scale(0.99)}
.school-info{display:flex;align-items:center;gap:16px;flex:2 1 220px}
.school-icon{background:linear-gradient(145deg,#1a4cff,#1440e0);width:48px;height:48px;border-radius:16px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;box-shadow:0 6px 12px -6px rgba(26,76,255,0.25);flex-shrink:0}
.school-details{display:flex;flex-direction:column;gap:2px}
.school-name{font-size:18px;font-weight:600;color:#0b1a33;letter-spacing:-0.2px}
.school-location{font-size:14px;color:#64748b;display:flex;align-items:center;gap:4px}
.school-location:before{content:"📍";font-size:12px}
.school-meta{display:flex;align-items:center;gap:12px;flex-wrap:wrap}
.school-status{font-size:12px;padding:4px 14px;border-radius:40px;font-weight:500;letter-spacing:0.2px}
.status-active{background:#e3f5ec;color:#0b7a4a;border:1px solid #b8dfcc}
.status-inactive{background:#fde8e8;color:#b91c1c;border:1px solid #f5cdcd}
.status-expired{background:#fef3d7;color:#a16207;border:1px solid #f7dfb0}
.btn-access{background:transparent;border:1px solid #d6e2ff;padding:6px 20px;border-radius:40px;font-size:13px;font-weight:500;color:#1a4cff;display:inline-flex;align-items:center;gap:8px;transition:all 0.15s;cursor:pointer}
.btn-access:after{content:"→";transition:transform 0.2s}
.school-card:hover .btn-access{background:#1a4cff;border-color:#1a4cff;color:#fff;box-shadow:0 4px 12px rgba(26,76,255,0.25)}
.school-card:hover .btn-access:after{transform:translateX(4px)}
.loading{text-align:center;padding:60px 20px;color:#5470a6;font-size:15px;display:flex;align-items:center;justify-content:center;gap:12px;background:#fafbff;border-radius:32px;border:1px solid #e9edf4}
.loading:before{content:"";width:22px;height:22px;border:3px solid #d6e2ff;border-top-color:#1a4cff;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error{text-align:center;padding:48px 20px;color:#b91c1c;background:#fde8e8;border-radius:32px;font-weight:500;border-left:4px solid #b91c1c}
@media (max-width:640px){.main-container{padding:20px 16px 28px;border-radius:32px}.header-title{font-size:20px}.header-title span{font-size:14px;display:block;margin-left:0}.header-badge{font-size:12px;padding:4px 14px}.school-card{padding:14px 16px}.school-icon{width:40px;height:40px;font-size:18px}.school-name{font-size:16px}.btn-access{padding:4px 16px;font-size:12px}}
</style>
</head>
<body>
<div class="main-container">
<div class="header">
<div class="header-left">
<div class="header-icon">🏛️</div>
<div class="header-title">Établissements <span>· sélection</span></div>
</div>
<div class="header-badge">🔐 accès sécurisé</div>
</div>
<div id="schoolsList" class="loading">Chargement des écoles…</div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",authDomain:"netubexmoney.firebaseapp.com",projectId:"netubexmoney",storageBucket:"netubexmoney.firebasestorage.app",messagingSenderId:"856592608176",appId:"1:856592608176:web:69f9df9cfd4f8c28630475"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const ECOLES_AUTORISEES="ecoles_autorisees";
async function chargerEcoles(){
const container=document.getElementById('schoolsList');
try{
const snapshot=await getDocs(collection(db,ECOLES_AUTORISEES));
if(snapshot.empty){container.innerHTML='<div class="error">⚠️ Aucune école autorisée trouvée</div>';return;}
let html='<div class="schools-grid">';
snapshot.forEach(doc=>{
const ecole=doc.data();
const prefixe=doc.id;
const estActif=ecole.actif!==false;
const estExpire=ecole.dateExpiration&&new Date(ecole.dateExpiration)<new Date();
let statusHtml='';
if(estExpire){statusHtml='<span class="school-status status-expired">⏰ Expiré</span>';}
else if(estActif){statusHtml='<span class="school-status status-active">✅ Actif</span>';}
else{statusHtml='<span class="school-status status-inactive">⛔ Inactif</span>';}
const nomSafe=(ecole.nom||prefixe||'').replace(/[&<>]/g,m=>{if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m;});
const villeSafe=(ecole.ville||'').replace(/[&<>]/g,m=>{if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m;});
html+=`
<div class="school-card" data-prefixe="${prefixe||''}">
<div class="school-info">
<div class="school-icon">🏛️</div>
<div class="school-details">
<div class="school-name">${nomSafe}</div>
<div class="school-location">${villeSafe||'Localisation non renseignée'}</div>
</div>
</div>
<div class="school-meta">
${statusHtml}
<div class="btn-access">Accéder</div>
</div>
</div>
`;
});
html+='</div>';
container.innerHTML=html;
document.querySelectorAll('.school-card').forEach(card=>{
card.addEventListener('click',e=>{
e.stopPropagation();
const prefixe=card.getAttribute('data-prefixe');
if(prefixe&&prefixe!=='null'&&prefixe!=='undefined'){window.location.href=`/schooling?ecole=${encodeURIComponent(prefixe)}`;}
});
});
}catch(error){container.innerHTML=`<div class="error">❌ Erreur: ${error.message}</div>`;}
}
chargerEcoles();
(function(){
document.addEventListener('contextmenu',function(e){e.preventDefault();return false;});
document.addEventListener('keydown',function(e){if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'||e.key==='C'))||(e.ctrlKey&&e.key==='u')){e.preventDefault();return false;}});
document.addEventListener('dragstart',function(e){e.preventDefault();return false;});
document.querySelectorAll('img, .school-card, .btn-access').forEach(el=>{if(el)el.addEventListener('contextmenu',(e)=>e.preventDefault());});
})();
</script>
</body>
</html>
