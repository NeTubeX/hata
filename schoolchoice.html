<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Écoles</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
</head>
<body>
    <h1>Liste des écoles</h1>
    <div id="liste"></div>

    <script>
        // Attendre que tout soit chargé
        window.onload = function() {
            console.log("Page chargée");
            
            // Vérifier si Firebase existe
            if (typeof firebase === 'undefined') {
                document.getElementById('liste').innerHTML = "❌ Firebase non chargé";
                console.log("Firebase non trouvé");
                return;
            }
            
            console.log("Firebase trouvé");
            
            const firebaseConfig = {
                apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
                authDomain: "netubexmoney.firebaseapp.com",
                projectId: "netubexmoney",
                storageBucket: "netubexmoney.firebasestorage.app",
                messagingSenderId: "856592608176",
                appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
            };
            
            firebase.initializeApp(firebaseConfig);
            const db = firebase.firestore();
            
            db.collection('ecoles').get().then((snapshot) => {
                let html = "";
                snapshot.forEach(doc => {
                    const e = doc.data();
                    html += `<p>🏫 ${e.nom} - ${e.ville}</p>`;
                });
                if (html === "") html = "Aucune école trouvée";
                document.getElementById('liste').innerHTML = html;
            }).catch(err => {
                document.getElementById('liste').innerHTML = "Erreur: " + err.message;
            });
        };
    </script>
</body>
</html>
