<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<title>Sélectionnez votre établissement</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{background:#f0f4fe;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:24px 16px 40px;color:#0b1a33}
.main-container{max-width:880px;width:100%}
.header{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px 20px;margin-bottom:20px}
.header-left{display:flex;align-items:center;gap:12px}
.header-icon{background:#1a4cff;width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;box-shadow:0 6px 14px rgba(26,76,255,0.25)}
.header-title{font-size:22px;font-weight:600;color:#0b1a33;letter-spacing:-0.2px}
.header-title span{font-weight:400;color:#5a7ab5;font-size:15px;margin-left:6px}
.header-badge{background:#e9effa;padding:5px 16px;border-radius:30px;font-size:12px;font-weight:500;color:#1a4cff;border:1px solid #d0def5}
.search-wrap{position:relative;margin-bottom:20px}
.search-icon{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:16px;color:#8a9bb8}
.search-input{width:100%;padding:12px 16px 12px 46px;border-radius:16px;border:1px solid #d6e2ff;background:#ffffff;font-size:15px;font-family:inherit;color:#0b1a33;transition:all 0.2s;box-shadow:0 2px 8px rgba(0,0,0,0.02)}
.search-input:focus{outline:none;border-color:#1a4cff;box-shadow:0 4px 16px rgba(26,76,255,0.08)}
.search-input::placeholder{color:#8a9bb8}
.search-clear{position:absolute;right:14px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:18px;color:#8a9bb8;cursor:pointer;padding:4px;display:none;border-radius:50%}
.search-clear:hover{color:#0b1a33}
.stats-row{display:flex;gap:16px;margin-bottom:20px;flex-wrap:wrap}
.stat-card{background:#fff;border-radius:16px;padding:10px 18px;flex:1;min-width:100px;border:1px solid #e6ecf7;display:flex;align-items:center;gap:10px;box-shadow:0 2px 6px rgba(0,0,0,0.02)}
.stat-number{font-size:20px;font-weight:700;color:#0b1a33}
.stat-label{font-size:12px;color:#64748b}
.stat-dot{width:8px;height:8px;border-radius:50%;display:inline-block;margin-right:4px}
.dot-green{background:#0b7a4a}
.dot-orange{background:#a16207}
.dot-red{background:#b91c1c}
.schools-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.school-card{background:#ffffff;border-radius:20px;padding:16px 18px 14px;border:1px solid #e6ecf7;transition:all 0.18s ease;cursor:pointer;box-shadow:0 2px 6px rgba(0,20,50,0.03);display:flex;flex-direction:column;gap:8px}
.school-card:hover{border-color:#b5c8f0;box-shadow:0 8px 24px -10px rgba(26,76,255,0.10);transform:translateY(-2px)}
.school-card:active{transform:scale(0.98)}
.school-card.hidden{display:none}
.school-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.school-left{display:flex;align-items:center;gap:12px;min-width:0}
.school-number{display:inline-flex;align-items:center;justify-content:center;background:#eef4ff;color:#1a4cff;font-size:12px;font-weight:600;width:26px;height:26px;border-radius:50%;flex-shrink:0;border:1px solid #d6e2ff}
.school-icon{background:linear-gradient(145deg,#1a4cff,#1440e0);width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:17px;color:#fff;flex-shrink:0;box-shadow:0 4px 10px rgba(26,76,255,0.15)}
.school-name{font-size:15px;font-weight:600;color:#0b1a33;letter-spacing:-0.1px;word-break:break-word}
.school-location{font-size:12px;color:#64748b;display:flex;align-items:center;gap:4px;margin-top:1px}
.school-location:before{content:"📍";font-size:10px}
.school-status{font-size:10px;padding:2px 10px;border-radius:30px;font-weight:500;white-space:nowrap}
.status-active{background:#e3f5ec;color:#0b7a4a;border:1px solid #b8dfcc}
.status-inactive{background:#fde8e8;color:#b91c1c;border:1px solid #f5cdcd}
.status-expired{background:#fef3d7;color:#a16207;border:1px solid #f7dfb0}
.school-bottom{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-top:2px;padding-top:8px;border-top:1px solid #f0f4fe}
.school-meta{font-size:11px;color:#7a8aa8}
.school-meta span{margin-right:8px}
.btn-access{background:transparent;border:1px solid #d6e2ff;padding:3px 14px;border-radius:30px;font-size:11px;font-weight:500;color:#1a4cff;transition:all 0.15s;cursor:pointer}
.btn-access:after{content:" →";transition:transform 0.2s}
.school-card:hover .btn-access{background:#1a4cff;border-color:#1a4cff;color:#fff;box-shadow:0 4px 12px rgba(26,76,255,0.20)}
.school-card:hover .btn-access:after{transform:translateX(3px)}
.no-result{text-align:center;padding:40px 20px;color:#64748b;font-size:15px;grid-column:1/-1;background:#fff;border-radius:20px;border:1px solid #e9edf4}
.loading{text-align:center;padding:60px 20px;color:#5470a6;font-size:15px;display:flex;align-items:center;justify-content:center;gap:12px;background:#fff;border-radius:24px;border:1px solid #e9edf4;grid-column:1/-1}
.loading:before{content:"";width:22px;height:22px;border:3px solid #d6e2ff;border-top-color:#1a4cff;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error{text-align:center;padding:48px 20px;color:#b91c1c;background:#fde8e8;border-radius:24px;font-weight:500;border-left:4px solid #b91c1c;grid-column:1/-1}
@media (max-width:680px){.schools-grid{grid-template-columns:1fr}.header-title{font-size:19px}.header-title span{font-size:13px;display:block;margin-left:0}.stats-row{flex-wrap:nowrap;overflow-x:auto;gap:10px;padding-bottom:4px}.stat-card{min-width:90px;padding:8px 12px}.stat-number{font-size:17px}.search-input{padding:10px 16px 10px 40px;font-size:14px}}
@media (max-width:420px){.school-card{padding:12px 12px 10px}.school-icon{width:34px;height:34px;font-size:14px}.school-name{font-size:13px}.school-number{width:22px;height:22px;font-size:10px}.btn-access{padding:2px 10px;font-size:10px}}
</style>
</head>
<body>
<div class="main-container">
<div class="header">
<div class="header-left">
<div class="header-icon">🏫</div>
<div class="header-title">Établissements <span>· sélection</span></div>
</div>
<div class="header-badge">🔐 sécurisé</div>
</div>
<div class="search-wrap">
<span class="search-icon">🔍</span>
<input class="search-input" id="searchInput" type="text" placeholder="Rechercher un établissement…" autocomplete="off">
<button class="search-clear" id="searchClear" aria-label="Effacer">✕</button>
</div>
<div class="stats-row" id="statsRow">
<div class="stat-card"><span class="stat-number" id="totalCount">0</span><span class="stat-label">établissements</span></div>
<div class="stat-card"><span class="stat-dot dot-green"></span><span class="stat-number" id="activeCount">0</span><span class="stat-label">actifs</span></div>
<div class="stat-card"><span class="stat-dot dot-orange"></span><span class="stat-number" id="expiredCount">0</span><span class="stat-label">expirés</span></div>
</div>
<div class="schools-grid" id="schoolsList">
<div class="loading">Chargement des écoles…</div>
</div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",authDomain:"netubexmoney.firebaseapp.com",projectId:"netubexmoney",storageBucket:"netubexmoney.firebasestorage.app",messagingSenderId:"856592608176",appId:"1:856592608176:web:69f9df9cfd4f8c28630475"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const ECOLES_AUTORISEES="ecoles_autorisees";
let allCards=[];

async function chargerEcoles(){
const container=document.getElementById('schoolsList');
try{
const snapshot=await getDocs(collection(db,ECOLES_AUTORISEES));
if(snapshot.empty){container.innerHTML='<div class="error">⚠️ Aucune école autorisée trouvée</div>';updateStats(0,0,0);return;}
let total=0,active=0,expired=0;
const cardsData=[];
let index=0;
snapshot.forEach(doc=>{
const ecole=doc.data();
const prefixe=doc.id;
const estActif=ecole.actif!==false;
const estExpire=ecole.dateExpiration&&new Date(ecole.dateExpiration)<new Date();
total++;
if(estExpire)expired++;
else if(estActif)active++;
index++;
let statusHtml='';
if(estExpire){statusHtml='<span class="school-status status-expired">⏰ Expiré</span>';}
else if(estActif){statusHtml='<span class="school-status status-active">● Actif</span>';}
else{statusHtml='<span class="school-status status-inactive">⛔ Inactif</span>';}
const nomSafe=(ecole.nom||prefixe||'').replace(/[&<>]/g,m=>{if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m;});
const villeSafe=(ecole.ville||'').replace(/[&<>]/g,m=>{if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m;});
const prefixeDisplay=prefixe||'';
cardsData.push({
html:`
<div class="school-card" data-prefixe="${prefixeDisplay}" data-nom="${nomSafe.toLowerCase()}" data-ville="${villeSafe.toLowerCase()}" data-index="${index}">
<div class="school-top">
<div class="school-left">
<span class="school-number">${index}</span>
<div class="school-icon">🏛️</div>
<div>
<div class="school-name">${nomSafe}</div>
<div class="school-location">${villeSafe||'Localisation non renseignée'}</div>
</div>
</div>
${statusHtml}
</div>
<div class="school-bottom">
<div class="school-meta"><span>📋 ${prefixeDisplay||'—'}</span></div>
<div class="btn-access">Accéder</div>
</div>
</div>
`,
prefixe:prefixeDisplay,
nom:nomSafe.toLowerCase(),
ville:villeSafe.toLowerCase()
});
});
updateStats(total,active,expired);
allCards=cardsData;
renderCards(cardsData);
setupSearch();
setupClicks();
}catch(error){container.innerHTML=`<div class="error">❌ Erreur: ${error.message}</div>`;}
}
function renderCards(cards){
const container=document.getElementById('schoolsList');
if(cards.length===0){container.innerHTML='<div class="no-result">🔍 Aucun établissement ne correspond à votre recherche</div>';return;}
container.innerHTML=cards.map(c=>c.html).join('');
}
function updateStats(total,active,expired){
document.getElementById('totalCount').textContent=total;
document.getElementById('activeCount').textContent=active;
document.getElementById('expiredCount').textContent=expired;
}
function setupSearch(){
const input=document.getElementById('searchInput');
const clear=document.getElementById('searchClear');
input.addEventListener('input',function(){
const q=this.value.trim().toLowerCase();
if(q.length>0){clear.style.display='block';}else{clear.style.display='none';}
const filtered=allCards.filter(c=>c.nom.includes(q)||c.ville.includes(q));
renderCards(filtered);
setupClicks();
});
clear.addEventListener('click',function(){
document.getElementById('searchInput').value='';
this.style.display='none';
renderCards(allCards);
setupClicks();
document.getElementById('searchInput').focus();
});
}
function setupClicks(){
document.querySelectorAll('.school-card').forEach(card=>{
card.addEventListener('click',function(e){
e.stopPropagation();
const prefixe=this.getAttribute('data-prefixe');
if(prefixe&&prefixe!=='null'&&prefixe!=='undefined'){window.location.href=`/schooling?ecole=${encodeURIComponent(prefixe)}`;}
});
});
}
chargerEcoles();
(function(){
document.addEventListener('contextmenu',function(e){e.preventDefault();return false;});
document.addEventListener('keydown',function(e){if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'||e.key==='C'))||(e.ctrlKey&&e.key==='u')){e.preventDefault();return false;}});
document.addEventListener('dragstart',function(e){e.preventDefault();return false;});
document.querySelectorAll('img, .school-card, .btn-access').forEach(el=>{if(el)el.addEventListener('contextmenu',(e)=>e.preventDefault());});
})();
</script>
</body>
</html>
