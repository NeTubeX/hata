<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<title>Sélectionnez votre établissement</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;-webkit-user-select:none;user-select:none}
body{background:#0b1120;font-family:'Inter',-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,Helvetica,Arial,sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0;color:#e8edf5}
.main-container{max-width:880px;width:100%;padding:0 16px 40px}
.header-fixed{position:sticky;top:0;z-index:100;background:#0b1120;padding:16px 16px 10px;margin:0 -16px 12px;border-bottom:1px solid rgba(59,130,246,0.12);backdrop-filter:blur(12px);box-shadow:0 4px 24px rgba(0,0,0,0.3)}
.header{display:flex;flex-direction:column;gap:12px;max-width:880px;margin:0 auto}
.header-top{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px 16px}
.header-left{display:flex;align-items:center;gap:14px}
.header-icon{background:linear-gradient(145deg,#2563eb,#1a4cff);width:44px;height:44px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:20px;color:#fff;box-shadow:0 0 30px rgba(37,99,235,0.15),0 6px 20px rgba(37,99,235,0.2);flex-shrink:0}
.header-title{font-size:22px;font-weight:600;color:#f1f5f9;letter-spacing:-0.3px;white-space:nowrap}
.header-title span{font-weight:400;color:#94a3b8;font-size:14px;margin-left:6px}
.header-badge{background:rgba(37,99,235,0.12);padding:5px 16px;border-radius:40px;font-size:11px;font-weight:500;color:#60a5fa;border:1px solid rgba(37,99,235,0.15);white-space:nowrap}
.search-wrap{position:relative;width:100%}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:15px;color:#64748b}
.search-input{width:100%;padding:11px 16px 11px 44px;border-radius:12px;border:1px solid rgba(59,130,246,0.1);background:#1a2234;font-size:14px;font-family:inherit;color:#f1f5f9;transition:all 0.25s}
.search-input:focus{outline:none;border-color:#3b82f6;background:#1e2a3f;box-shadow:0 0 0 3px rgba(59,130,246,0.06)}
.search-input::placeholder{color:#64748b}
.search-clear{position:absolute;right:12px;top:50%;transform:translateY(-50%);background:rgba(255,255,255,0.04);border:none;font-size:15px;color:#64748b;cursor:pointer;padding:4px 8px;display:none;border-radius:30px;transition:all 0.2s}
.search-clear:hover{color:#f1f5f9;background:rgba(255,255,255,0.07)}
.stats-fixed{position:sticky;top:94px;z-index:99;background:#0b1120;padding:4px 0 14px;margin:0 -16px;backdrop-filter:blur(8px)}
.stats-row{display:flex;gap:12px;flex-wrap:nowrap;max-width:880px;margin:0 auto;padding:0 16px}
.stat-card{background:#1a2234;border-radius:12px;padding:8px 14px;flex:1;min-width:0;border:1px solid rgba(59,130,246,0.06);display:flex;align-items:center;gap:6px;position:relative;overflow:hidden;flex-shrink:1}
.stat-card::before{content:'';position:absolute;inset:0;border-radius:12px;padding:1px;background:conic-gradient(from 0deg,transparent,#3b82f6,transparent,#3b82f6,transparent);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;animation:borderSpin 3s linear infinite}
@keyframes borderSpin{to{transform:rotate(360deg)}}
.stat-number{font-size:18px;font-weight:700;color:#f1f5f9;flex-shrink:0}
.stat-label{font-size:11px;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0}
.stat-dot{width:7px;height:7px;border-radius:50%;display:inline-block;margin-right:2px;flex-shrink:0}
.dot-green{background:#10b981;box-shadow:0 0 12px rgba(16,185,129,0.25)}
.dot-gray{background:#475569}
.schools-grid{display:grid;grid-template-columns:1fr 1fr;gap:14px;padding-top:2px}
.school-card{background:#1a2234;border-radius:18px;padding:14px 16px 12px;border:1px solid rgba(255,255,255,0.04);transition:all 0.25s ease;cursor:pointer;display:flex;flex-direction:column;gap:6px;position:relative;overflow:hidden}
.school-card::before{content:'';position:absolute;inset:0;border-radius:18px;padding:1px;background:conic-gradient(from 0deg,transparent,#3b82f6,transparent,#3b82f6,transparent);-webkit-mask:linear-gradient(#fff 0 0) content-box,linear-gradient(#fff 0 0);-webkit-mask-composite:xor;mask-composite:exclude;pointer-events:none;opacity:0;transition:opacity 0.4s}
.school-card:hover::before{opacity:1;animation:borderSpin 2.5s linear infinite}
.school-card:hover{border-color:rgba(59,130,246,0.1);background:#232e42;transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,0.4)}
.school-card:active{transform:scale(0.98)}
.school-card.hidden{display:none}
.school-top{display:flex;align-items:flex-start;justify-content:space-between;gap:8px}
.school-left{display:flex;align-items:center;gap:10px;min-width:0}
.school-number{display:inline-flex;align-items:center;justify-content:center;background:rgba(37,99,235,0.12);color:#60a5fa;font-size:11px;font-weight:600;width:24px;height:24px;border-radius:50%;flex-shrink:0;border:1px solid rgba(37,99,235,0.1)}
.school-icon{background:linear-gradient(145deg,#2563eb,#1a4cff);width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:15px;color:#fff;flex-shrink:0;box-shadow:0 4px 14px rgba(37,99,235,0.15)}
.school-name{font-size:14px;font-weight:600;color:#f1f5f9;letter-spacing:-0.1px;word-break:break-word}
.school-location{font-size:11px;color:#94a3b8;display:flex;align-items:center;gap:3px;margin-top:1px}
.school-location:before{content:"📍";font-size:9px}
.school-status{font-size:9px;padding:2px 10px;border-radius:30px;font-weight:500;white-space:nowrap}
.status-active{background:rgba(16,185,129,0.1);color:#34d399;border:1px solid rgba(16,185,129,0.08)}
.status-inactive{background:rgba(239,68,68,0.08);color:#f87171;border:1px solid rgba(239,68,68,0.08)}
.school-bottom{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-top:2px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.04)}
.school-meta{font-size:10px;color:#64748b}
.school-meta span{margin-right:6px}
.btn-access{background:rgba(37,99,235,0.06);border:1px solid rgba(59,130,246,0.08);padding:2px 14px;border-radius:30px;font-size:10px;font-weight:500;color:#60a5fa;transition:all 0.2s;cursor:pointer;flex-shrink:0}
.btn-access:after{content:" →";transition:transform 0.2s}
.school-card:hover .btn-access{background:#2563eb;border-color:#2563eb;color:#fff;box-shadow:0 4px 20px rgba(37,99,235,0.25)}
.school-card:hover .btn-access:after{transform:translateX(4px)}
.no-result{text-align:center;padding:50px 20px;color:#94a3b8;font-size:15px;grid-column:1/-1;background:#1a2234;border-radius:20px;border:1px solid rgba(255,255,255,0.04)}
.loading{text-align:center;padding:60px 20px;color:#94a3b8;font-size:15px;display:flex;align-items:center;justify-content:center;gap:12px;background:#1a2234;border-radius:24px;border:1px solid rgba(255,255,255,0.04);grid-column:1/-1}
.loading:before{content:"";width:22px;height:22px;border:3px solid rgba(59,130,246,0.1);border-top-color:#3b82f6;border-radius:50%;animation:spin 0.8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.error{text-align:center;padding:48px 20px;color:#f87171;background:rgba(127,29,29,0.15);border-radius:24px;font-weight:500;border-left:4px solid #ef4444;grid-column:1/-1}
@media (max-width:680px){.schools-grid{grid-template-columns:1fr}.header-title{font-size:19px}.header-title span{font-size:12px;margin-left:4px}.header-icon{width:38px;height:38px;font-size:17px}.stats-fixed{top:98px}.stat-card{padding:6px 10px}.stat-number{font-size:15px}.stat-label{font-size:10px}.search-input{padding:10px 14px 10px 40px;font-size:13px}.header-top{gap:8px}}
@media (max-width:420px){.school-card{padding:10px 12px 10px}.school-icon{width:32px;height:32px;font-size:13px}.school-name{font-size:13px}.school-number{width:20px;height:20px;font-size:9px}.btn-access{padding:2px 10px;font-size:9px}.stat-card{padding:4px 8px}.stat-number{font-size:13px}.stat-label{font-size:9px}}
</style>
</head>
<body>
<div class="header-fixed">
<div class="header">
<div class="header-top">
<div class="header-left">
<div class="header-icon">🏫</div>
<div class="header-title">Établissements <span>· sélection</span></div>
</div>
<div class="header-badge">🔐 sécurisé</div>
</div>
<div class="search-wrap">
<span class="search-icon">🔍</span>
<input class="search-input" id="searchInput" type="text" placeholder="Rechercher un établissement…" autocomplete="off">
<button class="search-clear" id="searchClear" aria-label="Effacer">✕</button>
</div>
</div>
</div>
<div class="main-container">
<div class="stats-fixed">
<div class="stats-row" id="statsRow">
<div class="stat-card"><span class="stat-number" id="totalCount">0</span><span class="stat-label">établissements</span></div>
<div class="stat-card"><span class="stat-dot dot-green"></span><span class="stat-number" id="activeCount">0</span><span class="stat-label">actifs</span></div>
<div class="stat-card"><span class="stat-dot dot-gray"></span><span class="stat-number" id="inactiveCount">0</span><span class="stat-label">inactifs</span></div>
</div>
</div>
<div class="schools-grid" id="schoolsList">
<div class="loading">Chargement des écoles…</div>
</div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
const firebaseConfig={apiKey:"AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",authDomain:"netubexmoney.firebaseapp.com",projectId:"netubexmoney",storageBucket:"netubexmoney.firebasestorage.app",messagingSenderId:"856592608176",appId:"1:856592608176:web:69f9df9cfd4f8c28630475"};
const app=initializeApp(firebaseConfig);
const db=getFirestore(app);
const ECOLES_AUTORISEES="ecoles_autorisees";
let allCards=[];

async function chargerEcoles(){
const container=document.getElementById('schoolsList');
try{
const snapshot=await getDocs(collection(db,ECOLES_AUTORISEES));
if(snapshot.empty){container.innerHTML='<div class="error">⚠️ Aucune école autorisée trouvée</div>';updateStats(0,0,0);return;}
let total=0,active=0,inactive=0;
const cardsData=[];
let index=0;
snapshot.forEach(doc=>{
const ecole=doc.data();
const prefixe=doc.id;
const estActif=ecole.actif!==false;
total++;
if(estActif)active++;
else inactive++;
index++;
let statusHtml='';
if(estActif){statusHtml='<span class="school-status status-active">● Actif</span>';}
else{statusHtml='<span class="school-status status-inactive">⛔ Inactif</span>';}
const nomSafe=(ecole.nom||prefixe||'').replace(/[&<>]/g,m=>{if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m;});
const villeSafe=(ecole.ville||'').replace(/[&<>]/g,m=>{if(m==='&')return'&amp;';if(m==='<')return'&lt;';if(m==='>')return'&gt;';return m;});
const prefixeDisplay=prefixe||'';
cardsData.push({
html:`
<div class="school-card" data-prefixe="${prefixeDisplay}" data-nom="${nomSafe.toLowerCase()}" data-ville="${villeSafe.toLowerCase()}" data-index="${index}">
<div class="school-top">
<div class="school-left">
<span class="school-number">${index}</span>
<div class="school-icon">🏛️</div>
<div>
<div class="school-name">${nomSafe}</div>
<div class="school-location">${villeSafe||'Localisation non renseignée'}</div>
</div>
</div>
${statusHtml}
</div>
<div class="school-bottom">
<div class="school-meta"><span>📋 ${prefixeDisplay||'—'}</span></div>
<div class="btn-access">Accéder</div>
</div>
</div>
`,
prefixe:prefixeDisplay,
nom:nomSafe.toLowerCase(),
ville:villeSafe.toLowerCase()
});
});
updateStats(total,active,inactive);
allCards=cardsData;
renderCards(cardsData);
setupSearch();
setupClicks();
}catch(error){container.innerHTML=`<div class="error">❌ Erreur: ${error.message}</div>`;}
}
function renderCards(cards){
const container=document.getElementById('schoolsList');
if(cards.length===0){container.innerHTML='<div class="no-result">🔍 Aucun établissement ne correspond à votre recherche</div>';return;}
container.innerHTML=cards.map(c=>c.html).join('');
}
function updateStats(total,active,inactive){
document.getElementById('totalCount').textContent=total;
document.getElementById('activeCount').textContent=active;
document.getElementById('inactiveCount').textContent=inactive;
}
function setupSearch(){
const input=document.getElementById('searchInput');
const clear=document.getElementById('searchClear');
input.addEventListener('input',function(){
const q=this.value.trim().toLowerCase();
if(q.length>0){clear.style.display='block';}else{clear.style.display='none';}
const filtered=allCards.filter(c=>c.nom.includes(q)||c.ville.includes(q));
renderCards(filtered);
setupClicks();
});
clear.addEventListener('click',function(){
document.getElementById('searchInput').value='';
this.style.display='none';
renderCards(allCards);
setupClicks();
document.getElementById('searchInput').focus();
});
}
function setupClicks(){
document.querySelectorAll('.school-card').forEach(card=>{
card.addEventListener('click',function(e){
e.stopPropagation();
const prefixe=this.getAttribute('data-prefixe');
if(prefixe&&prefixe!=='null'&&prefixe!=='undefined'){window.location.href=`/schooling?ecole=${encodeURIComponent(prefixe)}`;}
});
});
}
chargerEcoles();
(function(){
document.addEventListener('contextmenu',function(e){e.preventDefault();return false;});
document.addEventListener('keydown',function(e){if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&(e.key==='I'||e.key==='J'||e.key==='C'))||(e.ctrlKey&&e.key==='u')){e.preventDefault();return false;}});
document.addEventListener('dragstart',function(e){e.preventDefault();return false;});
document.querySelectorAll('img, .school-card, .btn-access').forEach(el=>{if(el)el.addEventListener('contextmenu',(e)=>e.preventDefault());});
})();
</script>
</body>
</html>
