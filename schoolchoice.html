<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mode Développeur</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #0f172a;
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
        }

        h1 {
            font-size: 3rem;
            color: #38bdf8;
            text-shadow: 0 0 15px #38bdf8;
            margin-bottom: 20px;
        }

        #countdown {
            font-size: 5rem;
            font-weight: bold;
            color: #22c55e;
            text-shadow: 0 0 20px #22c55e;
        }

        .subtitle {
            margin-top: 15px;
            font-size: 1.2rem;
            color: #cbd5e1;
        }
    </style>
</head>
<body>

    <h1>MODE DÉVELOPPEUR</h1>
    <div id="countdown">10</div>
    <div class="subtitle">FLORY NGENDA</div>

    <script>
        let timeLeft = 10;
        const countdown = document.getElementById("countdown");

        const timer = setInterval(() => {
            timeLeft--;
            countdown.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timer);
                countdown.textContent = "✔ ACTIVÉ";
            }
        }, 1000);
    </script>

</body>
</html>
