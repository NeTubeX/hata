<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Espace Parental - Version Corrigée</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            background: #0a0e1a;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #1a2335;
            border-radius: 20px;
            padding: 24px;
            border: 1px solid rgba(59, 130, 246, 0.2);
        }
        h1 {
            text-align: center;
            font-size: 20px;
            margin-bottom: 20px;
            color: #60a5fa;
        }
        .chat {
            background: #0f172a;
            border-radius: 16px;
            padding: 16px;
            min-height: 400px;
            max-height: 500px;
            overflow-y: auto;
            margin-bottom: 16px;
            border: 1px solid rgba(59, 130, 246, 0.1);
        }
        .message {
            margin-bottom: 12px;
            padding: 12px 16px;
            border-radius: 16px;
            max-width: 90%;
            word-wrap: break-word;
            font-size: 14px;
            line-height: 1.5;
        }
        .user {
            background: #3b82f6;
            color: #fff;
            margin-left: auto;
            border-radius: 16px 16px 4px 16px;
        }
        .bot {
            background: #1e293b;
            color: #e2e8f0;
            margin-right: auto;
            border-radius: 16px 16px 16px 4px;
            border: 1px solid rgba(59, 130, 246, 0.15);
        }
        .input-area {
            display: flex;
            gap: 10px;
        }
        .input-area input {
            flex: 1;
            padding: 12px 16px;
            border-radius: 40px;
            border: 1px solid #334155;
            background: #0f172a;
            color: #fff;
            font-size: 16px;
            outline: none;
        }
        .input-area input:focus {
            border-color: #3b82f6;
        }
        .input-area button {
            padding: 12px 24px;
            border-radius: 40px;
            border: none;
            background: #3b82f6;
            color: #fff;
            font-weight: 600;
            cursor: pointer;
            font-size: 16px;
        }
        .input-area button:active {
            transform: scale(0.97);
        }
        .status {
            text-align: center;
            font-size: 12px;
            color: #94a3b8;
            margin-top: 12px;
            padding: 8px;
            background: #0f172a;
            border-radius: 8px;
        }
        .error {
            color: #ef4444;
        }
        .success {
            color: #10b981;
        }
        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 11px;
            font-weight: 600;
        }
        .badge-test {
            background: #f59e0b;
            color: #000;
        }
        .compteur {
            text-align: center;
            font-size: 13px;
            color: #94a3b8;
            margin: 8px 0;
        }
        .compteur span {
            background: #10b981;
            color: #fff;
            padding: 2px 12px;
            border-radius: 20px;
            font-weight: 700;
        }
        .test-info {
            background: #0f172a;
            border-radius: 12px;
            padding: 12px;
            margin-bottom: 16px;
            font-size: 13px;
            color: #94a3b8;
            border: 1px solid rgba(59, 130, 246, 0.1);
        }
        .test-info strong {
            color: #60a5fa;
        }
        .test-codes {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
        .test-codes button {
            padding: 6px 14px;
            border-radius: 20px;
            border: 1px solid #334155;
            background: transparent;
            color: #cbd5e1;
            font-size: 12px;
            cursor: pointer;
        }
        .test-codes button:hover {
            background: #334155;
        }
        .typing {
            color: #94a3b8;
            font-style: italic;
            font-size: 13px;
            padding: 8px 16px;
        }
        .typing::after {
            content: '...';
            animation: dots 1.5s infinite;
        }
        @keyframes dots {
            0% { content: '.'; }
            33% { content: '..'; }
            66% { content: '...'; }
        }
        .message .instruction {
            color: #ef4444;
            font-weight: 700;
            background: rgba(239, 68, 68, 0.1);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>🧪 Test Espace Parental</h1>

        <div class="test-info">
            <strong>🔑 Codes de test :</strong>
            <div class="test-codes">
                <button onclick="simulerCode('123456')">123456 (Jean)</button>
                <button onclick="simulerCode('654321')">654321 (Marie)</button>
                <button onclick="simulerCode('111111')">111111 (Inconnu)</button>
                <button onclick="simulerCode('')">❌ Test erreur</button>
            </div>
            <div style="margin-top:8px;font-size:11px;">
                💡 Entrez un code à 6 chiffres ou cliquez sur un bouton
            </div>
        </div>

        <div class="compteur">
            Questions aujourd'hui : <span id="questionCounter">0/10</span>
        </div>

        <div class="chat" id="chatMessages">
            <div class="message bot">
                👋 Bonjour ! Entrez votre <strong>code parent</strong> à 6 chiffres pour commencer.
            </div>
        </div>

        <div class="input-area">
            <input type="text" id="messageInput" placeholder="Code ou question..." maxlength="100">
            <button id="sendBtn">Envoyer</button>
        </div>

        <div class="status" id="statusMessage">
            ✅ IA prête - <span class="badge badge-test">MODE TEST</span>
        </div>
    </div>

    <script>
        // ============================================
        // CONFIGURATION DE TEST
        // ============================================
        const WORKER_URL = 'https://parent.netube-a97.workers.dev/';
        const SCHOOL_NAME = 'COMPLEXE SCOLAIRE TEST';

        // ============================================
        // BASE DE DONNÉES DE TEST
        // ============================================
        const elevesTest = {
            '123456': {
                nom: 'KASONGO',
                prenom: 'Jean',
                classe: '4eme Annee',
                option: 'CG',
                sexe: 'M',
                minerval: 45000,
                totalPaye: 45000 * 10,
                reste: 0,
                moisImpayes: [],
                statut: 'En ordre',
                titulaire: 'M. LUMUMBA',
                notes: [
                    { matiere: 'Mathématiques', epreuve: 'Interrogation 1', note: 18, max: 20, periode: 1 },
                    { matiere: 'Mathématiques', epreuve: 'Interrogation 2', note: 15, max: 20, periode: 2 },
                    { matiere: 'Français', epreuve: 'Composition', note: 16, max: 20, periode: 1 },
                    { matiere: 'Anglais', epreuve: 'Test', note: 14, max: 20, periode: 2 }
                ],
                presences: [
                    { date: new Date().toISOString(), present: true, estAujourdhui: true },
                    { date: new Date(Date.now() - 86400000).toISOString(), present: true, estAujourdhui: false },
                    { date: new Date(Date.now() - 172800000).toISOString(), present: false, estAujourdhui: false }
                ],
                punitions: []
            },
            '654321': {
                nom: 'LUBUMA',
                prenom: 'Marie',
                classe: '3eme Annee',
                option: 'HP',
                sexe: 'F',
                minerval: 45000,
                totalPaye: 45000 * 8,
                reste: 45000 * 2,
                moisImpayes: ['Mai', 'Juin'],
                statut: 'Paiement partiel',
                titulaire: 'Mme. KABAMBA',
                notes: [
                    { matiere: 'Physique', epreuve: 'Interrogation', note: 12, max: 20, periode: 1 },
                    { matiere: 'Chimie', epreuve: 'Test', note: 10, max: 20, periode: 2 }
                ],
                presences: [
                    { date: new Date().toISOString(), present: false, estAujourdhui: true },
                    { date: new Date(Date.now() - 86400000).toISOString(), present: false, estAujourdhui: false }
                ],
                punitions: [
                    { motif: 'Retard répété', justification: 'Arrivée en retard 3 fois', date: new Date(Date.now() - 172800000)
                            .toISOString(), gravite: 'legere' }
                ]
            }
        };

        // ============================================
        // ÉTAT DE L'APPLICATION
        // ============================================
        let currentParentCode = null;
        let dernierEleveData = null;
        let estEnAttenteReponse = false;
        let questionCount = 0;
        const MAX_QUESTIONS = 10;

        // ============================================
        // FONCTIONS PRINCIPALES
        // ============================================

        // 🔥 NOUVELLE FONCTION DE NETTOYAGE - CORRECTION PRINCIPALE
        function nettoyerReponse(reponse, eleveData) {
            // Liste des instructions à supprimer
            const patterns = [
                /TU ES UN SYSTÈME[^.]*\./gi,
                /Règles IMPÉRATIVES[^.]*\./gi,
                /Ne JAMAIS[^.]*\./gi,
                /Maximum 3 phrases[^.]*\./gi,
                /Sois chaleureux[^.]*\./gi,
                /Utilise le nom[^.]*\./gi,
                /RAPPEL :[^.]*\./gi,
                /Ne demande JAMAIS[^.]*\./gi,
                /N'affiche PAS[^.]*\./gi,
                /Reste factuel[^.]*\./gi,
                /1\.[^.]*\./g,
                /2\.[^.]*\./g,
                /3\.[^.]*\./g,
                /4\.[^.]*\./g,
                /5\.[^.]*\./g,
                /6\.[^.]*\./g,
                /7\.[^.]*\./g,
                /8\.[^.]*\./g,
                /9\.[^.]*\./g,
                /10\.[^.]*\./g
            ];

            let reponseNettoyee = reponse;

            // Supprimer tous les patterns
            for (const pattern of patterns) {
                reponseNettoyee = reponseNettoyee.replace(pattern, '');
            }

            // Si la réponse commence par "TU ES" ou "Règles", tout supprimer
            if (reponseNettoyee.trim().toUpperCase().startsWith('TU ES') ||
                reponseNettoyee.trim().toUpperCase().startsWith('RÈGLES')) {
                reponseNettoyee = `Bonjour cher parent, ${eleveData.nom} ${eleveData.prenom || ''} est en ${eleveData.classe}.`;
            }

            // Nettoyer les espaces et retours à la ligne
            reponseNettoyee = reponseNettoyee.replace(/\s+/g, ' ').trim();

            // Si vide, message par défaut
            if (!reponseNettoyee || reponseNettoyee.length < 5) {
                reponseNettoyee = `Bonjour cher parent, ${eleveData.nom} ${eleveData.prenom || ''} est bien inscrit en ${eleveData.classe}.`;
            }

            // Ajouter le nom de l'élève si absent
            if (!reponseNettoyee.includes(eleveData.nom)) {
                reponseNettoyee = `${eleveData.nom} ${eleveData.prenom || ''} : ${reponseNettoyee}`;
            }

            return reponseNettoyee;
        }

        // 🔥 VERSION CORRIGÉE DE genererReponseNaturelle
        async function genererReponseNaturelle(question, eleveData) {
            // Instructions TRÈS COURTES pour éviter les répétitions
            const prompt = `École: ${SCHOOL_NAME}. Élève: ${eleveData.nom} ${eleveData.prenom || ''}. Classe: ${eleveData.classe}. Question: ${question}. Réponds gentiment en 2-3 phrases. Utilise les points. Ne répète jamais les instructions.`;

            try {
                const response = await fetch(WORKER_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question: prompt })
                });
                const data = await response.json();

                let reponse = data.answer || "Je suis désolé, je n'ai pas pu traiter votre demande.";

                // 🔥 FILTRAGE : Supprimer les instructions si elles apparaissent
                const motsInterdits = [
                    "TU ES UN SYSTÈME", "Règles IMPÉRATIVES", "Ne JAMAIS",
                    "Maximum 3 phrases", "Sois chaleureux", "Utilise le nom",
                    "RAPPEL :", "Ne demande JAMAIS", "N'affiche PAS"
                ];

                let contientInstruction = false;
                for (const mot of motsInterdits) {
                    if (reponse.toUpperCase().includes(mot.toUpperCase())) {
                        contientInstruction = true;
                        break;
                    }
                }

                if (contientInstruction) {
                    console.warn("⚠️ Instructions détectées, nettoyage...");
                    reponse = nettoyerReponse(reponse, eleveData);
                }

                return reponse;

            } catch (error) {
                console.error("Erreur:", error);
                return `Bonjour cher parent, ${eleveData.nom} ${eleveData.prenom || ''} est en ${eleveData.classe}. Pour plus d'informations, veuillez contacter la direction.`;
            }
        }

        // ============================================
        // FONCTIONS DE TRAITEMENT
        // ============================================

        function chercherInfosParCode(code) {
            const eleve = elevesTest[code];
            if (!eleve) return null;

            return [{
                ...eleve,
                id: 'test_' + code
            }];
        }

        async function traiterMessage(message) {
            const msg = message.trim();

            // Vérifier si c'est un code (6 chiffres)
            if (/^\d{6}$/.test(msg)) {
                const infos = chercherInfosParCode(msg);

                if (!infos || infos.length === 0) {
                    dernierEleveData = null;
                    return `❌ Code parent "${msg}" non reconnu.\n\nVeuillez vérifier votre code ou contacter la comptabilité.`;
                }

                currentParentCode = msg;
                const eleve = infos[0];
                dernierEleveData = {
                    ...eleve,
                    ecole: SCHOOL_NAME,
                    nombreElevesClasse: 25,
                    punitions: eleve.punitions || [],
                    presences: eleve.presences || [],
                    notes: eleve.notes || []
                };

                // Réinitialiser le compteur
                questionCount = 0;
                updateCounter();

                return await genererReponseAccueil(dernierEleveData);
            }

            // Si on a un élève sélectionné
            if (dernierEleveData) {
                const texteComplet = msg.toLowerCase();

                // Détection des intentions
                if (texteComplet.includes('frais') || texteComplet.includes('argent') || texteComplet.includes('payer') ||
                    texteComplet.includes('minerval') || texteComplet.includes('dette')) {
                    return await genererReponseFrais(dernierEleveData);
                }

                if (texteComplet.includes('note') || texteComplet.includes('résultat') || texteComplet.includes('point') ||
                    texteComplet.includes('epreuve') || texteComplet.includes('devoir')) {
                    return await genererReponseNotes(dernierEleveData);
                }

                if (texteComplet.includes('présence') || texteComplet.includes('absent') || texteComplet.includes('present') ||
                    texteComplet.includes('assiduité') || texteComplet.includes('aujourd\'hui')) {
                    return await genererReponsePresence(dernierEleveData);
                }

                if (texteComplet.includes('punition') || texteComplet.includes('sanction') || texteComplet.includes('comportement') ||
                    texteComplet.includes('discipline')) {
                    return await genererReponsePunitions(dernierEleveData);
                }

                if (texteComplet.includes('aide') || texteComplet.includes('conseil') || texteComplet.includes('que faire') ||
                    texteComplet.includes('comment') || texteComplet.includes('quoi')) {
                    return await genererReponseAide(dernierEleveData);
                }

                if (texteComplet.includes('menu') || texteComplet.includes('accueil') || texteComplet.includes('retour')) {
                    return await genererReponseMenu(dernierEleveData);
                }

                if (texteComplet.includes('résumé') || texteComplet.includes('tout') || texteComplet.includes('complet') ||
                    texteComplet.includes('global')) {
                    return await genererReponseComplet(dernierEleveData);
                }

                // Si aucune intention spécifique, utiliser l'IA
                return await genererReponseNaturelle(msg, dernierEleveData);
            }

            return `Bonjour cher parent, veuillez entrer votre code parent à 6 chiffres.\n\nSi vous n'avez pas de code, contactez la comptabilité de l'école ${SCHOOL_NAME}.`;
        }

        // ============================================
        // RÉPONSES PRÉDÉFINIES (Fallback)
        // ============================================

        async function genererReponseAccueil(eleveData) {
            const nomComplet = `${eleveData.nom} ${eleveData.prenom || ''}`.trim();
            const sexe = eleveData.sexe === 'M' ? 'il' : 'elle';

            let reponse = `👋 Bonjour cher parent, j'ai trouvé ${nomComplet} dans notre système.`;
            reponse += `\n\n${eleveData.sexe === 'M' ? 'Il' : 'Elle'} est en ${eleveData.classe}${eleveData.option ? ' option '+eleveData.option : ''}.`;
            reponse += `\n\nJe peux vous parler de :`;
            reponse += `\n💰 Les frais`;
            reponse += `\n📝 Les notes`;
            reponse += `\n👤 La présence`;
            reponse += `\n⚠️ Les punitions`;
            reponse += `\n\nDites-moi ce que vous voulez savoir.`;
            return reponse;
        }

        async function genererReponseFrais(eleveData) {
            const nomComplet = `${eleveData.nom} ${eleveData.prenom || ''}`.trim();
            const minerval = eleveData.minerval || 45000;
            const totalPaye = eleveData.totalPaye || 0;
            const reste = eleveData.reste || (minerval * 10 - totalPaye);
            const moisImpayes = eleveData.moisImpayes || [];

            let reponse = `💰 Frais de ${nomComplet} :`;
            reponse += `\n\nMinerval : ${minerval.toLocaleString()} FC/mois`;
            reponse += `\nTotal payé : ${totalPaye.toLocaleString()} FC`;
            reponse += `\nReste à payer : ${reste.toLocaleString()} FC`;

            if (moisImpayes.length > 0) {
                reponse += `\n\n📌 Mois impayés : ${moisImpayes.join(', ')}`;
                if (moisImpayes.length >= 3) {
                    reponse += `\n⚠️ Attention : ${moisImpayes.length} mois d'impayés !`;
                }
            } else {
                reponse += `\n\n✅ Tout est à jour, c'est parfait !`;
            }

            return reponse;
        }

        async function genererReponseNotes(eleveData) {
            const nomComplet = `${eleveData.nom} ${eleveData.prenom || ''}`.trim();
            const notes = eleveData.notes || [];

            if (notes.length === 0) {
                return `📝 ${nomComplet} n'a pas encore de notes enregistrées.`;
            }

            let reponse = `📝 Notes de ${nomComplet} :\n\n`;
            notes.forEach(n => {
                reponse += `📌 ${n.matiere} - ${n.epreuve} : ${n.note}/${n.max}\n`;
            });

            if (eleveData.titulaire) {
                reponse += `\n👨‍🏫 Professeur : ${eleveData.titulaire}`;
            }

            return reponse;
        }

        async function genererReponsePresence(eleveData) {
            const nomComplet = `${eleveData.nom} ${eleveData.prenom || ''}`.trim();
            const presences = eleveData.presences || [];

            if (presences.length === 0) {
                return `👤 Je n'ai pas d'informations sur la présence de ${nomComplet}.`;
            }

            const aujourdhui = presences.find(p => p.estAujourdhui);
            let reponse = `👤 Présence de ${nomComplet} :\n\n`;

            if (aujourdhui && aujourdhui.present !== null) {
                reponse += `Aujourd'hui : ${aujourdhui.present ? '✅ Présent' : '❌ Absent'}\n\n`;
            }

            const total = presences.filter(p => p.present !== null).length;
            const presents = presences.filter(p => p.present === true).length;
            if (total > 0) {
                const taux = Math.round((presents / total) * 100);
                reponse += `Taux de présence : ${taux}% (${presents}/${total})`;
            }

            return reponse;
        }

        async function genererReponsePunitions(eleveData) {
            const nomComplet = `${eleveData.nom} ${eleveData.prenom || ''}`.trim();
            const punitions = eleveData.punitions || [];

            if (punitions.length === 0) {
                return `⚠️ Aucune punition active pour ${nomComplet}.\n\n${eleveData.sexe === 'M' ? 'Il' : 'Elle'} a un bon comportement ! 🌟`;
            }

            let reponse = `⚠️ Punitions de ${nomComplet} :\n\n`;
            punitions.forEach((p, i) => {
                const date = new Date(p.date).toLocaleDateString('fr-FR');
                reponse += `${i+1}. ${p.motif}\n   Date : ${date}\n`;
                if (p.justification) reponse += `   ${p.justification}\n`;
                reponse += '\n';
            });

            return reponse;
        }

        async function genererReponseAide(eleveData) {
            const nomComplet = `${eleveData.nom} ${eleveData.prenom || ''}`.trim();
            return `💡 Je suis là pour vous aider avec ${nomComplet}.\n\nJe peux vous parler de :\n💰 Les frais (minerval, paiements)\n📝 Les notes et résultats\n👤 La présence\n⚠️ Les punitions\n\nDites-moi simplement ce que vous voulez savoir.`;
        }

        async function genererReponseMenu(eleveData) {
            return await genererReponseAide(eleveData);
        }

        async function genererReponseComplet(eleveData) {
            const frais = await genererReponseFrais(eleveData);
            const notes = await genererReponseNotes(eleveData);
            const presence = await genererReponsePresence(eleveData);
            const punitions = await genererReponsePunitions(eleveData);

            return `📋 RÉSUMÉ COMPLET\n\n${frais}\n\n${notes}\n\n${presence}\n\n${punitions}`;
        }

        // ============================================
        // INTERFACE UTILISATEUR
        // ============================================

        const chatMessages = document.getElementById('chatMessages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusMessage = document.getElementById('statusMessage');
        const questionCounter = document.getElementById('questionCounter');

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;

            // Vérifier si le message contient des instructions
            if (type === 'bot' && text) {
                const motsInterdits = ["TU ES UN SYSTÈME", "Règles IMPÉRATIVES", "Ne JAMAIS"];
                if (motsInterdits.some(m => text.toUpperCase().includes(m.toUpperCase()))) {
                    div.innerHTML = text + '<br><span style="color:#ef4444;font-size:12px;">⚠️ Instructions détectées !</span>';
                } else {
                    div.textContent = text;
                }
            } else {
                div.textContent = text;
            }

            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function showTyping() {
            const div = document.createElement('div');
            div.className = 'message bot typing';
            div.textContent = 'L\'IA réfléchit';
            div.id = 'typingIndicator';
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function removeTyping() {
            const typing = document.getElementById('typingIndicator');
            if (typing) typing.remove();
        }

        function updateCounter() {
            questionCounter.textContent = `${questionCount}/${MAX_QUESTIONS}`;
            if (questionCount >= MAX_QUESTIONS) {
                questionCounter.style.background = '#ef4444';
            } else {
                questionCounter.style.background = '#10b981';
            }
        }

        function simulerCode(code) {
            messageInput.value = code;
            envoyerMessage();
        }

        function setStatus(text, type) {
            statusMessage.innerHTML = text;
            statusMessage.className = 'status';
            if (type) statusMessage.classList.add(type);
        }

        async function envoyerMessage() {
            const message = messageInput.value.trim();
            if (!message) return;

            if (estEnAttenteReponse) {
                setStatus('⏳ Veuillez patienter...', '');
                return;
            }

            // Vérifier le compteur
            if (questionCount >= MAX_QUESTIONS && !/^\d{6}$/.test(message)) {
                addMessage('⚠️ Limite de questions atteinte pour aujourd\'hui. Revenez demain.', 'bot');
                messageInput.value = '';
                return;
            }

            // Ajouter le message de l'utilisateur
            addMessage(message, 'user');
            messageInput.value = '';
            setStatus('⏳ Traitement en cours...', '');

            estEnAttenteReponse = true;
            showTyping();

            try {
                const reponse = await traiterMessage(message);

                removeTyping();

                // Vérifier si la réponse contient encore des instructions (dernière sécurité)
                let reponseFinale = reponse;
                const motsInterdits = ["TU ES UN SYSTÈME", "Règles IMPÉRATIVES", "Ne JAMAIS"];
                if (motsInterdits.some(m => reponse.toUpperCase().includes(m.toUpperCase()))) {
                    console.warn("⚠️ Instructions détectées dans la réponse finale !");
                    reponseFinale = "Désolé, une erreur s'est produite. Veuillez réessayer.";
                }

                addMessage(reponseFinale, 'bot');
                setStatus('✅ Réponse générée', 'success');

                // Incrémenter le compteur si ce n'est pas un code
                if (!/^\d{6}$/.test(message) && dernierEleveData) {
                    questionCount++;
                    updateCounter();
                }

            } catch (error) {
                removeTyping();
                addMessage('❌ Désolé, une erreur s\'est produite. Veuillez réessayer.', 'bot');
                setStatus('❌ Erreur: ' + error.message, 'error');
                console.error(error);
            } finally {
                estEnAttenteReponse = false;
            }
        }

        // ============================================
        // ÉVÉNEMENTS
        // ============================================

        sendBtn.addEventListener('click', envoyerMessage);

        messageInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                envoyerMessage();
            }
        });

        // Focus automatique
        messageInput.focus();

        // ============================================
        // DÉMARRAGE
        // ============================================

        setStatus('✅ IA prête - Entrez un code pour commencer', 'success');
        updateCounter();

        console.log('🧪 Application de test chargée !');
        console.log('📌 Codes disponibles : 123456 (Jean), 654321 (Marie)');
        console.log('🔧 Instructions filtrées automatiquement');
    </script>
</body>
</html>
