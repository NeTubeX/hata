<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Test IA</title>
<style>
    /* Solution : colorer la zone batterie pour qu'elle ne soit PLUS GRISE */
    html {
        background: #0a0e1a !important;
    }
    
    body {
        margin: 0;
        padding: env(safe-area-inset-top) 0 0 0;
        background: #0a0e1a !important;
        font-family: system-ui, sans-serif;
    }
    
    /* Zone noire qui remplace le gris sous la batterie */
    .battery-fix {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        height: env(safe-area-inset-top, 47px);
        background: #0a0e1a;
        z-index: 9999;
    }
    
    .container {
        max-width: 500px;
        margin: 0 auto;
        padding: 20px;
        position: relative;
        z-index: 1;
        background: #0a0e1a;
        min-height: 100vh;
    }
    
    /* Tout le reste en #0a0e1a */
    h1 { color: white; text-align: center; }
    p { color: #94a3b8; text-align: center; }
    
    .btn {
        display: block;
        width: 100%;
        padding: 16px;
        margin: 10px 0;
        border-radius: 60px;
        border: none;
        font-weight: bold;
        cursor: pointer;
    }
    
    .btn-primary { background: #3b82f6; color: white; }
    .btn-success { background: #10b981; color: white; }
    
    .card {
        background: #1e293b;
        border-radius: 20px;
        padding: 20px;
        margin: 20px 0;
    }
</style>
</head>
<body>
<!-- Cache le gris sous la batterie -->
<div class="battery-fix"></div>

<div class="container">
    <h1>🧪 Test IA</h1>
    <p>Vérification de la connexion</p>
    
    <button class="btn btn-primary" id="testBtn">🚀 Tester</button>
    <button class="btn btn-success" id="questionBtn">💬 Question IA</button>
    
    <div class="card">
        <div id="reponse">Cliquez sur Tester</div>
    </div>
</div>

<script>
const WORKER_URL = 'https://ia.netube-a97.workers.dev/';
const reponseDiv = document.getElementById('reponse');

async function tester(question) {
    reponseDiv.innerHTML = '⏳ Chargement...';
    try {
        const res = await fetch(WORKER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: question })
        });
        const data = await res.json();
        reponseDiv.innerHTML = data.answer || data.error || 'Réponse reçue';
    } catch(e) {
        reponseDiv.innerHTML = 'Erreur: ' + e.message;
    }
}

document.getElementById('testBtn').onclick = () => tester('Réponds "OK"');
document.getElementById('questionBtn').onclick = () => tester('Donne un conseil');
</script>
</body>
</html>
