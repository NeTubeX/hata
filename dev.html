    <title>Test</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#0a0e1a;display:flex;align-items:center;justify-content:center;height:100vh;color:#fff;font-family:sans-serif;margin:0;padding:20px;}
        .box{background:rgba(18,18,31,0.95);border-radius:24px;padding:40px;max-width:400px;width:100%;text-align:center;border:1px solid rgba(59,130,246,0.3);}
        h1{color:#60a5fa;font-size:28px;}
        p{color:#94a3b8;margin:15px 0;}
        .status{font-size:20px;font-weight:bold;color:#10b981;padding:15px;background:#1e293b;border-radius:12px;}
        .btn{background:#3b82f6;border:none;padding:14px 28px;border-radius:40px;color:#fff;font-weight:600;cursor:pointer;font-size:16px;margin:10px;width:80%;}
        .btn:active{transform:scale(0.95);}
        .btn-green{background:#10b981;}
        .info{font-size:11px;color:#4a5568;margin-top:15px;padding:10px;background:#0f172a;border-radius:8px;}
        .info strong{color:#60a5fa;}
    </style>
</head>
<body>
    <div class="box">
        <h1>🤖 Android</h1>
        <p>Barre d'adresse</p>
        <div class="status" id="status">👆 Appuyez</div>
        <button class="btn" id="fullBtn">🖥️ Plein écran</button>
        <button class="btn btn-green" id="checkBtn">🔍 Vérifier</button>
        <div class="info">
            💡 <strong>Sur Android :</strong><br>
            Appuyez sur "Plein écran" pour cacher la barre
        </div>
    </div>

    <script>
    function cacherBarre() {
        // Scroll
        window.scrollTo(0, 1);
        
        // Plein écran - CACHE TOUT
        const el = document.documentElement;
        if (el.requestFullscreen && !document.fullscreenElement) {
            el.requestFullscreen().catch(() => {
                document.getElementById('status').textContent = '⚠️ Appuyez sur le bouton';
                document.getElementById('status').style.color = '#f59e0b';
            });
        }
        
        // Forcer le scroll
        setTimeout(() => window.scrollTo(0, 1), 100);
        setTimeout(() => window.scrollTo(0, 1), 300);
        
        document.getElementById('status').textContent = '✅ Plein écran activé';
        document.getElementById('status').style.color = '#10b981';
    }

    // Au chargement
    window.addEventListener('load', function() {
        setTimeout(cacherBarre, 300);
        setTimeout(cacherBarre, 600);
        setTimeout(cacherBarre, 1000);
    });

    // Au premier clic
    document.addEventListener('click', function premierClic() {
        cacherBarre();
        document.removeEventListener('click', premierClic);
    }, { once: true });

    // Au premier touch
    document.addEventListener('touchstart', function premierTouch() {
        cacherBarre();
        document.removeEventListener('touchstart', premierTouch);
    }, { once: true });

    // Bouton Plein écran
    document.getElementById('fullBtn').onclick = function() {
        cacherBarre();
        this.textContent = '✅ Fait !';
        setTimeout(() => { this.textContent = '🖥️ Plein écran'; }, 2000);
    };

    // Bouton Vérifier
    document.getElementById('checkBtn').onclick = function() {
        const isFullscreen = document.fullscreenElement;
        const status = document.getElementById('status');
        if (isFullscreen) {
            status.textContent = '✅ Plein écran activé';
            status.style.color = '#10b981';
            this.textContent = '✅ OK';
        } else {
            status.textContent = '⚠️ Appuyez sur "Plein écran"';
            status.style.color = '#f59e0b';
            this.textContent = '⚠️ Non';
        }
        setTimeout(() => { this.textContent = '🔍 Vérifier'; }, 2000);
    };
    </script>
</body>
</html>
