<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Test IA - Vision</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e1a; font-family: system-ui, -apple-system, sans-serif; padding: 20px; min-height: 100vh; }
.container { max-width: 500px; margin: 0 auto; }
h1 { color: #fff; font-size: 24px; text-align: center; margin-bottom: 8px; }
.sub { color: #94a3b8; font-size: 14px; text-align: center; margin-bottom: 30px; }
.card { background: #1e293b; border-radius: 24px; padding: 24px; border: 1px solid #334155; margin-bottom: 20px; }
.label { color: #94a3b8; font-size: 12px; margin-bottom: 12px; letter-spacing: 1px; }
.image-preview { 
    background: #0f172a; 
    border-radius: 16px; 
    padding: 20px; 
    text-align: center; 
    margin: 15px 0;
    min-height: 150px;
    display: flex;
    align-items: center;
    justify-content: center;
    border: 1px dashed #334155;
}
.image-preview img { max-width: 100%; border-radius: 12px; max-height: 250px; }
input[type="file"] { 
    width: 100%; 
    padding: 12px; 
    background: #0f172a; 
    border: 1px solid #334155; 
    border-radius: 12px;
    color: #e2e8f0;
    cursor: pointer;
}
.btn { 
    padding: 14px 20px; 
    border-radius: 60px; 
    border: none; 
    font-weight: 600; 
    font-size: 15px;
    cursor: pointer; 
    width: 100%;
    margin-top: 12px;
    transition: opacity 0.2s;
}
.btn:active { opacity: 0.7; }
.btn-primary { background: #3b82f6; color: #fff; }
.btn-success { background: #10b981; color: #fff; }
.btn-secondary { background: #475569; color: #fff; }
.reponse { 
    background: #0f172a; 
    border-radius: 16px; 
    padding: 16px; 
    margin-top: 20px;
    color: #e2e8f0; 
    line-height: 1.5;
    font-size: 14px;
}
.loader {
    display: inline-block;
    width: 18px;
    height: 18px;
    border: 2px solid #3b82f6;
    border-top-color: transparent;
    border-radius: 50%;
    animation: spin 0.6s linear infinite;
    margin-right: 8px;
    vertical-align: middle;
}
@keyframes spin { to { transform: rotate(360deg); } }
.succes { color: #10b981; }
.erreur { color: #ef4444; }
</style>
</head>
<body>
<div class="container">
    <h1>🧠 IA Vision</h1>
    <div class="sub">📸 L'IA lit et analyse vos images</div>
    
    <div class="card">
        <div class="label">📤 1. CHOISISSEZ UNE IMAGE</div>
        <input type="file" id="imageInput" accept="image/*">
        <div class="image-preview" id="preview">
            <span style="color:#64748b;">Aucune image sélectionnée</span>
        </div>
    </div>
    
    <div class="card">
        <div class="label">🤖 2. QUESTION POUR L'IA</div>
        <button class="btn btn-primary" id="describeBtn">🔍 Décrire l'image</button>
        <button class="btn btn-success" id="analyzeBtn">💬 Analyser en profondeur</button>
        <button class="btn btn-secondary" id="questionBtn">❓ Question IA (texte)</button>
        
        <div class="reponse" id="reponse">
            <span style="color:#64748b;">Sélectionnez une image et cliquez sur un bouton...</span>
        </div>
    </div>
</div>

<script>
const GEMINI_API_KEY = 'AQ.Ab8RN6LSjmyJiQOys6ydeCNPrWQQa-59cZCuI-5qtgEs9lmztg';
const GEMINI_URL = `https://generativelanguage.googleapis.com/v1/models/gemini-1.5-flash:generateContent?key=${GEMINI_API_KEY}`;
const WORKER_URL = 'https://ia.netube-a97.workers.dev/';

const reponseDiv = document.getElementById('reponse');
let currentImageBase64 = null;
let currentMimeType = 'image/jpeg';

// Prévisualisation
document.getElementById('imageInput').addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (file) {
        currentMimeType = file.type;
        const reader = new FileReader();
        reader.onload = function(event) {
            currentImageBase64 = event.target.result.split(',')[1];
            document.getElementById('preview').innerHTML = `<img src="${event.target.result}" alt="Aperçu">`;
        };
        reader.readAsDataURL(file);
    }
});

// Appel à l'API Gemini
async function callGemini(prompt) {
    if (!currentImageBase64) {
        reponseDiv.innerHTML = '<span class="erreur">⚠️ Veuillez d\'abord sélectionner une image</span>';
        return null;
    }
    
    reponseDiv.innerHTML = '<span class="loader"></span> L\'IA analyse votre image...';
    
    try {
        const response = await fetch(GEMINI_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
                contents: [{
                    parts: [
                        { text: prompt },
                        {
                            inline_data: {
                                mime_type: currentMimeType,
                                data: currentImageBase64
                            }
                        }
                    ]
                }]
            })
        });
        
        const data = await response.json();
        
        if (data.candidates && data.candidates[0] && data.candidates[0].content) {
            const text = data.candidates[0].content.parts[0].text;
            return text;
        } else if (data.error) {
            throw new Error(data.error.message);
        } else {
            return "L'IA n'a pas pu analyser l'image.";
        }
    } catch(e) {
        reponseDiv.innerHTML = `<span class="erreur">❌ Erreur API: ${e.message}</span>`;
        return null;
    }
}

// Décrire l'image
async function describeImage() {
    const result = await callGemini("Décris précisément ce que tu vois sur cette image en français. Sois détaillé mais concis.");
    if (result) {
        reponseDiv.innerHTML = `<span class="succes">📷 DESCRIPTION :</span><br><br>${result}`;
    }
}

// Analyser en profondeur
async function analyzeImageDeep() {
    const result = await callGemini("Analyse cette image en profondeur. Dis-moi ce qu'elle représente, les objets, les personnes, les couleurs, l'ambiance, et ce que tu trouves intéressant. Réponds en français.");
    if (result) {
        reponseDiv.innerHTML = `<span class="succes">🔬 ANALYSE DÉTAILLÉE :</span><br><br>${result}`;
    }
}

// Question texte normale (sans image)
async function askTextQuestion() {
    reponseDiv.innerHTML = '<span class="loader"></span> Appel en cours...';
    try {
        const res = await fetch(WORKER_URL, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ question: "Donne un conseil utile pour un professeur en quelques phrases" })
        });
        const data = await res.json();
        if(data.answer) {
            reponseDiv.innerHTML = `<span class="succes">💬 RÉPONSE IA :</span><br><br>${data.answer}`;
        } else if(data.error) {
            reponseDiv.innerHTML = `<span class="erreur">❌ Erreur: ${data.error}</span>`;
        } else {
            reponseDiv.innerHTML = `<span class="erreur">⚠️ Réponse inattendue</span>`;
        }
    } catch(e) {
        reponseDiv.innerHTML = `<span class="erreur">❌ Échec: ${e.message}</span>`;
    }
}

// Événements
document.getElementById('describeBtn').onclick = describeImage;
document.getElementById('analyzeBtn').onclick = analyzeImageDeep;
document.getElementById('questionBtn').onclick = askTextQuestion;
</script>
</body>
</html>
