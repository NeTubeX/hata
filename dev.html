    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background:#0a0e1a;
            font-family:sans-serif;
        }
        .full {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background:#0a0e1a;
            color:#fff;
            padding:20px;
        }
        .box{background:rgba(18,18,31,0.9);border-radius:24px;padding:40px;max-width:400px;width:100%;text-align:center;border:1px solid rgba(59,130,246,0.2);}
        h1{font-size:28px;color:#60a5fa;}
        p{color:#94a3b8;margin:15px 0;}
        .status{font-size:20px;font-weight:bold;color:#10b981;padding:15px;background:#1e293b;border-radius:12px;}
        .btn{background:#3b82f6;border:none;padding:14px 28px;border-radius:40px;color:#fff;font-weight:600;cursor:pointer;font-size:16px;margin:10px;width:100%;}
        .btn:active{transform:scale(0.97);}
        .info{font-size:11px;color:#4a5568;margin-top:15px;padding:10px;background:#1a1a2e;border-radius:8px;}
        .info strong{color:#60a5fa;}
    </style>
</head>
<body>
    <div class="full">
        <div class="box">
            <h1>🏫 Gestion Scolaire</h1>
            <p>Version Android - Barre cachée</p>
            <div class="status" id="status">✅ OK</div>
            <button class="btn" id="fullBtn">🖥️ Plein écran</button>
            <div class="info">
                💡 <strong>Si la barre est visible</strong> :<br>
                1. Ouvrez Chrome → Menu → "Ajouter à l'écran d'accueil"<br>
                2. Ouvrez l'icône sur l'écran d'accueil<br>
                3. La barre devrait être cachée
            </div>
        </div>
    </div>

    <script>
    // ============================================================
    // SOLUTION ANDROID COMPLÈTE
    // ============================================================
    
    const isAndroid = /android/i.test(navigator.userAgent);
    const isStandalone = window.matchMedia('(display-mode: standalone)').matches || 
                         window.navigator.standalone;
    
    function cacherBarre() {
        // Scroll
        window.scrollTo(0, 1);
        
        // Plein écran
        const el = document.documentElement;
        if (el.requestFullscreen && !document.fullscreenElement) {
            el.requestFullscreen().catch(() => {});
        }
        
        // Forcer
        setTimeout(() => window.scrollTo(0, 1), 50);
        setTimeout(() => window.scrollTo(0, 1), 200);
        setTimeout(() => window.scrollTo(0, 1), 500);
    }
    
    // ============================================================
    // DÉCLENCHEMENT
    // ============================================================
    
    if (isAndroid) {
        document.getElementById('status').textContent = '🤖 Android';
        
        if (isStandalone) {
            document.getElementById('status').textContent = '📱 Mode App - Barre cachée';
        }
        
        window.addEventListener('load', function() {
            setTimeout(cacherBarre, 100);
            setTimeout(cacherBarre, 300);
            setTimeout(cacherBarre, 600);
            setTimeout(cacherBarre, 1000);
            setTimeout(cacherBarre, 2000);
        });
        
        document.addEventListener('click', function premierClic() {
            cacherBarre();
            document.removeEventListener('click', premierClic);
        }, { once: true });
        
        document.addEventListener('touchstart', function premierTouch() {
            cacherBarre();
            document.removeEventListener('touchstart', premierTouch);
        }, { once: true });
        
        window.addEventListener('orientationchange', function() {
            setTimeout(cacherBarre, 200);
            setTimeout(cacherBarre, 500);
        });
        
        window.addEventListener('resize', function() {
            setTimeout(cacherBarre, 100);
            setTimeout(cacherBarre, 300);
        });
        
        setInterval(cacherBarre, 2000);
    }
    
    document.getElementById('fullBtn').onclick = function() {
        cacherBarre();
        this.textContent = '✅ Fait !';
        setTimeout(() => { this.textContent = '🖥️ Plein écran'; }, 2000);
    };
    </script>
</body>
