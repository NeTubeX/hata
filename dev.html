<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0e1a">
    <meta name="mobile-web-app-capable" content="yes">
    <title>TEST</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{background:#0a0e1a;font-family:sans-serif;display:flex;align-items:center;justify-content:center;height:100vh;color:#fff;padding:20px;}
        .box{background:rgba(18,18,31,0.9);border-radius:24px;padding:40px;max-width:400px;width:100%;text-align:center;border:1px solid rgba(59,130,246,0.2);}
        h1{font-size:24px;color:#60a5fa;margin-bottom:10px;}
        p{color:#94a3b8;font-size:14px;margin-bottom:15px;}
        .status{background:#1e293b;border-radius:12px;padding:15px;margin:15px 0;border-left:3px solid #10b981;}
        .status .value{font-size:20px;font-weight:bold;color:#f1f5f9;}
        .btn{background:#3b82f6;border:none;padding:12px 20px;border-radius:40px;color:#fff;font-weight:600;cursor:pointer;font-size:14px;margin:5px;}
        .btn-green{background:#10b981;}
        .log{background:#0f172a;border-radius:12px;padding:10px;margin-top:10px;font-size:11px;color:#94a3b8;text-align:left;max-height:100px;overflow-y:auto;font-family:monospace;}
        .log span{color:#10b981;}
    </style>
</head>
<body>
    <div class="box">
        <h1>📱 TEST BARRE</h1>
        <p>Appuyez pour cacher la barre</p>
        
        <div class="status">
            <div class="value" id="status">👆 Appuyez</div>
        </div>
        
        <button class="btn" id="hideBtn">🙈 Cacher la barre</button>
        <button class="btn btn-green" id="checkBtn">🔍 Vérifier</button>
        
        <div class="log" id="log">📋 En attente...</div>
    </div>

    <script>
    // ============================================================
    // SOLUTION ULTRA SIMPLE - FORCE LE CACHE DE LA BARRE
    // ============================================================
    
    const isAndroid = /android/i.test(navigator.userAgent);
    const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
    
    function log(msg) {
        document.getElementById('log').innerHTML += `<br><span>→</span> ${msg}`;
    }
    
    function cacherBarre() {
        // 1. Scroll tout en haut (cache la barre sur les deux)
        window.scrollTo(0, 1);
        
        // 2. Plein écran (cache TOUT)
        const el = document.documentElement;
        if (isAndroid && el.requestFullscreen) {
            el.requestFullscreen().catch(() => {});
        }
        if (isIOS && el.webkitRequestFullscreen) {
            el.webkitRequestFullscreen();
        }
        
        // 3. Forcer le scroll encore
        setTimeout(() => window.scrollTo(0, 1), 100);
        setTimeout(() => window.scrollTo(0, 1), 300);
        
        document.getElementById('status').textContent = '✅ Barre cachée !';
        document.getElementById('status').style.color = '#10b981';
        log('Barre cachée');
    }
    
    // ============================================================
    // DÉCLENCHEMENT AUTOMATIQUE AU CHARGEMENT
    // ============================================================
    
    window.addEventListener('load', function() {
        log('Page chargée');
        setTimeout(cacherBarre, 100);
        setTimeout(cacherBarre, 500);
        setTimeout(cacherBarre, 1000);
    });
    
    // Premier clic = cache la barre
    document.addEventListener('click', function premierClic() {
        cacherBarre();
        document.removeEventListener('click', premierClic);
    }, { once: true });
    
    // Premier touch = cache la barre
    document.addEventListener('touchstart', function premierTouch() {
        cacherBarre();
        document.removeEventListener('touchstart', premierTouch);
    }, { once: true });
    
    // Intervalle toutes les 2 secondes (agressif)
    setInterval(cacherBarre, 2000);
    
    // ============================================================
    // BOUTONS
    // ============================================================
    
    document.getElementById('hideBtn').onclick = cacherBarre;
    
    document.getElementById('checkBtn').onclick = function() {
        const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement;
        const status = document.getElementById('status');
        if (isFullscreen || window.innerHeight >= screen.height - 50) {
            status.textContent = '✅ Barre cachée !';
            status.style.color = '#10b981';
            log('✅ OK - Barre cachée');
        } else {
            status.textContent = '⚠️ Barre visible - Appuyez sur "Cacher"';
            status.style.color = '#f59e0b';
            log('⚠️ Barre visible');
        }
    };
    
    // Détection
    if (isAndroid) {
        document.getElementById('status').textContent = '🤖 Android - Barre va se cacher';
        log('Android détecté');
    } else if (isIOS) {
        document.getElementById('status').textContent = '🍎 iPhone - Barre va se cacher';
        log('iPhone détecté');
    } else {
        document.getElementById('status').textContent = '💻 Desktop';
        log('Desktop détecté');
    }
    </script>
</body>
</html>
