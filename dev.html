    <title>Test Cache Barre</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box;}
        body{
            background:#0a0e1a;
            display:flex;
            align-items:center;
            justify-content:center;
            height:100vh;
            color:#fff;
            font-family:sans-serif;
            padding:20px;
            margin:0;
        }
        .box{
            background:rgba(18,18,31,0.95);
            border-radius:24px;
            padding:40px 30px;
            max-width:400px;
            width:100%;
            text-align:center;
            border:1px solid rgba(59,130,246,0.3);
        }
        h1{
            font-size:28px;
            background:linear-gradient(135deg,#60a5fa,#a78bfa);
            -webkit-background-clip:text;
            background-clip:text;
            color:transparent;
            margin-bottom:10px;
        }
        .icon{font-size:64px;margin-bottom:10px;}
        p{color:#94a3b8;font-size:14px;margin-bottom:20px;line-height:1.6;}
        .status{
            background:#1e293b;
            border-radius:12px;
            padding:15px;
            margin:15px 0;
            border-left:3px solid #10b981;
        }
        .status .label{font-size:11px;color:#64748b;text-transform:uppercase;letter-spacing:1px;}
        .status .value{font-size:20px;font-weight:bold;color:#f1f5f9;margin-top:5px;}
        .btn{
            background:#3b82f6;
            border:none;
            padding:12px 24px;
            border-radius:40px;
            color:#fff;
            font-weight:600;
            cursor:pointer;
            font-size:14px;
            margin:5px;
            transition:transform 0.2s;
        }
        .btn:active{transform:scale(0.95);}
        .btn-green{background:#10b981;}
        .btn-red{background:#ef4444;}
        .info{
            font-size:11px;
            color:#4a5568;
            margin-top:15px;
            padding:12px;
            background:#0f172a;
            border-radius:8px;
            border:1px solid rgba(255,255,255,0.05);
        }
        .info strong{color:#60a5fa;}
        .badge{
            display:inline-block;
            padding:3px 14px;
            border-radius:40px;
            font-size:11px;
            font-weight:600;
            margin:5px 3px;
        }
        .badge-android{background:#3b82f6;color:#fff;}
        .badge-ios{background:#8b5cf6;color:#fff;}
        .badge-app{background:#10b981;color:#fff;}
        .badge-web{background:#475569;color:#fff;}
        .log{
            background:#0f172a;
            border-radius:8px;
            padding:10px 12px;
            margin-top:12px;
            font-size:10px;
            color:#64748b;
            text-align:left;
            max-height:80px;
            overflow-y:auto;
            font-family:monospace;
            border:1px solid rgba(255,255,255,0.05);
        }
        .log span{color:#10b981;}
        .log .error{color:#ef4444;}
    </style>

<body>

<div class="box">
    <div class="icon">📱</div>
    <h1>Test Cache Barre</h1>
    <p>Vérifiez si la barre d'adresse est cachée</p>
    
    <div class="status">
        <div class="label">📱 Mode</div>
        <div class="value" id="modeDisplay">Chargement...</div>
    </div>
    
    <div class="status" style="border-left-color:#f59e0b;">
        <div class="label">🔍 Barre d'adresse</div>
        <div class="value" id="barStatus">Vérification...</div>
    </div>
    
    <div id="badgeContainer"></div>
    
    <div style="margin:10px 0;">
        <button class="btn" id="hideBtn">🙈 Cacher</button>
        <button class="btn btn-green" id="checkBtn">🔍 Vérifier</button>
    </div>
    
    <div class="log" id="logContainer">
        <span>📋</span> Logs d'activité...
    </div>
    
    <div class="info">
        💡 <strong>Sur Android :</strong> Ajoutez à l'écran d'accueil<br>
        🍎 <strong>Sur iPhone :</strong> Ajoutez à l'écran d'accueil
    </div>
</div>

<script>
// ============================================================
// TEST CACHE BARRE - VERSION SIMPLE
// ============================================================

const isAndroid = /android/i.test(navigator.userAgent);
const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);
const isStandalone = window.matchMedia('(display-mode: standalone)').matches || 
                     window.navigator.standalone;

function log(msg) {
    const el = document.getElementById('logContainer');
    const time = new Date().toLocaleTimeString();
    el.innerHTML += `<br><span>${time}</span> ${msg}`;
    el.scrollTop = el.scrollHeight;
}

function updateStatus() {
    const isFullscreen = document.fullscreenElement || document.webkitFullscreenElement;
    const barStatus = document.getElementById('barStatus');
    
    if (isStandalone) {
        barStatus.textContent = '✅ Cachée (mode app)';
        barStatus.style.color = '#10b981';
    } else if (isFullscreen) {
        barStatus.textContent = '✅ Cachée (plein écran)';
        barStatus.style.color = '#10b981';
    } else if (window.innerHeight >= screen.height - 50) {
        barStatus.textContent = '✅ Cachée';
        barStatus.style.color = '#10b981';
    } else {
        barStatus.textContent = '⚠️ Visible';
        barStatus.style.color = '#f59e0b';
    }
}

function cacherBarre() {
    // Scroll
    window.scrollTo(0, 1);
    
    // Plein écran
    const el = document.documentElement;
    if (el.requestFullscreen && !document.fullscreenElement) {
        el.requestFullscreen().catch(() => {});
    }
    if (el.webkitRequestFullscreen && !document.webkitFullscreenElement) {
        el.webkitRequestFullscreen();
    }
    
    // Forcer plusieurs fois
    setTimeout(() => window.scrollTo(0, 1), 50);
    setTimeout(() => window.scrollTo(0, 1), 200);
    setTimeout(() => window.scrollTo(0, 1), 500);
    
    updateStatus();
    log('🔄 Barre cachée');
}

// ============================================================
// DÉTECTION
// ============================================================

function detecter() {
    const modeEl = document.getElementById('modeDisplay');
    const badgeContainer = document.getElementById('badgeContainer');
    
    // Mode standalone
    if (isStandalone) {
        modeEl.textContent = '📱 Mode App (installée)';
        modeEl.style.color = '#10b981';
        badgeContainer.innerHTML = '<span class="badge badge-app">📱 App</span>';
        log('✅ Mode App détecté');
    } 
    // Mode navigateur
    else {
        if (isAndroid) {
            modeEl.textContent = '🌐 Navigateur (Android)';
            badgeContainer.innerHTML = '<span class="badge badge-android">🤖 Android</span>';
            log('🤖 Android détecté');
        } else if (isIOS) {
            modeEl.textContent = '🌐 Navigateur (iPhone)';
            badgeContainer.innerHTML = '<span class="badge badge-ios">🍎 iPhone</span>';
            log('🍎 iPhone détecté');
        } else {
            modeEl.textContent = '💻 Desktop';
            badgeContainer.innerHTML = '<span class="badge badge-web">💻 Desktop</span>';
            log('💻 Desktop détecté');
        }
    }
    
    updateStatus();
}

// ============================================================
// DÉCLENCHEMENT AUTOMATIQUE
// ============================================================

window.addEventListener('load', function() {
    detecter();
    log('📄 Page chargée');
    
    // Essayer de cacher plusieurs fois
    setTimeout(cacherBarre, 100);
    setTimeout(cacherBarre, 300);
    setTimeout(cacherBarre, 600);
    setTimeout(cacherBarre, 1000);
});

// Premier clic = cache la barre
document.addEventListener('click', function premierClic() {
    cacherBarre();
    document.removeEventListener('click', premierClic);
}, { once: true });

// Premier touch = cache la barre
document.addEventListener('touchstart', function premierTouch() {
    cacherBarre();
    document.removeEventListener('touchstart', premierTouch);
}, { once: true });

// Intervalle toutes les 3 secondes
setInterval(cacherBarre, 3000);

// Rotation
window.addEventListener('orientationchange', function() {
    setTimeout(cacherBarre, 300);
    setTimeout(updateStatus, 400);
});

// ============================================================
// BOUTONS
// ============================================================

document.getElementById('hideBtn').onclick = function() {
    cacherBarre();
    this.textContent = '✅ Fait !';
    setTimeout(() => { this.textContent = '🙈 Cacher'; }, 1500);
};

document.getElementById('checkBtn').onclick = function() {
    updateStatus();
    const status = document.getElementById('barStatus');
    if (status.textContent.includes('Cachée')) {
        this.textContent = '✅ OK';
        this.style.background = '#10b981';
    } else {
        this.textContent = '⚠️ Visible';
        this.style.background = '#ef4444';
    }
    log('🔍 Vérification manuelle');
    setTimeout(() => {
        this.textContent = '🔍 Vérifier';
        this.style.background = '#10b981';
    }, 2000);
};
</script>
</body>
