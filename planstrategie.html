<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<title>Netubex SARL - Tableau de Bord Stratégique</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:#EFF3F8;font-family:'Inter',-apple-system,'Segoe UI',Roboto,sans-serif;padding:30px 24px;}
.dashboard{max-width:1300px;width:100%;margin:0 auto;}
.tabs-container{background:#FFFFFF;border-radius:28px 28px 24px 24px;box-shadow:0 20px 35px -12px rgba(0,0,0,0.12);overflow:hidden;}
.tabs-header{display:flex;flex-wrap:wrap;background:#F8FAFE;border-bottom:2px solid #E2E8F0;padding:0 8px;gap:4px;}
.tab-btn{background:transparent;border:none;padding:18px 28px;font-size:15px;font-weight:700;color:#4A5568;cursor:pointer;transition:0.2s;border-radius:20px 20px 0 0;display:flex;align-items:center;gap:10px;}
.tab-btn i{font-size:20px;}
.tab-btn.active{background:#FFFFFF;color:#1A4A5F;border-bottom:3px solid #1A4A5F;}
.tab-content{display:none;padding:28px 32px;background:#FFFFFF;}
.tab-content.active{display:block;}
.form-group{margin-bottom:22px;}
.form-row{display:flex;flex-wrap:wrap;gap:24px;margin-bottom:8px;}
.form-group.half{flex:1;min-width:220px;}
label{display:block;font-size:12px;font-weight:700;color:#2C5282;margin-bottom:8px;letter-spacing:0.3px;}
input,select,textarea{width:100%;padding:12px 16px;border:1.5px solid #E2E8F0;border-radius:14px;font-size:14px;font-family:inherit;background:#FFFFFF;transition:0.2s;}
input:focus,select:focus,textarea:focus{outline:none;border-color:#1A4A5F;box-shadow:0 0 0 3px rgba(26,74,95,0.12);}
textarea{resize:vertical;min-height:70px;}
.calendar-table{width:100%;border-collapse:collapse;margin-top:16px;font-size:13px;}
.calendar-table th,.calendar-table td{border:1px solid #CBD5E0;padding:12px 10px;vertical-align:top;text-align:left;}
.calendar-table th{background:#F1F5F9;font-weight:800;color:#1E4A6B;font-size:13px;}
.calendar-table td input,.calendar-table td select{width:100%;border:none;padding:6px 4px;background:transparent;font-size:12px;}
.calendar-table td input:focus,.calendar-table td select:focus{background:#F8FAFE;border:1px solid #1A4A5F;border-radius:8px;}
.badge-company{background:linear-gradient(135deg,#0B2B3B,#1A4A5F);border-radius:24px;padding:14px 28px;margin-bottom:24px;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;color:white;}
.badge-company h3{font-weight:700;display:flex;align-items:center;gap:8px;}
.btn-group{display:flex;justify-content:flex-end;gap:16px;margin-top:30px;padding-bottom:10px;}
.btn-pdf{background:#1A4A5F;color:white;border:none;padding:12px 28px;border-radius:40px;font-weight:700;cursor:pointer;display:inline-flex;align-items:center;gap:8px;transition:0.2s;}
.btn-reset{background:#F1F5F9;color:#2D3748;border:1px solid #CBD5E1;padding:12px 26px;border-radius:40px;font-weight:600;cursor:pointer;}
.btn-pdf:hover{transform:translateY(-2px);background:#0F3B4F;}
.footer{text-align:center;margin-top:24px;font-size:11px;color:#5A7184;}
@media print{.tabs-header,.btn-group,.btn-pdf,.btn-reset{display:none;}.tab-content{display:block !important;padding:0;}.dashboard{padding:0;margin:0;}.calendar-table td input,.calendar-table td select{border:none;background:transparent;}}
@media (max-width:700px){.tabs-header{overflow-x:auto;}.tab-btn{padding:12px 16px;font-size:13px;}.tab-content{padding:20px;}}
</style>
</head>
<body>
<div class="dashboard" id="dashboardContent">
<div class="badge-company">
<h3>📊 NETUBEX SARL</h3>
<span>Département Stratégie & Planification · Document officiel</span>
</div>
<div class="tabs-container">
<div class="tabs-header">
<button class="tab-btn active" data-tab="tab1">🏢 Infos Générales</button>
<button class="tab-btn" data-tab="tab2">📅 Planification 3 Mois</button>
<button class="tab-btn" data-tab="tab3">💰 Finance & Risques</button>
<button class="tab-btn" data-tab="tab4">📊 Suivi & Validation</button>
</div>
<form id="strategicForm">
<div id="tab1" class="tab-content active">
<div class="form-row"><div class="form-group half"><label>Nom entreprise</label><input type="text" value="NETUBEX SARL" readonly style="background:#F1F5F9;"></div>
<div class="form-group half"><label>Vision stratégique</label><input type="text" id="vision" placeholder="Ex: Digitalisation éducative"></div></div>
<div class="form-row"><div class="form-group half"><label>Objectif annuel lié</label><input type="text" id="objectifAnnuel"></div>
<div class="form-group half"><label>Pôle concerné</label><select id="pole"><option>PSI</option><option>PAFCO</option><option>PMGAJ</option><option>GLOBAL</option><option>RECHERCHE & INNOVATION</option><option>DÉVELOPPEMENT & PROJETS</option></select></div></div>
<div class="form-row"><div class="form-group half"><label>Année / Période</label><input type="text" id="periodeAnnee" placeholder="2025-2026"></div>
<div class="form-group half"><label>Semestre</label><select id="semestre"><option>S1 (Janvier - Juin)</option><option>S2 (Juillet - Décembre)</option></select></div></div>
<div class="form-row"><div class="form-group half"><label>Responsable du plan</label><input type="text" id="responsablePlan"></div>
<div class="form-group half"><label>Date création</label><input type="date" id="dateCreation"></div></div>
<div class="form-row"><div class="form-group half"><label>Date validation</label><input type="date" id="dateValidation"></div>
<div class="form-group half"><label>Statut global</label><select id="statutGlobal"><option>Brouillon</option><option>En attente</option><option>Validé</option><option>Archivé</option></select></div></div>
</div>
<div id="tab2" class="tab-content">
<div style="overflow-x:auto;">
<table class="calendar-table" id="calendarTable">
<thead><tr><th>Mois</th><th>Titre<br>personnalisé</th><th>Période</th><th>Objectif principal</th><th>Actions clés</th><th>KPI</th><th>Cible</th><th>Responsable</th><th>Pôle</th><th>Priorité</th><th>Statut</th></tr></thead>
<tbody>
<tr><td><strong>MOIS 1</strong></td><td><input type="text" id="titreM1" placeholder="Ex: Lancement"></td><td><input type="text" id="periodeM1" placeholder="01 Juin → 30 Juin"></td><td><input type="text" id="objectifM1"></td><td><textarea rows="1" id="actionsM1" style="min-height:40px;"></textarea></td><td><input type="text" id="kpiM1"></td><td><input type="text" id="cibleM1"></td><td><input type="text" id="respM1"></td><td><select id="poleExecM1"><option>PSI</option><option>PAFCO</option><option>PMGAJ</option><option>GLOBAL</option></select></td><td><select id="prioriteM1"><option>Haute</option><option>Moyenne</option><option>Basse</option></select></td><td><select id="statutM1"><option>À venir</option><option>En cours</option><option>Terminé</option></select></td></tr>
<tr><td><strong>MOIS 2</strong></td><td><input type="text" id="titreM2" placeholder="Ex: Exécution"></td><td><input type="text" id="periodeM2" placeholder="01 Juillet → 31 Juillet"></td><td><input type="text" id="objectifM2"></td><td><textarea rows="1" id="actionsM2" style="min-height:40px;"></textarea></td><td><input type="text" id="kpiM2"></td><td><input type="text" id="cibleM2"></td><td><input type="text" id="respM2"></td><td><select id="poleExecM2"><option>PSI</option><option>PAFCO</option><option>PMGAJ</option><option>GLOBAL</option></select></td><td><select id="prioriteM2"><option>Haute</option><option>Moyenne</option><option>Basse</option></select></td><td><select id="statutM2"><option>À venir</option><option>En cours</option><option>Terminé</option></select></td></tr>
<tr><td><strong>MOIS 3</strong></td><td><input type="text" id="titreM3" placeholder="Ex: Clôture"></td><td><input type="text" id="periodeM3" placeholder="01 Août → 31 Août"></td><td><input type="text" id="objectifM3"></td><td><textarea rows="1" id="actionsM3" style="min-height:40px;"></textarea></td><td><input type="text" id="kpiM3"></td><td><input type="text" id="cibleM3"></td><td><input type="text" id="respM3"></td><td><select id="poleExecM3"><option>PSI</option><option>PAFCO</option><option>PMGAJ</option><option>GLOBAL</option></select></td><td><select id="prioriteM3"><option>Haute</option><option>Moyenne</option><option>Basse</option></select></td><td><select id="statutM3"><option>À venir</option><option>En cours</option><option>Terminé</option></select></td></tr>
</tbody>
</table>
</div>
</div>
<div id="tab3" class="tab-content">
<div class="form-row"><div class="form-group half"><label>Budget total semestre (USD/CDF)</label><input type="text" id="budgetTotal"></div>
<div class="form-group half"><label>Coût mensuel estimé</label><input type="text" id="coutMensuel"></div></div>
<div class="form-row"><div class="form-group half"><label>Source financement</label><select id="sourceFinance"><option>Interne</option><option>Partenaires</option><option>Mixte</option><option>Subvention</option></select></div>
<div class="form-group half"><label>Rentabilité attendue (ROI)</label><input type="text" id="roi"></div></div>
<div class="form-row"><div class="form-group half"><label>Risques identifiés (max 3)</label><textarea rows="2" id="risques" placeholder="1. Risque technique&#10;2. Risque financier"></textarea></div>
<div class="form-group half"><label>Plan de mitigation</label><textarea rows="2" id="mitigation" placeholder="Actions correctives"></textarea></div></div>
<div class="form-row"><div class="form-group half"><label>Probabilité (R1,R2,R3)</label><input type="text" id="probabilite" placeholder="Élevée / Moyenne / Faible"></div>
<div class="form-group half"><label>Impact (R1,R2,R3)</label><input type="text" id="impact" placeholder="Critique / Moyen / Faible"></div></div>
</div>
<div id="tab4" class="tab-content">
<div class="form-row"><div class="form-group half"><label>Taux avancement global</label><select id="avancement"><option>0%</option><option>25%</option><option>50%</option><option>75%</option><option>100%</option></select></div>
<div class="form-group half"><label>Fréquence suivi</label><select id="frequence"><option>Hebdomadaire</option><option>Mensuel</option><option>Trimestriel</option></select></div></div>
<div class="form-row"><div class="form-group half"><label>Écart objectifs/résultats</label><input type="text" id="ecart"></div>
<div class="form-group half"><label>Actions correctives</label><textarea rows="1" id="correctives"></textarea></div></div>
<div class="form-row"><div class="form-group half"><label>Niveau exécution</label><select id="niveauExec"><option>Faible</option><option>Moyen</option><option>Bon</option><option>Excellent</option></select></div>
<div class="form-group half"><label>Commentaires direction</label><textarea rows="1" id="commentaires"></textarea></div></div>
<div class="form-row"><div class="form-group half"><label>Validé par (Nom & titre)</label><input type="text" id="validePar"></div>
<div class="form-group half"><label>Signature électronique</label><input type="text" id="signature"></div></div>
<div class="form-row"><div class="form-group half"><label>Date validation finale</label><input type="date" id="dateValidationFinale"></div>
<div class="form-group half"><label>Cachet Netubex SARL</label><input type="text" value="NETUBEX SARL - Stratégie" readonly style="background:#F1F5F9;"></div></div>
</div>
<div class="btn-group">
<button type="button" class="btn-reset" id="resetBtn">⟳ Réinitialiser</button>
<button type="button" class="btn-pdf" id="pdfBtn">📄 PDF Professionnel (1 page A4)</button>
</div>
</form>
</div>
<div class="footer">Netubex SARL · Département Stratégie & Planification · Document confidentiel</div>
</div>
<script>
(function() {
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => {
if (e.key === 'F12' || (e.ctrlKey && e.shiftKey && (e.key === 'I' || e.key === 'J' || e.key === 'C')) || (e.ctrlKey && e.key === 'u')) {
e.preventDefault();
}
});
})();
const tabs = document.querySelectorAll('.tab-btn');
const contents = document.querySelectorAll('.tab-content');
tabs.forEach(btn => {
btn.addEventListener('click', () => {
const tabId = btn.getAttribute('data-tab');
tabs.forEach(b => b.classList.remove('active'));
contents.forEach(c => c.classList.remove('active'));
btn.classList.add('active');
document.getElementById(tabId).classList.add('active');
});
});
function saveFormData() {
const inputs = document.querySelectorAll('#strategicForm input, #strategicForm select, #strategicForm textarea');
const data = {};
inputs.forEach(el => { if(el.id) data[el.id] = el.value; });
localStorage.setItem('stratData', JSON.stringify(data));
}
function loadFormData() {
const saved = localStorage.getItem('stratData');
if(!saved) return;
const data = JSON.parse(saved);
Object.keys(data).forEach(id => {
const el = document.getElementById(id);
if(el) el.value = data[id];
});
}
function resetForm() {
if(confirm('Réinitialiser tout le formulaire ?')) {
const form = document.getElementById('strategicForm');
form.reset();
document.querySelectorAll('input[readonly]').forEach(inp => { if(inp.value.includes('NETUBEX')) inp.value = inp.value; });
localStorage.removeItem('stratData');
document.getElementById('dateCreation').valueAsDate = new Date();
document.getElementById('dateValidationFinale').valueAsDate = new Date();
}
}
document.getElementById('strategicForm').addEventListener('input', saveFormData);
document.getElementById('resetBtn').addEventListener('click', resetForm);
document.getElementById('pdfBtn').addEventListener('click', function() {
const element = document.getElementById('dashboardContent');
const originalPrintStyle = document.createElement('style');
originalPrintStyle.id = 'print-fix-style';
originalPrintStyle.innerHTML = `@media print { body { margin:0; padding:0; } .tabs-header, .btn-group, .btn-pdf, .btn-reset, .badge-company { display: none !important; } .tab-content { display: block !important; padding: 4px !important; } .dashboard { margin:0; padding:0; } .calendar-table td input, .calendar-table td select { border: none !important; background: transparent !important; font-size: 9pt; } .calendar-table th { font-size: 9pt; } .form-group input, .form-group select, .form-group textarea { border: none !important; background: transparent !important; } }`;
document.head.appendChild(originalPrintStyle);
const opt = {
margin: [0.3, 0.3, 0.3, 0.3],
filename: 'Netubex_Planification_Strategique.pdf',
image: { type: 'jpeg', quality: 0.98 },
html2canvas: { scale: 2, letterRendering: true, useCORS: true, logging: false, windowWidth: element.scrollWidth },
jsPDF: { unit: 'in', format: 'a4', orientation: 'landscape' }
};
html2pdf().set(opt).from(element).save().then(() => {
document.getElementById('print-fix-style')?.remove();
});
});
loadFormData();
document.getElementById('dateCreation').valueAsDate = new Date();
document.getElementById('dateValidationFinale').valueAsDate = new Date();
document.getElementById('dateValidation').valueAsDate = new Date();
</script>
</body>
</html>
