<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter Établissement</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"></script>
    <style>
        body {
            background: #0a0e1a;
            color: white;
            font-family: system-ui;
            padding: 20px;
            margin: 0;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 20px;
        }
        pre {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            overflow-x: auto;
            font-size: 12px;
        }
        .success { 
            color: #10b981; 
            font-weight: bold;
        }
        .error { 
            color: #ef4444; 
            font-weight: bold;
        }
        .info {
            background: #1e3a5f;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <h1>🏫 Ajout établissement</h1>
    <button onclick="ajouterEcole()">📚 AJOUTER COMPLEXE SCOLAIRE BERNISSE</button>
    <div id="status">⚠️ Cliquez sur le bouton pour ajouter l'école</div>
    <pre id="resultat"></pre>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
            authDomain: "netubexmoney.firebaseapp.com",
            projectId: "netubexmoney",
            storageBucket: "netubexmoney.firebasestorage.app",
            messagingSenderId: "856592608176",
            appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
        };

        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        async function ajouterEcole() {
            const statusDiv = document.getElementById('status');
            const resultatDiv = document.getElementById('resultat');
            
            statusDiv.innerHTML = "⏳ Ajout en cours...";
            statusDiv.style.color = "#f59e0b";
            resultatDiv.textContent = "";
            
            try {
                const ecoleData = {
                    nom: "Complexe Scolaire Bernisse",
                    ville: "Kasumbalesa",
                    prefixe: "HK-A001",
                    commune: "Kasumbalesa",
                    province: "Haut-Katanga",
                    pays: "République Démocratique du Congo",
                    nbProfesseurs: 0,
                    nbFiches: 0,
                    nbClients: 0,
                    directeurNom: "",
                    dateCreation: new Date(),
                    anneeScolaire: "2026-2027",
                    contratValide: true
                };
                
                // Ajout à Firebase (crée automatiquement la collection et le document)
                await db.collection('ecoles').doc('HK-A001').set(ecoleData);
                
                statusDiv.innerHTML = "✅ Établissement ajouté avec SUCCÈS !";
                statusDiv.style.color = "#10b981";
                
                // Vérification
                const docVerif = await db.collection('ecoles').doc('HK-A001').get();
                if (docVerif.exists) {
                    resultatDiv.textContent = "📚 DONNÉES ENREGISTRÉES :\n\n" + 
                        JSON.stringify(docVerif.data(), null, 2);
                } else {
                    resultatDiv.textContent = "❌ Erreur : L'établissement n'a pas été trouvé";
                }
                
            } catch (error) {
                statusDiv.innerHTML = "❌ ERREUR : " + error.message;
                statusDiv.style.color = "#ef4444";
                resultatDiv.textContent = "Détail : " + error.message;
                console.error(error);
            }
        }
    </script>
</body>
</html>
