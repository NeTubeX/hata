<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ajouter Établissement</title>
    <style>
        body {
            background: #0a0e1a;
            color: white;
            font-family: system-ui;
            padding: 20px;
            margin: 0;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 40px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-bottom: 20px;
        }
        pre {
            background: #1e293b;
            padding: 15px;
            border-radius: 12px;
            overflow-x: auto;
            font-size: 12px;
        }
        .success { color: #10b981; font-weight: bold; }
        .error { color: #ef4444; font-weight: bold; }
        .loading { color: #f59e0b; }
    </style>
</head>
<body>
    <h1>🏫 Ajout établissement</h1>
    <button id="ajouterBtn" onclick="ajouterEcole()">📚 AJOUTER COMPLEXE SCOLAIRE BERNISSE</button>
    <div id="status">⚠️ Cliquez sur le bouton pour ajouter l'école</div>
    <pre id="resultat"></pre>

    <script>
        // Attendre que la page soit complètement chargée
        document.addEventListener('DOMContentLoaded', function() {
            console.log("Page chargée, initialisation Firebase...");
            
            // Initialisation Firebase
            const firebaseConfig = {
                apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
                authDomain: "netubexmoney.firebaseapp.com",
                projectId: "netubexmoney",
                storageBucket: "netubexmoney.firebasestorage.app",
                messagingSenderId: "856592608176",
                appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
            };

            // Initialiser Firebase s'il n'est pas déjà initialisé
            if (!firebase.apps.length) {
                firebase.initializeApp(firebaseConfig);
                console.log("Firebase initialisé");
            } else {
                console.log("Firebase déjà initialisé");
            }
            
            window.db = firebase.firestore();
            console.log("Firestore prêt");
            document.getElementById('status').innerHTML = "✅ Firebase prêt ! Cliquez sur le bouton";
        });

        // Fonction pour ajouter l'école
        window.ajouterEcole = async function() {
            const statusDiv = document.getElementById('status');
            const resultatDiv = document.getElementById('resultat');
            
            // Vérifier que db existe
            if (!window.db) {
                statusDiv.innerHTML = "❌ Firebase non initialisé. Rechargez la page.";
                statusDiv.className = "error";
                return;
            }
            
            statusDiv.innerHTML = "⏳ Ajout en cours...";
            statusDiv.className = "loading";
            resultatDiv.textContent = "";
            
            try {
                const ecoleData = {
                    nom: "Complexe Scolaire Bernisse",
                    ville: "Kasumbalesa",
                    prefixe: "HK-A001",
                    commune: "Kasumbalesa",
                    province: "Haut-Katanga",
                    pays: "République Démocratique du Congo",
                    nbProfesseurs: 0,
                    nbFiches: 0,
                    nbClients: 0,
                    directeurNom: "",
                    dateCreation: new Date(),
                    anneeScolaire: "2026-2027",
                    contratValide: true
                };
                
                console.log("Tentative d'ajout...");
                
                // Ajout à Firebase
                await window.db.collection('ecoles').doc('HK-A001').set(ecoleData);
                
                console.log("Ajout réussi !");
                statusDiv.innerHTML = "✅ Établissement ajouté avec SUCCÈS !";
                statusDiv.className = "success";
                
                // Vérification
                const docVerif = await window.db.collection('ecoles').doc('HK-A001').get();
                if (docVerif.exists) {
                    resultatDiv.textContent = "📚 DONNÉES ENREGISTRÉES :\n\n" + 
                        JSON.stringify(docVerif.data(), null, 2);
                } else {
                    resultatDiv.textContent = "❌ Erreur : L'établissement n'a pas été trouvé";
                }
                
            } catch (error) {
                console.error("Erreur détaillée:", error);
                statusDiv.innerHTML = "❌ ERREUR : " + error.message;
                statusDiv.className = "error";
                resultatDiv.textContent = "Détail : " + error.message + "\n\nCode: " + (error.code || 'inconnu');
            }
        };
    </script>
</body>
</html>
