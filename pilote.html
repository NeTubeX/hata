<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, doc, getDoc, getDocs, query, where, orderBy, limit, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
const firebaseConfig = {apiKey:"AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",authDomain:"netubexmoney.firebaseapp.com",projectId:"netubexmoney",storageBucket:"netubexmoney.firebasestorage.app",messagingSenderId:"856592608176",appId:"1:856592608176:web:69f9df9cfd4f8c28630475"};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);
window.db = db;
window.collection = collection;
window.addDoc = addDoc;
window.doc = doc;
window.getDoc = getDoc;
window.getDocs = getDocs;
window.query = query;
window.where = where;
window.orderBy = orderBy;
window.limit = limit;
window.updateDoc = updateDoc;
window.deleteDoc = deleteDoc;
const RAISONS_ABSENCE = ["Obligations familiales","Maladie","Absence non justifiée","Déplacement/voyage","Abandon","Problème de santé","Fatigue","Rendez-vous","Deuil","Engagement scolaire"];
const NETUBERS = [{code:"MA-NX-S1-ZA-01"},{code:"MA-NX-S1-ZA-02"},{code:"MA-NX-S1-ZA-03"}];
let currentStep = 0, responses = {}, questions = [], waitingYesNo = false, typewriterTimeout = null, formulaireComplete = false;
let questionText, questionMeta, inputRow, choiceRow, answerSelect, answerNumber, submitBtn, yesBtn, noBtn;
let progressFill, stepCounterSpan, prevBtn, resetBtn, saveStatus, popupOverlay, popupTitle, popupMessageDiv;
let popupBtnLeft, popupBtnRight, sendReportBtn, questionCardDiv;
function escapeHtml(t){if(!t)return '';return String(t).replace(/[&<>]/g,function(m){if(m==='&')return '&amp;';if(m==='<')return '&lt;';if(m==='>')return '&gt;';return m;});}
function formatDate(dateValue){if(!dateValue)return"Date inconnue";try{let d;if(typeof dateValue==='string'){d=new Date(dateValue);}else if(dateValue.toDate){d=dateValue.toDate();}else{d=new Date(dateValue);}if(isNaN(d.getTime()))return"Date inconnue";return d.toLocaleDateString('fr-FR',{day:'numeric',month:'long',year:'numeric'})+' '+d.toLocaleTimeString('fr-FR',{hour:'2-digit',minute:'2-digit'});}catch(e){return"Date inconnue";}}
function showPopup(t,m,l,r,onC,onCa,rc='primary',rd=false){popupTitle.textContent=t;popupMessageDiv.innerHTML=m;popupBtnLeft.textContent=l;popupBtnRight.textContent=r;popupBtnRight.className=`popup-btn ${rc}`;if(rd)popupBtnRight.disabled=true;else popupBtnRight.disabled=false;popupOverlay.classList.add('active');popupBtnRight.onclick=()=>{if(popupBtnRight.disabled)return;popupOverlay.classList.remove('active');if(onC)onC();};popupBtnLeft.onclick=()=>{popupOverlay.classList.remove('active');if(onCa)onCa();};}
function saveLocal(){localStorage.setItem('pgco_rapport',JSON.stringify({responses,currentStep}));saveStatus.innerHTML='💾 OK';setTimeout(()=>saveStatus.innerHTML='💾 Auto',1200);}
function buildQuestions(){const q=[];let n=0;q.push({num:n++,type:"choice",field:"responsable",meta:"Identification",text:"Qui remplit le rapport aujourd'hui ?",options:["Madame Ursule","Madame Chancelle"]});for(let nu of NETUBERS){q.push({num:n++,type:"yesno",field:`${nu.code}_present`,meta:nu.code,text:`${nu.code} : Était-il présent aujourd'hui ?`});q.push({num:n++,type:"select",field:`${nu.code}_raisonAbsence`,meta:nu.code,text:`${nu.code} : Raison de l'absence ? (si absent)`,options:RAISONS_ABSENCE.map(r=>`<option value="${r}">${r}</option>`).join('')});const questionsPresent=[{type:"select",field:`${nu.code}_objMensuel`,text:`${nu.code} : Quel est son objectif mensuel ?`,options:[...Array(16).keys()].map(i=>`<option value="${i}">${i}</option>`).join('')},{type:"select",field:`${nu.code}_objAtteint`,text:`${nu.code} : Combien d'objectifs a-t-il atteints aujourd'hui ?`,options:[...Array(16).keys()].map(i=>`<option value="${i}">${i}</option>`).join('')},{type:"number",field:`${nu.code}_nbNiveaux`,text:`${nu.code} : Quel est le nombre de niveaux/événements ou mètres ?`,min:0},{type:"number",field:`${nu.code}_nbNiveauxAtteints`,text:`${nu.code} : Combien de niveaux/événements ou mètres a-t-il atteints ?`,min:0},{type:"number",field:`${nu.code}_pointsPrec`,text:`${nu.code} : Combien de points avait-il précédemment ?`,min:0},{type:"number",field:`${nu.code}_pointsJour`,text:`${nu.code} : Combien de points a-t-il aujourd'hui ?`,min:0},{type:"number",field:`${nu.code}_tempsPrec`,text:`${nu.code} : Quel temps avait-il précédemment (en minutes) ?`,min:0},{type:"number",field:`${nu.code}_tempsJour`,text:`${nu.code} : Quel temps a-t-il aujourd'hui (en minutes) ?`,min:0}];for(let pq of questionsPresent){q.push({num:n++,type:pq.type,field:pq.field,meta:nu.code,text:pq.text,options:pq.options,min:pq.min,requiresPresent:true});}}
q.push({num:n++,type:"text",field:"referenceNumber",meta:"Rapport",text:"Numéro de rapport (3 derniers chiffres personnalisables)",placeholder:"Ex: 001"});return q;}
function shouldShowQuestion(q){if(!q.requiresPresent)return true;const codeMatch=q.field.match(/(MA-NX-S1-ZA-\d{2})/);if(!codeMatch)return true;const netuberCode=codeMatch[1];const presenceResponse=responses[`${netuberCode}_present`];return presenceResponse==="OUI";}
function updateCardColor(){if(currentStep>=questions.length){questionCardDiv.classList.add('default-card');return;}
const q=questions[currentStep];if(!q)return;const idx=getCurrentNetuberIndex();questionCardDiv.classList.remove('netuber-0','netuber-1','netuber-2','default-card');if(idx>=0&&idx<NETUBERS.length)questionCardDiv.classList.add(`netuber-${idx}`);else questionCardDiv.classList.add('default-card');}
function getCurrentNetuberIndex(){if(currentStep>=questions.length)return-1;const q=questions[currentStep];if(!q||!q.field)return-1;for(let i=0;i<NETUBERS.length;i++)if(q.field.includes(NETUBERS[i].code))return i;return-1;}
function typewriterEffect(el,txt,speed=25,cb){if(typewriterTimeout)clearTimeout(typewriterTimeout);el.innerHTML='';let i=0;function type(){if(i<txt.length){el.innerHTML=txt.substring(0,i+1);i++;typewriterTimeout=setTimeout(type,speed);}else{if(cb)cb();}}
type();}
function findNextValidStep(currentStep){let next=currentStep+1;while(next<questions.length){if(shouldShowQuestion(questions[next]))return next;next++;}
return questions.length;}
function findPrevValidStep(currentStep){let prev=currentStep-1;while(prev>=0){if(shouldShowQuestion(questions[prev]))return prev;prev--;}
return-1;}
function displayCurrent(){updateCardColor();if(currentStep>=questions.length){formulaireComplete=true;sendReportBtn.classList.remove('hidden');typewriterEffect(questionText,"✅ Formulaire terminé. Cliquez sur 'Envoyer' pour transmettre le rapport.",25);inputRow.classList.add('hidden');choiceRow.classList.add('hidden');return;}
formulaireComplete=false;sendReportBtn.classList.add('hidden');if(!shouldShowQuestion(questions[currentStep])){currentStep=findNextValidStep(currentStep);displayCurrent();return;}
const q=questions[currentStep];waitingYesNo=false;inputRow.classList.add('hidden');choiceRow.classList.add('hidden');answerSelect.style.display='none';answerNumber.style.display='none';questionMeta.innerHTML=`<span class="question-num">#${q.num+1}</span> ${q.meta}`;let displayText=q.text;if(q.field.includes('_raisonAbsence')){const netuberCode=q.field.replace('_raisonAbsence','');if(responses[`${netuberCode}_present`]==='OUI'){displayText=`${netuberCode} : Cette question n'est pas applicable (présent). Cliquez sur Suivant.`;}}
if(q.type==="choice"){choiceRow.classList.remove('hidden');waitingYesNo=true;yesBtn.textContent=q.options[0];noBtn.textContent=q.options[1];typewriterEffect(questionText,displayText,25);}else if(q.type==="yesno"){choiceRow.classList.remove('hidden');waitingYesNo=true;yesBtn.textContent="✔ Oui";noBtn.textContent="✘ Non";typewriterEffect(questionText,displayText,25);}else if(q.type==="select"){inputRow.classList.remove('hidden');answerSelect.style.display='block';answerNumber.style.display='none';answerSelect.innerHTML=q.options;if(responses[q.field])answerSelect.value=responses[q.field];else answerSelect.value="0";typewriterEffect(questionText,displayText,25);}else if(q.type==="number"){inputRow.classList.remove('hidden');answerNumber.style.display='block';answerSelect.style.display='none';answerNumber.type='number';answerNumber.min=q.min||0;answerNumber.value=responses[q.field]||'';answerNumber.placeholder=q.placeholder||"Saisir un nombre";typewriterEffect(questionText,displayText,25);}else if(q.type==="text"){inputRow.classList.remove('hidden');answerNumber.style.display='block';answerSelect.style.display='none';answerNumber.type='text';answerNumber.value=responses[q.field]||'';answerNumber.placeholder=q.placeholder||"Saisir...";typewriterEffect(questionText,displayText,25);}
const totalVisibleQuestions=questions.filter((_,idx)=>{if(idx===0)return true;const qTemp=questions[idx];if(qTemp.requiresPresent){const codeMatch=qTemp.field.match(/(MA-NX-S1-ZA-\d{2})/);if(codeMatch)return responses[`${codeMatch[1]}_present`]==="OUI";}
return true;}).length;const currentVisibleIndex=questions.filter((_,idx)=>{if(idx>=currentStep)return false;const qTemp=questions[idx];if(qTemp.requiresPresent){const codeMatch=qTemp.field.match(/(MA-NX-S1-ZA-\d{2})/);if(codeMatch)return responses[`${codeMatch[1]}_present`]==="OUI";}
return true;}).length;progressFill.style.width=`${((currentVisibleIndex+1)/totalVisibleQuestions)*100}%`;stepCounterSpan.innerText=`${currentVisibleIndex+1}/${totalVisibleQuestions}`;const prevValid=findPrevValidStep(currentStep);prevBtn.classList.toggle('hidden',prevValid===-1);}
function handleResponse(val){if(currentStep>=questions.length)return;const q=questions[currentStep];responses[q.field]=val;if(q.field.includes('_present')){if(val==='NON'){currentStep++;displayCurrent();autoSave();return;}else if(val==='OUI'){currentStep++;displayCurrent();autoSave();return;}}
if(q.field.includes('_raisonAbsence')){const netuberCode=q.field.replace('_raisonAbsence','');if(responses[`${netuberCode}_present`]==='OUI'){delete responses[q.field];currentStep=findNextValidStep(currentStep);displayCurrent();autoSave();return;}}
let nextStep=findNextValidStep(currentStep);currentStep=nextStep;displayCurrent();autoSave();}
function prevQ(){const prevValid=findPrevValidStep(currentStep);if(prevValid!==-1){currentStep=prevValid;displayCurrent();}}
function validateCurrent(){if(waitingYesNo||currentStep>=questions.length)return;const q=questions[currentStep];if(q.field.includes('_raisonAbsence')){const netuberCode=q.field.replace('_raisonAbsence','');if(responses[`${netuberCode}_present`]==='OUI'){let nextStep=findNextValidStep(currentStep);currentStep=nextStep;displayCurrent();return;}}
if(q.type==="select"){handleResponse(answerSelect.value);}else if(q.type==="number"){const val=answerNumber.value.trim();if(val===''){showPopup("⚠️","Veuillez saisir une réponse","Fermer","",()=>{},()=>{});return;}
if(isNaN(parseFloat(val))){showPopup("⚠️","Nombre valide requis","Fermer","",()=>{},()=>{});return;}
handleResponse(val);}else if(q.type==="text"){const val=answerNumber.value.trim();if(val===''){showPopup("⚠️","Champ requis","Fermer","",()=>{},()=>{});return;}
handleResponse(val);}}
function defaultYes(){if(waitingYesNo&&currentStep<questions.length){const q=questions[currentStep];if(q.type==="choice")handleResponse(yesBtn.textContent);else handleResponse("OUI");}}
function defaultNo(){if(waitingYesNo&&currentStep<questions.length){const q=questions[currentStep];if(q.type==="choice")handleResponse(noBtn.textContent);else handleResponse("NON");}}
function resetAllSilently(){responses={};currentStep=0;formulaireComplete=false;sendReportBtn.classList.add('hidden');localStorage.removeItem('pgco_rapport');questions=buildQuestions();displayCurrent();}
function resetAll(){showPopup("Confirmation","⚠️ Tout recommencer ?","Annuler","Confirmer",()=>{resetAllSilently();showPopup("Succès","Nouveau rapport initialisé","OK","",()=>{},()=>{});},()=>{});}
function getFullReference(){let num=responses.referenceNumber||"001";num=num.toString().padStart(3,'0').slice(0,3);return`RPT-BLTJRNL-2026-${num}`;}
async function performSendToFirebase(){const btn=sendReportBtn;const orig=btn.textContent;btn.textContent="⏳ Envoi...";btn.disabled=true;try{let totalPtsP=0,totalPtsJ=0,totalTempsP=0,totalTempsJ=0;const netubersData=[];for(let n of NETUBERS){const present=responses[`${n.code}_present`]==='OUI'?'Présent':'Absent';const raisonAbsence=responses[`${n.code}_raisonAbsence`]||"";const objM=parseInt(responses[`${n.code}_objMensuel`])||0;const objA=parseInt(responses[`${n.code}_objAtteint`])||0;const nbN=parseFloat(responses[`${n.code}_nbNiveaux`])||0;const nbA=parseFloat(responses[`${n.code}_nbNiveauxAtteints`])||0;const ptsP=parseFloat(responses[`${n.code}_pointsPrec`])||0;const ptsJ=parseFloat(responses[`${n.code}_pointsJour`])||0;const tempsP=parseFloat(responses[`${n.code}_tempsPrec`])||0;const tempsJ=parseFloat(responses[`${n.code}_tempsJour`])||0;if(present==='Présent'){totalPtsP+=ptsP;totalPtsJ+=ptsJ;totalTempsP+=tempsP;totalTempsJ+=tempsJ;}
netubersData.push({code:n.code,presence:present,raisonAbsence:raisonAbsence,objectifMensuel:objM,objectifAtteint:objA,nbNiveaux:nbN,nbNiveauxAtteints:nbA,pointsPrecedents:ptsP,pointsJour:ptsJ,tempsPrecedent:tempsP,tempsJour:tempsJ});}
const currentRef=getFullReference();const reportData={type:"pgco_report",responsable:responses.responsable||"Non spécifié",zone:"ORG-NX-S1",reference:currentRef,date:new Date().toLocaleDateString('fr-FR'),heure:new Date().toLocaleTimeString('fr-FR'),totalPointsPrecedents:totalPtsP,totalPointsJour:totalPtsJ,totalTempsPrecedent:totalTempsP,totalTempsJour:totalTempsJ,netubers:netubersData,status:"non_traite",createdAt:new Date().toISOString()};const reportsRef=collection(db,"reports");await addDoc(reportsRef,reportData);const confirmationMsg=`Expéditeur: ${responses.responsable||"Non spécifié"}\nRéférence: ${currentRef}\n\n✅ Rapport reçu avec succès`;showPopup("✅ RAPPORT TRANSMIS",confirmationMsg,"Fermer","",()=>{resetAllSilently();},()=>{},'primary');}catch(e){showPopup("❌ ERREUR",`Erreur: ${e.message}`,"Fermer","",()=>{},()=>{},'primary');}finally{btn.textContent=orig;btn.disabled=false;}}
function sendReportToFirebase(){if(!formulaireComplete){showPopup("⚠️","Veuillez compléter toutes les questions","Fermer","",()=>{},()=>{});return;}
let missing=[];for(let n of NETUBERS){if(responses[`${n.code}_present`]==='OUI'){if(!responses[`${n.code}_objMensuel`]&&responses[`${n.code}_objMensuel`]!==0)missing.push(`${n.code} - Objectif mensuel`);if(!responses[`${n.code}_objAtteint`]&&responses[`${n.code}_objAtteint`]!==0)missing.push(`${n.code} - Objectif atteint`);if(!responses[`${n.code}_nbNiveaux`]&&responses[`${n.code}_nbNiveaux`]!==0)missing.push(`${n.code} - Nb niveaux`);if(!responses[`${n.code}_nbNiveauxAtteints`]&&responses[`${n.code}_nbNiveauxAtteints`]!==0)missing.push(`${n.code} - Nb niveaux atteints`);if(!responses[`${n.code}_pointsPrec`]&&responses[`${n.code}_pointsPrec`]!==0)missing.push(`${n.code} - Points précédents`);if(!responses[`${n.code}_pointsJour`]&&responses[`${n.code}_pointsJour`]!==0)missing.push(`${n.code} - Points jour`);if(!responses[`${n.code}_tempsPrec`]&&responses[`${n.code}_tempsPrec`]!==0)missing.push(`${n.code} - Temps précédent`);if(!responses[`${n.code}_tempsJour`]&&responses[`${n.code}_tempsJour`]!==0)missing.push(`${n.code} - Temps jour`);}}
if(!responses.referenceNumber||responses.referenceNumber.trim()==='')missing.push("Numéro de rapport");if(missing.length>0){showPopup("⚠️ Champs manquants",missing.join("\n"),"Fermer","",()=>{},()=>{});return;}
performSendToFirebase();}
function autoSave(){saveLocal();}
function handleLogout(){showPopup("🔓 Déconnexion","Êtes-vous sûr de vouloir vous déconnecter ?","Annuler","Se déconnecter",()=>{signOut(auth).then(()=>{window.location.href="login.html";});},()=>{},'primary');}
function initApp(){questionText=document.getElementById('questionText');questionMeta=document.getElementById('questionMeta');inputRow=document.getElementById('inputRow');choiceRow=document.getElementById('choiceRow');answerSelect=document.getElementById('answerSelect');answerNumber=document.getElementById('answerNumber');submitBtn=document.getElementById('submitBtn');yesBtn=document.getElementById('yesBtn');noBtn=document.getElementById('noBtn');progressFill=document.getElementById('progressFill');stepCounterSpan=document.getElementById('stepCounter');prevBtn=document.getElementById('prevBtn');resetBtn=document.getElementById('resetBtn');saveStatus=document.getElementById('saveStatus');popupOverlay=document.getElementById('popupOverlay');popupTitle=document.getElementById('popupTitle');popupMessageDiv=document.getElementById('popupMessage');popupBtnLeft=document.getElementById('popupBtnLeft');popupBtnRight=document.getElementById('popupBtnRight');sendReportBtn=document.getElementById('sendReportBtn');questionCardDiv=document.getElementById('questionCard');yesBtn.onclick=defaultYes;noBtn.onclick=defaultNo;submitBtn.onclick=validateCurrent;prevBtn.onclick=prevQ;resetBtn.onclick=resetAll;sendReportBtn.onclick=sendReportToFirebase;questions=buildQuestions();displayCurrent();const saved=localStorage.getItem('pgco_rapport');if(saved){try{const d=JSON.parse(saved);if(d.responses&&Object.keys(d.responses).length>0){responses=d.responses;currentStep=d.currentStep||0;displayCurrent();}}catch(e){}}}
onAuthStateChanged(auth,(user)=>{if(!user){window.location.href="login.html";}else{const userEmailSpan=document.getElementById("userEmail");if(userEmailSpan)userEmailSpan.textContent=user.email;initApp();}});
const logoutBtn=document.getElementById("logoutBtn");if(logoutBtn){logoutBtn.onclick=handleLogout;}
</script>

.reset-btn{background:linear-gradient(145deg,#e74c3c,#c0392b);color:#fff;}
.hidden{display:none;}
.popup-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.8);backdrop-filter:blur(5px);z-index:1000;display:flex;align-items:center;justify-content:center;visibility:hidden;}
.popup-overlay.active{visibility:visible;}
.popup-card{background:linear-gradient(145deg,#1e3a5f,#0f2d45);border-radius:28px;width:92%;max-width:500px;padding:24px 20px;text-align:center;border-top:5px solid #facc15;box-shadow:0 5px 30px rgba(0,0,0,0.5);}
.popup-title{font-size:1.2rem;font-weight:800;color:#facc15;margin-bottom:12px;}
.popup-message{font-size:0.9rem;margin-bottom:20px;color:#e0f2fe;line-height:1.6;white-space:pre-line;}
.popup-buttons{display:flex;gap:12px;justify-content:center;}
.popup-btn{padding:10px 22px;border-radius:60px;font-weight:700;font-size:0.8rem;border:none;cursor:pointer;}
.popup-btn.secondary{background:#2d4e73;color:#fff;}
.popup-btn.primary{background:#27ae60;color:#fff;}
footer{text-align:center;font-size:0.6rem;color:#5f748d;margin-top:16px;}
.send-btn-special{background:linear-gradient(145deg,#e67e22,#d35400);color:#fff;margin-top:16px;}
.send-btn-special.hidden{display:none;}
</style>
</head>
<body>
<div class="app-container">
    <div class="top-bar">
        <button id="formIconBtn" class="form-icon-btn">
            <i class="fas fa-edit"></i>
            <span>NeTubeX</span>
        </button>
        <div class="user-info">
            <i class="fas fa-envelope"></i>
            <span id="userEmail">Chargement...</span>
            <button id="logoutBtn" class="logout-btn" title="Déconnexion"><i class="fas fa-sign-out-alt"></i></button>
        </div>
    </div>
    <div class="main-title">
        <h1>📋 BULLETIN JOURNALIER</h1>
    </div>
    <div class="tabs">
        <button class="tab-btn active" data-tab="form">📋 FORMULAIRE RAPPORT</button>
    </div>
    <div id="tabForm" class="tab-content active">
        <div class="question-card" id="questionCard">
            <div id="questionMeta" class="question-meta"></div>
            <div class="question-text" id="questionText"></div>
            <div class="answer-area" id="answerArea">
                <div class="input-row" id="inputRow">
                    <select id="answerSelect" style="display:none;"></select>
                    <input type="number" id="answerNumber" placeholder="Saisir..." style="display:none;">
                    <button id="submitBtn">✓ Valider</button>
                </div>
                <div class="choice-row hidden" id="choiceRow">
                    <button class="choice-btn yes" id="yesBtn">✔ Oui</button>
                    <button class="choice-btn no" id="noBtn">✘ Non</button>
                </div>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="step-info"><span id="stepCounter">0 / 0</span><span id="saveStatus">💾 Auto</span></div>
            <div class="action-buttons">
                <button id="prevBtn" class="nav-btn hidden">◀ Reculer</button>
                <button id="resetBtn" class="reset-btn">🔄 Nouveau rapport</button>
            </div>
        </div>
        <button id="sendReportBtn" class="send-btn-special hidden">📤 ENVOYER À LA DEO</button>
        <footer>DEO · NeTubeX · Rapport journalier PGCO</footer>
    </div>
</div>
<div id="popupOverlay" class="popup-overlay"><div class="popup-card"><div id="popupTitle" class="popup-title"></div><div id="popupMessage" class="popup-message"></div><div class="popup-buttons"><button id="popupBtnLeft" class="popup-btn secondary"></button><button id="popupBtnRight" class="popup-btn primary"></button></div></div></div>
<script>
document.getElementById('formIconBtn').addEventListener('click', function() {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelector('.tab-btn[data-tab="form"]').classList.add('active');
    document.getElementById('tabForm').classList.add('active');
});
document.addEventListener('contextmenu',function(e){e.preventDefault();return false;});
document.addEventListener('keydown',function(e){const fk=[{key:'F12',p:true},{ctrl:true,shift:true,key:'I',p:true},{ctrl:true,shift:true,key:'J',p:true},{ctrl:true,shift:true,key:'C',p:true},{ctrl:true,key:'U',p:true},{ctrl:true,key:'S',p:true},{ctrl:true,key:'P',p:true},{ctrl:true,key:'R',p:true},{ctrl:true,shift:true,key:'R',p:true},{ctrl:true,key:'F5',p:true},{ctrl:true,key:'E',p:true},{ctrl:true,key:'G',p:true},{ctrl:true,key:'F',p:true},{ctrl:true,key:'H',p:true},{ctrl:true,key:'J',p:true},{ctrl:true,key:'K',p:true},{ctrl:true,key:'O',p:true},{ctrl:true,key:'N',p:true},{ctrl:true,key:'W',p:true},{ctrl:true,key:'T',p:true}];for(let fb of fk){let m=true;if(fb.ctrl&&!e.ctrlKey)m=false;if(fb.shift&&!e.shiftKey)m=false;if(fb.key){const km=e.key===fb.key||(fb.key==='F12'&&e.key==='F12')||(fb.key==='I'&&e.key==='i')||(fb.key==='J'&&e.key==='j')||(fb.key==='C'&&e.key==='c')||(fb.key==='U'&&e.key==='u')||(fb.key==='S'&&e.key==='s')||(fb.key==='P'&&e.key==='p')||(fb.key==='R'&&e.key==='r')||(fb.key==='E'&&e.key==='e')||(fb.key==='G'&&e.key==='g')||(fb.key==='F'&&e.key==='f')||(fb.key==='H'&&e.key==='h')||(fb.key==='K'&&e.key==='k')||(fb.key==='O'&&e.key==='o')||(fb.key==='N'&&e.key==='n')||(fb.key==='W'&&e.key==='w')||(fb.key==='T'&&e.key==='t');if(!km)m=false;}
if(m&&fb.p){e.preventDefault();e.stopPropagation();return false;}}
if(e.key==='F12'){e.preventDefault();return false;}
if(e.ctrlKey&&e.shiftKey&&/^[A-Za-z]$/.test(e.key)){e.preventDefault();return false;}});
document.addEventListener('dragstart',function(e){e.preventDefault();return false;});
document.addEventListener('selectstart',function(e){e.preventDefault();return false;});
document.addEventListener('copy',function(e){e.preventDefault();return false;});
</script>
</body>
</html>
