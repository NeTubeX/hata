<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0e1a">
<title>Gloria Dei - Fiche de Cotation</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#0a0e1a;font-family:'Inter',sans-serif;}
.container{max-width:1400px;margin:0 auto;padding:20px;}
.card{background:rgba(18,18,31,0.9);backdrop-filter:blur(10px);border-radius:20px;margin-bottom:20px;overflow:hidden;border:1px solid rgba(59,130,246,0.2);}
.card-header{padding:14px 20px;background:linear-gradient(135deg,#0f2b44,#071a2c);color:#fff;font-weight:600;}
.school-header{background:linear-gradient(135deg,#0f2b44,#071a2c);border-radius:20px;padding:20px;text-align:center;margin-bottom:20px;}
.school-name{font-size:22px;font-weight:700;background:linear-gradient(135deg,#fff,#94a3b8);-webkit-background-clip:text;background-clip:text;color:transparent;}
.school-sub{font-size:11px;opacity:0.8;margin-top:4px;color:#cbd5e1;}
.tabs-container{overflow-x:auto;margin-bottom:20px;white-space:nowrap;}
.tabs{display:inline-flex;gap:6px;}
.tab{background:transparent;border:1px solid #334155;padding:9px 20px;border-radius:40px;font-size:13px;cursor:pointer;color:#cbd5e1;transition:all 0.2s;}
.tab:hover{background:rgba(59,130,246,0.2);border-color:#3b82f6;}
.tab.active{background:#1e3a5f;color:#fff;border-color:transparent;}
.tab.disabled{opacity:0.5;cursor:not-allowed;pointer-events:none;}
.tab-content{display:none;animation:fadeIn 0.25s;}
.tab-content.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.form-grid{display:grid;grid-template-columns:1fr;gap:14px;padding:20px;}
@media(min-width:768px){.form-grid{grid-template-columns:repeat(3,1fr)}}
.form-field{display:flex;flex-direction:column;gap:6px;}
.form-field label{font-size:11px;font-weight:600;color:#cbd5e1;}
.form-field input,.form-field select{background:#2d3748;border:1px solid #334155;border-radius:12px;padding:10px 14px;color:#fff;}
.form-field input:focus,.form-field select:focus{outline:none;border-color:#3b82f6;}
.btn{background:#1e3a5f;color:#fff;border:none;padding:10px 20px;border-radius:40px;font-weight:500;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:8px;transition:all 0.2s;}
.btn:hover{opacity:0.9;transform:scale(0.98);}
.btn-sm{padding:6px 14px;font-size:12px;}
.btn-outline{background:transparent;border:1.5px solid #3b82f6;color:#3b82f6;}
.btn-outline:hover{background:#3b82f6;color:#fff;}
.btn-danger{background:#7f1d1d;}
.btn-danger:hover{background:#991b1b;}
.btn-success{background:#14532d;}
.btn-success:hover{background:#166534;}
.btn-secondary{background:#334155;}
.btn-secondary:hover{background:#475569;}
.btn-warning{background:#b45309;color:#fff;}
.btn-warning:hover{background:#c2410c;}
.btn-titulaire{background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:#fff;width:100%;justify-content:center;}
.table-wrapper{overflow-x:auto;padding:0 16px 20px;}
.student-table{width:100%;border-collapse:collapse;font-size:12px;min-width:1400px;}
.student-table th{background:#0f172a;padding:12px 6px;border-bottom:2px solid #334155;font-size:11px;color:#fff;}
.student-table td{border-bottom:1px solid #334155;padding:8px 4px;color:#e2e8f0;}
.student-table input{width:55px;padding:6px;border-radius:8px;background:#2d3748;border:1px solid #334155;color:#fff;text-align:center;}
.footer-note{text-align:center;padding:12px;font-size:11px;color:#4a5568;}
.fiche-selector{background:rgba(18,18,31,0.9);margin:12px 16px 0;padding:12px 16px;border-radius:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.fiche-selector label{color:#fff;}
.fiche-selector select{flex:1;padding:8px 12px;border-radius:14px;background:#2d3748;border:1px solid #334155;color:#fff;}
.modal-fullscreen{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);backdrop-filter:blur(20px);z-index:20000;display:flex;align-items:center;justify-content:center;visibility:hidden;opacity:0;transition:all 0.2s;}
.modal-fullscreen.show{visibility:visible;opacity:1;}
.modal-content{background:linear-gradient(135deg,#1e293b,#0f172a);border-radius:32px;width:90%;max-width:600px;padding:24px;border:1px solid rgba(59,130,246,0.3);max-height:80vh;overflow-y:auto;}
.modal-content h3{font-size:20px;margin-bottom:8px;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent;}
.modal-content input,.modal-content select{width:100%;padding:12px;border-radius:40px;background:#2d3748;border:1px solid #334155;color:#fff;margin:16px 0;}
.prof-list-item{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid #334155;flex-wrap:wrap;gap:12px;background:rgba(0,0,0,0.2);border-radius:12px;margin-bottom:8px;}
.prof-info{flex:2;min-width:180px;}
.prof-name{font-weight:700;font-size:16px;color:#fff;margin-bottom:6px;}
.prof-date{font-size:12px;color:#94a3b8;}
.prof-code{font-family:monospace;font-weight:700;background:#0f172a;padding:8px 16px;border-radius:40px;font-size:14px;min-width:130px;text-align:center;}
.code-visible{color:#10b981;}
.code-hidden{color:#f97316;}
.prof-actions{display:flex;gap:8px;}
.icon-admin{background:rgba(59,130,246,0.2);border:none;font-size:24px;cursor:pointer;padding:8px;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;margin-top:16px;transition:all 0.2s;}
.icon-admin:hover{background:rgba(59,130,246,0.4);transform:scale(1.05);}
.toast-container{position:fixed;top:20px;right:20px;z-index:30000;display:flex;flex-direction:column;gap:10px;pointer-events:none;}
.toast-notification{background:rgba(18,25,45,0.95);backdrop-filter:blur(12px);border-radius:12px;padding:12px 20px;min-width:280px;max-width:380px;display:flex;align-items:center;gap:12px;box-shadow:0 4px 20px rgba(0,0,0,0.3);border-left:3px solid #10b981;transform:translateX(400px);transition:transform 0.3s ease;pointer-events:auto;}
.toast-notification.show{transform:translateX(0);}
.toast-notification.error{border-left-color:#ef4444;}
.toast-notification.warning{border-left-color:#f59e0b;}
.toast-icon{font-size:18px;}
.toast-content{flex:1;}
.toast-title{font-weight:600;font-size:13px;color:#fff;margin-bottom:2px;}
.toast-message{font-size:11px;color:#94a3b8;}
.modal-toast{background:#10b981;border-radius:8px;padding:10px 15px;margin-top:15px;text-align:center;font-size:13px;color:#fff;}
.modal-toast.error{background:#ef4444;}
.modal-toast.warning{background:#f59e0b;}
.empty-state{text-align:center;padding:40px;color:#94a3b8;}
.login-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);backdrop-filter:blur(20px);z-index:10000;display:flex;align-items:center;justify-content:center;}
.login-card{background:rgba(18,18,31,0.95);border-radius:32px;padding:32px;width:90%;max-width:380px;text-align:center;border:1px solid rgba(59,130,246,0.3);}
.login-card h2{font-size:22px;font-weight:800;background:linear-gradient(135deg,#60a5fa,#3b82f6);-webkit-background-clip:text;background-clip:text;color:transparent;}
.login-card p{color:#cbd5e1;font-size:13px;margin-bottom:20px;}
.login-card input,.login-card select{width:100%;padding:12px;margin-bottom:14px;border-radius:40px;border:1px solid #334155;background:#2d3748;color:#fff;}
.login-card button{width:100%;padding:12px;border-radius:40px;background:linear-gradient(135deg,#60a5fa,#3b82f6);color:#fff;font-weight:600;border:none;cursor:pointer;}
.eleve-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;flex-wrap:wrap;}
.eleve-row input{flex:2;padding:8px;border-radius:12px;background:#2d3748;border:1px solid #334155;color:#fff;}
.eleve-row select{padding:8px;border-radius:12px;background:#2d3748;border:1px solid #334155;color:#fff;}
.epreuve-box{background:rgba(45,55,72,0.6);border-radius:16px;padding:12px;margin-bottom:12px;}
.epreuve-list{display:flex;flex-wrap:wrap;gap:8px;}
.epreuve-item{display:flex;align-items:center;gap:8px;background:#2d3748;padding:6px 12px;border-radius:40px;}
.prof-config{background:rgba(45,55,72,0.4);border-radius:16px;padding:16px;margin:0 16px 20px;border:1px solid #334155;}
.prof-config h3{font-size:13px;margin-bottom:12px;color:#fff;}
.prof-config .note-max-row{display:flex;align-items:center;gap:15px;flex-wrap:wrap;margin-bottom:15px;}
.prof-config .note-max-row label{color:#cbd5e1;font-size:12px;}
.prof-config .note-max-row input{width:100px;padding:8px;border-radius:12px;background:#2d3748;color:#fff;border:1px solid #334155;}
.prof-config .btn-group{display:flex;gap:10px;flex-wrap:wrap;margin-top:10px;}
.hidden-field{display:none;}
.field-required label::after{content:" *";color:#ef4444;}
.field-optional label::after{content:" (facultatif)";color:#94a3b8;font-size:10px;font-weight:normal;}
</style>
</head>
<body>
<div class="container" id="mainApp" style="display:none">
<div class="school-header">
<div class="school-name">COMPLEXE SCOLAIRE GLORIA DEI</div>
<div class="school-sub">KASUMBALESA / KOYO (NEW KOYO)</div>
<div style="font-size:13px;margin-top:8px;color:#fff;">FICHE DE COTATION</div>
</div>
<div class="tabs-container"><div class="tabs" id="tabsContainer">
<button class="tab active" data-tab="tabProf">📚 PROFESSEURS</button>
<button class="tab" data-tab="tabEpreuves">📝 EPREUVES</button>
<button class="tab" data-tab="tabEleves">👨‍🎓 ÉLÈVES</button>
<button class="tab" data-tab="tabCotation">📊 COTATION</button>
<button class="tab" data-tab="tabExports">📄 EXPORTS</button>
<button class="tab" data-tab="tabParams">⚙️ PARAMÈTRES</button>
</div></div>
<div id="tabProf" class="tab-content active"><div class="card"><div class="card-header">GESTION DES FICHES</div>
<div class="fiche-selector"><label>📚 Fiche active :</label><select id="ficheSelect"></select></div>
<div class="form-grid">
<div class="form-field field-required"><label>COURS</label><input type="text" id="coursInput" placeholder="Ex: Mathématiques, Français..."></div>
<div class="form-field field-required"><label>CLASSE</label><select id="classeSelect"><option value="">-- Sélectionner --</option><option value="7ème EB">7ème EB</option><option value="8ème EB">8ème EB</option><option value="1ère Année">1ère Année</option><option value="2ème Année">2ème Année</option><option value="3ème Année">3ème Année</option><option value="4ème Année">4ème Année</option></select></div>
<div class="form-field hidden-field" id="optionField"><label>OPTION</label><select id="optionSelect"><option value="">-- Sélectionner --</option><option value="CG">CG (Commerciale et Gestion)</option><option value="HP">HP (Humanité Pédagogique)</option><option value="TCC">TCC (Technique Coup et Couture)</option><option value="ELEC">ELEC (Électricité)</option><option value="MG">MG (Mécanique Générale)</option><option value="SCIENCES">SCIENCES (Sciences)</option><option value="Toutes">Toutes (cours d'ensemble)</option></select></div>
<div class="form-field field-optional"><label>TITULAIRE</label><input type="text" id="titulaireInput" placeholder="Nom du professeur titulaire (facultatif)"></div>
<div class="form-field"><label>ANNEE SCOLAIRE</label><input type="text" id="anneeInput" value="2026-2027" readonly></div>
</div>
<div class="prof-config">
<h3>⚙️ CONFIGURATION</h3>
<div class="note-max-row"><label>📊 Note max / période :</label><input type="number" id="p1MaxConfig" value="20" step="1"></div>
<div class="btn-group">
<button class="btn btn-success" id="newFicheBtn">📄 NOUVELLE FICHE</button>
<button class="btn btn-warning" id="copyElevesBtn">📋 COPIER ÉLÈVES</button>
<button class="btn btn-danger" id="deleteFicheBtn">🗑️ SUPPRIMER</button>
</div>
</div>
</div></div>
<div id="tabEpreuves" class="tab-content"><div class="card"><div class="card-header">EPREUVES PAR PERIODE</div><div class="fiche-selector"><select id="epreuveFicheSelector"></select></div><div id="epreuvesContainer" style="padding:16px"></div><div style="padding:16px;display:flex;gap:8px;flex-wrap:wrap"><button class="btn btn-sm" id="addEpreuve1">+ P1</button><button class="btn btn-sm" id="addEpreuve2">+ P2</button><button class="btn btn-sm" id="addEpreuve3">+ P3</button><button class="btn btn-sm" id="addEpreuve4">+ P4</button></div></div></div>
<div id="tabEleves" class="tab-content"><div class="card"><div class="card-header">LISTE DES ÉLÈVES</div><div class="fiche-selector"><select id="elevesFicheSelector"></select></div><div id="elevesListContainer" style="padding:16px;max-height:500px;overflow-y:auto"></div><button class="btn btn-success" id="addEleveBtn">+ AJOUTER UN ÉLÈVE</button></div></div>
<div id="tabCotation" class="tab-content"><div class="card"><div class="card-header">TABLEAU DES NOTES</div><div class="fiche-selector"><select id="cotationFicheSelector"></select></div><div style="padding:16px;display:flex;gap:8px;flex-wrap:wrap"><input type="text" id="searchInput" placeholder="🔍 Rechercher..." style="padding:8px;border-radius:40px;background:#2d3748;border:1px solid #334155;color:#fff;flex:1"><button class="btn-sm btn-outline" id="sortAlphaBtn">🔤 Tri alphabétique</button></div><div class="table-wrapper"><table class="student-table" id="cotationTable"><thead id="cotationHeader"></thead><tbody id="cotationBody"></tbody></table></div></div></div>
<div id="tabExports" class="tab-content"><div class="card"><div class="card-header">EXPORTATIONS PDF</div><div class="fiche-selector"><select id="exportFicheSelector"></select></div><div style="padding:20px;display:flex;flex-direction:column;gap:12px"><button class="btn" id="exportCurrentBtn">📄 PDF Fiche de cotation</button><button class="btn" id="exportEleveNotesBtn">📄 PDF Relevé élève</button><select id="eleveForExportSelect" style="padding:10px;border-radius:40px;background:#2d3748;color:#fff"><option value="">-- Choisir un élève --</option></select></div></div></div>
<div id="tabParams" class="tab-content"><div class="card"><div class="card-header">PARAMÈTRES</div><div style="padding:20px;display:flex;flex-direction:column;gap:15px"><button class="btn btn-danger" id="logoutBtnParam">🚪 DÉCONNEXION</button><button class="btn btn-titulaire" id="espaceTitulaireBtn">👤 ESPACE TITULAIRE</button><div style="border-top:1px solid #334155;padding-top:15px"><h3 style="font-size:13px;margin-bottom:12px;color:#fff;">🔐 CHANGER LE CODE</h3><input type="password" id="oldCode" placeholder="Ancien code" style="width:100%;padding:10px;margin-bottom:8px;border-radius:40px;background:#2d3748;color:#fff;border:1px solid #334155"><input type="password" id="newCode1" placeholder="Nouveau code" style="width:100%;padding:10px;margin-bottom:8px;border-radius:40px;background:#2d3748;color:#fff;border:1px solid #334155"><input type="password" id="newCode2" placeholder="Confirmer" style="width:100%;padding:10px;margin-bottom:8px;border-radius:40px;background:#2d3748;color:#fff;border:1px solid #334155"><button class="btn btn-sm" id="changeCodeBtn">✅ CHANGER</button></div></div></div></div>
<div class="footer-note">CS. GLORIA DEI - KOYO (NEW KOYO)</div>
</div>
<div class="toast-container" id="toastContainer"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, doc, getDoc, getDocs, setDoc, deleteDoc, query, where, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = { apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA", authDomain: "netubexmoney.firebaseapp.com", projectId: "netubexmoney", storageBucket: "netubexmoney.firebasestorage.app", messagingSenderId: "856592608176", appId: "1:856592608176:web:69f9df9cfd4f8c28630475" };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentProf = null, currentFicheId = null, currentFiche = null, toutesFiches = [];
let saveTimeout = null, isCreatingFiche = false;

function toast(message, type = 'success') {
    const container = document.getElementById('toastContainer');
    if(!container) return;
    const icons = { success: '✓', error: '✕', warning: '⚠' };
    const titles = { success: 'Succès', error: 'Erreur', warning: 'Attention' };
    const toastEl = document.createElement('div');
    toastEl.className = `toast-notification ${type}`;
    toastEl.innerHTML = `<div class="toast-icon">${icons[type]}</div><div class="toast-content"><div class="toast-title">${titles[type]}</div><div class="toast-message">${message}</div></div>`;
    container.appendChild(toastEl);
    setTimeout(() => toastEl.classList.add('show'), 10);
    setTimeout(() => { toastEl.classList.remove('show'); setTimeout(() => toastEl.remove(), 300); }, 3000);
}

function formatNumero(num) { return num ? 'F' + String(num).padStart(3, '0') : '???'; }

function toggleOptionField() {
    const classe = document.getElementById('classeSelect').value;
    const optionField = document.getElementById('optionField');
    if(classe === '7ème EB' || classe === '8ème EB') {
        optionField.classList.add('hidden-field');
        document.getElementById('optionSelect').value = '';
    } else if(classe && classe !== '') optionField.classList.remove('hidden-field');
    else optionField.classList.add('hidden-field');
}

function showConfirm(msg, onOk) {
    let div = document.createElement('div');
    div.className = 'modal-fullscreen';
    div.innerHTML = `<div class="modal-content" style="max-width:350px;text-align:center"><p style="color:#fff;margin-bottom:20px">${msg}</p><div style="display:flex;gap:12px;margin-top:20px;justify-content:center"><button class="btn" id="confirmOk" style="background:#ef4444">Confirmer</button><button class="btn btn-outline" id="confirmCancel">Annuler</button></div></div>`;
    document.body.appendChild(div);
    setTimeout(() => div.classList.add('show'), 10);
    div.querySelector('#confirmOk').onclick = () => { div.remove(); onOk(); };
    div.querySelector('#confirmCancel').onclick = () => div.remove();
}

async function getNextFicheNumero() {
    const compteurRef = doc(db, "gloria_dei_fiches", "_compteur_global");
    const snap = await getDoc(compteurRef);
    if(snap.exists()) {
        const newNum = (snap.data().valeur || 0) + 1;
        await updateDoc(compteurRef, { valeur: increment(1) });
        return newNum;
    } else {
        await setDoc(compteurRef, { valeur: 1 });
        return 1;
    }
}

async function loadAllFiches() {
    if(!currentProf) return [];
    const q = query(collection(db, "gloria_dei_fiches"), where("profId", "==", currentProf.id));
    const snap = await getDocs(q);
    const fiches = [];
    for(const docSnap of snap.docs) {
        const data = docSnap.data();
        if(data._type === "prof") continue;
        fiches.push({ id: data.ficheId, cours: data.cours || '', classe: data.classe || '', option: data.option || '', numeroRef: data.numeroRef || null });
    }
    fiches.sort((a, b) => (a.numeroRef || 999) - (b.numeroRef || 999));
    return fiches;
}

async function saveCurrentFiche() {
    if(!currentProf || !currentFicheId || !currentFiche) return;
    try { await setDoc(doc(db, "gloria_dei_fiches", `${currentProf.id}_${currentFicheId}`), currentFiche); } catch(e) {}
}
function debounceSave() { if(saveTimeout) clearTimeout(saveTimeout); saveTimeout = setTimeout(() => saveCurrentFiche(), 500); }

async function refreshSelectors() {
    toutesFiches = await loadAllFiches();
    const selects = ['ficheSelect', 'epreuveFicheSelector', 'elevesFicheSelector', 'cotationFicheSelector', 'exportFicheSelector'];
    for(let selId of selects) {
        let sel = document.getElementById(selId);
        if(sel) {
            sel.innerHTML = '<option value="">-- Choisir --</option>';
            for(let f of toutesFiches) {
                let opt = document.createElement('option');
                opt.value = f.id;
                let refa = f.numeroRef ? formatNumero(f.numeroRef) : 'Nouvelle';
                let optionText = f.option ? ` (${f.option})` : '';
                opt.textContent = `${refa} - ${f.cours || '?'} - ${f.classe || '?'}${optionText}`;
                if(currentFicheId === f.id) opt.selected = true;
                sel.appendChild(opt);
            }
            sel.onchange = async () => { if(sel.value && !isCreatingFiche) await selectFiche(sel.value); };
        }
    }
}

async function selectFiche(id) {
    if(!id || isCreatingFiche) return;
    currentFicheId = id;
    const docRef = doc(db, "gloria_dei_fiches", `${currentProf.id}_${id}`);
    const snap = await getDoc(docRef);
    if(snap.exists() && !snap.data()._type) {
        currentFiche = snap.data();
        document.getElementById('coursInput').value = currentFiche.cours || '';
        document.getElementById('classeSelect').value = currentFiche.classe || '';
        document.getElementById('optionSelect').value = currentFiche.option || '';
        document.getElementById('titulaireInput').value = currentFiche.titulaire || '';
        document.getElementById('p1MaxConfig').value = currentFiche.p1Max || 20;
        toggleOptionField();
        afficherEpreuves();
        afficherEleves();
        afficherCotation();
        const eleveSelect = document.getElementById('eleveForExportSelect');
        if(eleveSelect) {
            eleveSelect.innerHTML = '<option value="">-- Choisir un élève --</option>';
            (currentFiche.eleves || []).forEach((e,i) => { if(e.nom?.trim()) eleveSelect.innerHTML += `<option value="${i}">${e.nom}</option>`; });
        }
        await refreshSelectors();
    }
}

function resetFormFields() {
    document.getElementById('coursInput').value = '';
    document.getElementById('classeSelect').value = '';

function calcMoy(periode, notes) {
    let eps = currentFiche.epreuvesParPeriode?.[periode] || [];
    if(!eps.length || !notes?.length) return 0;
    let sumN=0, sumM=0;
    for(let i=0;i<eps.length;i++) { sumN += (notes[i]||0); sumM += (eps[i].max||1); }
    return sumM ? Math.min(currentFiche.p1Max, Math.round((sumN/sumM)*currentFiche.p1Max)) : 0;
}

function afficherCotation() {
    let thead = document.getElementById('cotationHeader');
    let tbody = document.getElementById('cotationBody');
    let eleves = currentFiche?.eleves || [];
    if(!eleves.length) { thead.innerHTML = ''; tbody.innerHTML = '<tr><td class="empty-state">Aucun élève inscrit</td></tr>'; return; }
    let headers = ['<th>N°</th><th>NOMS</th><th>SEXE</th>'];
    let eps1 = currentFiche.epreuvesParPeriode?.[1] || [];
    for(let ep of eps1) headers.push(`<th>${ep.nom}<br>P1</th>`);
    headers.push('<th>MOY P1</th>');
    let eps2 = currentFiche.epreuvesParPeriode?.[2] || [];
    for(let ep of eps2) headers.push(`<th>${ep.nom}<br>P2</th>`);
    headers.push('<th>MOY P2</th><th>EXAM S1</th><th>TOT S1</th>');
    let eps3 = currentFiche.epreuvesParPeriode?.[3] || [];
    for(let ep of eps3) headers.push(`<th>${ep.nom}<br>P3</th>`);
    headers.push('<th>MOY P3</th>');
    let eps4 = currentFiche.epreuvesParPeriode?.[4] || [];
    for(let ep of eps4) headers.push(`<th>${ep.nom}<br>P4</th>`);
    headers.push('<th>MOY P4</th><th>EXAM S2</th><th>TOT S2</th><th>TOTAL</th>');
    thead.innerHTML = headers.join('');
    tbody.innerHTML = '';
    for(let i=0;i<eleves.length;i++) {
        let e = eleves[i];
        if(!e.notes) e.notes = {p1:[],p2:[],p3:[],p4:[],exam1:0,exam2:0};
        let p1 = calcMoy(1, e.notes.p1), p2 = calcMoy(2, e.notes.p2), p3 = calcMoy(3, e.notes.p3), p4 = calcMoy(4, e.notes.p4);
        let exam1 = e.notes.exam1||0, exam2 = e.notes.exam2||0;
        let totalS1 = p1 + p2 + exam1, totalS2 = p3 + p4 + exam2, total = totalS1 + totalS2;
        let row = `<tr><td style="text-align:center">${String(i+1).padStart(2,'0')}</td><td style="text-align:left"><input type="text" value="${e.nom||''}" onchange="window.updNoteField(${i},'nom',this.value)" style="width:180px"></td><td style="text-align:center"><select onchange="window.updNoteField(${i},'sexe',this.value)"><option value="M" ${e.sexe=='M'?'selected':''}>M</option><option value="F" ${e.sexe=='F'?'selected':''}>F</option></select></td>`;
        for(let ei=0;ei<eps1.length;ei++) { let val = e.notes.p1?.[ei]||0; row += `<td><input type="number" step="0.5" min="0" max="${eps1[ei].max}" value="${val}" onchange="window.updNote(${i},1,${ei},this.value)" style="width:55px"></td>`; }
        row += `<td style="background:#1e3a5f">${p1}</td>`;
        for(let ei=0;ei<eps2.length;ei++) { let val = e.notes.p2?.[ei]||0; row += `<td><input type="number" step="0.5" min="0" max="${eps2[ei].max}" value="${val}" onchange="window.updNote(${i},2,${ei},this.value)" style="width:55px"></td>`; }
        row += `<td style="background:#1e3a5f">${p2}</td><td><input type="number" step="0.5" min="0" max="${currentFiche.p1Max}" value="${exam1}" onchange="window.updExam(${i},1,this.value)" style="width:55px"></td><td style="background:#5c4a1a">${totalS1}</td>`;
        for(let ei=0;ei<eps3.length;ei++) { let val = e.notes.p3?.[ei]||0; row += `<td><input type="number" step="0.5" min="0" max="${eps3[ei].max}" value="${val}" onchange="window.updNote(${i},3,${ei},this.value)" style="width:55px"></td>`; }
        row += `<td style="background:#1e3a5f">${p3}</td>`;
        for(let ei=0;ei<eps4.length;ei++) { let val = e.notes.p4?.[ei]||0; row += `<td><input type="number" step="0.5" min="0" max="${eps4[ei].max}" value="${val}" onchange="window.updNote(${i},4,${ei},this.value)" style="width:55px"></td>`; }
        row += `<td style="background:#1e3a5f">${p4}</td><td><input type="number" step="0.5" min="0" max="${currentFiche.p1Max}" value="${exam2}" onchange="window.updExam(${i},2,this.value)" style="width:55px"></td><td style="background:#5c4a1a">${totalS2}</td><td style="background:#5c4a1a">${total}</td></tr>`;
        tbody.innerHTML += row;
    }
}
window.updNoteField = (idx, field, val) => { if(field === 'nom' && !val.trim()) { toast("Le nom ne peut pas être vide", 'error'); return; } currentFiche.eleves[idx][field] = val; debounceSave(); };
window.updNote = (idx, periode, epIdx, val) => {
    let v = parseFloat(val)||0;
    let maxEp = currentFiche.epreuvesParPeriode[periode]?.[epIdx]?.max || 20;
    if(v>maxEp) v=maxEp;
    if(!currentFiche.eleves[idx].notes) currentFiche.eleves[idx].notes = {p1:[],p2:[],p3:[],p4:[],exam1:0,exam2:0};
    if(!currentFiche.eleves[idx].notes['p'+periode]) currentFiche.eleves[idx].notes['p'+periode] = [];
    currentFiche.eleves[idx].notes['p'+periode][epIdx] = v;
    afficherCotation(); debounceSave();
};
window.updExam = (idx, sem, val) => {
    let v = parseFloat(val)||0;
    if(v>currentFiche.p1Max) v=currentFiche.p1Max;
    if(!currentFiche.eleves[idx].notes) currentFiche.eleves[idx].notes = {p1:[],p2:[],p3:[],p4:[],exam1:0,exam2:0};
    if(sem===1) currentFiche.eleves[idx].notes.exam1 = v;
    else currentFiche.eleves[idx].notes.exam2 = v;
    afficherCotation(); debounceSave();
};

async function generateFichePDF(ficheData) {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('landscape', 'mm', 'a4');
    const pMax = ficheData.p1Max || 20;
    const seuil = pMax / 2;
    const refNum = ficheData.numeroRef ? formatNumero(ficheData.numeroRef) : '???';
    
    pdf.setFontSize(12);
    pdf.setFont('helvetica', 'bold');
    pdf.text('COMPLEXE SCOLAIRE GLORIA DEI', 148, 15, { align: 'center' });
    pdf.setFontSize(9);
    pdf.setFont('helvetica', 'normal');
    pdf.text('KASUMBALESA / KOYO (NEW KOYO)', 148, 22, { align: 'center' });
    pdf.setFontSize(11);
    pdf.setFont('helvetica', 'bold');
    pdf.text('FICHE DE COTATION', 148, 32, { align: 'center' });
    
    pdf.setFontSize(9);
    pdf.setFont('helvetica', 'normal');
    pdf.text(`Année scolaire : ${ficheData.anneeScolaire || '2026-2027'}`, 14, 45);
    pdf.text(`Référence : ${refNum}`, 14, 53);
    pdf.text(`Cours : ${ficheData.cours || ''}`, 14, 61);
    pdf.text(`Classe : ${ficheData.classe || ''}`, 14, 69);
    let yOffset = 77;
    if(ficheData.option && ficheData.option !== '') {
        pdf.text(`Option : ${ficheData.option}`, 14, yOffset);
        yOffset += 8;
    }
    pdf.text(`Titulaire : ${ficheData.titulaire || ''}`, 14, yOffset);
    
    const eleves = ficheData.eleves || [];
    const eps = ficheData.epreuvesParPeriode || {1:[],2:[],3:[],4:[]};
    
    const calcMoyenne = (periode, notes) => {
        const epreuves = eps[periode] || [];
        if(!epreuves.length || !notes?.length) return 0;
        let sumNotes = 0, sumMax = 0;
        for(let i=0; i<epreuves.length; i++) {
            sumNotes += (notes[i] || 0);
            sumMax += (epreuves[i].max || 1);
        }
        return sumMax ? Math.min(pMax, Math.round((sumNotes / sumMax) * pMax)) : 0;
    };
    
    const headers = [['N°', 'NOMS - POSTNOMS', 'SEXE', '1er P', '2e P', 'EXAM', 'TOT.', '3e P', '4e P', 'EXAM', 'TOT.', 'TOTAL']];
    const body = [];
    
    for(let i=0; i<eleves.length; i++) {
        const e = eleves[i];
        const notes = e.notes || {p1:[],p2:[],p3:[],p4:[],exam1:0,exam2:0};
        const p1 = calcMoyenne(1, notes.p1);
        const p2 = calcMoyenne(2, notes.p2);
        const p3 = calcMoyenne(3, notes.p3);
        const p4 = calcMoyenne(4, notes.p4);
        const exam1 = notes.exam1 || 0;
        const exam2 = notes.exam2 || 0;
        const totalS1 = p1 + p2 + exam1;
        const totalS2 = p3 + p4 + exam2;
        const total = totalS1 + totalS2;
        body.push([(i+1).toString(), e.nom || '', e.sexe === 'F' ? 'F' : 'M', p1, p2, exam1, totalS1, p3, p4, exam2, totalS2, total]);
    }
    
    if(body.length === 0) body.push(['', 'Aucun élève', '', '', '', '', '', '', '', '', '', '']);
    
    pdf.autoTable({
        head: headers,
        body: body,
        startY: yOffset + 8,
        theme: 'grid',
        styles: { fontSize: 8, cellPadding: 2, valign: 'middle', halign: 'center' },
        headStyles: { fillColor: [31, 41, 55], textColor: [255, 255, 255], fontStyle: 'bold', halign: 'center' },
        columnStyles: { 0: { cellWidth: 12 }, 1: { cellWidth: 45, halign: 'left' }, 2: { cellWidth: 12 } },
        didDrawCell: function(data) {
            if(data.section === 'body' && typeof data.cell.raw === 'number' && !isNaN(data.cell.raw)) {
                if(data.cell.raw < seuil && data.cell.raw !== 0) {
                    pdf.setTextColor(255, 0, 0);
                    pdf.text(data.cell.raw.toString(), data.cell.x + data.cell.width/2, data.cell.y + data.cell.height/2, { align: 'center', baseline: 'middle' });
                    pdf.setTextColor(0, 0, 0);
                    return false;
                }
            }
            return true;
        }
    });
    return pdf;
}

document.getElementById('exportCurrentBtn').onclick = async () => {
    if(!currentFiche) { toast("Aucune fiche sélectionnée", 'error'); return; }
    if(!currentFiche.eleves?.length) { toast("Aucun élève à exporter", 'error'); return; }
    try {
        const pdf = await generateFichePDF(currentFiche);
        const numeroFiche = currentFiche.numeroRef ? formatNumero(currentFiche.numeroRef) : 'fiche';
        pdf.save(`Fiche_${numeroFiche}_${currentFiche.cours || 'cours'}.pdf`);
        toast("PDF exporté avec succès", 'success');
    } catch(e) { toast("Erreur lors de la génération du PDF", 'error'); }
};

document.getElementById('exportEleveNotesBtn').onclick = async () => {
    const idx = document.getElementById('eleveForExportSelect').value;
    if(idx === "") { toast("Veuillez sélectionner un élève", 'warning'); return; }
    const eleve = currentFiche.eleves[parseInt(idx)];
    if(!eleve) { toast("Élève non trouvé", 'error'); return; }
    try {
        const { jsPDF } = window.jspdf;
        const doc = new jsPDF('portrait', 'mm', 'a4');
        const numeroFiche = currentFiche.numeroRef ? formatNumero(currentFiche.numeroRef) : '???';
        
        doc.setFontSize(14);
        doc.setFont('helvetica', 'bold');
        doc.text('COMPLEXE SCOLAIRE GLORIA DEI', 105, 15, { align: 'center' });
        doc.setFontSize(10);
        doc.setFont('helvetica', 'normal');
        doc.text('KASUMBALESA / KOYO (NEW KOYO)', 105, 22, { align: 'center' });
        doc.setFontSize(12);
        doc.setFont('helvetica', 'bold');
        doc.text('RELEVÉ DES ÉPREUVES', 105, 32, { align: 'center' });
        doc.setFontSize(9);
        doc.setFont('helvetica', 'normal');
        doc.text(`Réf: ${numeroFiche}`, 150, 45);
        doc.text(`Élève: ${eleve.nom || ''}`, 20, 45);
        doc.text(`Classe: ${currentFiche.classe || ''}${currentFiche.option ? ' - ' + currentFiche.option : ''}`, 20, 53);
        doc.text(`Cours: ${currentFiche.cours || ''}`, 20, 61);
        
        const body = [];
        const eps = currentFiche.epreuvesParPeriode || {1:[],2:[],3:[],4:[]};
        for(let p=1; p<=4; p++) {
            for(let ei=0; ei<(eps[p]||[]).length; ei++) {
                const note = (eleve.notes?.['p'+p] && eleve.notes['p'+p][ei]) ? eleve.notes['p'+p][ei] : 0;
                body.push([`Période ${p}`, eps[p][ei].nom, `${note} / ${eps[p][ei].max}`]);
            }
        }
        if(body.length === 0) body.push(['Aucune épreuve', '', '']);
        
        doc.autoTable({
            head: [['Période', 'Épreuve', 'Note']],
            body: body,
            startY: 75,
            theme: 'grid',
            styles: { fontSize: 9, cellPadding: 3 },
            headStyles: { fillColor: [59, 130, 246], textColor: [255, 255, 255] }
        });
        
        doc.save(`Releve_${numeroFiche}_${(eleve.nom || 'eleve').replace(/\s/g,'_')}.pdf`);
        toast(`PDF généré pour ${eleve.nom}`, 'success');
    } catch(e) { toast("Erreur lors de la génération du PDF", 'error'); }
};

// ========== GESTION ADMIN ==========
async function showAdminModal() {
    let modal = document.createElement('div'); modal.className = 'modal-fullscreen';
    modal.innerHTML = `<div class="modal-content" style="max-width:400px"><div style="display:flex;justify-content:space-between;margin-bottom:20px"><h3>Accès Directrice</h3><span style="font-size:28px;cursor:pointer;color:#94a3b8" id="closeAdminModal">&times;</span></div><input type="password" id="adminCodeInput" placeholder="Code d'accès"><button class="btn" id="validateAdminBtn" style="width:100%;margin-top:16px">Valider</button><div id="adminError" style="color:#ef4444;margin-top:12px;text-align:center"></div></div>`;
    document.body.appendChild(modal); setTimeout(() => modal.classList.add('show'), 10);
    document.getElementById('closeAdminModal').onclick = () => modal.remove();
    document.getElementById('validateAdminBtn').onclick = async () => { if(document.getElementById('adminCodeInput').value === '1111') { modal.remove(); showGestionProfsModal(); } else { document.getElementById('adminError').innerHTML = 'Code incorrect'; toast("Code d'accès incorrect", 'error'); } };
}

async function showGestionProfsModal() {
    let modal = document.createElement('div'); modal.className = 'modal-fullscreen';
    modal.innerHTML = `<div class="modal-content" style="max-width:600px"><div style="display:flex;justify-content:space-between;margin-bottom:20px"><h3>Gestion des professeurs</h3><span style="font-size:28px;cursor:pointer;color:#94a3b8" id="closeGestionModal">&times;</span></div><button class="btn btn-success" id="addProfBtn" style="width:100%;margin-bottom:20px">+ Ajouter un professeur</button><div id="profsListContainer" style="max-height:450px;overflow-y:auto"></div><div style="margin-top:16px"><button class="btn btn-secondary" id="closeGestionBtn" style="width:100%">Fermer</button></div></div>`;
    document.body.appendChild(modal); setTimeout(() => modal.classList.add('show'), 10);
    document.getElementById('closeGestionModal').onclick = () => modal.remove();
    document.getElementById('closeGestionBtn').onclick = () => modal.remove();
    await refreshProfsList();
    document.getElementById('addProfBtn').onclick = () => showAddProfForm();
}

async function refreshProfsList() {
    let container = document.getElementById('profsListContainer');
    if(!container) return;
    const q = query(collection(db, "gloria_dei_fiches"), where("_type", "==", "prof"));
    const snap = await getDocs(q);
    let profs = [];
    snap.forEach(doc => profs.push({ id: doc.id, ...doc.data() }));
    if(profs.length === 0) { container.innerHTML = '<div class="empty-state">Aucun professeur enregistré</div>'; return; }
    profs.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));
    container.innerHTML = '';
    profs.forEach(prof => {
        let div = document.createElement('div'); div.className = 'prof-list-item';
        div.innerHTML = `<div class="prof-info"><div class="prof-name">${escapeHtml(prof.nom)}</div><div class="prof-date">${prof.createdAt ? new Date(prof.createdAt).toLocaleDateString() : ''}</div></div><div class="prof-code">${prof.code || '---'}</div><div class="prof-actions"><button class="btn btn-danger btn-sm" data-id="${prof.id}" data-nom="${escapeHtml(prof.nom)}">Supprimer</button></div>`;
        container.appendChild(div);
    });
    document.querySelectorAll('#profsListContainer .btn-danger').forEach(btn => { btn.onclick = async () => { showConfirm(`Supprimer "${btn.dataset.nom}" ?`, async () => { await deleteDoc(doc(db, "gloria_dei_fiches", btn.dataset.id)); await refreshProfsList(); toast(`Professeur "${btn.dataset.nom}" supprimé`, 'success'); }); }; });
}

function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;' }[m])); }
function generateProfCode() { let chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789', code = ''; for(let i=0;i<6;i++) code += chars.charAt(Math.floor(Math.random() * chars.length)); return code; }
function showAddProfForm() {
    let modal = document.createElement('div'); modal.className = 'modal-fullscreen';
    modal.innerHTML = `<div class="modal-content" style="max-width:400px"><div style="display:flex;justify-content:space-between;margin-bottom:20px"><h3>Nouveau professeur</h3><span style="font-size:28px;cursor:pointer;color:#94a3b8" id="closeAddModal">&times;</span></div><input type="text" id="newProfName" placeholder="Nom complet"><button class="btn btn-success" id="generateAndAddBtn" style="width:100%;margin-top:16px">Générer et ajouter</button><div style="margin-top:12px;text-align:center"><button class="btn-outline btn-sm" id="cancelAddBtn">Annuler</button></div></div>`;
    document.body.appendChild(modal); setTimeout(() => modal.classList.add('show'), 10);
    document.getElementById('closeAddModal').onclick = () => modal.remove();
    document.getElementById('cancelAddBtn').onclick = () => modal.remove();
    document.getElementById('generateAndAddBtn').onclick = async () => { let nom = document.getElementById('newProfName').value.trim(); if(!nom) { toast("Veuillez entrer un nom", 'error'); return; } let code = generateProfCode(); let profId = 'prof_' + Date.now(); await setDoc(doc(db, "gloria_dei_fiches", profId), { _type: "prof", profId, nom, code, createdAt: Date.now() }); modal.remove(); showCodePopup(nom, code); await refreshProfsList(); toast(`Professeur "${nom}" ajouté avec succès`, 'success'); };
}
function showCodePopup(nom, code) {
    let popup = document.createElement('div'); popup.className = 'modal-fullscreen';
    popup.innerHTML = `<div class="modal-content" style="text-align:center;max-width:400px"><div style="display:flex;justify-content:flex-end"><span style="font-size:28px;cursor:pointer;color:#94a3b8" id="closeCodeX">&times;</span></div><h3>Professeur ajouté</h3><p style="margin:8px 0;color:#cbd5e1">${escapeHtml(nom)}</p><div style="background:#10b981;border-radius:60px;padding:16px 24px;margin:16px 0"><span style="font-size:24px;font-weight:800;letter-spacing:2px;color:#fff">${code}</span></div><p style="font-size:12px;color:#94a3b8">Notez ce code, il sera masqué après 5 minutes</p><button class="btn" id="closeCodePopup" style="margin-top:16px">Fermer</button></div>`;
    document.body.appendChild(popup); setTimeout(() => popup.classList.add('show'), 10);
    document.getElementById('closeCodePopup').onclick = () => popup.remove();
    document.getElementById('closeCodeX').onclick = () => popup.remove();
}

// ========== CONNEXION ==========
async function showLogin() {
    let div = document.createElement('div'); div.className = 'login-overlay'; div.id = 'loginOverlay';
    div.innerHTML = `<div class="login-card"><h2>GLORIA DEI</h2><p>Accès enseignant</p><select id="loginNom"><option value="">-- Choisir --</option><option value="Prof. NGENDA Flory" data-id="p1">Prof. NGENDA Flory</option></select><input type="password" id="loginCode" placeholder="Code d'accès"><button id="loginBtn">Se connecter</button><div style="margin-top:16px"><button id="adminIconBtn" style="background:rgba(59,130,246,0.2);border:none;padding:8px;border-radius:50%;width:40px;height:40px;cursor:pointer">⚙️</button></div><div id="loginError" style="margin-top:12px;font-size:13px;color:#ef4444"></div></div>`;
    document.body.appendChild(div);
    document.getElementById('loginBtn').onclick = async () => {
        let nom = document.getElementById('loginNom').value;
        let code = document.getElementById('loginCode').value;
        let profId = nom === "Prof. NGENDA Flory" ? "p1" : null;
        if(!profId) {
            const profsSnap = await getDocs(query(collection(db, "gloria_dei_fiches"), where("_type", "==", "prof")));
            let found = false;
            profsSnap.forEach(doc => { if(doc.data().nom === nom && doc.data().code === code) { found = true; profId = doc.data().profId; } });
            if(!found) { document.getElementById('loginError').innerHTML = 'Identifiants incorrects'; toast("Identifiants incorrects", 'error'); return; }
        }
        let savedCode = await (async () => { const snap = await getDoc(doc(db, "gloria_dei_fiches", `prof_${profId}`)); return snap.exists() ? snap.data().code : null; })();
        let defaultCode = "0000";
        let validCode = savedCode || defaultCode;
        if(code === validCode) {
            currentProf = { id: profId, nom: nom, code: validCode, createdAt: Date.now() };
            if(!savedCode && profId === "p1") await setDoc(doc(db, "gloria_dei_fiches", `prof_${profId}`), { _type: "prof", profId, nom, code: validCode, createdAt: Date.now() });
            document.getElementById('loginOverlay').remove();
            document.getElementById('mainApp').style.display = 'block';
            toutesFiches = await loadAllFiches();
            if(toutesFiches.length) await selectFiche(toutesFiches[0].id);
            await refreshSelectors();
            toast(`Bienvenue ${currentProf.nom}`, 'success');
        } else { document.getElementById('loginError').innerHTML = 'Code incorrect'; toast("Code d'accès incorrect", 'error'); }
    };
    document.getElementById('adminIconBtn').onclick = () => { showAdminModal(); };
}
showLogin();
