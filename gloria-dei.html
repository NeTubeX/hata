<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
<title>Gloria Dei - Fiche de Cotation</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg-body:#1a1a2e;
  --bg-card:#1e2933;
  --text-primary:#ffffff;
  --text-secondary:#cbd5e1;
  --border:#334155;
  --header-bg:linear-gradient(135deg,#0f2b44,#071a2c);
  --header-text:#ffffff;
  --table-header-bg:#0f172a;
  --table-header-text:#ffffff;
  --moy-bg:#1e3a5f;
  --total-bg:#5c4a1a;
  --exam-bg:#3b2e5c;
  --shadow:0 8px 32px rgba(0,0,0,0.3);
  --input-bg:#2d3748;
  --tab-active:#1e3a5f;
  --tab-hover:#2d4a6e;
}
body{
  background:var(--bg-body);
  font-family:'Inter',sans-serif;
  padding:20px;
  min-height:100vh;
}
.container{max-width:1400px;margin:0 auto}
.card{
  background:var(--bg-card);
  border-radius:20px;
  box-shadow:var(--shadow);
  margin-bottom:20px;
  overflow:hidden;
  border:1px solid rgba(255,255,255,0.08);
}
.card-header{
  padding:14px 20px;
  background:var(--header-bg);
  color:var(--header-text);
  font-weight:600;
  font-size:15px;
}
.school-header{
  background:var(--header-bg);
  color:white;
  padding:16px 20px;
  border-radius:20px;
  text-align:center;
  margin-bottom:20px;
}
.school-name{font-size:20px;font-weight:700;color:#ffffff;}
.school-sub{font-size:11px;opacity:0.8;margin-top:4px;color:#cbd5e1;}
.fiche-title{
  font-size:14px;
  margin-top:8px;
  padding-top:6px;
  border-top:1px solid rgba(255,255,255,0.15);
  font-weight:500;
  color:#ffffff;
}
.tabs-container{
  margin-bottom:20px;
  overflow-x:auto;
  white-space:nowrap;
  scrollbar-width:thin;
}
.tabs-container::-webkit-scrollbar{height:4px;}
.tabs-container::-webkit-scrollbar-track{background:rgba(255,255,255,0.1);border-radius:4px;}
.tabs-container::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.3);border-radius:4px;}
.tabs{
  display:inline-flex;
  gap:6px;
  padding-bottom:4px;
}
.tab{
  background:transparent;
  border:1px solid var(--border);
  padding:9px 20px;
  border-radius:40px;
  font-weight:500;
  font-size:13px;
  cursor:pointer;
  color:var(--text-secondary);
  transition:all 0.2s;
  white-space:nowrap;
}
.tab:hover{background:var(--tab-hover);color:#ffffff;border-color:transparent;}
.tab.active{background:var(--tab-active);color:#ffffff;border-color:transparent;}
.tab-content{display:none;animation:fadeIn 0.25s ease;}
.tab-content.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.form-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:14px;
  padding:20px;
}
@media (min-width:768px){.form-grid{grid-template-columns:repeat(2,1fr)}}
.form-field{
  display:flex;
  flex-direction:column;
  gap:6px;
}
.form-field label{
  font-size:11px;
  font-weight:600;
  color:var(--text-secondary);
  text-transform:uppercase;
}
.form-field input,.form-field select{
  background:var(--input-bg);
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px 14px;
  font-size:14px;
  color:#ffffff;
}
.form-field input:focus,.form-field select:focus{
  outline:none;
  border-color:#3b82f6;
  box-shadow:0 0 0 2px rgba(59,130,246,0.2);
}
.btn{
  background:var(--tab-active);
  color:#ffffff;
  border:none;
  padding:10px 20px;
  border-radius:40px;
  font-weight:500;
  cursor:pointer;
  font-size:13px;
  display:inline-flex;
  align-items:center;
  gap:8px;
  transition:all 0.2s;
}
.btn:hover{background:var(--tab-hover);transform:translateY(-1px);}
.btn-sm{padding:7px 14px;font-size:12px;}
.btn-outline{background:transparent;border:1.5px solid #3b82f6;color:#3b82f6;}
.btn-outline:hover{background:#3b82f6;color:#ffffff;}
.btn-danger{background:#7f1d1d;}
.btn-danger:hover{background:#991b1b;}
.btn-success{background:#14532d;}
.btn-success:hover{background:#166534;}
.btn-group{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
.epreuve-section{display:flex;flex-direction:column;gap:16px;padding:16px;}
.epreuve-box{background:rgba(45,55,72,0.6);border-radius:16px;padding:12px;border:1px solid var(--border);}
.epreuve-box h4{font-size:13px;margin-bottom:10px;color:#60a5fa;font-weight:600;}
.epreuve-list{display:flex;flex-wrap:wrap;gap:8px;}
.epreuve-item{
  display:flex;
  align-items:center;
  gap:8px;
  background:var(--input-bg);
  padding:6px 12px;
  border-radius:40px;
  border:1px solid var(--border);
}
.epreuve-item input{
  width:65px;
  padding:6px;
  border-radius:20px;
  border:1px solid var(--border);
  text-align:center;
  background:var(--input-bg);
  color:#ffffff;
  font-size:12px;
}
.epreuve-item input[type="date"]{width:110px;}
.table-wrapper{overflow-x:auto;padding:0 16px 20px;}
.student-table{width:100%;border-collapse:collapse;font-size:12px;min-width:1200px;}
.student-table th{
  background:var(--table-header-bg);
  color:#ffffff;
  padding:12px 6px;
  border-bottom:2px solid var(--border);
  font-size:11px;
  font-weight:600;
}
.student-table td{border-bottom:1px solid var(--border);padding:8px 4px;color:#ffffff;}
.student-table input{
  width:50px;
  padding:6px 2px;
  border:1px solid var(--border);
  border-radius:8px;
  text-align:center;
  font-size:11px;
  background:var(--input-bg);
  color:#ffffff;
}
.student-table select{
  background:var(--input-bg);
  border:1px solid var(--border);
  border-radius:8px;
  padding:6px;
  color:#ffffff;
}
.footer-note{text-align:center;padding:12px;font-size:11px;color:var(--text-secondary);}
.fiche-selector{
  background:var(--bg-card);
  margin:12px 16px 0;
  padding:12px 16px;
  border-radius:20px;
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
  border:1px solid var(--border);
}
.fiche-selector label{font-weight:600;color:#60a5fa;font-size:12px;}
.fiche-selector select{
  flex:1;
  padding:8px 12px;
  border-radius:14px;
  border:1px solid var(--border);
  font-size:13px;
  background:var(--input-bg);
  color:#ffffff;
}
.modal-confirm{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.7);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:10002;
}
.confirm-box{
  background:var(--bg-card);
  border-radius:24px;
  padding:24px;
  max-width:350px;
  text-align:center;
}
.confirm-box h4{font-size:18px;margin-bottom:12px;color:#f59e0b;}
.confirm-box p{margin-bottom:20px;font-size:14px;color:#ffffff;}
.confirm-box .btn-ok{
  background:#ef4444;
  color:white;
  border:none;
  padding:8px 24px;
  border-radius:40px;
  cursor:pointer;
  margin-right:10px;
}
.confirm-box .btn-cancel{
  background:#64748b;
  color:white;
  border:none;
  padding:8px 24px;
  border-radius:40px;
  cursor:pointer;
}
.toast-notification{
  position:fixed;
  top:20px;
  left:50%;
  transform:translateX(-50%) translateY(-100px);
  background:rgba(0,0,0,0.9);
  color:#ffffff;
  padding:10px 20px;
  border-radius:40px;
  z-index:10001;
  transition:transform 0.3s;
  border-left:3px solid #10b981;
  font-size:13px;
}
.toast-notification.show{transform:translateX(-50%) translateY(0);}
.toast-notification.error{border-left-color:#ef4444;}
.login-overlay{
  position:fixed;
  top:0;left:0;right:0;bottom:0;
  background:rgba(0,0,0,0.95);
  backdrop-filter:blur(20px);
  z-index:10000;
  display:flex;
  align-items:center;
  justify-content:center;
}
.login-card{
  background:var(--bg-card);
  border-radius:32px;
  padding:32px;
  width:90%;
  max-width:380px;
  text-align:center;
}
.login-card h2{
  font-size:22px;
  font-weight:800;
  background:linear-gradient(135deg,#60a5fa,#3b82f6);
  -webkit-background-clip:text;
  background-clip:text;
  color:transparent;
  margin-bottom:8px;
}
.login-card p{color:var(--text-secondary);margin-bottom:20px;font-size:13px;}
.login-card input,.login-card select{
  width:100%;
  padding:12px;
  margin-bottom:14px;
  border-radius:40px;
  border:1px solid var(--border);
  background:var(--input-bg);
  color:#ffffff;
}
.login-card button{
  width:100%;
  padding:12px;
  border-radius:40px;
  background:linear-gradient(135deg,#60a5fa,#3b82f6);
  color:white;
  font-weight:600;
  border:none;
  cursor:pointer;
}
.login-error{color:#ef4444;font-size:12px;margin-top:8px;}
.empty-state{text-align:center;padding:40px 20px;color:var(--text-secondary);}
.empty-state h3{font-size:16px;margin-bottom:8px;color:#cbd5e1;}
.batch-list{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:12px;}
.batch-item{
  display:flex;
  align-items:center;
  gap:6px;
  background:var(--input-bg);
  padding:5px 10px;
  border-radius:30px;
  font-size:12px;
  border:1px solid var(--border);
}
.batch-item label{color:#ffffff;}
.toolbar{
  display:flex;
  flex-wrap:wrap;
  gap:8px;
  align-items:center;
  margin:12px 16px;
}
.toolbar input{
  padding:8px 14px;
  border-radius:40px;
  border:1px solid var(--border);
  background:var(--input-bg);
  color:#ffffff;
  width:200px;
  font-size:12px;
}
.eleve-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.eleve-row input{padding:8px;border-radius:12px;border:1px solid var(--border);background:var(--input-bg);color:#ffffff;flex:1;}
.eleve-row select{padding:8px;border-radius:12px;border:1px solid var(--border);background:var(--input-bg);color:#ffffff;}
.eleve-list{padding:16px;max-height:500px;overflow-y:auto;}
</style>
</head>
<body>
<div class="container" id="mainApp" style="display:none">
<div class="school-header">
<div class="school-name">COMPLEXE SCOLAIRE GLORIA DEI</div>
<div class="school-sub">KASUMBALESA / NEW KOVO</div>
<div class="fiche-title">FICHE DE COTATION</div>
</div>
<div class="tabs-container"><div class="tabs">
<button class="tab active" data-tab="tabProf">📚 PROFESSEURS</button>
<button class="tab" data-tab="tabEpreuves">📝 EPREUVES</button>
<button class="tab" data-tab="tabEleves">👨‍🎓 ÉLÈVES</button>
<button class="tab" data-tab="tabCotation">📊 COTATION</button>
<button class="tab" data-tab="tabExports">📄 EXPORTS</button>
<button class="tab" data-tab="tabParams">⚙️ PARAMÈTRES</button>
</div></div>
<div id="tabProf" class="tab-content active">
<div class="card"><div class="card-header">GESTION DES FICHES</div>
<div class="fiche-selector"><label>📚 Fiche active :</label><select id="ficheSelect"></select></div>
<div class="form-grid">
<div class="form-field"><label>COURS</label><input type="text" id="coursInput"></div>
<div class="form-field"><label>CLASSE</label><input type="text" id="classeInput"></div>
<div class="form-field"><label>ANNEE</label><input type="text" id="anneeInput" value="2026-2027" readonly style="background:#2d3748"></div>
<div class="form-field"><label>TITULAIRE</label><input type="text" id="titulaireInput"></div>
</div>
<div class="prof-config" style="padding:16px;margin:0 16px 20px;border:1px solid var(--border);border-radius:20px">
<h3 style="font-size:13px;margin-bottom:12px;color:#ffffff">NOTE MAX PAR PÉRIODE</h3>
<input type="number" id="p1MaxConfig" value="20" step="1" style="width:100px;padding:8px;border-radius:12px;background:var(--input-bg);color:#ffffff;border:1px solid var(--border)">
<div class="btn-group" style="margin-top:12px">
<button class="btn btn-success btn-sm" id="newFicheBtn">📄 NOUVELLE FICHE</button>
<button class="btn btn-danger btn-sm" id="deleteFicheBtn">🗑️ SUPPRIMER</button>
</div>
<div class="btn-group" style="margin-top:8px">
<button class="btn btn-info btn-sm" id="copyElevesBtn">📋 COPIER ELEVES</button>
<select id="copySourceSelect" style="padding:7px;border-radius:40px;background:var(--input-bg);color:#ffffff;border:1px solid var(--border)"><option value="">-- Source --</option></select>
</div>
</div>
</div>
</div>
<div id="tabEpreuves" class="tab-content">
<div class="card"><div class="card-header">EPREUVES PAR PERIODE</div>
<div class="fiche-selector"><label>📚 Fiche :</label><select id="epreuveFicheSelector"></select></div>
<div class="epreuve-section" id="epreuvesContainer"><div class="empty-state"><h3>Aucune fiche sélectionnée</h3></div></div>
<div style="padding:0 16px 20px;display:flex;gap:8px;flex-wrap:wrap">
<button class="btn btn-sm" id="addEpreuve1">+ P1</button>
<button class="btn btn-sm" id="addEpreuve2">+ P2</button>
<button class="btn btn-sm" id="addEpreuve3">+ P3</button>
<button class="btn btn-sm" id="addEpreuve4">+ P4</button>
</div>
</div>
</div>
<div id="tabEleves" class="tab-content">
<div class="card"><div class="card-header">LISTE DES ÉLÈVES</div>
<div class="fiche-selector"><label>📚 Fiche :</label><select id="elevesFicheSelector"></select></div>
<div id="elevesListContainer" class="eleve-list"><div class="empty-state"><h3>Aucune fiche sélectionnée</h3></div></div>
<button class="btn btn-success btn-sm" id="addEleveBtn" style="margin:0 16px 20px">+ AJOUTER ELEVE</button>
</div>
</div>
<div id="tabCotation" class="tab-content">
<div class="card"><div class="card-header">TABLEAU DES NOTES</div>
<div class="fiche-selector"><label>📚 Fiche :</label><select id="cotationFicheSelector"></select></div>
<div class="toolbar"><input type="text" id="searchInput" placeholder="🔍 Rechercher..."><button class="btn-sm btn-outline" id="sortAlphaBtn">🔤 Tri alphabétique</button></div>
<div class="table-wrapper"><table class="student-table" id="cotationTable"><thead id="cotationHeader"></thead><tbody id="cotationBody"></tbody></table></div>
</div>
</div>
<div id="tabExports" class="tab-content">
<div class="card"><div class="card-header">EXPORTATIONS PDF</div>
<div class="fiche-selector"><label>📚 Fiche active :</label><select id="exportFicheSelector"></select></div>
<div class="btn-group" style="padding:20px;flex-direction:column;gap:12px">
<button class="btn btn-info" id="exportCurrentBtn">📄 PDF - Fiche active</button>
<button class="btn btn-success" id="exportLotBtn">📚 PDF - Toutes les fiches (multi-pages)</button>
<button class="btn btn-warning" id="exportEleveNotesBtn">📄 PDF - Épreuves d'un élève</button>
<select id="eleveForExportSelect" style="padding:10px;border-radius:40px;background:var(--input-bg);color:#ffffff;border:1px solid var(--border);margin-top:10px"><option value="">-- Choisir un élève --</option></select>
</div>
</div>
</div>
<div id="tabParams" class="tab-content">
<div class="card"><div class="card-header">PARAMÈTRES</div>
<div class="btn-group" style="padding:20px;flex-direction:column;gap:12px">
<button class="btn btn-danger" id="logoutBtnParam">🚪 DÉCONNEXION</button>
<div style="border-top:1px solid var(--border);margin:10px 0;padding-top:15px">
<h3 style="font-size:13px;margin-bottom:12px;color:#ffffff">CHANGER LE CODE D'ACCÈS</h3>
<input type="password" id="oldCode" placeholder="Ancien code" style="width:100%;padding:10px;margin-bottom:8px;border-radius:40px;background:var(--input-bg);color:#ffffff;border:1px solid var(--border)">
<input type="password" id="newCode1" placeholder="Nouveau code" style="width:100%;padding:10px;margin-bottom:8px;border-radius:40px;background:var(--input-bg);color:#ffffff;border:1px solid var(--border)">
<input type="password" id="newCode2" placeholder="Confirmer nouveau code" style="width:100%;padding:10px;margin-bottom:8px;border-radius:40px;background:var(--input-bg);color:#ffffff;border:1px solid var(--border)">
<button class="btn btn-info btn-sm" id="changeCodeBtn">✅ CHANGER LE CODE</button>
</div>
</div>
</div>
</div>
<div class="footer-note">CS. GLORIA DEI</div>
</div>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, doc, getDoc, getDocs, setDoc, deleteDoc, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
const firebaseConfig = {
    apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA",
    authDomain: "netubexmoney.firebaseapp.com",
    projectId: "netubexmoney",
    storageBucket: "netubexmoney.firebasestorage.app",
    messagingSenderId: "856592608176",
    appId: "1:856592608176:web:69f9df9cfd4f8c28630475"
};
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let currentProf = null, currentFicheId = null, currentFiche = null, toutesFiches = [];
let fichesASupprimer = [];
let saveTimeout = null;
function toast(msg, isError = false) {
    let d = document.createElement('div');
    d.className = 'toast-notification' + (isError ? ' error' : '');
    d.innerHTML = `<span>${isError ? '❌' : '✓'}</span><span>${msg}</span>`;
    document.body.appendChild(d);
    setTimeout(() => d.classList.add('show'), 10);
    setTimeout(() => { d.classList.remove('show'); setTimeout(() => d.remove(), 300); }, 2000);
}
function showConfirm(msg, onOk) {
    let div = document.createElement('div');
    div.className = 'modal-confirm';
    div.innerHTML = `<div class="confirm-box"><h4>⚠️ CONFIRMATION</h4><p>${msg}</p><button class="btn-ok">OUI</button><button class="btn-cancel">NON</button></div>`;
    document.body.appendChild(div);
    div.querySelector('.btn-ok').onclick = () => { div.remove(); onOk(); };
    div.querySelector('.btn-cancel').onclick = () => div.remove();
}
function debounceSave() {
    if(saveTimeout) clearTimeout(saveTimeout);
    saveTimeout = setTimeout(() => { if(currentFiche && currentFicheId) autoSave(); }, 500);
}
async function autoSave() {
    if(!currentProf || !currentFicheId || !currentFiche) return;
    if((!currentFiche.eleves || currentFiche.eleves.length === 0)) {
        if(!fichesASupprimer.includes(currentFicheId)) fichesASupprimer.push(currentFicheId);
        return;
    }
    try {
        await setDoc(doc(db, "gloria_dei_fiches", `${currentProf.id}_${currentFicheId}`), currentFiche);
        const idx = fichesASupprimer.indexOf(currentFicheId);
        if(idx !== -1) fichesASupprimer.splice(idx,1);
    } catch(e) { console.error(e); }
}
async function nettoyerFichesVides() {
    for(let id of fichesASupprimer) {
        try {
            await deleteDoc(doc(db, "gloria_dei_fiches", `${currentProf.id}_${id}`));
        } catch(e) {}
    }
    fichesASupprimer = [];
}
async function loadAllFiches() {
    if(!currentProf) return [];
    const q = query(collection(db, "gloria_dei_fiches"), where("profId", "==", currentProf.id));
    const snap = await getDocs(q);
    return snap.docs.filter(d => {
        const data = d.data();
        return data.eleves && data.eleves.length > 0 && !data._type;
    }).map(d => ({ id: d.data().ficheId, cours: d.data().cours, classe: d.data().classe }));
}
async function loadFiche(id) {
    const docRef = doc(db, "gloria_dei_fiches", `${currentProf.id}_${id}`);
    const snap = await getDoc(docRef);
    if(snap.exists() && !snap.data()._type) return snap.data();
    return null;
}
async function saveProfCode() {
    if(!currentProf) return;
    const docRef = doc(db, "gloria_dei_fiches", `prof_${currentProf.id}`);
    await setDoc(docRef, { _type: "prof", profId: currentProf.id, nom: currentProf.nom, code: currentProf.code });
}
async function loadProfCode(profId) {
    const docRef = doc(db, "gloria_dei_fiches", `prof_${profId}`);
    const snap = await getDoc(docRef);
    if(snap.exists()) return snap.data().code;
    return null;
}
async function refreshSelectors() {
    toutesFiches = await loadAllFiches();
    const selects = ['ficheSelect', 'epreuveFicheSelector', 'elevesFicheSelector', 'cotationFicheSelector', 'exportFicheSelector'];
    for(let selId of selects) {
        let sel = document.getElementById(selId);
        if(sel) {
            sel.innerHTML = '<option value="">-- Choisir une fiche --</option>';
            for(let f of toutesFiches) {
                let opt = document.createElement('option');
                opt.value = f.id;
                opt.textContent = `${f.cours || '?'} - ${f.classe || '?'}`;
                if(currentFicheId === f.id) opt.selected = true;
                sel.appendChild(opt);
            }
            sel.onchange = async () => { if(sel.value) await setCurrentFiche(sel.value); };
        }
    }
    let copySelect = document.getElementById('copySourceSelect');
    if(copySelect) {
        copySelect.innerHTML = '<option value="">-- Copier depuis --</option>';
        for(let f of toutesFiches) if(f.id !== currentFicheId) copySelect.innerHTML += `<option value="${f.id}">${f.cours} - ${f.classe}</option>`;
    }
}
async function setCurrentFiche(id) {
    if(!id) { currentFicheId = null; currentFiche = null; refreshUI(); return; }
    currentFicheId = id;
    currentFiche = await loadFiche(id);
    if(!currentFiche) {
        currentFiche = { profId: currentProf.id, ficheId: id, cours: "", classe: "", titulaire: "", anneeScolaire: "2026-2027", p1Max: 20, epreuvesParPeriode: {1:[{nom:"Interrogation",max:20,date:getTodayDate()},{nom:"Devoir",max:20,date:getTodayDate()}],2:[{nom:"Interrogation",max:20,date:getTodayDate()},{nom:"Devoir",max:20,date:getTodayDate()}],3:[{nom:"Interrogation",max:20,date:getTodayDate()},{nom:"Devoir",max:20,date:getTodayDate()}],4:[{nom:"Interrogation",max:20,date:getTodayDate()},{nom:"Devoir",max:20,date:getTodayDate()}]}, eleves: [] };
    }
    document.getElementById('coursInput').value = currentFiche.cours || '';
    document.getElementById('classeInput').value = currentFiche.classe || '';
    document.getElementById('titulaireInput').value = currentFiche.titulaire || '';
    document.getElementById('p1MaxConfig').value = currentFiche.p1Max || 20;
    refreshUI();
    await refreshSelectors();
}
function getTodayDate() {
    let d = new Date();
    return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}
function refreshUI() {
    if(!currentFiche) { document.getElementById('epreuvesContainer').innerHTML = '<div class="empty-state"><h3>Aucune fiche</h3></div>'; document.getElementById('cotationHeader').innerHTML = ''; document.getElementById('cotationBody').innerHTML = '<tr><td class="empty-state">Aucune fiche</td></tr>'; document.getElementById('elevesListContainer').innerHTML = '<div class="empty-state"><h3>Aucune fiche</h3></div>'; return; }
    afficherEpreuves();
    afficherEleves();
    afficherCotation();
    let eleveSelect = document.getElementById('eleveForExportSelect');
    if(eleveSelect) {
        eleveSelect.innerHTML = '<option value="">-- Choisir un élève --</option>';
        (currentFiche.eleves || []).forEach((e,i) => eleveSelect.innerHTML += `<option value="${i}">${e.nom}</option>`);
    }
}
document.getElementById('coursInput').oninput = () => { if(currentFiche) { currentFiche.cours = document.getElementById('coursInput').value; debounceSave(); refreshSelectors(); } };
document.getElementById('classeInput').oninput = () => { if(currentFiche) { currentFiche.classe = document.getElementById('classeInput').value; debounceSave(); refreshSelectors(); } };
document.getElementById('titulaireInput').oninput = () => { if(currentFiche) { currentFiche.titulaire = document.getElementById('titulaireInput').value; debounceSave(); } };
document.getElementById('p1MaxConfig').oninput = () => { if(currentFiche) { currentFiche.p1Max = parseFloat(document.getElementById('p1MaxConfig').value) || 20; debounceSave(); afficherCotation(); } };
function afficherEpreuves() {
    let cont = document.getElementById('epreuvesContainer');
    if(!cont) return;
    cont.innerHTML = '';
    for(let p=1;p<=4;p++) {
        let box = document.createElement('div');
        box.className = 'epreuve-box';
        box.innerHTML = `<h4>PERIODE ${p}</h4><div class="epreuve-list" id="listEpreuve${p}"></div>`;
        cont.appendChild(box);
        let listDiv = document.getElementById(`listEpreuve${p}`);
        if(listDiv) {
            listDiv.innerHTML = '';
            let eps = currentFiche.epreuvesParPeriode[p] || [];
            for(let i=0;i<eps.length;i++) {
                let div = document.createElement('div');
                div.className = 'epreuve-item';
                div.innerHTML = `<input type="text" value="${eps[i].nom}" onchange="window.updEpreuve(${p},${i},'nom',this.value)" style="width:80px"><input type="number" value="${eps[i].max}" onchange="window.updEpreuve(${p},${i},'max',this.value)" style="width:55px"><input type="date" value="${eps[i].date || getTodayDate()}" onchange="window.updEpreuve(${p},${i},'date',this.value)" style="width:110px"><span style="cursor:pointer;color:#ef4444" onclick="window.delEpreuve(${p},${i})">✖</span>`;
                listDiv.appendChild(div);
            }
            if(eps.length===0) listDiv.innerHTML = '<span style="font-size:12px;color:#94a3b8">Aucune épreuve</span>';
        }
    }
}
window.updEpreuve = (p, idx, field, val) => {
    if(field === 'nom') currentFiche.epreuvesParPeriode[p][idx].nom = val;
    else if(field === 'max') currentFiche.epreuvesParPeriode[p][idx].max = parseFloat(val)||20;
    else if(field === 'date') currentFiche.epreuvesParPeriode[p][idx].date = val;
    afficherCotation(); debounceSave();
};
window.delEpreuve = (p, idx) => {
    currentFiche.epreuvesParPeriode[p].splice(idx,1);
    afficherEpreuves(); afficherCotation(); debounceSave();
};
function afficherEleves() {
    let cont = document.getElementById('elevesListContainer');
    if(!cont) return;
    cont.innerHTML = '';
    let eleves = currentFiche.eleves || [];
    for(let i=0;i<eleves.length;i++) {
        let div = document.createElement('div');
        div.className = 'eleve-row';
        div.innerHTML = `<input type="text" value="${eleves[i].nom}" placeholder="Nom" onchange="window.updEleve(${i},'nom',this.value)" style="flex:1"><select onchange="window.updEleve(${i},'sexe',this.value)"><option value="M" ${eleves[i].sexe=='M'?'selected':''}>M</option><option value="F" ${eleves[i].sexe=='F'?'selected':''}>F</option></select><span onclick="window.delEleve(${i})" style="cursor:pointer;color:#ef4444;font-size:18px">🗑️</span>`;
        cont.appendChild(div);
    }
    if(eleves.length===0) cont.innerHTML = '<div class="empty-state"><h3>Aucun élève</h3><p>Cliquez sur + AJOUTER</p></div>';
}
window.updEleve = (idx, field, val) => { currentFiche.eleves[idx][field] = val; debounceSave(); };
window.delEleve = (idx) => { currentFiche.eleves.splice(idx,1); afficherEleves(); afficherCotation(); debounceSave(); };
function calcMoy(periode, notes) {
    let eps = currentFiche.epreuvesParPeriode[periode] || [];
    if(!eps.length || !notes || !notes.length) return 0;
    let sumN=0, sumM=0;
    for(let i=0;i<eps.length;i++) { sumN += (notes[i]||0); sumM += (eps[i].max||1); }
    return sumM ? Math.min(currentFiche.p1Max, Math.round((sumN/sumM)*currentFiche.p1Max)) : 0;
}
function afficherCotation() {
    let thead = document.getElementById('cotationHeader');
    let tbody = document.getElementById('cotationBody');
    let eleves = currentFiche.eleves || [];
    let pMax = currentFiche.p1Max || 20;
    if(!eleves.length) { thead.innerHTML = ''; tbody.innerHTML = '<tr><td class="empty-state">Aucun élève</td></tr>'; return; }
    let headers = ['<th>N°</th><th>NOM</th><th>SEXE</th>'];
    for(let p=1;p<=4;p++) {
        let eps = currentFiche.epreuvesParPeriode[p] || [];
        for(let ep of eps) headers.push(`<th>${ep.nom}<br>P${p}<br>/${ep.max}</th>`);
        headers.push(`<th style="background:var(--moy-bg)">MOY P${p}</th>`);
    }
    headers.push('<th>TOTAL</th><th></th>');
    thead.innerHTML = headers.join('');
    tbody.innerHTML = '';
    for(let i=0;i<eleves.length;i++) {
        let e = eleves[i];
        if(!e.notes) e.notes = {p1:[],p2:[],p3:[],p4:[]};
        let row = `<tr><td>${i+1}</td><td><input type="text" value="${e.nom}" onchange="window.updNoteField(${i},'nom',this.value)" style="width:120px"></td><td><select onchange="window.updNoteField(${i},'sexe',this.value)"><option value="M" ${e.sexe=='M'?'selected':''}>M</option><option value="F" ${e.sexe=='F'?'selected':''}>F</option></select>`;
        let tot = 0;
        for(let p=1;p<=4;p++) {
            let eps = currentFiche.epreuvesParPeriode[p] || [];
            for(let ei=0;ei<eps.length;ei++) {
                let val = (e.notes['p'+p] && e.notes['p'+p][ei]) ? e.notes['p'+p][ei] : 0;
                row += `<td><input type="number" step="0.5" min="0" max="${eps[ei].max}" value="${val}" onchange="window.updNote(${i},${p},${ei},this.value)" style="width:50px"></td>`;
            }
            let moy = calcMoy(p, e.notes['p'+p]||[]);
            row += `<td style="background:var(--moy-bg);font-weight:bold">${moy}</td>`;
            tot += moy;
        }
        row += `<td style="background:var(--total-bg);font-weight:bold">${tot}</td>`;
        row += `<td><span onclick="window.delEleve(${i})" style="cursor:pointer;color:#ef4444">🗑️</span></td></tr>`;
        tbody.innerHTML += row;
    }
}
window.updNoteField = (idx, field, val) => { currentFiche.eleves[idx][field] = val; debounceSave(); };
window.updNote = (idx, p, ei, val) => {
    let v = parseFloat(val)||0;
    let maxEp = (currentFiche.epreuvesParPeriode[p]||[])[ei]?.max || 20;
    if(v>maxEp) v=maxEp;
    if(!currentFiche.eleves[idx].notes) currentFiche.eleves[idx].notes = {p1:[],p2:[],p3:[],p4:[]};
    if(!currentFiche.eleves[idx].notes['p'+p]) currentFiche.eleves[idx].notes['p'+p] = [];
    currentFiche.eleves[idx].notes['p'+p][ei] = v;
    afficherCotation(); debounceSave();
};
async function generateFichePDF(ficheData, addPage = false) {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('landscape', 'mm', 'a4');
    if(addPage) pdf.addPage();
    pdf.setFontSize(14); pdf.setTextColor(30,60,92); pdf.setFont('helvetica','bold');
    pdf.text('COMPLEXE SCOLAIRE GLORIA DEI', 148, 15, { align: 'center' });
    pdf.setFontSize(9); pdf.setTextColor(80,80,80); pdf.setFont('helvetica','normal');
    pdf.text('KASUMBALESA / NEW KOVO', 148, 22, { align: 'center' });
    pdf.setFontSize(11); pdf.setTextColor(30,60,92); pdf.setFont('helvetica','bold');
    pdf.text('FICHE DE COTATION', 148, 30, { align: 'center' });
    pdf.setFontSize(9); pdf.setTextColor(50,50,50); pdf.setFont('helvetica','normal');
    pdf.text(`Cours: ${ficheData.cours} | Classe: ${ficheData.classe} | Enseignant: ${currentProf.nom}`, 14, 40);
    let pMax = ficheData.p1Max || 20;
    let eps = ficheData.epreuvesParPeriode || {1:[],2:[],3:[],4:[]};
    let headers = ['N°', 'NOM', 'SEXE'];
    for(let p=1;p<=4;p++) {
        for(let ep of (eps[p]||[])) headers.push(`${ep.nom} P${p}`);
        headers.push(`Moy P${p}`);
    }
    headers.push('TOTAL');
    let body = [];
    for(let i=0;i<(ficheData.eleves||[]).length;i++) {
        let e = ficheData.eleves[i];
        let row = [(i+1).toString(), e.nom, e.sexe];
        let tot = 0;
        for(let p=1;p<=4;p++) {
            let sumN=0, sumM=0;
            for(let ep of (eps[p]||[])) {
                let idx = (eps[p]||[]).indexOf(ep);
                let val = (e.notes?.['p'+p]||[])[idx]||0;
                row.push(val);
                sumN += val; sumM += ep.max;
            }
            let moy = sumM ? Math.min(pMax, Math.round((sumN/sumM)*pMax)) : 0;
            row.push(moy);
            tot += moy;
        }
        row.push(tot);
        body.push(row);
    }
    pdf.autoTable({ head: [headers], body: body, startY: 50, theme: 'grid', styles: { fontSize: 7, textColor: [0,0,0] }, headStyles: { fillColor: [200,210,220] } });
    return pdf;
}
document.getElementById('exportCurrentBtn').onclick = async () => {
    if(!currentFiche || !currentFiche.eleves || currentFiche.eleves.length === 0) { toast("Aucune fiche avec élèves", true); return; }
    let pdf = await generateFichePDF(currentFiche, false);
    pdf.save(`Fiche_${currentFiche.cours || 'cours'}.pdf`);
    toast("PDF exporté");
};
document.getElementById('exportLotBtn').onclick = async () => {
    let fiches = await loadAllFiches();
    if(fiches.length === 0) { toast("Aucune fiche avec élèves", true); return; }
    toast(`Génération de ${fiches.length} fiche(s)...`);
    let first = true;
    let finalPdf = null;
    for(let i=0;i<fiches.length;i++) {
        let ficheData = await loadFiche(fiches[i].id);
        if(ficheData && ficheData.eleves && ficheData.eleves.length > 0) {
            let pdf = await generateFichePDF(ficheData, !first);
            if(first) { finalPdf = pdf; first = false; }
            else {
                let totalPages = pdf.internal.getNumberOfPages();
                for(let p=1;p<=totalPages;p++) {
                    finalPdf.addPage();
                    finalPdf.addImage(pdf.getPageData(p), 'JPEG', 0, 0, 297, 210);
                }
            }
        }
    }
    if(finalPdf) finalPdf.save(`Toutes_fiches_${currentProf.nom}.pdf`);
    toast("Export terminé");
};

document.getElementById('addEleveBtn').onclick = () => {
    if(!currentFiche) { toast("Sélectionnez une fiche", true); return; }
    if(!currentFiche.eleves) currentFiche.eleves = [];

async function showLogin() {
    let div = document.createElement('div');
    div.className = 'login-overlay'; div.id = 'loginOverlay';
    div.innerHTML = `<div class="login-card"><h2>GLORIA DEI</h2><p>Accès enseignant</p><select id="loginNom"><option value="">-- Choisir --</option><option value="Prof. NGENDA Flory" data-id="p1">Prof. NGENDA Flory</option><option value="Prof. KASONGO Jean" data-id="p2">Prof. KASONGO Jean</option></select><input type="password" id="loginCode" placeholder="Code d'accès"><button id="loginBtn">🔐 CONNEXION</button><div id="loginError"></div></div>`;
    document.body.appendChild(div);
    document.getElementById('loginBtn').onclick = async () => {
        let nom = document.getElementById('loginNom').value;
        let code = document.getElementById('loginCode').value;
        let profId = nom === "Prof. NGENDA Flory" ? "p1" : (nom === "Prof. KASONGO Jean" ? "p2" : null);
        if(!profId) { document.getElementById('loginError').innerText = "Sélectionnez un professeur"; return; }
        let savedCode = await loadProfCode(profId);
        let defaultCode = profId === "p1" ? "NGENDA2025" : "KASONGO123";
        let validCode = savedCode ? savedCode : defaultCode;
        if(code === validCode) {
            currentProf = { id: profId, nom: nom, code: validCode };
            if(!savedCode) await saveProfCode();
            document.getElementById('loginOverlay').remove();
            document.getElementById('mainApp').style.display = 'block';
            await nettoyerFichesVides();
            toutesFiches = await loadAllFiches();
            if(toutesFiches.length) await setCurrentFiche(toutesFiches[0].id);
            else { currentFicheId = null; currentFiche = null; refreshUI(); }
            await refreshSelectors();
            toast(`Bienvenue ${currentProf.nom}`);
        } else document.getElementById('loginError').innerText = "Code incorrect";
    };
}
