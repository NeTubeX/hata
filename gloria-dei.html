<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<meta name="msapplication-navbutton-color" content="#0a0e1a">

<title>Gloria Dei - Fiche de Cotation</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#0a0e1a;min-height:100vh;}
body{background:#0a0e1a;font-family:'Inter',sans-serif;padding:20px;min-height:100vh;color:#EAEAEA;}
.container{max-width:1400px;margin:0 auto}
.card{background:rgba(18,18,31,0.9);backdrop-filter:blur(10px);border-radius:20px;box-shadow:0 8px 32px rgba(0,0,0,0.3);margin-bottom:20px;overflow:hidden;border:1px solid rgba(59,130,246,0.2);}
.card-header{padding:14px 20px;background:linear-gradient(135deg,#0f2b44,#071a2c);color:#ffffff;font-weight:600;font-size:15px;}
.school-header{background:linear-gradient(135deg,#0f2b44,#071a2c);color:white;padding:20px;border-radius:20px;text-align:center;margin-bottom:20px;border-bottom:2px solid rgba(59,130,246,0.4);}
.school-name{font-size:22px;font-weight:700;background:linear-gradient(135deg,#fff,#94a3b8);-webkit-background-clip:text;background-clip:text;color:transparent;}
.school-sub{font-size:11px;opacity:0.8;margin-top:4px;color:#cbd5e1;}
.fiche-title{font-size:14px;margin-top:8px;padding-top:6px;border-top:1px solid rgba(255,255,255,0.15);font-weight:500;color:#ffffff;}
.tabs-container{margin-bottom:20px;overflow-x:auto;white-space:nowrap;scrollbar-width:thin;}
.tabs-container::-webkit-scrollbar{height:4px;}
.tabs-container::-webkit-scrollbar-track{background:rgba(255,255,255,0.1);border-radius:4px;}
.tabs-container::-webkit-scrollbar-thumb{background:rgba(255,255,255,0.3);border-radius:4px;}
.tabs{display:inline-flex;gap:6px;padding-bottom:4px;}
.tab{background:transparent;border:1px solid #334155;padding:9px 20px;border-radius:40px;font-weight:500;font-size:13px;cursor:pointer;color:#cbd5e1;transition:all 0.2s;white-space:nowrap;}
.tab:hover{background:#2d4a6e;color:#ffffff;border-color:transparent;}
.tab.active{background:#1e3a5f;color:#ffffff;border-color:transparent;}
.tab-content{display:none;animation:fadeIn 0.25s ease;}
.tab-content.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.form-grid{display:grid;grid-template-columns:1fr;gap:14px;padding:20px;}
@media (min-width:768px){.form-grid{grid-template-columns:repeat(2,1fr)}}
.form-field{display:flex;flex-direction:column;gap:6px;}
.form-field label{font-size:11px;font-weight:600;color:#cbd5e1;text-transform:uppercase;}
.form-field input,.form-field select{background:#2d3748;border:1px solid #334155;border-radius:12px;padding:10px 14px;font-size:14px;color:#ffffff;}
.form-field input:focus,.form-field select:focus{outline:none;border-color:#3b82f6;box-shadow:0 0 0 2px rgba(59,130,246,0.2);}
.btn{background:#1e3a5f;color:#ffffff;border:none;padding:10px 20px;border-radius:40px;font-weight:500;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:8px;transition:all 0.1s ease;position:relative;overflow:hidden;}
.btn:active{transform:scale(0.96);}
.btn::after{content:'';position:absolute;top:50%;left:50%;width:0;height:0;border-radius:50%;background:rgba(255,255,255,0.3);transform:translate(-50%,-50%);transition:width 0.3s, height 0.3s;}
.btn:active::after{width:200px;height:200px;}
.btn:hover{background:#2d4a6e;}
.btn-sm{padding:7px 14px;font-size:12px;}
.btn-outline{background:transparent;border:1.5px solid #3b82f6;color:#3b82f6;}
.btn-outline:hover{background:#3b82f6;color:#ffffff;}
.btn-danger{background:#7f1d1d;}
.btn-danger:hover{background:#991b1b;}
.btn-success{background:#14532d;}
.btn-success:hover{background:#166534;}
.btn-group{display:flex;gap:10px;flex-wrap:wrap;margin-top:8px;}
.epreuve-section{display:flex;flex-direction:column;gap:16px;padding:16px;}
.epreuve-box{background:rgba(45,55,72,0.6);border-radius:16px;padding:12px;border:1px solid #334155;}
.epreuve-box h4{font-size:13px;margin-bottom:10px;color:#60a5fa;font-weight:600;}
.epreuve-list{display:flex;flex-wrap:wrap;gap:8px;}
.epreuve-item{display:flex;align-items:center;gap:8px;background:#2d3748;padding:6px 12px;border-radius:40px;border:1px solid #334155;}
.epreuve-item input{width:65px;padding:6px;border-radius:20px;border:1px solid #334155;text-align:center;background:#2d3748;color:#ffffff;font-size:12px;}
.epreuve-item input[type="date"]{width:110px;}
.table-wrapper{overflow-x:auto;padding:0 16px 20px;}
.student-table{width:100%;border-collapse:collapse;font-size:12px;min-width:1400px;}
.student-table th{background:#0f172a;color:#ffffff;padding:12px 6px;border-bottom:2px solid #334155;font-size:11px;font-weight:600;}
.student-table td{border-bottom:1px solid #334155;padding:8px 4px;color:#e2e8f0;}
.student-table input{width:55px;padding:6px 2px;border:1px solid #334155;border-radius:8px;text-align:center;font-size:11px;background:#2d3748;color:#ffffff;}
.student-table select{background:#2d3748;border:1px solid #334155;border-radius:8px;padding:6px;color:#ffffff;}
.footer-note{text-align:center;padding:12px;font-size:11px;color:#4a5568;}
.fiche-selector{background:rgba(18,18,31,0.9);margin:12px 16px 0;padding:12px 16px;border-radius:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;border:1px solid #334155;}
.fiche-selector label{font-weight:600;color:#60a5fa;font-size:12px;}
.fiche-selector select{flex:1;padding:8px 12px;border-radius:14px;border:1px solid #334155;font-size:13px;background:#2d3748;color:#ffffff;}
.modal-confirm{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.7);display:flex;align-items:center;justify-content:center;z-index:10002;}
.confirm-box{background:rgba(18,18,31,0.95);border-radius:24px;padding:24px;max-width:350px;text-align:center;}
.confirm-box h4{font-size:18px;margin-bottom:12px;color:#f59e0b;}
.confirm-box p{margin-bottom:20px;font-size:14px;color:#ffffff;}
.confirm-box .btn-ok{background:#ef4444;color:white;border:none;padding:8px 24px;border-radius:40px;cursor:pointer;margin-right:10px;}
.confirm-box .btn-cancel{background:#64748b;color:white;border:none;padding:8px 24px;border-radius:40px;cursor:pointer;}
.toast-notification{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:rgba(0,0,0,0.95);backdrop-filter:blur(12px);color:#ffffff;padding:10px 20px;border-radius:40px;z-index:10001;transition:transform 0.3s;border-left:3px solid #10b981;font-size:13px;}
.toast-notification.show{transform:translateX(-50%) translateY(0);}
.toast-notification.error{border-left-color:#ef4444;}
.login-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);backdrop-filter:blur(20px);z-index:10000;display:flex;align-items:center;justify-content:center;}
.login-card{background:rgba(18,18,31,0.95);border-radius:32px;padding:32px;width:90%;max-width:380px;text-align:center;}
.login-card h2{font-size:22px;font-weight:800;background:linear-gradient(135deg,#60a5fa,#3b82f6);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:8px;}
.login-card p{color:#cbd5e1;margin-bottom:20px;font-size:13px;}
.login-card input,.login-card select{width:100%;padding:12px;margin-bottom:14px;border-radius:40px;border:1px solid #334155;background:#2d3748;color:#ffffff;}
.login-card button{width:100%;padding:12px;border-radius:40px;background:linear-gradient(135deg,#60a5fa,#3b82f6);color:white;font-weight:600;border:none;cursor:pointer;transition:all 0.1s ease;}
.login-card button:active{transform:scale(0.96);}
.login-error{color:#ef4444;font-size:13px;margin-top:8px;background:rgba(239,68,68,0.15);padding:8px;border-radius:12px;font-weight:500;}
.empty-state{text-align:center;padding:40px 20px;color:#cbd5e1;}
.empty-state h3{font-size:16px;margin-bottom:8px;color:#ffffff;}
.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin:12px 16px;}
.toolbar input{padding:8px 14px;border-radius:40px;border:1px solid #334155;background:#2d3748;color:#ffffff;width:200px;font-size:12px;}
.eleve-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.eleve-row input{padding:8px;border-radius:12px;border:1px solid #334155;background:#2d3748;color:#ffffff;flex:1;}
.eleve-row select{padding:8px;border-radius:12px;border:1px solid #334155;background:#2d3748;color:#ffffff;}
.eleve-list{padding:16px;max-height:500px;overflow-y:auto;}
.blocked-message{position:fixed;top:0;left:0;right:0;bottom:0;background:#1a1a2e;display:flex;align-items:center;justify-content:center;z-index:20000;padding:20px;}
.blocked-card{background:#1e2933;border-radius:32px;padding:32px;text-align:center;max-width:350px;border:1px solid #ef4444;}
.blocked-card h2{color:#ef4444;margin-bottom:16px;font-size:20px;}
.blocked-card p{color:#cbd5e1;margin-bottom:24px;line-height:1.5;}
.blocked-card .icon{font-size:48px;margin-bottom:16px;}
</style>
</head>
<body>
<div class="container" id="mainApp" style="display:none">
<div class="school-header">
<div class="school-name">COMPLEXE SCOLAIRE GLORIA DEI</div>
<div class="school-sub">KASUMBALESA / NEW KOVO</div>
<div class="fiche-title">FICHE DE COTATION</div>
</div>
<div class="tabs-container"><div class="tabs">
<button class="tab active" data-tab="tabProf">📚 PROFESSEURS</button>
<button class="tab" data-tab="tabEpreuves">📝 EPREUVES</button>
<button class="tab" data-tab="tabEleves">👨‍🎓 ÉLÈVES</button>
<button class="tab" data-tab="tabCotation">📊 COTATION</button>
<button class="tab" data-tab="tabExports">📄 EXPORTS</button>
<button class="tab" data-tab="tabParams">⚙️ PARAMÈTRES</button>
</div></div>
<div id="tabProf" class="tab-content active">
<div class="card"><div class="card-header">GESTION DES FICHES</div>
<div class="fiche-selector"><label>📚 Fiche active :</label><select id="ficheSelect"></select></div>
<div class="form-grid">
<div class="form-field"><label>COURS</label><input type="text" id="coursInput" placeholder="Ex: Mathématique"></div>
<div class="form-field"><label>CLASSE</label><input type="text" id="classeInput" placeholder="Ex: 6ème A"></div>
<div class="form-field"><label>ANNEE</label><input type="text" id="anneeInput" value="2026-2027" readonly style="background:#2d3748"></div>
<div class="form-field"><label>TITULAIRE</label><input type="text" id="titulaireInput" placeholder="Nom du titulaire"></div>
</div>
<div class="prof-config" style="padding:16px;margin:0 16px 20px;border:1px solid #334155;border-radius:20px">
<h3 style="font-size:13px;margin-bottom:12px;color:#ffffff">NOTE MAX PAR PÉRIODE</h3>
<input type="number" id="p1MaxConfig" value="20" step="1" style="width:100px;padding:8px;border-radius:12px;background:#2d3748;color:#ffffff;border:1px solid #334155">
<div class="btn-group" style="margin-top:12px">
<button class="btn btn-success btn-sm" id="newFicheBtn">📄 NOUVELLE FICHE</button>
<button class="btn btn-danger btn-sm" id="deleteFicheBtn">🗑️ SUPPRIMER</button>
</div>
<div class="btn-group" style="margin-top:8px">
<button class="btn btn-info btn-sm" id="copyElevesBtn">📋 COPIER ELEVES</button>
<select id="copySourceSelect" style="padding:7px;border-radius:40px;background:#2d3748;color:#ffffff;border:1px solid #334155"><option value="">-- Source --</option></select>
</div>
</div>
</div>
</div>
<div id="tabEpreuves" class="tab-content">
<div class="card"><div class="card-header">EPREUVES PAR PERIODE</div>
<div class="fiche-selector"><label>📚 Fiche :</label><select id="epreuveFicheSelector"></select></div>
<div class="epreuve-section" id="epreuvesContainer"><div class="empty-state"><h3>Aucune fiche sélectionnée</h3></div></div>
<div style="padding:0 16px 20px;display:flex;gap:8px;flex-wrap:wrap">
<button class="btn btn-sm" id="addEpreuve1">+ P1</button>
<button class="btn btn-sm" id="addEpreuve2">+ P2</button>
<button class="btn btn-sm" id="addEpreuve3">+ P3</button>
<button class="btn btn-sm" id="addEpreuve4">+ P4</button>
</div>
</div>
</div>
<div id="tabEleves" class="tab-content">
<div class="card"><div class="card-header">LISTE DES ÉLÈVES</div>
<div class="fiche-selector"><label>📚 Fiche :</label><select id="elevesFicheSelector"></select></div>
<div id="elevesListContainer" class="eleve-list"><div class="empty-state"><h3>Aucune fiche sélectionnée</h3></div></div>
<button class="btn btn-success btn-sm" id="addEleveBtn" style="margin:0 16px 20px">+ AJOUTER ELEVE</button>
</div>
</div>
<div id="tabCotation" class="tab-content">
<div class="card"><div class="card-header">TABLEAU DES NOTES</div>
<div class="fiche-selector"><label>📚 Fiche :</label><select id="cotationFicheSelector"></select></div>
<div class="toolbar"><input type="text" id="searchInput" placeholder="🔍 Rechercher..."><button class="btn-sm btn-outline" id="sortAlphaBtn">🔤 Tri alphabétique</button></div>
<div class="table-wrapper"><table class="student-table" id="cotationTable"><thead id="cotationHeader"></thead><tbody id="cotationBody"></tbody></table></div>
</div>
</div>
<div id="tabExports" class="tab-content">
<div class="card"><div class="card-header">EXPORTATIONS PDF</div>
<div class="fiche-selector"><label>📚 Fiche active :</label><select id="exportFicheSelector"></select></div>
<div class="btn-group" style="padding:20px;flex-direction:column;gap:12px">
<button class="btn btn-info" id="exportCurrentBtn">📄 PDF - Fiche active</button>
<button class="btn btn-warning" id="exportEleveNotesBtn">📄 PDF - Épreuves d'un élève</button>
<select id="eleveForExportSelect" style="padding:10px;border-radius:40px;background:#2d3748;color:#ffffff;border:1px solid #334155;margin-top:10px"><option value="">-- Choisir un élève --</option></select>
</div>
</div>
</div>
<div id="tabParams" class="tab-content">
<div class="card"><div class="card-header">PARAMÈTRES</div>
<div class="btn-group" style="padding:20px;flex-direction:column;gap:12px">
<button class="btn btn-danger" id="logoutBtnParam">🚪 DÉCONNEXION</button>
<div style="border-top:1px solid #334155;margin:10px 0;padding-top:15px">
<h3 style="font-size:13px;margin-bottom:12px;color:#ffffff">CHANGER LE CODE D'ACCÈS</h3>
<input type="password" id="oldCode" placeholder="Ancien code" style="width:100%;padding:10px;margin-bottom:8px;border-radius:40px;background:#2d3748;color:#ffffff;border:1px solid #334155">
<input type="password" id="newCode1" placeholder="Nouveau code" style="width:100%;padding:10px;margin-bottom:8px;border-radius:40px;background:#2d3748;color:#ffffff;border:1px solid #334155">
<input type="password" id="newCode2" placeholder="Confirmer nouveau code" style="width:100%;padding:10px;margin-bottom:8px;border-radius:40px;background:#2d3748;color:#ffffff;border:1px solid #334155">
<button class="btn btn-info btn-sm" id="changeCodeBtn">✅ CHANGER LE CODE</button>
</div>
</div>
</div>
</div>
<div class="footer-note">CS. GLORIA DEI</div>
</div>
<script type="module">
document.addEventListener('contextmenu', e => e.preventDefault());
document.addEventListener('keydown', e => { if(e.key === 'F12' || (e.ctrlKey && e.shiftKey && e.key === 'I') || (e.ctrlKey && e.shiftKey && e.key === 'C') || (e.ctrlKey && e.key === 'U')) e.preventDefault(); });
function isMobileOrTablet() { const ua = navigator.userAgent.toLowerCase(); return /android|webos|iphone|ipad|ipod|blackberry|windows phone|iemobile|opera mini|mobile/i.test(ua) || /ipad|android(?!.*mobile)|tablet|kindle|silk/i.test(ua) || window.innerWidth <= 1024; }
if (!isMobileOrTablet()) { document.body.innerHTML = `<div class="blocked-message"><div class="blocked-card"><div class="icon">📱🚫</div><h2>Accès limité</h2><p>Cette application est accessible uniquement depuis un téléphone mobile ou une tablette.</p></div></div>`; throw new Error("Accès uniquement depuis mobile/tablette"); }
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, doc, getDoc, getDocs, setDoc, deleteDoc, query, where, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
const firebaseConfig = { apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA", authDomain: "netubexmoney.firebaseapp.com", projectId: "netubexmoney", storageBucket: "netubexmoney.firebasestorage.app", messagingSenderId: "856592608176", appId: "1:856592608176:web:69f9df9cfd4f8c28630475" };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
let currentProf = null, currentFicheId = null, currentFiche = null, toutesFiches = [];
let saveTimeout = null;
function getNextFicheNumero() { return new Promise(async resolve => { const compteurRef = doc(db, "gloria_dei_fiches", "_compteur_global"); const compteurSnap = await getDoc(compteurRef); if(compteurSnap.exists()) { const newNum = (compteurSnap.data().valeur || 0) + 1; await updateDoc(compteurRef, { valeur: increment(1) }); resolve(newNum); } else { await setDoc(compteurRef, { valeur: 1 }); resolve(1); } }); }
function formatNumero(num) { return 'F' + String(num).padStart(3, '0'); }
function toast(msg, isError = false) { let d = document.createElement('div'); d.className = 'toast-notification' + (isError ? ' error' : ''); d.innerHTML = `<span>${isError ? '❌' : '✓'}</span><span>${msg}</span>`; document.body.appendChild(d); setTimeout(() => d.classList.add('show'), 10); setTimeout(() => { d.classList.remove('show'); setTimeout(() => d.remove(), 300); }, 2000); }
function showConfirm(msg, onOk) { let div = document.createElement('div'); div.className = 'modal-confirm'; div.innerHTML = `<div class="confirm-box"><h4>⚠️ CONFIRMATION</h4><p>${msg}</p><button class="btn-ok">OUI</button><button class="btn-cancel">NON</button></div>`; document.body.appendChild(div); div.querySelector('.btn-ok').onclick = () => { div.remove(); onOk(); }; div.querySelector('.btn-cancel').onclick = () => div.remove(); }
async function autoSave() { if(!currentProf || !currentFicheId || !currentFiche) return; try { await setDoc(doc(db, "gloria_dei_fiches", `${currentProf.id}_${currentFicheId}`), currentFiche); } catch(e) { console.error(e); } }
function debounceSave() { if(saveTimeout) clearTimeout(saveTimeout); saveTimeout = setTimeout(() => autoSave(), 500); }
async function loadAllFiches() { if(!currentProf) return []; const q = query(collection(db, "gloria_dei_fiches"), where("profId", "==", currentProf.id)); const snap = await getDocs(q); const fiches = []; for(const docSnap of snap.docs) { const data = docSnap.data(); if(data._type === "prof") continue; if(!data.cours && !data.classe) continue; let numeroRef = data.numeroRef; if(!numeroRef) { numeroRef = await getNextFicheNumero(); await setDoc(doc(db, "gloria_dei_fiches", docSnap.id), { ...data, numeroRef }, { merge: true }); } fiches.push({ id: data.ficheId, cours: data.cours, classe: data.classe, eleves: data.eleves, numeroRef }); } return fiches; }
async function loadFiche(id) { const docRef = doc(db, "gloria_dei_fiches", `${currentProf.id}_${id}`); const snap = await getDoc(docRef); if(snap.exists() && !snap.data()._type) return snap.data(); return null; }
async function saveProfCode() { if(!currentProf) return; await setDoc(doc(db, "gloria_dei_fiches", `prof_${currentProf.id}`), { _type: "prof", profId: currentProf.id, nom: currentProf.nom, code: currentProf.code }); }
async function loadProfCode(profId) { const snap = await getDoc(doc(db, "gloria_dei_fiches", `prof_${profId}`)); return snap.exists() ? snap.data().code : null; }
async function refreshSelectors() { toutesFiches = await loadAllFiches(); const selects = ['ficheSelect', 'epreuveFicheSelector', 'elevesFicheSelector', 'cotationFicheSelector', 'exportFicheSelector']; for(let selId of selects) { let sel = document.getElementById(selId); if(sel) { sel.innerHTML = '<option value="">-- Choisir une fiche --</option>'; for(let f of toutesFiches) { let opt = document.createElement('option'); opt.value = f.id; let refa = f.numeroRef ? formatNumero(f.numeroRef) : '???'; opt.textContent = `${refa} - ${f.cours || '?'} - ${f.classe || '?'}`; if(currentFicheId === f.id) opt.selected = true; sel.appendChild(opt); } sel.onchange = async () => { if(sel.value) await setCurrentFiche(sel.value); }; } } let copySelect = document.getElementById('copySourceSelect'); if(copySelect) { copySelect.innerHTML = '<option value="">-- Copier depuis --</option>'; for(let f of toutesFiches) if(f.id !== currentFicheId) copySelect.innerHTML += `<option value="${f.id}">${f.cours} - ${f.classe}</option>`; } }

document.getElementById('changeCodeBtn').onclick = async () => { let old = document.getElementById('oldCode').value; let new1 = document.getElementById('newCode1').value; let new2 = document.getElementById('newCode2').value; if(old !== currentProf.code) { toast("Ancien code incorrect", true); return; } if(new1 !== new2) { toast("Les nouveaux codes ne correspondent pas", true); return; } if(new1.length < 4) { toast("Code trop court (min 4)", true); return; } currentProf.code = new1; await saveProfCode(); document.getElementById('oldCode').value = ''; document.getElementById('newCode1').value = ''; document.getElementById('newCode2').value = ''; toast("Code modifié avec succès"); };
document.querySelectorAll('.tab').forEach(btn => { btn.onclick = function() { document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active')); this.classList.add('active'); document.getElementById(this.dataset.tab).classList.add('active'); if(this.dataset.tab === 'tabCotation') afficherCotation(); if(this.dataset.tab === 'tabEpreuves') afficherEpreuves(); if(this.dataset.tab === 'tabEleves') afficherEleves(); }; });
async function showLogin() { let div = document.createElement('div'); div.className = 'login-overlay'; div.id = 'loginOverlay'; div.innerHTML = `<div class="login-card"><h2>GLORIA DEI</h2><p>Accès enseignant</p><select id="loginNom"><option value="">-- Choisir --</option><option value="Prof. NGENDA Flory" data-id="p1">Prof. NGENDA Flory</option><option value="Prof. KASONGO Jean" data-id="p2">Prof. KASONGO Jean</option></select><input type="password" id="loginCode" placeholder="Code d'accès"><button id="loginBtn">🔐 CONNEXION</button><div id="loginError"></div></div>`; document.body.appendChild(div); document.getElementById('loginBtn').onclick = async () => { let nom = document.getElementById('loginNom').value; let code = document.getElementById('loginCode').value; let profId = nom === "Prof. NGENDA Flory" ? "p1" : (nom === "Prof. KASONGO Jean" ? "p2" : null); if(!profId) { document.getElementById('loginError').innerText = "Sélectionnez un professeur"; return; } let savedCode = await loadProfCode(profId); let defaultCode = profId === "p1" ? "NGENDA2025" : "KASONGO123"; let validCode = savedCode ? savedCode : defaultCode; if(code === validCode) { currentProf = { id: profId, nom: nom, code: validCode }; if(!savedCode) await saveProfCode(); document.getElementById('loginOverlay').remove(); document.getElementById('mainApp').style.display = 'block'; toutesFiches = await loadAllFiches(); if(toutesFiches.length) await setCurrentFiche(toutesFiches[0].id); else { currentFicheId = null; currentFiche = null; refreshUI(); } await refreshSelectors(); toast(`Bienvenue ${currentProf.nom}`); } else { document.getElementById('loginError').innerHTML = '<span style="color:#ef4444;font-weight:bold;">❌ Code incorrect. Veuillez réessayer.</span>'; } }; }
showLogin();
</script>
