<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0e1a">
<title>Gloria Dei - Fiche de Cotation</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.31/jspdf.plugin.autotable.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#0a0e1a;font-family:'Inter',sans-serif;}
.container{max-width:1400px;margin:0 auto;padding:20px;}
.card{background:rgba(18,18,31,0.9);backdrop-filter:blur(10px);border-radius:20px;margin-bottom:20px;overflow:hidden;border:1px solid rgba(59,130,246,0.2);}
.card-header{padding:14px 20px;background:linear-gradient(135deg,#0f2b44,#071a2c);color:#fff;font-weight:600;}
.school-header{background:linear-gradient(135deg,#0f2b44,#071a2c);border-radius:20px;padding:20px;text-align:center;margin-bottom:20px;}
.school-name{font-size:22px;font-weight:700;background:linear-gradient(135deg,#fff,#94a3b8);-webkit-background-clip:text;background-clip:text;color:transparent;}
.school-sub{font-size:11px;opacity:0.8;margin-top:4px;color:#cbd5e1;}
.tabs-container{overflow-x:auto;margin-bottom:20px;white-space:nowrap;}
.tabs{display:inline-flex;gap:6px;}
.tab{background:transparent;border:1px solid #334155;padding:9px 20px;border-radius:40px;font-size:13px;cursor:pointer;color:#cbd5e1;}
.tab.active{background:#1e3a5f;color:#fff;border-color:transparent;}
.tab-content{display:none;animation:fadeIn 0.25s;}
.tab-content.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.form-grid{display:grid;grid-template-columns:1fr;gap:14px;padding:20px;}
@media(min-width:768px){.form-grid{grid-template-columns:repeat(2,1fr)}}
.form-field{display:flex;flex-direction:column;gap:6px;}
.form-field label{font-size:11px;font-weight:600;color:#cbd5e1;}
.form-field input,.form-field select{background:#2d3748;border:1px solid #334155;border-radius:12px;padding:10px 14px;color:#fff;}
.btn{background:#1e3a5f;color:#fff;border:none;padding:10px 20px;border-radius:40px;font-weight:500;cursor:pointer;font-size:13px;display:inline-flex;align-items:center;gap:8px;}
.btn:active{transform:scale(0.96);}
.btn-sm{padding:6px 14px;font-size:12px;}
.btn-outline{background:transparent;border:1.5px solid #3b82f6;color:#3b82f6;}
.btn-danger{background:#7f1d1d;}
.btn-success{background:#14532d;}
.btn-secondary{background:#334155;}
.btn-secondary:hover{background:#475569;}
.btn-titulaire{background:linear-gradient(135deg,#8b5cf6,#7c3aed);color:#fff;width:100%;justify-content:center;}
.btn-titulaire:hover{background:linear-gradient(135deg,#7c3aed,#6d28d9);}
.table-wrapper{overflow-x:auto;padding:0 16px 20px;}
.student-table{width:100%;border-collapse:collapse;font-size:12px;min-width:1400px;}
.student-table th{background:#0f172a;padding:12px 6px;border-bottom:2px solid #334155;font-size:11px;color:#fff;}
.student-table td{border-bottom:1px solid #334155;padding:8px 4px;color:#e2e8f0;}
.student-table input{width:55px;padding:6px;border-radius:8px;background:#2d3748;border:1px solid #334155;color:#fff;text-align:center;}
.footer-note{text-align:center;padding:12px;font-size:11px;color:#4a5568;}
.fiche-selector{background:rgba(18,18,31,0.9);margin:12px 16px 0;padding:12px 16px;border-radius:20px;display:flex;align-items:center;gap:12px;flex-wrap:wrap;}
.fiche-selector label{color:#fff;}
.fiche-selector select{flex:1;padding:8px 12px;border-radius:14px;background:#2d3748;border:1px solid #334155;color:#fff;}
.modal-fullscreen{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);backdrop-filter:blur(20px);z-index:20000;display:flex;align-items:center;justify-content:center;visibility:hidden;opacity:0;transition:all 0.2s;}
.modal-fullscreen.show{visibility:visible;opacity:1;}
.modal-content{background:linear-gradient(135deg,#1e293b,#0f172a);border-radius:32px;width:90%;max-width:600px;padding:24px;border:1px solid rgba(59,130,246,0.3);max-height:80vh;overflow-y:auto;}
.modal-content h3{font-size:20px;margin-bottom:8px;background:linear-gradient(135deg,#60a5fa,#a78bfa);-webkit-background-clip:text;background-clip:text;color:transparent;}
.modal-content input{width:100%;padding:12px;border-radius:40px;background:#2d3748;border:1px solid #334155;color:#fff;margin:16px 0;}
.modal-content p, .modal-content span, .modal-content div{color:#fff;}
.prof-list-item{display:flex;justify-content:space-between;align-items:center;padding:16px;border-bottom:1px solid #334155;flex-wrap:wrap;gap:12px;background:rgba(0,0,0,0.2);border-radius:12px;margin-bottom:8px;}
.prof-list-item:last-child{border-bottom:none;margin-bottom:0;}
.prof-info{flex:2;min-width:180px;}
.prof-name{font-weight:700;font-size:16px;color:#fff;margin-bottom:6px;}
.prof-date{font-size:12px;color:#94a3b8;}
.prof-code{font-family:monospace;font-weight:700;background:#0f172a;padding:8px 16px;border-radius:40px;font-size:14px;min-width:130px;text-align:center;}
.code-visible{color:#10b981;}
.code-hidden{color:#f97316;}
.prof-actions{display:flex;gap:8px;}
.icon-admin{background:rgba(59,130,246,0.2);border:none;font-size:24px;cursor:pointer;padding:8px;border-radius:50%;width:44px;height:44px;display:flex;align-items:center;justify-content:center;margin-top:16px;transition:all 0.2s;}
.icon-admin:hover{background:rgba(59,130,246,0.4);transform:scale(1.05);}
.toast-notification{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-100px);background:rgba(0,0,0,0.95);color:#fff;padding:10px 20px;border-radius:40px;z-index:30000;transition:transform 0.3s;border-left:3px solid #10b981;}
.toast-notification.show{transform:translateX(-50%) translateY(0);}
.empty-state{text-align:center;padding:40px;color:#94a3b8;}
.login-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);backdrop-filter:blur(20px);z-index:10000;display:flex;align-items:center;justify-content:center;}
.login-card{background:rgba(18,18,31,0.95);border-radius:32px;padding:32px;width:90%;max-width:380px;text-align:center;}
.login-card h2{font-size:22px;font-weight:800;background:linear-gradient(135deg,#60a5fa,#3b82f6);-webkit-background-clip:text;background-clip:text;color:transparent;margin-bottom:8px;}
.login-card p{color:#cbd5e1;}
.login-card input,.login-card select{width:100%;padding:12px;margin-bottom:14px;border-radius:40px;border:1px solid #334155;background:#2d3748;color:#fff;}
.login-card button{width:100%;padding:12px;border-radius:40px;background:linear-gradient(135deg,#60a5fa,#3b82f6);color:#fff;font-weight:600;border:none;cursor:pointer;}
.eleve-row{display:flex;align-items:center;gap:10px;margin-bottom:8px;}
.eleve-row input{flex:1;padding:8px;border-radius:12px;background:#2d3748;border:1px solid #334155;color:#fff;}
.epreuve-box{background:rgba(45,55,72,0.6);border-radius:16px;padding:12px;margin-bottom:12px;}
.epreuve-list{display:flex;flex-wrap:wrap;gap:8px;}
.epreuve-item{display:flex;align-items:center;gap:8px;background:#2d3748;padding:6px 12px;border-radius:40px;}
.code-popup{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.95);z-index:20001;display:flex;align-items:center;justify-content:center;visibility:hidden;opacity:0;transition:all 0.2s;}
.code-popup.show{visibility:visible;opacity:1;}
.code-box{background:linear-gradient(135deg,#1e293b,#0f172a);border-radius:32px;padding:32px;text-align:center;border:2px solid #10b981;max-width:350px;}
.code-box p, .code-box h3{color:#fff;}
.generated-code{font-size:28px;font-weight:800;background:#10b981;display:inline-block;padding:12px 24px;border-radius:60px;letter-spacing:2px;margin:16px 0;color:#fff;}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-header h3{margin:0;color:#fff;}
.close-modal{font-size:28px;cursor:pointer;color:#94a3b8;transition:color 0.2s;}
.close-modal:hover{color:#ef4444;}
.info-banner{background:rgba(59,130,246,0.15);border-radius:16px;padding:12px;margin-bottom:20px;text-align:center;border-left:3px solid #3b82f6;}
.info-banner p{color:#cbd5e1;font-size:13px;margin:0;}
</style>
</head>
<body>
<div class="container" id="mainApp" style="display:none">
<div class="school-header">
<div class="school-name">COMPLEXE SCOLAIRE GLORIA DEI</div>
<div class="school-sub">KASUMBALESA / KOYO (NEW KOYO)</div>
<div style="font-size:13px;margin-top:8px;color:#fff;">FICHE DE COTATION</div>
</div>
<div class="tabs-container"><div class="tabs">
<button class="tab active" data-tab="tabProf">📚 PROFESSEURS</button>
<button class="tab" data-tab="tabEpreuves">📝 EPREUVES</button>
<button class="tab" data-tab="tabEleves">👨‍🎓 ÉLÈVES</button>
<button class="tab" data-tab="tabCotation">📊 COTATION</button>
<button class="tab" data-tab="tabExports">📄 EXPORTS</button>
<button class="tab" data-tab="tabParams">⚙️ PARAMÈTRES</button>
</div></div>
<div id="tabProf" class="tab-content active"><div class="card"><div class="card-header">GESTION DES FICHES</div>
<div class="fiche-selector"><label>📚 Fiche active :</label><select id="ficheSelect"></select></div>
<div class="form-grid"><div class="form-field"><label>COURS</label><input type="text" id="coursInput"></div><div class="form-field"><label>CLASSE</label><input type="text" id="classeInput"></div><div class="form-field"><label>ANNEE</label><input type="text" id="anneeInput" value="2026-2027" readonly></div><div class="form-field"><label>TITULAIRE</label><input type="text" id="titulaireInput"></div></div>
<div class="prof-config" style="padding:16px;margin:0 16px 20px;border:1px solid #334155;border-radius:20px"><h3 style="font-size:13px;margin-bottom:12px;color:#fff;">NOTE MAX</h3><input type="number" id="p1MaxConfig" value="20" step="1" style="width:100px;padding:8px;border-radius:12px;background:#2d3748;color:#fff;border:1px solid #334155;"><div class="btn-group" style="margin-top:12px"><button class="btn btn-success btn-sm" id="newFicheBtn">📄 NOUVELLE FICHE</button><button class="btn btn-danger btn-sm" id="deleteFicheBtn">🗑️ SUPPRIMER</button></div></div></div></div>
<div id="tabEpreuves" class="tab-content"><div class="card"><div class="card-header">EPREUVES PAR PERIODE</div><div class="fiche-selector"><select id="epreuveFicheSelector"></select></div><div id="epreuvesContainer" style="padding:16px"></div><div style="padding:16px;display:flex;gap:8px"><button class="btn btn-sm" id="addEpreuve1">+ P1</button><button class="btn btn-sm" id="addEpreuve2">+ P2</button><button class="btn btn-sm" id="addEpreuve3">+ P3</button><button class="btn btn-sm" id="addEpreuve4">+ P4</button></div></div></div>
<div id="tabEleves" class="tab-content"><div class="card"><div class="card-header">LISTE DES ÉLÈVES</div><div class="fiche-selector"><select id="elevesFicheSelector"></select></div><div id="elevesListContainer" style="padding:16px;max-height:500px;overflow-y:auto"></div><button class="btn btn-success btn-sm" id="addEleveBtn" style="margin:0 16px 20px">+ AJOUTER ELEVE</button></div></div>
<div id="tabCotation" class="tab-content"><div class="card"><div class="card-header">TABLEAU DES NOTES</div><div class="fiche-selector"><select id="cotationFicheSelector"></select></div><div style="padding:16px;display:flex;gap:8px"><input type="text" id="searchInput" placeholder="🔍 Rechercher..." style="padding:8px;border-radius:40px;background:#2d3748;border:1px solid #334155;color:#fff"><button class="btn-sm btn-outline" id="sortAlphaBtn">🔤 Tri alphabétique</button></div><div class="table-wrapper"><table class="student-table" id="cotationTable"><thead id="cotationHeader"></thead><tbody id="cotationBody"></tbody></table></div></div></div>
<div id="tabExports" class="tab-content"><div class="card"><div class="card-header">EXPORTATIONS PDF</div><div class="fiche-selector"><select id="exportFicheSelector"></select></div><div style="padding:20px;display:flex;flex-direction:column;gap:12px"><button class="btn" id="exportCurrentBtn">📄 PDF - Fiche active</button><button class="btn" id="exportEleveNotesBtn">📄 PDF - Épreuves d'un élève</button><select id="eleveForExportSelect" style="padding:10px;border-radius:40px;background:#2d3748;color:#fff"><option value="">-- Choisir un élève --</option></select></div></div></div>
<div id="tabParams" class="tab-content"><div class="card"><div class="card-header">PARAMÈTRES</div><div style="padding:20px;display:flex;flex-direction:column;gap:15px"><button class="btn btn-danger" id="logoutBtnParam">🚪 DÉCONNEXION</button><button class="btn btn-titulaire" id="espaceTitulaireBtn">👤 ESPACE TITULAIRE</button><div style="border-top:1px solid #334155;padding-top:15px"><h3 style="font-size:13px;margin-bottom:12px;color:#fff;">CHANGER LE CODE D'ACCÈS</h3><input type="password" id="oldCode" placeholder="Ancien code" style="width:100%;padding:10px;margin-bottom:8px;border-radius:40px;background:#2d3748;color:#fff;border:1px solid #334155"><input type="password" id="newCode1" placeholder="Nouveau code" style="width:100%;padding:10px;margin-bottom:8px;border-radius:40px;background:#2d3748;color:#fff;border:1px solid #334155"><input type="password" id="newCode2" placeholder="Confirmer" style="width:100%;padding:10px;margin-bottom:8px;border-radius:40px;background:#2d3748;color:#fff;border:1px solid #334155"><button class="btn btn-sm" id="changeCodeBtn">✅ CHANGER</button></div></div></div></div>
<div class="footer-note">CS. GLORIA DEI - KOYO (NEW KOYO)</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, doc, getDoc, getDocs, setDoc, deleteDoc, query, where, updateDoc, increment } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = { apiKey: "AIzaSyB_GdmPBnWl3w6g99j1cGO7vxDdxmKr4QA", authDomain: "netubexmoney.firebaseapp.com", projectId: "netubexmoney", storageBucket: "netubexmoney.firebasestorage.app", messagingSenderId: "856592608176", appId: "1:856592608176:web:69f9df9cfd4f8c28630475" };
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

let currentProf = null, currentFicheId = null, currentFiche = null, toutesFiches = [];
let saveTimeout = null;

function toast(msg, isError = false) { let d = document.createElement('div'); d.className = 'toast-notification'; d.innerHTML = `<span>${isError ? '❌' : '✓'}</span><span>${msg}</span>`; document.body.appendChild(d); setTimeout(() => d.classList.add('show'), 10); setTimeout(() => { d.classList.remove('show'); setTimeout(() => d.remove(), 300); }, 2000); }
function formatNumero(num) { return 'F' + String(num).padStart(3, '0'); }

function formatDateAgo(timestamp) {
    if(!timestamp) return "Date inconnue";
    const now = Date.now();
    const diffMs = now - timestamp;
    const diffMins = Math.floor(diffMs / 60000);
    const diffHours = Math.floor(diffMs / 3600000);
    const diffDays = Math.floor(diffMs / 86400000);
    const diffYears = Math.floor(diffDays / 365);
    
    if(diffYears > 0) return `il y a ${diffYears} an${diffYears > 1 ? 's' : ''}`;
    if(diffDays > 0) return `il y a ${diffDays} jour${diffDays > 1 ? 's' : ''}`;
    if(diffHours > 0) return `il y a ${diffHours} heure${diffHours > 1 ? 's' : ''}`;
    if(diffMins > 0) return `il y a ${diffMins} minute${diffMins > 1 ? 's' : ''}`;
    return "moins d'1 minute";
}

function showConfirm(msg, onOk) { 
    let div = document.createElement('div'); div.className = 'modal-fullscreen'; 
    div.innerHTML = `<div class="modal-content" style="max-width:350px;text-align:center"><p style="color:#fff;margin-bottom:20px">${msg}</p><div style="display:flex;gap:12px;margin-top:20px;justify-content:center"><button class="btn" id="confirmOk" style="background:#ef4444">✓ OUI</button><button class="btn btn-outline" id="confirmCancel">✗ NON</button></div></div>`; 
    document.body.appendChild(div); setTimeout(() => div.classList.add('show'), 10); 
    div.querySelector('#confirmOk').onclick = () => { div.remove(); onOk(); }; 
    div.querySelector('#confirmCancel').onclick = () => div.remove(); 
}

async function getNextFicheNumero() { const compteurRef = doc(db, "gloria_dei_fiches", "_compteur_global"); const snap = await getDoc(compteurRef); if(snap.exists()) { const newNum = (snap.data().valeur || 0) + 1; await updateDoc(compteurRef, { valeur: increment(1) }); return newNum; } else { await setDoc(compteurRef, { valeur: 1 }); return 1; } }

async function loadAllFiches() { if(!currentProf) return []; const q = query(collection(db, "gloria_dei_fiches"), where("profId", "==", currentProf.id)); const snap = await getDocs(q); const fiches = []; for(const docSnap of snap.docs) { const data = docSnap.data(); if(data._type === "prof") continue; if(!data.cours && !data.classe) continue; let numeroRef = data.numeroRef; if(!numeroRef) { numeroRef = await getNextFicheNumero(); await setDoc(doc(db, "gloria_dei_fiches", docSnap.id), { ...data, numeroRef }, { merge: true }); } fiches.push({ id: data.ficheId, cours: data.cours, classe: data.classe, eleves: data.eleves, numeroRef }); } return fiches; }

async function loadFiche(id) { const docRef = doc(db, "gloria_dei_fiches", `${currentProf.id}_${id}`); const snap = await getDoc(docRef); if(snap.exists() && !snap.data()._type) return snap.data(); return null; }

async function autoSave() { if(!currentProf || !currentFicheId || !currentFiche) return; try { await setDoc(doc(db, "gloria_dei_fiches", `${currentProf.id}_${currentFicheId}`), currentFiche); } catch(e) { console.error(e); } }
function debounceSave() { if(saveTimeout) clearTimeout(saveTimeout); saveTimeout = setTimeout(() => autoSave(), 500); }

async function refreshSelectors() { toutesFiches = await loadAllFiches(); const selects = ['ficheSelect', 'epreuveFicheSelector', 'elevesFicheSelector', 'cotationFicheSelector', 'exportFicheSelector']; for(let selId of selects) { let sel = document.getElementById(selId); if(sel) { sel.innerHTML = '<option value="">-- Choisir --</option>'; for(let f of toutesFiches) { let opt = document.createElement('option'); opt.value = f.id; let refa = f.numeroRef ? formatNumero(f.numeroRef) : '???'; opt.textContent = `${refa} - ${f.cours || '?'} - ${f.classe || '?'}`; if(currentFicheId === f.id) opt.selected = true; sel.appendChild(opt); } sel.onchange = async () => { if(sel.value) await setCurrentFiche(sel.value); }; } } }

async function setCurrentFiche(id) { if(!id) { currentFicheId = null; currentFiche = null; refreshUI(); return; } currentFicheId = id; currentFiche = await loadFiche(id); if(!currentFiche) { let newNumero = await getNextFicheNumero(); currentFiche = { profId: currentProf.id, ficheId: id, cours: "", classe: "", titulaire: "", anneeScolaire: "2026-2027", p1Max: 20, numeroRef: newNumero, epreuvesParPeriode: {1:[{nom:"Interrogation",max:20}],2:[{nom:"Interrogation",max:20}],3:[{nom:"Interrogation",max:20}],4:[{nom:"Interrogation",max:20}]}, eleves: [] }; await autoSave(); } document.getElementById('coursInput').value = currentFiche.cours || ''; document.getElementById('classeInput').value = currentFiche.classe || ''; document.getElementById('titulaireInput').value = currentFiche.titulaire || ''; document.getElementById('p1MaxConfig').value = currentFiche.p1Max || 20; refreshUI(); await refreshSelectors(); }

function refreshUI() { if(!currentFiche) { document.getElementById('epreuvesContainer').innerHTML = '<div class="empty-state">Aucune fiche</div>'; document.getElementById('cotationHeader').innerHTML = ''; document.getElementById('cotationBody').innerHTML = '<td><td class="empty-state">Aucune fiche</td></tr>'; document.getElementById('elevesListContainer').innerHTML = '<div class="empty-state">Aucune fiche</div>'; return; } afficherEpreuves(); afficherEleves(); afficherCotation(); let eleveSelect = document.getElementById('eleveForExportSelect'); if(eleveSelect) { eleveSelect.innerHTML = '<option value="">-- Choisir --</option>'; (currentFiche.eleves || []).forEach((e,i) => eleveSelect.innerHTML += `<option value="${i}">${e.nom || 'Sans nom'}</option>`); } }

document.getElementById('coursInput').oninput = () => { if(currentFiche) { currentFiche.cours = document.getElementById('coursInput').value; debounceSave(); refreshSelectors(); } };
document.getElementById('classeInput').oninput = () => { if(currentFiche) { currentFiche.classe = document.getElementById('classeInput').value; debounceSave(); refreshSelectors(); } };
document.getElementById('titulaireInput').oninput = () => { if(currentFiche) { currentFiche.titulaire = document.getElementById('titulaireInput').value; debounceSave(); } };
document.getElementById('p1MaxConfig').oninput = () => { if(currentFiche) { currentFiche.p1Max = parseFloat(document.getElementById('p1MaxConfig').value) || 20; debounceSave(); afficherCotation(); } };

async function generateFichePDF(ficheData) {
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF('landscape', 'mm', 'a4');
    let pMax = ficheData.p1Max || 20;
    let seuil = pMax / 2;
    let refNum = ficheData.numeroRef ? formatNumero(ficheData.numeroRef) : '???';
    
    pdf.setFontSize(12); pdf.setFont('helvetica', 'bold');
    pdf.text('COMPLEXE SCOLAIRE GLORIA DEI', 148, 15, { align: 'center' });
    pdf.setFontSize(9); pdf.setFont('helvetica', 'normal');
    pdf.text('KASUMBALESA / KOYO (NEW KOYO)', 148, 22, { align: 'center' });
    pdf.setFontSize(11); pdf.setFont('helvetica', 'bold');
    pdf.text('FICHE DE COTATION', 148, 32, { align: 'center' });
    pdf.setFontSize(9); pdf.setFont('helvetica', 'normal');
    pdf.text(`ANNEE SCOLAIRE : ${ficheData.anneeScolaire || '2026-2027'}`, 14, 45);
    pdf.text(`REFERENCE : ${refNum}`, 14, 53);
    pdf.text(`COURS : ${ficheData.cours || '__________________________'}`, 14, 61);
    pdf.text(`CLASSE : ${ficheData.classe || '__________________________'}`, 14, 69);
    pdf.text(`TITULAIRE : ${ficheData.titulaire || '__________________________'}`, 14, 77);
    
    let headers = [['N°', 'NOMS - POSTNOMS', 'SEXE', '1er P', '2e P', 'EXAM', 'TOT.', '3e P', '4e P', 'EXAM', 'TOT.', 'TOTAL']];
    let body = [];
    let eps = ficheData.epreuvesParPeriode || {1:[],2:[],3:[],4:[]};
    
    function calcMP(p, notes) {
        let eee = eps[p] || [];
        if(!eee.length || !notes || !notes.length) return 0;
        let sn = 0, sm = 0;
        for(let i=0; i<eee.length; i++) {
            sn += (notes[i] || 0);
            sm += (eee[i].max || 1);
        }
        return sm ? Math.min(pMax, Math.round((sn/sm) * pMax)) : 0;
    }
    
    for(let i=0; i<(ficheData.eleves || []).length; i++) {
        let e = ficheData.eleves[i];
        let p1 = calcMP(1, e.notes?.p1 || []);
        let p2 = calcMP(2, e.notes?.p2 || []);
        let p3 = calcMP(3, e.notes?.p3 || []);
        let p4 = calcMP(4, e.notes?.p4 || []);
        let exam1 = e.notes?.exam1 || 0;
        let exam2 = e.notes?.exam2 || 0;
        let totalS1 = p1 + p2 + exam1;
        let totalS2 = p3 + p4 + exam2;
        let total = totalS1 + totalS2;
        body.push([(i+1).toString().padStart(2,'0'), e.nom || '', e.sexe || '', p1, p2, exam1, totalS1, p3, p4, exam2, totalS2, total]);
    }
    if(body.length === 0) body.push(['', '', '', '', '', '', '', '', '', '', '', '']);
    
    pdf.autoTable({
        head: headers,
        body: body,
        startY: 85,
        theme: 'grid',
        styles: { fontSize: 8, cellPadding: 2 },
        headStyles: { fillColor: [200, 210, 220], fontStyle: 'bold', textColor: [0, 0, 0] },
        bodyStyles: (data) => {
            const val = data.cell?.raw;
            if(typeof val === 'number' && !isNaN(val) && val < seuil) return { textColor: [255, 0, 0] };
            return { textColor: [0, 0, 0] };
        }
    });
    return pdf;
}

async function refreshProfsList() {
    let container = document.getElementById('profsListContainer');
    if(!container) return;
    
    const q = query(collection(db, "gloria_dei_fiches"), where("_type", "==", "prof"));
    const snap = await getDocs(q);
    let profs = [];
    snap.forEach(doc => profs.push({ id: doc.id, ...doc.data() }));
    
    if(profs.length === 0) {
        container.innerHTML = '<div class="empty-state">📭 Aucun professeur enregistré</div>';
        return;
    }
    
    profs.sort((a,b) => (b.createdAt || 0) - (a.createdAt || 0));
    container.innerHTML = '';
    
    profs.forEach(prof => {
        let createdAt = prof.createdAt || 0;
        let dateStr = createdAt ? new Date(createdAt).toLocaleDateString() + ' ' + new Date(createdAt).toLocaleTimeString() : 'Date inconnue';
        let timeAgoStr = formatDateAgo(createdAt);
        let now = Date.now();
        let isVisible = (now - createdAt) < (5 * 60 * 1000);
        let codeDisplay = isVisible && prof.code ? `<span class="prof-code code-visible">🔑 ${prof.code}</span>` : `<span class="prof-code code-hidden">🔒 Masqué</span>`;
        
        let div = document.createElement('div'); div.className = 'prof-list-item';
        div.innerHTML = `
            <div class="prof-info">
                <div class="prof-name">${escapeHtml(prof.nom)}</div>
                <div class="prof-date">📅 ${dateStr} (${timeAgoStr})</div>
            </div>
            <div class="prof-code">${codeDisplay}</div>
            <div class="prof-actions">
                <button class="btn btn-danger btn-sm" data-id="${prof.id}" data-nom="${escapeHtml(prof.nom)}">🗑️ Supprimer</button>
            </div>
        `;
        container.appendChild(div);
    });
    
    document.querySelectorAll('#profsListContainer .btn-danger').forEach(btn => {
        btn.onclick = async () => {
            let nom = btn.dataset.nom;
            showConfirm(`Supprimer définitivement le professeur "${nom}" ?`, async () => {
                await deleteDoc(doc(db, "gloria_dei_fiches", btn.dataset.id));
                toast(`Professeur "${nom}" supprimé`);
                await refreshProfsList();
            });
        };
    });
}

function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, function(m) { if(m === '&') return '&amp;'; if(m === '<') return '&lt;'; if(m === '>') return '&gt;'; return m; }); }

function generateProfCode() {
    const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ0123456789';
    let code = 'TEACH-';
    for(let i=0; i<5; i++) code += chars.charAt(Math.floor(Math.random() * chars.length));
    return code;
}

function showAddProfForm() {
    let modal = document.createElement('div'); modal.className = 'modal-fullscreen';
    modal.innerHTML = `<div class="modal-content" style="max-width:400px"><div class="modal-header"><h3>➕ NOUVEAU PROFESSEUR</h3><span class="close-modal" id="closeAddModal">&times;</span></div><input type="text" id="newProfName" placeholder="Nom complet du professeur" style="margin:16px 0"><button class="btn btn-success" id="generateAndAddBtn">🔑 GÉNÉRER ET AJOUTER</button><div style="margin-top:12px;text-align:center"><button class="btn-outline btn-sm" id="cancelAddBtn">Annuler</button></div></div>`;
    document.body.appendChild(modal); setTimeout(() => modal.classList.add('show'), 10);
    
    document.getElementById('closeAddModal').onclick = () => modal.remove();
    document.getElementById('cancelAddBtn').onclick = () => modal.remove();
    
    document.getElementById('generateAndAddBtn').onclick = async () => {
        let nom = document.getElementById('newProfName').value.trim();
        if(!nom) { toast("Entrez un nom", true); return; }
        let generatedCode = generateProfCode();
        let profId = 'prof_' + Date.now();
        await setDoc(doc(db, "gloria_dei_fiches", profId), { 
            _type: "prof", 
            profId: profId, 
            nom: nom, 
            code: generatedCode, 
            createdAt: Date.now() 
        });
        modal.remove();
        showCodePopup(nom, generatedCode);
        await refreshProfsList();
    };
}

function showCodePopup(nom, code) {
    let popup = document.createElement('div'); popup.className = 'code-popup';
    popup.innerHTML = `<div class="code-box"><div style="display:flex;justify-content:flex-end"><span style="font-size:24px;cursor:pointer;color:#fff" id="closeCodeX">&times;</span></div><h3>✅ PROFESSEUR AJOUTÉ</h3><p style="margin:8px 0;color:#fff">${escapeHtml(nom)}</p><div class="generated-code">${code}</div><p style="font-size:13px;color:#94a3b8">⚠️ Notez ce code et donnez-le au professeur.<br>Il sera masqué après 5 minutes.</p><button class="btn" id="closeCodePopup" style="margin-top:16px">◀ FERMER</button></div>`;
    document.body.appendChild(popup); setTimeout(() => popup.classList.add('show'), 10);
    document.getElementById('closeCodePopup').onclick = () => popup.remove();
    document.getElementById('closeCodeX').onclick = () => popup.remove();
}

// ========== CONNEXION ==========
async function saveProfCode() { if(!currentProf) return; await setDoc(doc(db, "gloria_dei_fiches", `prof_${currentProf.id}`), { _type: "prof", profId: currentProf.id, nom: currentProf.nom, code: currentProf.code, createdAt: currentProf.createdAt || Date.now() }); }
async function loadProfCode(profId) { const snap = await getDoc(doc(db, "gloria_dei_fiches", `prof_${profId}`)); return snap.exists() ? snap.data().code : null; }

async function showLogin() {
    let div = document.createElement('div'); div.className = 'login-overlay'; div.id = 'loginOverlay';
    div.innerHTML = `<div class="login-card"><h2>GLORIA DEI</h2><p>Accès enseignant</p><select id="loginNom"><option value="">-- Choisir --</option><option value="Prof. NGENDA Flory" data-id="p1">Prof. NGENDA Flory</option></select><input type="password" id="loginCode" placeholder="Code d'accès"><button id="loginBtn">🔐 CONNEXION</button><div style="display:flex;justify-content:center;margin-top:16px"><button id="adminIconBtn" class="icon-admin">⚙️</button></div><div id="loginError" style="margin-top:12px;font-size:13px"></div></div>`;
    document.body.appendChild(div);
    
    document.getElementById('loginBtn').onclick = async () => {
        let nom = document.getElementById('loginNom').value;
        let code = document.getElementById('loginCode').value;
        let profId = nom === "Prof. NGENDA Flory" ? "p1" : null;
        
        if(!profId) {
            const profsSnap = await getDocs(query(collection(db, "gloria_dei_fiches"), where("_type", "==", "prof")));
            let found = false;
            profsSnap.forEach(doc => {
                if(doc.data().nom === nom && doc.data().code === code) {
                    found = true;
                    profId = doc.data().profId;
                }
            });
            if(!found) { document.getElementById('loginError').innerHTML = '<span style="color:#ef4444">❌ Identifiants incorrects</span>'; return; }
        }
        
        let savedCode = await loadProfCode(profId);
        let defaultCode = "0000";
        let validCode = savedCode ? savedCode : defaultCode;
        
        if(code === validCode || (profId !== "p1")) {
            currentProf = { id: profId, nom: nom, code: validCode || code, createdAt: Date.now() };
            if(!savedCode && profId === "p1") await saveProfCode();
            document.getElementById('loginOverlay').remove();
            document.getElementById('mainApp').style.display = 'block';
            toutesFiches = await loadAllFiches();
            if(toutesFiches.length) await setCurrentFiche(toutesFiches[0].id);
            else { currentFicheId = null; currentFiche = null; refreshUI(); }
            await refreshSelectors();
            toast(`Bienvenue ${currentProf.nom}`);
        } else {
            document.getElementById('loginError').innerHTML = '<span style="color:#ef4444">❌ Code incorrect</span>';
        }
    };
    document.getElementById('adminIconBtn').onclick = () => { showAdminModal(); };
}
showLogin();
</script>
